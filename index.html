function getArticleExplanation(word, article) {
  const w = word, lw = word.toLowerCase();
  const tips = [];

  // ── 1. COMPOUND NOUNS ──
  const compoundEnds = [["straße","die","Straße (die)"],["bahn","die","Bahn (die)"],["zeit","die","Zeit (die)"],["stelle","die","Stelle (die)"],["kraft","die","Kraft (die)"],["schrift","die","Schrift (die)"],["haus","das","Haus (das)"],["zeug","das","Zeug (das)"],["rad","das","Rad (das)"],["tier","das","Tier (das)"],["stück","das","Stück (das)"],["werk","das","Werk (das)"],["bild","das","Bild (das)"],["platz","der","Platz (der)"],["hof","der","Hof (der)"],["hafen","der","Hafen (der)"],["punkt","der","Punkt (der)"],["fall","der","Fall (der)"],["schritt","der","Schritt (der)"],["grund","der","Grund (der)"],["raum","der","Raum (der)"],["kampf","der","Kampf (der)"],["schrank","der","Schrank (der)"],["schlag","der","Schlag (der)"],["gang","der","Gang (der)"],["markt","der","Markt (der)"],["dienst","der","Dienst (der)"],["wand","die","Wand (die)"]];
  if (w.length > 6) for (const [e,a,n] of compoundEnds) if (lw.endsWith(e) && lw !== e) { tips.push(`Compound noun — gender follows the last element: ${n}. This is the #1 rule in German: always look at the final component.`); break; }

  // ── 2. SUFFIX RULES (iron-clad → reliable → tendencies) ──
  if (lw.endsWith("ung")) tips.push("Suffix rule: -ung → always die. Zero exceptions. One of the first rules to learn.");
  if (lw.endsWith("heit")) tips.push("Suffix rule: -heit → always die. Abstract quality nouns from adjectives/nouns. No exceptions.");
  if (lw.endsWith("keit")) tips.push("Suffix rule: -keit → always die. Variant of -heit (used after -ig, -lich, -bar, -sam). No exceptions.");
  if (lw.endsWith("schaft")) tips.push("Suffix rule: -schaft → always die. Collective/abstract nouns. No exceptions. Think: Mannschaft, Gesellschaft, Wirtschaft.");
  if (lw.endsWith("tion")) tips.push("Suffix rule: -tion → always die. Latin-origin. Stress on last syllable: NaTION, SituaTION. No exceptions.");
  if (lw.endsWith("sion")) tips.push("Suffix rule: -sion → always die. Same Latin pattern as -tion. E.g. Diskussion, Explosion.");
  if (lw.endsWith("tät")) tips.push("Suffix rule: -tät → always die. From Latin -tās. E.g. Universität, Qualität, Realität.");
  if (lw.endsWith("enz") && article === "die") tips.push("Suffix rule: -enz → die. Latin origin, very reliable. E.g. Konkurrenz, Konferenz, Differenz.");
  if (lw.endsWith("anz") && article === "die") tips.push("Suffix rule: -anz → die. Latin origin, reliable. E.g. Toleranz, Distanz, Substanz.");
  if (lw.endsWith("ie") && lw.length > 3 && article === "die") tips.push("Suffix pattern: Stressed -ie → usually die (French/Latin origin). E.g. Energie, Philosophie, Therapie, Industrie.");
  if (lw.endsWith("ik") && article === "die") tips.push("Suffix pattern: -ik → usually die. E.g. Musik, Kritik, Logik, Technik, Fabrik, Statistik.");
  if (lw.endsWith("ur") && article === "die") tips.push("Suffix pattern: -ur → usually die (Latin origin). E.g. Natur, Kultur, Struktur, Temperatur.");
  if (lw.endsWith("ei") && article === "die" && !lw.endsWith("erei")) tips.push("Suffix pattern: -ei → usually die. E.g. Polizei, Partei, Türkei.");
  if (lw.endsWith("erei") && article === "die") tips.push("Suffix rule: -erei → always die. Denotes repeated action or a place. E.g. Bäckerei, Bücherei.");
  if (lw.endsWith("chen")) tips.push("Suffix rule: -chen (diminutive) → always das. Overrides the base noun's gender. das Mädchen (from die Magd), das Brötchen (from das Brot).");
  if (lw.endsWith("lein")) tips.push("Suffix rule: -lein (diminutive) → always das. Southern German equivalent of -chen. Always neuter.");
  if (lw.endsWith("ment") && article === "das") tips.push("Suffix pattern: -ment → usually das (Latin). E.g. Dokument, Instrument, Medikament. Careful: der Moment (point in time) is masculine!");
  if (lw.endsWith("ment") && article === "der") tips.push("Exception: der Moment is one of the few masculine -ment nouns. Most -ment nouns are das. Interesting: das Moment (= driving factor) also exists as neuter.");
  if (lw.endsWith("um") && article === "das") tips.push("Suffix pattern: -um (Latin/Greek) → usually das. E.g. Museum, Studium, Datum, Zentrum, Publikum.");
  if (lw.endsWith("tum") && article === "das") tips.push("Suffix pattern: -tum → usually das. E.g. Eigentum, Wachstum, Datum. Exceptions: der Reichtum, der Irrtum.");
  if (lw.endsWith("tum") && article === "der") tips.push("Exception: -tum is usually das, but der Reichtum and der Irrtum are the two well-known masculine exceptions.");
  if (lw.endsWith("nis") && article === "das") tips.push("Suffix pattern: -nis → often das (Ergebnis, Verständnis, Gefängnis, Geheimnis). But ~20% are die (Erkenntnis, Erlaubnis, Finsternis) — check each one.");
  if (lw.endsWith("nis") && article === "die") tips.push("Exception: Most -nis nouns are das, but this one is die. The feminine -nis words (Erkenntnis, Erlaubnis, Kenntnis, Finsternis, Besorgnis) must simply be memorized.");
  if (lw.endsWith("ling")) tips.push("Suffix rule: -ling → always der. E.g. Frühling, Flüchtling, Schmetterling, Lehrling, Säugling.");
  if (lw.endsWith("ismus")) tips.push("Suffix rule: -ismus → always der. All -ismus words (ideologies, movements, conditions) are masculine.");
  if (lw.endsWith("ist") && article === "der") tips.push("Suffix pattern: -ist → usually der (denotes a person). E.g. Optimist, Journalist, Polizist. Also a weak noun (n-Deklination).");
  if (lw.endsWith("or") && article === "der") tips.push("Suffix pattern: -or → usually der (Latin agent noun). E.g. Motor, Autor, Professor, Doktor. Plural shifts stress: Motóren, Autóren.");
  if (lw.endsWith("ant") && article === "der") tips.push("Suffix pattern: -ant → usually der (Latin). Often also a weak noun. E.g. Elefant→Elefanten, Kandidat→Kandidaten.");
  if (lw.endsWith("ent") && article === "der") tips.push("Suffix pattern: -ent → usually der (Latin). Often a weak noun. E.g. Student→Studenten, Präsident→Präsidenten, Patient→Patienten.");

  // ── 3. MORPHOLOGICAL PATTERNS ──
  if (lw.startsWith("ge") && article === "das" && !lw.endsWith("ung") && !lw.endsWith("heit") && !lw.endsWith("keit") && tips.length === 0)
    tips.push("Morphological: Ge- prefix → often das. This prefix creates collective or result nouns: Gebiet, Gesetz, Gehirn, Gewicht, Gespräch, Gebirge, Getränk, Geschenk. Strong pattern with few exceptions (der Gedanke, der Gebrauch, die Gefahr, die Geschichte).");
  if (lw.startsWith("ge") && article === "der" && !lw.endsWith("er"))
    tips.push("Exception: Most Ge- nouns are das, but this one is der. Notable masculine Ge- exceptions: der Gedanke, der Gebrauch, der Gehalt, der Genuss, der Geruch, der Geschmack, der Gewinn.");
  if (lw.startsWith("ge") && article === "die" && !lw.endsWith("ung") && !lw.endsWith("heit") && !lw.endsWith("keit") && !lw.endsWith("schaft") && !lw.endsWith("tion"))
    tips.push("Exception: Most Ge- nouns are das, but this one is die. Notable feminine Ge- exceptions: die Gefahr, die Geburt, die Geduld, die Gemeinde, die Geschichte, die Gestalt, die Gewalt.");

  const nomInf = ["Leben","Wissen","Verhalten","Verfahren","Schwimmen","Rennen","Vertrauen","Misstrauen","Einkommen","Vermögen","Unternehmen","Abkommen","Verbrechen","Essen","Trinken","Schreiben","Lesen"];
  if (nomInf.includes(w) && article === "das") tips.push("Morphological: Nominalized infinitive → always das. Any German verb can be used as a noun (capitalize it), and it's always neuter. das Leben (to live → life), das Essen (to eat → food).");

  const verbStems = {Blick:"blicken",Lauf:"laufen",Flug:"fliegen",Zug:"ziehen",Ruf:"rufen",Griff:"greifen",Schnitt:"schneiden",Schluss:"schließen",Bruch:"brechen",Wurf:"werfen",Schritt:"schreiten",Fall:"fallen",Gang:"gehen",Kampf:"kämpfen",Krieg:"kriegen",Sieg:"siegen",Fluss:"fließen",Schlag:"schlagen",Druck:"drücken",Trieb:"treiben",Riss:"reißen",Strich:"streichen",Satz:"setzen",Schuss:"schießen",Sprung:"springen",Fund:"finden",Klang:"klingen",Schwung:"schwingen",Zwang:"zwingen",Brand:"brennen",Stand:"stehen",Rat:"raten"};
  if (verbStems[w] && article === "der") tips.push(`Morphological: Monosyllabic noun from a verb stem (${verbStems[w]}) → usually der. German frequently creates masculine nouns from strong verb stems by vowel change: fliegen→Flug, ziehen→Zug, fließen→Fluss. This is one of the oldest word-formation patterns.`);

  const adjDerivatives = {Höhe:"hoch",Breite:"breit",Länge:"lang",Tiefe:"tief",Stärke:"stark",Schwäche:"schwach",Wärme:"warm",Kälte:"kalt",Größe:"groß",Nähe:"nah",Ferne:"fern",Dichte:"dicht",Härte:"hart",Schärfe:"scharf",Süße:"süß"};
  if (adjDerivatives[w] && article === "die") tips.push(`Morphological: Abstract quality noun from adjective '${adjDerivatives[w]}' + -e → always die. This is a productive pattern: adjective → die + stem + -e = abstract quality. E.g. lang→Länge, stark→Stärke, warm→Wärme. Always feminine.`);

  const verbTnouns = {Fahrt:"fahren",Macht:"mögen/vermögen",Sicht:"sehen",Flucht:"fliehen",Geburt:"gebären",Schrift:"schreiben",Tat:"tun",Naht:"nähen",Sucht:"suchen",Pflicht:"pflegen",Frucht:"Frucht (Latin fructus)",Zucht:"ziehen",Tracht:"tragen",Andacht:"denken",Pracht:"prangen"};
  if (verbTnouns[w] && article === "die") tips.push(`Morphological: Noun ending in -t derived from a verb stem (${verbTnouns[w]}) → often die. E.g. fahren→Fahrt, fliehen→Flucht, sehen→Sicht. This is an old Germanic feminine noun pattern, though there are masculine exceptions (der Dienst, der Verlust, der Frost).`);

  // ── 4. SEMANTIC CATEGORIES ──
  if (["Frühling","Sommer","Herbst","Winter"].includes(w)) tips.push("Semantic rule: Seasons → always der. Der Frühling, der Sommer, der Herbst, der Winter. No exceptions.");
  if (["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"].includes(w)) tips.push("Semantic rule: Days of the week → always der. Der Montag, der Dienstag, etc. No exceptions.");
  if (["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"].includes(w)) tips.push("Semantic rule: Months → always der. Der Januar, der Februar, etc. No exceptions.");
  if (["Norden","Süden","Osten","Westen"].includes(w)) tips.push("Semantic rule: Cardinal directions → always der. Der Norden, der Süden, der Osten, der Westen.");
  if (["Regen","Wind","Schnee","Nebel","Donner","Frost","Hagel","Tau","Sturm","Blitz"].includes(w)) tips.push("Semantic rule: Weather phenomena → typically der. E.g. der Regen, der Wind, der Schnee, der Frost, der Blitz. Exceptions: das Eis, die Wolke, das Gewitter (Ge- prefix → das).");
  if (["Gewitter","Wetter"].includes(w)) tips.push("Competing rules: Weather nouns are usually der, BUT the Ge- prefix makes these das. The Ge- prefix wins. das Gewitter, das Wetter.");

  if (w === "Stahl") tips.push("Exception: Most metals are das, but der Stahl is masculine. Stahl is Germanic (not a chemical element name), which may explain the difference.");
  if (["Frau","Mutter","Tochter","Schwester","Königin","Nonne","Braut","Witwe","Nichte","Tante","Cousine"].includes(w)) tips.push("Semantic rule: Female persons → die. When a noun refers to a specifically female person, grammatical and natural gender align.");
  if (["Mann","Vater","Sohn","Bruder","König","Herr","Onkel","Neffe","Bräutigam"].includes(w)) tips.push("Semantic rule: Male persons → der. When a noun refers to a specifically male person, grammatical and natural gender align.");
  if (w === "Kind") tips.push("Semantic note: das Kind — neuter despite referring to a person. This is a famous case where grammatical gender ≠ natural gender. Same for das Baby, das Mädchen (-chen diminutive → always das).");
  if (["Wein","Schnaps","Wodka","Rum","Whisky","Sekt","Champagner","Likör"].includes(w) && article === "der") tips.push("Semantic rule: Alcoholic beverages → usually der. E.g. der Wein, der Schnaps, der Wodka. Notable exception: das Bier.");
  if (w === "Bier") tips.push("Exception: Most alcoholic drinks are der, but das Bier is neuter. Must memorize.");
  if (["Eiche","Buche","Tanne","Birke","Linde","Fichte","Kiefer","Erle","Weide"].includes(w)) tips.push("Semantic rule: Tree species → usually die. Die Eiche, die Buche, die Tanne, die Birke. (But: der Baum, der Ahorn, der Apfelbaum — compounds follow last element.)");
  if (["Blume","Rose","Tulpe","Nelke","Lilie","Orchidee"].includes(w)) tips.push("Semantic rule: Flowers → almost always die. Die Rose, die Tulpe, die Nelke. This combines with the -e ending pattern.");
  if (["Rhein","Main","Neckar","Inn"].includes(w)) tips.push("Semantic note: German rivers are split — most are der (der Rhein, der Main, der Neckar), but several are die (die Donau, die Elbe, die Mosel, die Spree). Non-German rivers are usually die (die Themse, die Seine).");
  if (["Kopf","Fuß","Arm","Bein","Mund","Hals","Zahn","Finger","Rücken","Magen","Ohr","Auge","Herz","Haar","Nase","Schulter","Haut","Knochen","Gehirn","Blut"].includes(w))
    tips.push("Semantic note: Body parts have no reliable gender rule — they're spread across all three genders. der Kopf, die Nase, das Auge. Each must be memorized individually.");

  // ── 5. LOANWORD PATTERNS ──
  if (lw.endsWith("ade") && article === "die") tips.push("Loanword pattern: -ade (French) → die. E.g. Fassade, Marmelade, Parade, Limonade.");
  if (lw.endsWith("age") && article === "die") tips.push("Loanword pattern: -age (French) → die. E.g. Garage, Etage, Massage, Passage.");
  if (lw.endsWith("ette") && article === "die") tips.push("Loanword pattern: -ette (French) → die. E.g. Tablette, Marionette, Kassette.");
  if (lw.endsWith("eur") && article === "der") tips.push("Loanword pattern: -eur (French) → der. E.g. Ingenieur, Friseur, Regisseur. Person nouns from French.");
  if (lw.endsWith("ment") && w === "Moment" && article === "der") tips.push("Loanword note: der Moment (point in time) is one of the few masculine -ment nouns. Contrast: das Moment (= a factor/impetus) exists as neuter. Most -ment words are das.");

  // ── 6. AGENT NOUNS IN -ER ──
  const agents = ["Lehrer","Arbeiter","Künstler","Schriftsteller","Spieler","Zuschauer","Bürger","Bewohner","Vertreter","Sprecher","Führer","Käufer","Verkäufer","Mieter","Eigentümer","Gegner","Partner","Leser","Redner","Fahrer","Trainer","Richter","Schüler","Mitarbeiter","Nachfolger","Vorgänger","Computer","Fernseher","Kalender","Spiegel","Koffer"];
  if (lw.endsWith("er") && article === "der" && agents.includes(w)) tips.push("Agent noun pattern: -er (person/thing that does X) → usually der. This is one of the most productive German suffixes. der Lehrer (one who teaches), der Fahrer (one who drives). Even tools/machines follow this: der Computer, der Fernseher.");
  if (lw.endsWith("er") && article === "der" && !agents.includes(w) && tips.length === 0) tips.push("Pattern: -er ending → usually der. Covers agents, tools, instruments, and many other categories. But beware: das Fenster, das Wasser, das Messer, das Feuer, das Zimmer are common neuter exceptions.");
  if (lw.endsWith("er") && article === "das") tips.push("Exception: Most -er nouns are der, but this one is das. The common neuter -er nouns (Fenster, Wasser, Messer, Feuer, Zimmer, Leder, Futter, Wetter) are among the most frequent words in German — they must simply be memorized.");

  // ── 7. -E ENDING PATTERN ──
  if (lw.endsWith("e") && article === "die" && !adjDerivatives[w] && tips.length === 0) tips.push("Ending pattern: ~90% of nouns ending in -e are die. This is one of the strongest gender-guessing heuristics in German. When in doubt on an -e noun, guess die.");
  if (lw.endsWith("e") && article === "der" && !verbStems[w] && tips.length === 0) {
    const weakE = ["Name","Gedanke","Glaube","Wille","Friede","Buchstabe","Funke","Haufe","Käse","Hase","Löwe","Affe","Bote","Erbe","Junge","Knabe","Kunde","Kollege","Zeuge","Riese","Laie","Neffe"];
    if (weakE.includes(w)) tips.push(`Exception: Most -e nouns are die, but '${w}' is one of the well-known masculine exceptions. It's also a weak noun (n-Deklination): ${w}→${w}n in all cases except nominative singular. These weak -e masculines must be memorized as a group.`);
    else tips.push("Exception: ~90% of -e nouns are die, but this is der. Masculine -e nouns are rare and mostly 'weak nouns' (n-Deklination). Worth memorizing as a set.");
  }
  if (lw.endsWith("e") && article === "das" && tips.length === 0) tips.push("Rare exception: ~90% of -e nouns are die, but this is das. Very few -e nouns are neuter: das Ende, das Auge, das Erbe, das Interesse, das Gebäude. Memorize these individually.");

  // ── 8. WEAK NOUN (n-DEKLINATION) FLAG ──
  const weakNouns = ["Mensch","Herr","Student","Soldat","Bauer","Nachbar","Kunde","Kollege","Held","Kandidat","Präsident","Bär","Hase","Affe","Elefant","Löwe","Zeuge","Autor","Name","Gedanke","Glaube","Buchstabe","Friede","Fels","Junge","Planet","Architekt","Philosoph","Pilot","Polizist","Journalist","Demokrat","Biologe"];
  if (weakNouns.includes(w) && article === "der") tips.push("⚠ Weak noun (n-Deklination): This noun takes -(e)n in ALL cases except nominative singular. den Menschen, dem Menschen, des Menschen. Recognizing weak nouns is crucial for correct case usage beyond just the article.");

  // ── 9. DUAL-GENDER NOTES ──
  const dualGender = {See:"der See = lake, die See = sea/ocean",Band:"das Band = ribbon, der Band = volume (book), die Band = music band",Leiter:"der Leiter = leader/conductor, die Leiter = ladder",Steuer:"das Steuer = steering wheel, die Steuer = tax",Verdienst:"der Verdienst = earnings, das Verdienst = merit",Schild:"der Schild = shield, das Schild = sign",Tor:"der Tor = fool, das Tor = gate/goal",Gehalt:"der Gehalt = content, das Gehalt = salary",Erbe:"der Erbe = heir, das Erbe = inheritance",Kunde:"der Kunde = customer, die Kunde = news/tidings",Kiefer:"der Kiefer = jaw, die Kiefer = pine tree",Tau:"der Tau = dew, das Tau = rope"};
  if (dualGender[w]) tips.push(`Dual-gender word: ${dualGender[w]}. The gender changes the meaning entirely — a classic German pitfall.`);

  // ── 10. MONOSYLLABIC DEFAULTS ──
  if (tips.length === 0 && w.length <= 5) {
    if (article === "der") tips.push("Short/monosyllabic noun — no suffix or semantic rule applies. Statistically, ~60% of monosyllabic German nouns are der, ~25% das, ~15% die. But that's a gamble, not a rule. Best memorized in a phrase: 'der Hund bellt', 'der Weg ist lang'.");
    else if (article === "das") tips.push("Short/monosyllabic noun — no suffix or semantic rule applies. Short neuter nouns are less common (~25% of monosyllables). Many short das-nouns form -er plurals (Buch→Bücher, Kind→Kinder, Haus→Häuser). Memorize in context.");
    else tips.push("Short/monosyllabic noun — no suffix or semantic rule applies. Short feminine nouns are the rarest monosyllables (~15%). Many form plurals with umlaut + -e (Hand→Hände, Nacht→Nächte, Stadt→Städte).");
  }

  // ── 11. GENERAL FALLBACK ──
  if (tips.length === 0) {
    if (article === "die") tips.push("No standard suffix, semantic, or morphological rule applies cleanly. Feminine gender must be memorized. Tip: learn it in a short phrase — contextual memory is stronger than isolated flashcards.");
    else if (article === "der") tips.push("No standard suffix, semantic, or morphological rule applies cleanly. Masculine gender must be memorized. Tip: associate it with a vivid image or phrase to anchor the article.");
    else tips.push("No standard suffix, semantic, or morphological rule applies cleanly. Neuter gender must be memorized. Tip: learn it as a chunk — 'das Ziel erreichen', not just 'das Ziel'.");
  }

  return tips.join(" · ");
}

function getPluralExplanation(word, article, plural) {
  const sing = word, plur = plural, art = article;
  const tips = [];

  if (plur === "—") {
    return "This noun is singular only (Singularetantum) — it has no plural form. Common for abstract concepts, materials, and collective nouns.";
  }

  if (plur === sing) {
    if (sing.endsWith("er")||sing.endsWith("el")||sing.endsWith("en"))
      tips.push(`No change (die ${plur}). Rule: Masculine and neuter nouns ending in -er, -el, -en usually keep the same plural form. Some add an umlaut (Vater→Väter), but many don't (Fenster→Fenster). The article change to 'die' is your only plural signal.`);
    else if (sing.endsWith("chen")||sing.endsWith("lein"))
      tips.push(`No change (die ${plur}). Rule: Diminutives (-chen/-lein) never change in plural. Only the article shifts: das Mädchen → die Mädchen.`);
    else
      tips.push(`No change — identical singular and plural (die ${plur}). No suffix rule predicts this; must memorize. Context and the article 'die' are the only plural markers.`);
    return tips[0];
  }

  const hasUmlaut = /[äöü]/.test(plur) && !/[äöü]/.test(sing);
  const uml = hasUmlaut ? " + umlaut" : "";
  const umlNote = hasUmlaut ? " The umlaut shifts the stem vowel (a→ä, o→ö, u→ü) — this is common in monosyllabic masculine and feminine nouns." : "";

  if (plur === sing + "s") {
    tips.push(`+s (die ${plur}). Rule: The -s plural is used for recent loanwords (Auto→Autos, Kino→Kinos) and nouns ending in vowels other than -e (Sofa→Sofas, Radio→Radios). This is the newest plural pattern in German, borrowed from French/English.`);
    return tips[0];
  }

  if (plur.endsWith("er") && !sing.endsWith("er")) {
    if (art === "das")
      tips.push(`-er${uml} (die ${plur}). Rule: The -er plural is the signature neuter pattern for short nouns. E.g. Kind→Kinder, Buch→Bücher, Haus→Häuser, Bild→Bilder. Almost always adds umlaut if possible.${umlNote}`);
    else
      tips.push(`-er${uml} (die ${plur}). The -er plural is mainly a neuter pattern, but a handful of masculine nouns use it too: Mann→Männer, Wald→Wälder, Gott→Götter. Feminine nouns never take -er.${umlNote}`);
    return tips[0];
  }

  if (plur === sing + "nen") {
    tips.push(`+nen (die ${plur}). Rule: Feminine person nouns ending in -in double the n: Königin→Königinnen, Lehrerin→Lehrerinnen, Ärztin→Ärztinnen. 100% consistent.`);
    return tips[0];
  }

  if (plur === sing + "n" && sing.endsWith("e")) {
    tips.push(`+n (die ${plur}). Rule: Nouns ending in -e simply add -n. Extremely consistent for feminine nouns (Straße→Straßen, Lampe→Lampen, Schule→Schulen). Also applies to masculine weak nouns ending in -e (Kollege→Kollegen, Löwe→Löwen).`);
    return tips[0];
  }

  if (plur.endsWith("en") && !sing.endsWith("en")) {
    const weak = ["Mensch","Herr","Student","Soldat","Bauer","Nachbar","Kunde","Kollege","Held","Kandidat","Präsident","Bär","Hase","Affe","Elefant","Löwe","Zeuge","Autor","Name","Gedanke","Glaube","Buchstabe","Friede"];
    if (art === "die")
      tips.push(`-(e)n (die ${plur}). Rule: The most common feminine plural. Nearly all die-nouns that don't end in -e take -(e)n: Frau→Frauen, Tür→Türen, Uhr→Uhren, Zahl→Zahlen. When you know it's die, guess -(e)n for the plural and you'll usually be right.`);
    else if (art === "der" && weak.includes(sing))
      tips.push(`-(e)n (die ${plur}). ⚠ Weak noun (n-Deklination): This noun takes -(e)n not just in plural, but in ALL cases except nominative singular. den ${plur.endsWith("en") ? sing + "en" : plur}, dem ${plur.endsWith("en") ? sing + "en" : plur}, des ${plur.endsWith("en") ? sing + "en" : plur}. The plural form is the same as the accusative/dative/genitive singular. Weak nouns must be memorized as a group.`);
    else if (art === "der")
      tips.push(`-(e)n (die ${plur}). Some masculine nouns take -(e)n plural, especially weak nouns (n-Deklination) and Latin-origin words. Check if this noun also takes -(e)n in accusative/dative/genitive — if so, it's a weak noun.`);
    else
      tips.push(`-(e)n (die ${plur}). Less common for neuter nouns, but occurs with Latin/Greek-origin words. E.g. Auge→Augen, Ohr→Ohren, Interesse→Interessen.`);
    return tips[0];
  }

  if ((plur === sing + "e") || (plur.endsWith("e") && !sing.endsWith("e") && plur.length === sing.length + 1) || (hasUmlaut && plur.endsWith("e"))) {
    if (art === "der")
      tips.push(`-e${uml} (die ${plur}). Rule: The default masculine plural. Monosyllabic der-nouns very often take -e, frequently with umlaut: Tag→Tage, Stuhl→Stühle, Kopf→Köpfe, Hund→Hunde. Tip: if it's der and one syllable, try -e (±umlaut) first.${umlNote}`);
    else if (art === "das")
      tips.push(`-e${uml} (die ${plur}). Rule: Some neuter nouns take -e, usually WITHOUT umlaut: Jahr→Jahre, Spiel→Spiele, Ziel→Ziele, Tier→Tiere. Neuter -e plurals rarely umlaut (exception: das Floß→Flöße).`);
    else
      tips.push(`-e${uml} (die ${plur}). Feminine nouns with -e plural are less common but important — they almost always take umlaut: Hand→Hände, Nacht→Nächte, Kraft→Kräfte, Stadt→Städte, Wand→Wände, Angst→Ängste. These are mostly monosyllabic.${umlNote}`);
    return tips[0];
  }

  if (hasUmlaut && plur.length === sing.length)
    return `Umlaut only, no ending added (die ${plur}). Rule: Some -er/-el/-en nouns add an umlaut without changing the ending: Vater→Väter, Mutter→Mütter, Bruder→Brüder, Boden→Böden, Ofen→Öfen. This is the same "no change" pattern as Fenster→Fenster, but with an umlaut added. Must memorize which nouns umlaut and which don't.`;

  if (sing.endsWith("um") && (plur.endsWith("en") || plur.endsWith("a") || plur.endsWith("ien"))) {
    if (plur.endsWith("en")) return `-um→-en (die ${plur}). Latin/Greek pattern: The -um ending is dropped and replaced with -en. This is how German naturalizes Latin neuter plurals: Museum→Museen, Datum→Daten, Zentrum→Zentren. Very consistent.`;
    if (plur.endsWith("a")) return `-um→-a (die ${plur}). Latin pattern: Some Latin nouns keep their original Latin plural (-um→-a). Visum→Visa, Praktikum→Praktika. More formal/technical words tend to keep Latin plurals.`;
    if (plur.endsWith("ien")) return `-ium→-ien (die ${plur}). Latin pattern: -ium nouns become -ien. Studium→Studien, Ministerium→Ministerien. Very consistent for -ium words.`;
  }
  if (sing.endsWith("us") && plur.endsWith("en")) return `-us→-en (die ${plur}). Latin/Greek pattern: Rhythmus→Rhythmen, Globus→Globen. German replaces the Latin ending with -(s)en.`;
  if (sing.endsWith("a") && plur.endsWith("en")) return `-a→-en (die ${plur}). Latin/Italian pattern: Firma→Firmen, Thema→Themen, Komma→Kommata/Kommas. The -a ending is replaced.`;

  if (hasUmlaut) return `Modified stem${uml} (die ${plur}). This plural involves both a suffix and an umlaut shift. The umlaut is common in monosyllabic nouns with a, o, or u in the stem. Must memorize this form with the noun.`;

  return `die ${plur}. This plural form doesn't fit a clean pattern — memorize it alongside the noun. Tip: say the full form aloud — "${art} ${sing}, die ${plur}" — to build muscle memory.`;
}

const EXPLANATIONS = new Map();
NOUNS.forEach(([s,a,p,e]) => { EXPLANATIONS.set(s, { article: getArticleExplanation(s,a), plural: getPluralExplanation(s,a,p) }); });

// ═══════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════
const ARTICLE_COLORS = { "der": "#3B82F6", "die": "#EC4899", "das": "#10B981" };
function shuffleArray(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function normalize(s) { return s.trim().toLowerCase().replace(/ß/g,"ss").replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue"); }
const MODES = { ARTICLE:"article", PLURAL:"plural", BOTH:"both" };

// ═══════════════════════════════════════════════════════════════
// MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════
function GermanNounGame() {
  const [screen, setScreen] = useState("menu");
  const [mode, setMode] = useState(MODES.ARTICLE);
  const [tier, setTier] = useState(500);
  const [queue, setQueue] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [totalAnswered, setTotalAnswered] = useState(0);
  const [totalCorrect, setTotalCorrect] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [pluralInput, setPluralInput] = useState("");
  const [articleChoice, setArticleChoice] = useState(null);
  const [phase, setPhase] = useState("question");
  const [difficulty, setDifficulty] = useState("normal");
  const [showHint, setShowHint] = useState(false);
  const [wrongAnswers, setWrongAnswers] = useState([]);
  const timerRef = useRef(null);
  const inputRef = useRef(null);
  const feedbackTimerRef = useRef(null);
  const currentNoun = queue[currentIndex];
  const timeLimit = useMemo(() => difficulty==="easy"?0:difficulty==="hard"?8:15, [difficulty]);

  const startGame = useCallback((m,d,t) => {
    const tierNouns = getNounsForTier(t);
    const unique = (() => { const seen = new Set(); return tierNouns.filter(n => { if (seen.has(n[0])) return false; seen.add(n[0]); return true; }); })();
    setMode(m);setDifficulty(d);setTier(t);setQueue(shuffleArray(unique));setCurrentIndex(0);setScore(0);setStreak(0);setBestStreak(0);
    setTotalAnswered(0);setTotalCorrect(0);setFeedback(null);setPluralInput("");setArticleChoice(null);
    setPhase("question");setShowHint(false);setWrongAnswers([]);setTimeLeft(d==="easy"?0:d==="hard"?8:15);setScreen("game");
  }, []);

  const endSession = useCallback(() => { clearInterval(timerRef.current); clearTimeout(feedbackTimerRef.current); setScreen("results"); }, []);

  useEffect(() => {
    if (screen!=="game"||phase!=="question"||difficulty==="easy") return;
    timerRef.current = setInterval(() => {
      setTimeLeft(p => { if(p<=1){clearInterval(timerRef.current);handleTimeout();return 0;} return p-1; });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [screen, phase, currentIndex, difficulty]);

  const handleTimeout = useCallback(() => {
    if (!currentNoun) return;
    const [s,a,p,e] = currentNoun;
    setStreak(0);setTotalAnswered(pr=>pr+1);
    setFeedback({correct:false,article:a,plural:p,noun:s,english:e});
    setWrongAnswers(pr=>[...pr,{noun:s,article:a,plural:p,english:e,userArticle:"—",userPlural:"—"}]);
    setPhase("feedback");
  }, [currentNoun]);

  useEffect(() => {
    if (phase==="feedback") { feedbackTimerRef.current=setTimeout(()=>nextQuestion(),feedback?.correct?150:650); return()=>clearTimeout(feedbackTimerRef.current); }
  }, [phase, feedback]);

  const nextQuestion = useCallback(() => {
    const ni=currentIndex+1;
    if(ni>=queue.length){setScreen("results");return;}
    setCurrentIndex(ni);setFeedback(null);setPluralInput("");setArticleChoice(null);setPhase("question");setShowHint(false);setTimeLeft(timeLimit);
  }, [currentIndex, queue.length, timeLimit]);

  const checkAnswer = useCallback((chosenArt, typedPlur) => {
    if(!currentNoun||phase!=="question") return;
    clearInterval(timerRef.current);
    const [s,a,p,e]=currentNoun; let correct=true;
    if(mode===MODES.ARTICLE||mode===MODES.BOTH) if(chosenArt!==a) correct=false;
    if(mode===MODES.PLURAL||mode===MODES.BOTH){const t=typedPlur.trim();if(!t||(t!==p&&normalize(t)!==normalize(p))) correct=false;}
    if(correct){
      const sb=Math.floor(streak/5)*10, tb=difficulty!=="easy"?Math.floor(timeLeft*2):0;
      setScore(pr=>pr+100+sb+tb);setStreak(pr=>{const n=pr+1;setBestStreak(b=>Math.max(b,n));return n;});setTotalCorrect(pr=>pr+1);
    } else {
      setStreak(0);
      setWrongAnswers(pr=>[...pr,{noun:s,article:a,plural:p,english:e,userArticle:chosenArt||"—",userPlural:typedPlur?.trim()||"—"}]);
    }
    setTotalAnswered(pr=>pr+1);setFeedback({correct,article:a,plural:p,noun:s,english:e});setPhase("feedback");
  }, [currentNoun, mode, phase, streak, difficulty, timeLeft]);

  const handleArticle = useCallback((art) => {
    if(phase!=="question") return;
    if(mode===MODES.ARTICLE) checkAnswer(art,"");
    else { setArticleChoice(art); setTimeout(()=>inputRef.current?.focus(),50); }
  }, [mode, phase, checkAnswer]);

  const handlePluralSubmit = useCallback((ev) => {
    ev?.preventDefault(); if(phase!=="question") return;
    if(mode===MODES.PLURAL) checkAnswer("",pluralInput);
    else if(mode===MODES.BOTH){if(!articleChoice) return; checkAnswer(articleChoice,pluralInput);}
  }, [mode,phase,pluralInput,articleChoice,checkAnswer]);

  useEffect(() => {
    if(screen!=="game"||phase!=="question") return;
    const h=(ev)=>{if(ev.target.tagName==="INPUT")return;if(ev.key==="1")handleArticle("der");else if(ev.key==="2")handleArticle("die");else if(ev.key==="3")handleArticle("das");else if(ev.key==="h")setShowHint(true);};
    window.addEventListener("keydown",h); return()=>window.removeEventListener("keydown",h);
  }, [screen,phase,handleArticle]);

  useEffect(() => { if(screen==="game"&&phase==="question"&&mode===MODES.PLURAL) setTimeout(()=>inputRef.current?.focus(),100); }, [screen,phase,mode,currentIndex]);

  const accuracy = totalAnswered>0?Math.round((totalCorrect/totalAnswered)*100):0;
  const timerPct = timeLimit>0?(timeLeft/timeLimit)*100:100;
  const timerColor = timeLeft<=3?"#EF4444":timeLeft<=6?"#F59E0B":"#10B981";

  if(screen==="menu") return <MenuScreen onStart={startGame}/>;
  if(screen==="results") return <ResultsScreen score={score} totalCorrect={totalCorrect} totalAnswered={totalAnswered} bestStreak={bestStreak} wrongAnswers={wrongAnswers} mode={mode} onRestart={()=>setScreen("menu")} onPracticeWrong={()=>{
    if(!wrongAnswers.length) return;
    const nd=wrongAnswers.map(w=>NOUNS.find(n=>n[0]===w.noun)).filter(Boolean);
    setQueue(shuffleArray(nd));setCurrentIndex(0);setScore(0);setStreak(0);setBestStreak(0);setTotalAnswered(0);setTotalCorrect(0);
    setFeedback(null);setPluralInput("");setArticleChoice(null);setPhase("question");setShowHint(false);setWrongAnswers([]);setTimeLeft(timeLimit);setScreen("game");
  }}/>;

  return (
    <div style={S.container}>
      <div style={S.header}>
        <button onClick={endSession} style={S.endBtn}>End</button>
        <div style={{textAlign:"center"}}>
          <span style={S.scoreLabel}>{score.toLocaleString()}{streak>=3&&<span style={S.streakBadge}>🔥 {streak}</span>}</span>
        </div>
        <span style={S.progressText}>{totalAnswered+1} / {queue.length}</span>
      </div>
      {difficulty!=="easy"&&<div style={S.timerBarOuter}><div style={{...S.timerBarInner,width:`${timerPct}%`,backgroundColor:timerColor,transition:phase==="question"?"width 1s linear":"none"}}/></div>}
      <div style={S.statsRow}>
        {[["Accuracy",`${accuracy}%`,"#cbd5e1"],["Best",bestStreak,"#cbd5e1"],["Correct",totalCorrect,"#10B981"],["Wrong",wrongAnswers.length,"#f87171"]].map(([l,v,c])=>
          <div key={l} style={S.statItem}><span style={{...S.statValue,color:c}}>{v}</span><span style={S.statLabel}>{l}</span></div>
        )}
      </div>
      {currentNoun&&(
        <div style={{...S.card,borderColor:phase==="feedback"?(feedback?.correct?"#10B981":"#EF4444"):"transparent",backgroundColor:phase==="feedback"?(feedback?.correct?"rgba(16,185,129,0.2)":"rgba(239,68,68,0.2)"):"rgba(255,255,255,0.03)"}}>
          <div style={S.nounDisplay}>
            <span style={S.nounWord}>{currentNoun[0]}</span>
            {showHint&&<span style={S.hintText}>({currentNoun[3]})</span>}
            {!showHint&&phase==="question"&&<button onClick={()=>setShowHint(true)} style={S.hintBtn}>hint</button>}
          </div>
          {phase==="feedback"&&feedback&&(
            <div style={S.feedbackFlash}>
              <span style={{fontSize:36,fontWeight:900,color:feedback.correct?"#10B981":"#EF4444"}}>{feedback.correct?"✓":"✗"}</span>
              {!feedback.correct&&<span style={S.flashCorrection}>{feedback.article} {feedback.noun} → {feedback.plural}</span>}
            </div>
          )}
          {phase==="question"&&(mode===MODES.ARTICLE||mode===MODES.BOTH)&&(
            <div style={S.articleRow}>
              {["der","die","das"].map(art=>(
                <button key={art} onClick={()=>handleArticle(art)} style={{...S.articleBtn,backgroundColor:articleChoice===art?ARTICLE_COLORS[art]:"transparent",borderColor:ARTICLE_COLORS[art],color:articleChoice===art?"#fff":ARTICLE_COLORS[art]}}>
                  <span style={S.articleBtnMain}>{art}</span>
                  <span style={S.articleBtnSub}>{art==="der"?"masc":art==="die"?"fem":"neut"}</span>
                </button>
              ))}
            </div>
          )}
          {phase==="question"&&(mode===MODES.PLURAL||mode===MODES.BOTH)&&(
            <div style={S.pluralSection}>
              <label style={S.pluralLabel}>Plural form:</label>
              <div style={S.inputRow}>
                <input ref={inputRef} value={pluralInput} onChange={e=>setPluralInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handlePluralSubmit(e);}} placeholder="die ..." style={S.pluralInput} autoComplete="off" autoCapitalize="off" spellCheck={false}/>
                <button onClick={handlePluralSubmit} style={S.submitBtn}>→</button>
              </div>
              <div style={S.umlauts}>
                {["ä","ö","ü","ß","Ä","Ö","Ü"].map(c=><button key={c} onClick={()=>{setPluralInput(p=>p+c);inputRef.current?.focus();}} style={S.umlautBtn}>{c}</button>)}
              </div>
            </div>
          )}
          {phase==="question"&&mode===MODES.ARTICLE&&<div style={S.shortcutHint}>Keys: <kbd style={S.kbd}>1</kbd> der · <kbd style={S.kbd}>2</kbd> die · <kbd style={S.kbd}>3</kbd> das · <kbd style={S.kbd}>H</kbd> hint</div>}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MENU
// ═══════════════════════════════════════════════════════════════
function MenuScreen({onStart}) {
  const [mode,setMode]=useState(MODES.ARTICLE);
  const [diff,setDiff]=useState("normal");
  const [tier,setTier]=useState(500);
  return (
    <div style={S.container}><div style={S.menuInner}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:28,marginBottom:8,letterSpacing:2}}><span style={{color:"#3B82F6",fontWeight:900}}>der</span><span style={{color:"#EC4899",fontWeight:900}}> die</span><span style={{color:"#10B981",fontWeight:900}}> das</span></div>
        <h1 style={S.menuTitle}>Artikel Blitz</h1>
        <p style={{fontSize:14,color:"#64748b",margin:0}}>Master {NOUNS.length.toLocaleString()} German nouns · Leipzig Corpus</p>
      </div>
      <div style={S.menuSection}>
        <label style={S.menuLabel}>Vocabulary Level</label>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          {TIER_OPTIONS.map(t=>
            <button key={t.value} onClick={()=>setTier(t.value)} style={{...S.tierBtn,borderColor:tier===t.value?"#8B5CF6":"rgba(255,255,255,0.1)",backgroundColor:tier===t.value?"rgba(139,92,246,0.1)":"transparent"}}>
              <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{t.label}</span>
              <span style={{fontSize:10,color:"#64748b"}}>{t.desc}</span>
            </button>
          )}
        </div>
      </div>
      <div style={S.menuSection}>
        <label style={S.menuLabel}>Game Mode</label>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {[[MODES.ARTICLE,"Articles","der / die / das"],[MODES.PLURAL,"Plurals","Type the plural form"],[MODES.BOTH,"Both","Article + Plural"]].map(([m,t,d])=>
            <button key={m} onClick={()=>setMode(m)} style={{...S.modeCard,borderColor:mode===m?"#3B82F6":"rgba(255,255,255,0.1)",backgroundColor:mode===m?"rgba(59,130,246,0.1)":"transparent"}}>
              <span style={{fontSize:16,fontWeight:700,color:"#e2e8f0"}}>{t}</span><span style={{fontSize:12,color:"#64748b"}}>{d}</span>
            </button>
          )}
        </div>
      </div>
      <div style={S.menuSection}>
        <label style={S.menuLabel}>Speed</label>
        <div style={{display:"flex",gap:8}}>
          {[["easy","Relaxed","No timer"],["normal","Normal","15s"],["hard","Blitz","8s"]].map(([d,l,s])=>
            <button key={d} onClick={()=>setDiff(d)} style={{...S.diffBtn,borderColor:diff===d?"#F59E0B":"rgba(255,255,255,0.1)",backgroundColor:diff===d?"rgba(245,158,11,0.1)":"transparent"}}>
              <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{l}</span><span style={{fontSize:11,color:"#64748b"}}>{s}</span>
            </button>
          )}
        </div>
      </div>
      <button onClick={()=>onStart(mode,diff,tier)} style={S.startBtn}>Start Game</button>
      <div style={{textAlign:"center",fontSize:12,color:"#475569"}}>{EXPLANATIONS.size} grammar explanations pre-loaded</div>
    </div></div>
  );
}

// ═══════════════════════════════════════════════════════════════
// RESULTS — detailed review with grammar explanations
// ═══════════════════════════════════════════════════════════════
function ResultsScreen({score,totalCorrect,totalAnswered,bestStreak,wrongAnswers,mode,onRestart,onPracticeWrong}) {
  const [expandedIdx,setExpandedIdx]=useState(null);
  const accuracy=totalAnswered>0?Math.round((totalCorrect/totalAnswered)*100):0;
  const grade=accuracy>=95?"S":accuracy>=85?"A":accuracy>=70?"B":accuracy>=55?"C":"D";
  const gc={S:"#F59E0B",A:"#10B981",B:"#3B82F6",C:"#8B5CF6",D:"#EF4444"}[grade];
  return (
    <div style={S.container}><div style={S.resultsInner}>
      <div style={{...S.gradeCircle,borderColor:gc,color:gc}}>{grade}</div>
      <h2 style={{fontSize:24,fontWeight:800,color:"#f1f5f9",margin:0}}>Session Complete</h2>
      <div style={S.resultsGrid}>
        {[["Score",score.toLocaleString()],["Accuracy",`${accuracy}%`],["Correct",`${totalCorrect}/${totalAnswered}`],["Best Streak",`🔥 ${bestStreak}`]].map(([l,v])=>
          <div key={l} style={S.resultCard}><span style={S.resultValue}>{v}</span><span style={S.resultLabel}>{l}</span></div>
        )}
      </div>

      {wrongAnswers.length>0&&(
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
          <h3 style={{fontSize:16,fontWeight:800,color:"#f87171",margin:0}}>Review: {wrongAnswers.length} mistake{wrongAnswers.length>1?"s":""}</h3>
          <p style={{fontSize:12,color:"#64748b",margin:"0 0 4px"}}>Tap any card for the grammar rule explanation</p>
          <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:500,overflowY:"auto",paddingRight:4}}>
            {wrongAnswers.map((w,i)=>{
              const expl=EXPLANATIONS.get(w.noun);
              const isOpen=expandedIdx===i;
              return (
                <div key={i} onClick={()=>setExpandedIdx(isOpen?null:i)} style={{background:"rgba(255,255,255,0.03)",border:`1px solid ${isOpen?"rgba(251,191,36,0.4)":"rgba(255,255,255,0.08)"}`,borderRadius:12,padding:"12px 14px",cursor:"pointer",transition:"border-color 0.2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                    <div style={{display:"flex",alignItems:"baseline",gap:2}}>
                      <span style={{color:ARTICLE_COLORS[w.article],fontWeight:800,fontSize:15}}>{w.article}</span>
                      <span style={{fontWeight:800,fontSize:17,color:"#f1f5f9"}}> {w.noun}</span>
                      <span style={{color:"#64748b",fontSize:13,marginLeft:6}}>→ {w.plural}</span>
                    </div>
                    <span style={{fontSize:12,color:"#94a3b8",fontStyle:"italic"}}>{w.english}</span>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:2,marginTop:6}}>
                    {(mode===MODES.ARTICLE||mode===MODES.BOTH)&&w.userArticle!=="—"&&(
                      <span style={{fontSize:12,color:"#94a3b8"}}>
                        Your article: <span style={{color:w.userArticle===w.article?"#10B981":"#f87171",fontWeight:700}}>{w.userArticle}</span>
                        {w.userArticle!==w.article&&<span style={{color:"#10B981"}}> → {w.article}</span>}
                      </span>
                    )}
                    {(mode===MODES.PLURAL||mode===MODES.BOTH)&&w.userPlural!=="—"&&(
                      <span style={{fontSize:12,color:"#94a3b8"}}>
                        Your plural: <span style={{color:"#f87171",fontWeight:700}}>{w.userPlural||"(empty)"}</span>
                        <span style={{color:"#10B981"}}> → {w.plural}</span>
                      </span>
                    )}
                    {w.userArticle==="—"&&w.userPlural==="—"&&<span style={{fontSize:12,color:"#f59e0b"}}>⏱ Time expired</span>}
                  </div>
                  {isOpen&&expl&&(
                    <div style={{marginTop:10,padding:"10px 12px",background:"rgba(251,191,36,0.05)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:8,display:"flex",flexDirection:"column",gap:10}}>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,color:"#fbbf24"}}>Why {w.article}?</span>
                        <span style={{fontSize:13,color:"#e2e8f0",lineHeight:1.55}}>{expl.article}</span>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,color:"#fbbf24"}}>Plural pattern</span>
                        <span style={{fontSize:13,color:"#e2e8f0",lineHeight:1.55}}>{expl.plural}</span>
                      </div>
                    </div>
                  )}
                  <div style={{fontSize:10,color:"#475569",textAlign:"center",marginTop:6}}>{isOpen?"▲ collapse":"▼ tap for explanation"}</div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {wrongAnswers.length===0&&<div style={{textAlign:"center",padding:24,color:"#10B981",fontSize:18,fontWeight:700}}>Perfect session — no mistakes!</div>}
      <div style={{display:"flex",gap:10,width:"100%",flexDirection:"column"}}>
        {wrongAnswers.length>0&&<button onClick={onPracticeWrong} style={S.practiceBtn}>Practice {wrongAnswers.length} Missed Noun{wrongAnswers.length>1?"s":""}</button>}
        <button onClick={onRestart} style={S.restartBtn}>New Game</button>
      </div>
    </div></div>
  );
}

  timerBarOuter:{width:"100%",maxWidth:600,height:4,background:"rgba(255,255,255,0.06)",borderRadius:2,overflow:"hidden",margin:"4px auto 0"},

  statsRow:{display:"flex",gap:16,justifyContent:"center",padding:"12px 20px",width:"100%",maxWidth:600,boxSizing:"border-box"},
  statItem:{display:"flex",flexDirection:"column",alignItems:"center"},
  statValue:{fontSize:15,fontWeight:700},
  statLabel:{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:1},
  card:{width:"100%",maxWidth:560,margin:"8px auto",padding:"32px 24px 24px",borderRadius:16,border:"2px solid transparent",transition:"all 0.15s ease",display:"flex",flexDirection:"column",alignItems:"center",minHeight:280,boxSizing:"border-box"},
  nounDisplay:{display:"flex",flexDirection:"column",alignItems:"center",gap:8,marginBottom:28},
  nounWord:{fontSize:44,fontWeight:900,letterSpacing:"-1px",color:"#f1f5f9",textAlign:"center",lineHeight:1.1,wordBreak:"break-word"},
  hintText:{fontSize:15,color:"#64748b",fontStyle:"italic"},
  hintBtn:{background:"none",border:"1px solid rgba(255,255,255,0.1)",color:"#64748b",fontSize:11,padding:"3px 10px",borderRadius:6,cursor:"pointer",textTransform:"uppercase",letterSpacing:1},
  feedbackFlash:{display:"flex",alignItems:"center",justifyContent:"center",gap:12,padding:"8px 16px"},
  flashCorrection:{fontSize:16,fontWeight:700,color:"#f1f5f9"},
  articleRow:{display:"flex",gap:12,width:"100%",justifyContent:"center",marginBottom:16},
  articleBtn:{flex:1,maxWidth:140,padding:"16px 8px 12px",border:"2px solid",borderRadius:12,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"transparent",transition:"all 0.15s ease"},
  articleBtnMain:{fontSize:24,fontWeight:800},
  articleBtnSub:{fontSize:10,textTransform:"uppercase",letterSpacing:1,opacity:0.7},
  pluralSection:{width:"100%",display:"flex",flexDirection:"column",alignItems:"center",gap:10},
  pluralLabel:{fontSize:13,color:"#94a3b8",textTransform:"uppercase",letterSpacing:1},
  inputRow:{display:"flex",gap:8,width:"100%",maxWidth:400},
  pluralInput:{flex:1,background:"rgba(255,255,255,0.06)",border:"2px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"12px 16px",fontSize:20,color:"#f1f5f9",outline:"none",fontFamily:"inherit",textAlign:"center"},
  submitBtn:{background:"#3B82F6",border:"none",borderRadius:10,padding:"12px 20px",fontSize:20,color:"#fff",cursor:"pointer",fontWeight:700},
  umlauts:{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"},
  umlautBtn:{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"6px 12px",fontSize:16,color:"#cbd5e1",cursor:"pointer",fontFamily:"inherit"},
  shortcutHint:{fontSize:11,color:"#475569",marginTop:16,textAlign:"center"},
  kbd:{background:"rgba(255,255,255,0.08)",padding:"1px 6px",borderRadius:4,border:"1px solid rgba(255,255,255,0.15)",fontSize:11,fontFamily:"inherit",color:"#94a3b8"},
  menuInner:{width:"100%",maxWidth:480,padding:"48px 24px",display:"flex",flexDirection:"column",gap:28,boxSizing:"border-box"},

  modeCard:{padding:"14px 16px",border:"2px solid",borderRadius:10,cursor:"pointer",background:"transparent",textAlign:"left",display:"flex",flexDirection:"column",gap:2,transition:"all 0.15s ease"},
  diffBtn:{flex:1,padding:"12px 8px",border:"2px solid",borderRadius:10,cursor:"pointer",background:"transparent",textAlign:"center",display:"flex",flexDirection:"column",gap:2,transition:"all 0.15s ease"},
  startBtn:{width:"100%",padding:"16px",background:"linear-gradient(135deg, #3B82F6, #6366F1)",border:"none",borderRadius:12,fontSize:18,fontWeight:800,color:"#fff",cursor:"pointer",letterSpacing:1,textTransform:"uppercase",marginTop:4,fontFamily:"inherit"},
  resultsInner:{width:"100%",maxWidth:600,padding:"32px 16px",display:"flex",flexDirection:"column",alignItems:"center",gap:20,boxSizing:"border-box"},
  gradeCircle:{width:80,height:80,borderRadius:"50%",border:"3px solid",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40,fontWeight:900},
  resultsGrid:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,width:"100%"},
  resultCard:{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:14,display:"flex",flexDirection:"column",alignItems:"center",gap:3},
  resultValue:{fontSize:20,fontWeight:800,color:"#f1f5f9"},
  resultLabel:{fontSize:10,color:"#64748b",textTransform:"uppercase",letterSpacing:1},
  practiceBtn:{width:"100%",padding:"14px",background:"rgba(239,68,68,0.1)",border:"2px solid rgba(239,68,68,0.3)",borderRadius:12,fontSize:15,fontWeight:700,color:"#f87171",cursor:"pointer",fontFamily:"inherit"},
  restartBtn:{width:"100%",padding:"14px",background:"linear-gradient(135deg, #3B82F6, #6366F1)",border:"none",borderRadius:12,fontSize:15,fontWeight:800,color:"#fff",cursor:"pointer",fontFamily:"inherit",letterSpacing:1,textTransform:"uppercase"},
};

// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<GermanNounGame />);
</script>
