    position: fixed;

<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;


// ═══════════════════════════════════════════════════════════════
// WORD DATA - loaded from JSON so the app can stay a static GitHub Pages site
const WORDS_DATA_PATH = "./data/nouns.json";
const ADJECTIVES_DATA_PATH = "./data/adjectives.json";
const VERBS_DATA_PATH = "./data/verbs.json";
const DUAL_GENDER_PATH = "./data/dual-gender-nouns.json";
const VERB_PREP_PATH = "./data/verbs-with-prepositions.json";
let NOUNS = [];
let NOUN_INDEX = new Map();
let EXPLANATIONS = new Map();
let WORDS_META = {};
let BUILTIN_DECKS = [];
let DUAL_GENDER_WORDS = new Set();
let DUAL_GENDER_SENSES = new Map();
let DUAL_GENDER_INDEX = new Map();
let DUAL_GENDER_DRILL_BOTH = new Set();
let ADJECTIVES = [];  // [word, english, rank]
let VERBS = [];  // [word, english, rank]
let IRREGULAR_VERBS = [];  // [word, english, rank, prateritum, perfekt]
let VERB_PREPOSITIONS = [];  // [verb, english, rank, preposition, case, example]

function makeDualGenderSenseId(word, article, plural) {
  return `__dual__|${word}|${article}|${plural || "—"}`;
}

function buildDualGenderEntry(word, rank, genderEntry) {
  const plural = genderEntry.singularOnly || genderEntry.plural === "?" ? "—" : (genderEntry.plural || "—");
  return [word, genderEntry.article, plural, genderEntry.english, rank, makeDualGenderSenseId(word, genderEntry.article, plural)];
}

function getNounEntryId(noun) {
  return noun?.[5] || noun?.[0] || "";
}

function getMistakeEntryId(mistake) {
  return mistake?.entryId || mistake?.noun || "";
}

function hydrateWordData(payload) {
  const nounEntries = Array.isArray(payload?.nouns) ? payload.nouns : [];
  NOUNS = nounEntries.map(({ word, article, plural, english, rank }) => [word, article, plural, english, rank]);
  NOUN_INDEX = new Map(NOUNS.map(noun => [noun[0], noun]));
  EXPLANATIONS = new Map(nounEntries.map(({ word, articleHelp, pluralHelp }) => [word, { article: articleHelp || "", plural: pluralHelp || "" }]));
  WORDS_META = payload?.meta || {};
}

async function loadWordData() {
  const response = await fetch(WORDS_DATA_PATH);
  if (!response.ok) throw new Error(`Could not load ${WORDS_DATA_PATH} (${response.status})`);
  const payload = await response.json();
  hydrateWordData(payload);
  if (!NOUNS.length) throw new Error(`No noun data found in ${WORDS_DATA_PATH}`);
  // Load adjectives
  try {
    const adjResp = await fetch(ADJECTIVES_DATA_PATH);
    if (adjResp.ok) {
      const adjData = await adjResp.json();
      ADJECTIVES = (adjData.adjectives || []).map(({ word, english, rank }) => [word, english, rank]);
    }
  } catch(e) { console.warn("Could not load adjectives:", e); }
  // Load verbs
  try {
    const verbResp = await fetch(VERBS_DATA_PATH);
    if (verbResp.ok) {
      const verbData = await verbResp.json();
      VERBS = (verbData.verbs || []).map(({ word, english, rank }) => [word, english, rank]);
      IRREGULAR_VERBS = (verbData.verbs || []).filter(v => v.irregular).map(({ word, english, rank, prateritum, perfekt, withSein }) => [word, english, rank, prateritum, (withSein ? "ist " : "hat ") + perfekt]);
    }
  } catch(e) { console.warn("Could not load verbs:", e); }
  // Load built-in decks
  try {
    const dgResp = await fetch(DUAL_GENDER_PATH);
    if (dgResp.ok) {
      const dgData = await dgResp.json();
      if (dgData.nouns?.length) {
        const dualSensePairs = dgData.nouns.map(({ word, rank, genders = [] }) => [word, genders.map(genderEntry => buildDualGenderEntry(word, rank, genderEntry))]);
        const dualEntries = dualSensePairs.flatMap(([, entries]) => entries);
        DUAL_GENDER_WORDS = new Set(dualSensePairs.map(([word]) => word));
        DUAL_GENDER_SENSES = new Map(dualSensePairs);
        DUAL_GENDER_INDEX = new Map(dualEntries.map(entry => [getNounEntryId(entry), entry]));
        DUAL_GENDER_DRILL_BOTH = new Set(dgData.nouns.filter(n => n.bothInDrills).map(n => n.word));
        BUILTIN_DECKS.push({
          id: "__dual_gender__",
          name: "Dual-Gender Nouns",
          description: dgData.meta?.description || "Nouns whose meaning changes with the article",
          nouns: dualEntries.map(entry => getNounEntryId(entry)),
          builtin: true
        });
      }
    }
  } catch(e) { console.warn("Could not load dual-gender deck:", e); }
  // Load verbs with prepositions
  try {
    const vpResp = await fetch(VERB_PREP_PATH);
    if (vpResp.ok) {
      const vpData = await vpResp.json();
      VERB_PREPOSITIONS = (vpData.verbs || []).map(({ verb, english, rank, preposition, case: cas, example }) => [verb, english, rank, preposition, cas, example]);
    }
  } catch(e) { console.warn("Could not load verbs with prepositions:", e); }
}

function getNounByName(name) {
  return DUAL_GENDER_INDEX.get(name) || NOUN_INDEX.get(name) || null;
}

function getDeckEntriesByName(name) {
  if (DUAL_GENDER_INDEX.has(name)) return [DUAL_GENDER_INDEX.get(name)];
  const dualEntries = DUAL_GENDER_SENSES.get(name);
  if (dualEntries?.length) return dualEntries;
  const noun = getNounByName(name);
  return noun ? [noun] : [];
}

// Like getDeckEntriesByName, but only expands to both genders for Category A words.
// Category B/C dual-gender words return only their primary (nouns.json) entry.
function getDrillEntriesByName(name) {
  if (DUAL_GENDER_INDEX.has(name)) return [DUAL_GENDER_INDEX.get(name)];
  if (DUAL_GENDER_SENSES.has(name)) {
    if (DUAL_GENDER_DRILL_BOTH.has(name)) return DUAL_GENDER_SENSES.get(name);
    // B/C word: return only the primary entry from nouns.json
    const primary = NOUN_INDEX.get(name);
    return primary ? [primary] : [DUAL_GENDER_SENSES.get(name)[0]];
  }
  const noun = getNounByName(name);
  return noun ? [noun] : [];
}

function shouldShowSenseHint(noun) {
  return !!noun?.[0] && !!noun?.[3] && DUAL_GENDER_WORDS.has(noun[0]);
}

function getAdjectivesForTier(tier, minRank) {
  return minRank ? ADJECTIVES.filter(a => a[2] > minRank && a[2] <= tier) : ADJECTIVES.filter(a => a[2] <= tier);
}

function getVerbsForTier(tier, minRank) {
  return minRank ? VERBS.filter(v => v[2] > minRank && v[2] <= tier) : VERBS.filter(v => v[2] <= tier);
}

function getIrregularVerbsForTier(tier, minRank) {
  return minRank ? IRREGULAR_VERBS.filter(v => v[2] > minRank && v[2] <= tier) : IRREGULAR_VERBS.filter(v => v[2] <= tier);
}

function getVerbPrepositionsForTier(tier, minRank) {
  // Verb prepositions use their own rank (1-298), map tier proportionally
  if (!VERB_PREPOSITIONS.length) return [];
  const maxRank = Math.max(...VERB_PREPOSITIONS.map(v => v[2]));
  const fraction = Math.min(tier / (NOUNS.length || 25000), 1);
  const cutoff = Math.max(Math.ceil(fraction * maxRank), 30);
  if (minRank) {
    const minFraction = Math.min(minRank / (NOUNS.length || 25000), 1);
    const minCutoff = Math.ceil(minFraction * maxRank);
    return VERB_PREPOSITIONS.filter(v => v[2] > minCutoff && v[2] <= cutoff);
  }
  return VERB_PREPOSITIONS.filter(v => v[2] <= cutoff);
}

// Answer mode helpers for per-mode tracking
function getAnswerModes(mode, gameMode) {
  if (gameMode === "matching") return ["matching"];
  if (gameMode === "reverse") return ["reverse"];
  if (gameMode === "verb_forms") return ["verb_forms"];
  if (gameMode === "verb_prepositions") return ["verb_prep"];
  if (gameMode === "runner") return ["article"];
  if (mode === MODES.BOTH) return ["article", "plural"];
  if (mode === MODES.PLURAL) return ["plural"];
  return ["article"];
}

// VOCABULARY TIER CONFIG
// ═══════════════════════════════════════════════════════════════
const TIER_OPTIONS = [
  { value: 100, label: "Top 100", desc: "Most essential words" },
  { value: 200, label: "Top 200", desc: "Core vocabulary" },
  { value: 500, label: "Top 500", desc: "Intermediate" },
  { value: 1000, label: "Top 1000", desc: "Advanced beginner" },
  { value: 2000, label: "Top 2000", desc: "Intermediate-advanced" },
  { value: 5000, label: "Top 5000", desc: "Comprehensive" },
  { value: 10000, label: "Top 10000", desc: "C2 mastery" },
  { value: 15000, label: "Top 15000", desc: "Advanced C2" },
  { value: 25000, label: "Top 25000", desc: "Near-native" },
];

function getNounsForTier(tier, minRank) {
  return minRank ? NOUNS.filter(n => n[4] > minRank && n[4] <= tier) : NOUNS.filter(n => n[4] <= tier);
}

// ═══════════════════════════════════════════════════════════════
// GRAMMAR EXPLANATIONS - precomputed in JSON
// ═══════════════════════════════════════════════════════════════

// Grammar explanations are precomputed in data/nouns.json.
// UTILITIES
// ═══════════════════════════════════════════════════════════════
const ARTICLE_COLORS = { "der": "#3B82F6", "die": "#EC4899", "das": "#10B981" };
function shuffleArray(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function normalize(s) { return s.trim().toLowerCase().replace(/ß/g,"ss").replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue"); }
const MODES = { ARTICLE:"article", PLURAL:"plural", BOTH:"both" };

// ═══════════════════════════════════════════════════════════════
// GIST PERSISTENCE
// ═══════════════════════════════════════════════════════════════
const GIST_FILENAME = "artikel-blitz-data.json";
const PAT_KEY = "artikel-blitz-pat";
const GIST_ID_KEY = "artikel-blitz-gist-id";
const DEFAULT_DATA = {
  decks: [], nounStats: {},
  xp: 0, level: 1, coins: 0,
  dailyStreak: { current: 0, lastDate: null, best: 0 },
  achievements: [],
  unlockedTiers: [100],
  masteredNouns: [],
  totalSessions: 0,
  activePerks: [],
  campaignProgress: {},
  bestScores: {},  // { "gameMode:tier_or_deck": { correct, total, pct } }
  modeStats: {},   // { "article:Haus": {attempts,correct,consecutiveCorrect}, "plural:Haus": {...}, ... }
  modeMastered: {}, // { "article": ["Haus",...], "plural": [...], ... }
};

function getPat() { return localStorage.getItem(PAT_KEY) || ""; }
function setPat(t) { localStorage.setItem(PAT_KEY, t); }
function getGistId() { return localStorage.getItem(GIST_ID_KEY) || ""; }
function setGistId(id) { localStorage.setItem(GIST_ID_KEY, id); }

async function gistFetch(path, opts = {}) {
  const pat = getPat();
  if (!pat) throw new Error("No PAT configured");
  const r = await fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: { Authorization: `token ${pat}`, Accept: "application/vnd.github+json", ...opts.headers },
  });
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${r.statusText}`);
  return r.json();
}

async function loadGistData() {
  const gistId = getGistId();
  if (!gistId) return { ...DEFAULT_DATA };
  const gist = await gistFetch(`/gists/${gistId}`);
  const file = gist.files[GIST_FILENAME];
  if (!file) return { ...DEFAULT_DATA };
  return sanitizePersistedData(JSON.parse(file.content));
}

// ── Gist save queue: serialize writes, coalesce concurrent updates ──
// Without this, two overlapping saveGistData() PATCHes (e.g. updateNounStats +
// endSession firing back-to-back) race on the same gist and whichever lands
// last wins — commonly losing the newer bestScores entry.
let _gistSaveInFlight = null;
let _gistSavePending = null;
let _gistStatusSetter = null;
function registerGistStatusSetter(fn) { _gistStatusSetter = fn; }
async function _drainGistSave() {
  try {
    while (_gistSavePending) {
      const data = _gistSavePending;
      _gistSavePending = null;
      await saveGistData(data);
    }
    if (_gistStatusSetter) _gistStatusSetter("synced");
  } catch (e) {
    if (_gistStatusSetter) _gistStatusSetter("error");
  } finally {
    _gistSaveInFlight = null;
  }
}
function queueGistSave(data) {
  if (!getPat()) return;
  _gistSavePending = data; // coalesce to latest
  if (_gistStatusSetter) _gistStatusSetter("saving");
  if (!_gistSaveInFlight) _gistSaveInFlight = _drainGistSave();
}

async function saveGistData(data) {
  const sanitized = sanitizePersistedData(data);
  const gistId = getGistId();
  const body = { files: { [GIST_FILENAME]: { content: JSON.stringify(sanitized, null, 2) } } };
  if (gistId) {
    return gistFetch(`/gists/${gistId}`, { method: "PATCH", body: JSON.stringify(body) });
  } else {
    const gist = await gistFetch("/gists", {
      method: "POST",
      body: JSON.stringify({ description: "Artikel Blitz — saved progress", public: false, ...body }),
    });
    setGistId(gist.id);
    return gist;
  }
}

// ═══════════════════════════════════════════════════════════════
// GAME SYSTEMS — XP, Levels, Achievements, Perks, SRS
// ═══════════════════════════════════════════════════════════════

// XP: level N requires 50*N*(N-1) total XP
function xpForLevel(n) { return 50 * n * (n - 1); }
function levelFromXp(xp) { let l = 1; while (xpForLevel(l + 1) <= xp) l++; return l; }
function xpProgress(xp) { const l = levelFromXp(xp); const cur = xpForLevel(l); const nxt = xpForLevel(l + 1); return { level: l, current: xp - cur, needed: nxt - cur, total: xp }; }

const TITLES = [
  [1, "Anfänger", "Beginner"],
  [5, "Fortgeschritten", "Intermediate"],
  [10, "Kenner", "Expert"],
  [15, "Meister", "Master"],
  [20, "Sprachgenie", "Language Genius"],
  [25, "Wortschatz-Legende", "Vocab Legend"],
];
function getTitle(level) { let t = TITLES[0]; for (const r of TITLES) if (level >= r[0]) t = r; return t; }

// ── Best-score medal tiering ──────────────────────────────────
// Returns { tier: "gold"|"silver"|"bronze"|null, label, color, next, nextLabel, gapToNext }
function bestScoreMedal(pct) {
  if (pct == null || pct <= 0) return { tier: null, label: null, color: null, next: 75, nextLabel: "Bronze", gapToNext: 75 };
  if (pct >= 100) return { tier: "gold", label: "PERFECT", color: "#F59E0B", next: null, nextLabel: null, gapToNext: 0 };
  if (pct >= 90)  return { tier: "silver", label: "Silver", color: "#CBD5E1", next: 100, nextLabel: "Perfect", gapToNext: 100 - pct };
  if (pct >= 75)  return { tier: "bronze", label: "Bronze", color: "#D97706", next: 90, nextLabel: "Silver", gapToNext: 90 - pct };
  return { tier: null, label: null, color: "#94a3b8", next: 75, nextLabel: "Bronze", gapToNext: 75 - pct };
}

// Small medal badge — shows trophy/medal with pct centered, styled by tier
function Medal({ pct, size = 28, showLabel = false }) {
  const m = bestScoreMedal(pct);
  if (m.tier === null && (!pct || pct <= 0)) return null;
  const bg = m.tier === "gold"
    ? "linear-gradient(135deg,#FCD34D 0%,#F59E0B 55%,#B45309 100%)"
    : m.tier === "silver"
    ? "linear-gradient(135deg,#F1F5F9 0%,#CBD5E1 55%,#64748B 100%)"
    : m.tier === "bronze"
    ? "linear-gradient(135deg,#FCD9B6 0%,#D97706 55%,#7C2D12 100%)"
    : "linear-gradient(135deg,#475569 0%,#334155 100%)";
  const border = m.tier === "gold" ? "rgba(252,211,77,0.9)" : m.tier === "silver" ? "rgba(203,213,225,0.8)" : m.tier === "bronze" ? "rgba(217,119,6,0.85)" : "rgba(148,163,184,0.5)";
  const textColor = m.tier === "silver" ? "#0f172a" : "#ffffff";
  const fs = size >= 30 ? 11 : size >= 24 ? 10 : 9;
  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:4}}>
      <div className={m.tier === "gold" ? "medal-gold" : ""} style={{
        width: size, height: size, borderRadius: "50%",
        background: bg, border: `1.5px solid ${border}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: m.tier === "gold" ? "0 0 10px rgba(245,158,11,0.55), inset 0 1px 2px rgba(255,255,255,0.5)" : "inset 0 1px 2px rgba(255,255,255,0.35)",
        color: textColor, fontWeight: 900, fontSize: fs, lineHeight: 1,
        flexShrink: 0,
      }}>
        {m.tier === "gold" ? "★" : Math.round(pct) + "%"}
      </div>
      {showLabel && m.label && <span style={{fontSize:10,fontWeight:800,letterSpacing:0.5,color:m.color,textTransform:"uppercase"}}>{m.label}</span>}
    </div>
  );
}

function isCampaignStateUnlocked(stateData, campaignProgress) {
  if (!stateData.unlockRequires) return true;
  const { tier, count } = stateData.unlockRequires;
  const statesInTier = CAMPAIGN_STATES.filter(s => s.tier === tier);
  const completed = statesInTier.filter(s => {
    const sp = campaignProgress[s.id];
    return sp && s.challenges.every(c => (sp[c.id] || 0) >= 1);
  });
  return completed.length >= count;
}

function getCampaignStateStars(stateId, campaignProgress) {
  const state = CAMPAIGN_STATES.find(s => s.id === stateId);
  if (!state) return 0;
  const sp = campaignProgress[stateId] || {};
  return state.challenges.reduce((sum, c) => sum + (sp[c.id] || 0), 0);
}

function getCampaignMaxStars(stateId) {
  const state = CAMPAIGN_STATES.find(s => s.id === stateId);
  return state ? state.challenges.length * 3 : 0;
}

function isChallengeUnlocked(state, challengeIndex, campaignProgress) {
  if (challengeIndex === 0) return true;
  const prevChallenge = state.challenges[challengeIndex - 1];
  const sp = campaignProgress[state.id] || {};
  return (sp[prevChallenge.id] || 0) >= 1;
}

function checkAchievements(data, sessionAchievements = []) {
  const newlyEarned = [];
  const all = [...data.achievements, ...sessionAchievements];
  for (const a of ACHIEVEMENTS) {
    if (all.includes(a.id)) continue;
    if (a.check && a.check(data)) newlyEarned.push(a.id);
  }
  return [...sessionAchievements, ...newlyEarned];
}

// Session XP/coin calculator
function calcSessionRewards(totalCorrect, totalAnswered, bestStreak, mode, difficulty, activePerks, gameMode, playStyle) {
  let xp = totalCorrect * 10 + (totalAnswered - totalCorrect) * 3;
  xp += bestStreak * 2;
  const acc = totalAnswered > 0 ? totalCorrect / totalAnswered : 0;
  if (acc >= 1) xp += 200; else if (acc >= 0.9) xp += 100; else if (acc >= 0.8) xp += 50;
  if (mode === MODES.PLURAL) xp = Math.floor(xp * 1.2);
  if (mode === MODES.BOTH) xp = Math.floor(xp * 1.5);
  if (difficulty === "normal") xp = Math.floor(xp * 1.25);
  if (difficulty === "hard") xp = Math.floor(xp * 1.5);
  if (playStyle === "timed" || gameMode === "timed") xp = Math.floor(xp * 1.3);
  if (playStyle === "survival" || gameMode === "survival") xp = Math.floor(xp * 1.4);
  if (activePerks.includes("double_xp")) xp *= 2;

  let coins = totalCorrect;
  if (bestStreak >= 10) coins += 5;
  if (bestStreak >= 25) coins += 10;
  if (acc >= 1 && totalAnswered >= 5) coins += 15;

  return { xp: Math.floor(xp), coins };
}

// SRS: build a weighted queue — struggling nouns appear more, mastered less
function buildSrsQueue(nouns, nounStats, maxSize) {
  const weighted = nouns.map(n => {
    const nounId = getNounEntryId(n);
    const s = nounStats[nounId] || nounStats[n[0]];
    if (!s) return { noun: n, weight: 5 }; // never seen = high priority
    const ratio = s.attempts > 0 ? s.correct / s.attempts : 0;
    const cStreak = s.consecutiveCorrect || 0;
    if (cStreak >= 5) return { noun: n, weight: 0.5 }; // mastered = low priority
    if (ratio < 0.5) return { noun: n, weight: 8 }; // struggling
    if (ratio < 0.75) return { noun: n, weight: 4 }; // needs work
    return { noun: n, weight: 2 }; // decent
  });
  // Weighted random selection
  const pool = [];
  for (const { noun, weight } of weighted) {
    const count = Math.max(1, Math.round(weight));
    for (let i = 0; i < count; i++) pool.push(noun);
  }
  const shuffled = shuffleArray(pool);
  const seen = new Set(); const result = [];
  for (const n of shuffled) {
    const nounId = getNounEntryId(n);
    if (seen.has(nounId)) continue;
    seen.add(nounId); result.push(n);
    if (result.length >= maxSize) break;
  }
  return result;
}

// Generate weakest words from stats, optionally filtered by word type
function getWeakestNouns(nounStats, count = 30, wordType) {
  // Build lookup sets for filtering by word type
  let allowedWords = null;
  if (wordType === "nouns") {
    allowedWords = new Set(NOUNS.map(n => n[0]));
    // Also include noun entry IDs
    NOUNS.forEach(n => { const id = getNounEntryId(n); if (id) allowedWords.add(id); });
  } else if (wordType === "adjectives") {
    allowedWords = new Set(ADJECTIVES.map(a => a[0]));
  } else if (wordType === "verbs") {
    allowedWords = new Set(VERBS.map(v => v[0]));
  }
  // wordType "mixed" or undefined => no filter
  const entries = Object.entries(nounStats)
    .filter(([name, s]) => s.attempts >= 2 && (!allowedWords || allowedWords.has(name)))
    .map(([noun, s]) => ({ noun, ratio: s.correct / s.attempts, attempts: s.attempts }))
    .sort((a, b) => a.ratio - b.ratio || b.attempts - a.attempts);
  return entries.slice(0, count).map(e => e.noun);
}

// Daily streak logic
function updateDailyStreak(streak) {
  const today = new Date().toISOString().slice(0, 10);
  if (streak.lastDate === today) return streak; // already played today
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (streak.lastDate === yesterday) {
    const c = streak.current + 1;
    return { current: c, lastDate: today, best: Math.max(streak.best || 0, c) };
  }
  return { current: 1, lastDate: today, best: Math.max(streak.best || 0, 1) }; // streak broken
}

  return acc;
}, {});

function sanitizePersistedData(data) {
  if (!data || typeof data !== "object") return { ...DEFAULT_DATA };
  const achievements = [...new Set((data.achievements || []).filter(id => VALID_ACHIEVEMENT_IDS.has(id)))];
  const bestScores = Object.fromEntries(
    Object.entries(data.bestScores || {}).filter(([key]) => PERSISTED_BEST_SCORE_MODE_IDS.has(key.split(":")[0]))
  );
  const modeStats = Object.fromEntries(
    Object.entries(data.modeStats || {}).filter(([key]) => VALID_PERSISTED_MODE_STAT_IDS.has(key.split(":")[0]))
  );
  const modeMastered = Object.fromEntries(
    Object.entries(data.modeMastered || {}).filter(([modeId]) => VALID_PERSISTED_MODE_STAT_IDS.has(modeId))
  );
  const campaignProgress = Object.fromEntries(
    Object.entries(data.campaignProgress || {}).flatMap(([stateId, progress]) => {
      const validChallenges = VALID_CAMPAIGN_CHALLENGES[stateId];
      if (!validChallenges) return [];
      const cleaned = Object.fromEntries(
        Object.entries(progress || {}).filter(([challengeId]) => validChallenges.has(challengeId))
      );
      return Object.keys(cleaned).length ? [[stateId, cleaned]] : [];
    })
  );
  return { ...data, achievements, bestScores, modeStats, modeMastered, campaignProgress };
}

const PLURAL_FAMILY_PRIORITY = {
  none: ["same", "e", "en", "s"],
  same: ["e", "en", "er", "umlaut"],
  s: ["e", "en", "same", "er"],
  nen: ["n", "en", "e", "same"],
  n: ["en", "e", "same", "s"],
  en: ["e", "same", "er", "s"],
  e: ["en", "er", "same", "s"],
  er: ["e", "same", "en", "s"],
  er_umlaut: ["er", "e_umlaut", "same", "en"],
  e_umlaut: ["e", "en", "er_umlaut", "same"],
  umlaut: ["same", "e_umlaut", "er_umlaut", "e"],
  um_en: ["um_a", "same", "e", "en"],
  um_a: ["um_en", "same", "e", "en"],
  ium_ien: ["same", "en", "e", "s"],
  us_en: ["same", "e", "en", "s"],
  a_en: ["same", "e", "en", "s"],
};

function formatArticleAttempt(value) {
  return value === NO_ANSWER ? "—" : value;
}

function formatPluralAttempt(value) {
  if (value === NO_ANSWER) return "—";
  return value === "—" ? NO_PLURAL_LABEL : value;
}

function getPluralOptionLabel(value) {
  return value === "—" ? NO_PLURAL_LABEL : `die ${value}`;
}

function isLikelyLoanword(lowerWord) {
  return ["ion","t\u00e4t","ismus","ist","or","eur","ment","ette","age","ade","ie","ik","ur","a","i","o","u","y"].some(suffix => lowerWord.endsWith(suffix));
}

function addUmlaut(word) {
  const lowerWord = word.toLowerCase();
  const auIndex = lowerWord.lastIndexOf("au");
  if (auIndex !== -1) {
    const replacement = word[auIndex] === word[auIndex].toUpperCase() ? "Äu" : "äu";
    return word.slice(0, auIndex) + replacement + word.slice(auIndex + 2);
  }

  const replacements = [["a", "ä"], ["o", "ö"], ["u", "ü"]];
  let bestMatch = null;

  replacements.forEach(([base, target]) => {
    const idx = lowerWord.lastIndexOf(base);
    if (idx === -1) return;
    if (!bestMatch || idx > bestMatch.idx || (idx === bestMatch.idx && base.length > bestMatch.base.length)) {
      bestMatch = { idx, base, target };
    }
  });

  if (!bestMatch) return word;

  let replacement = bestMatch.target;
  const originalSlice = word.slice(bestMatch.idx, bestMatch.idx + bestMatch.base.length);
  if (originalSlice[0] === originalSlice[0].toUpperCase()) {
    replacement = replacement[0].toUpperCase() + replacement.slice(1);
  }

  return word.slice(0, bestMatch.idx) + replacement + word.slice(bestMatch.idx + bestMatch.base.length);
}

function buildPluralCandidates(word, article) {
  const lowerWord = word.toLowerCase();
  const umlauted = addUmlaut(word);
  const hasUmlautVariant = umlauted !== word;
  const endsWithStableEnding = /(er|el|en)$/i.test(lowerWord);
  const hasLatinEnding = /(ent|ant|ist|or|eur|ion|ium|ismus|ment)$/i.test(lowerWord);
  const candidates = new Map();

  const pushCandidate = (form, family, score) => {
    if (!form && form !== "—") return;
    if (form !== "—" && form === word && family !== "same" && family !== "umlaut") return;
    const existing = candidates.get(form);
    if (!existing || existing.score < score) {
      candidates.set(form, { form, family, score });
    }
  };

  pushCandidate(word, "same", 0.18 + (endsWithStableEnding ? 0.65 : 0));
  if (!lowerWord.endsWith("e")) pushCandidate(word + "e", "e", 0.18 + (article === "der" ? 0.85 : article === "das" ? 0.65 : 0.22));
  pushCandidate(word + "en", "en", 0.18 + (article === "die" ? 0.95 : 0.38));
  if (!lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(word + "er", "er", 0.12 + (article === "das" ? 0.8 : article === "der" ? 0.35 : 0));
  pushCandidate(word + "s", "s", 0.08 + ((/[aiouy]$/i.test(word) || isLikelyLoanword(lowerWord)) ? 0.75 : 0.1));
  pushCandidate("—", "none", article === "die" ? 0.03 : 0.05);

  if (lowerWord.endsWith("e")) pushCandidate(word + "n", "n", 1.3 + (article === "die" ? 0.2 : 0.05));
  if (lowerWord.endsWith("in")) pushCandidate(word + "nen", "nen", 1.7);

  if (hasUmlautVariant && !hasLatinEnding) {
    pushCandidate(umlauted, "umlaut", 0.12 + (endsWithStableEnding ? 0.6 : 0.2));
    if (!lowerWord.endsWith("e")) pushCandidate(umlauted + "e", "e_umlaut", 0.15 + (article === "der" ? 1.0 : article === "die" ? 0.45 : 0.18));
    if (!lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(umlauted + "er", "er_umlaut", 0.12 + (article === "das" ? 1.05 : article === "der" ? 0.45 : 0));
  }

  if (/(chen|lein)$/i.test(lowerWord)) pushCandidate(word, "same", 1.6);
  if (endsWithStableEnding) {
    pushCandidate(word, "same", 1.05);
    if (hasUmlautVariant) pushCandidate(umlauted, "umlaut", 0.95);
  }

  if (article === "die" && !lowerWord.endsWith("e") && !lowerWord.endsWith("in")) pushCandidate(word + "en", "en", 1.2);
  if (article === "der" && word.length <= 7) {
    if (!lowerWord.endsWith("e")) pushCandidate(word + "e", "e", 1.1);
    if (hasUmlautVariant && !hasLatinEnding && !lowerWord.endsWith("e")) pushCandidate(umlauted + "e", "e_umlaut", 1.18);
  }
  if (article === "das" && word.length <= 7) {
    if (!lowerWord.endsWith("e")) pushCandidate(word + "e", "e", 1.02);
    if (!lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(word + "er", "er", 1.08);
    if (hasUmlautVariant && !hasLatinEnding && !lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(umlauted + "er", "er_umlaut", 1.2);
  }

  if (lowerWord.endsWith("um")) {
    pushCandidate(word.slice(0, -2) + "en", "um_en", 1.55);
    pushCandidate(word.slice(0, -2) + "a", "um_a", 1.1);
  }
  if (lowerWord.endsWith("ium")) pushCandidate(word.slice(0, -3) + "ien", "ium_ien", 1.65);
  if (lowerWord.endsWith("us")) pushCandidate(word.slice(0, -2) + "en", "us_en", 1.15);
  if (lowerWord.endsWith("a")) pushCandidate(word.slice(0, -1) + "en", "a_en", 1.05);

  return [...candidates.values()];
}

function familyClosenessBonus(candidateFamily, correctFamily) {
  if (!correctFamily) return 0;
  const priorities = PLURAL_FAMILY_PRIORITY[correctFamily] || [];
  const idx = priorities.indexOf(candidateFamily);
  return idx === -1 ? 0 : Math.max(0.16, 0.72 - idx * 0.14);
}

function getPluralOptions(word, article, correctPlural) {
  const candidates = buildPluralCandidates(word, article);
  if (!candidates.some(candidate => candidate.form === correctPlural)) {
    candidates.push({ form: correctPlural, family: null, score: 1.5 });
  }

  const correctEntry = candidates.find(candidate => candidate.form === correctPlural) || { family: null };
  const correctLength = correctPlural === "—" ? word.length : correctPlural.length;
  const wrongOptions = candidates
    .filter(candidate => candidate.form !== correctPlural)
    .map(candidate => ({
      ...candidate,
      totalScore:
        candidate.score +
        familyClosenessBonus(candidate.family, correctEntry.family) -
        Math.abs((candidate.form === "—" ? word.length : candidate.form.length) - correctLength) * 0.04,
    }))
    .sort((a, b) => b.totalScore - a.totalScore || a.form.localeCompare(b.form, "de"))
    .slice(0, 2)
    .map(candidate => candidate.form);

  const fallbackPool = [word + "e", word + "en", word + "er", word + "s", word, "—"].filter(form => form !== correctPlural);
  fallbackPool.forEach(form => {
    if (wrongOptions.length < 2 && !wrongOptions.includes(form)) wrongOptions.push(form);
  });

  return shuffleArray([correctPlural, ...wrongOptions.slice(0, 2)]);
}

function getMeaningLabel(english) {
  return (english || "").split("/").join(" / ");
}

function shuffleMatchingMeanings(batch, wordType) {
  if (wordType === "adjectives" || wordType === "verbs") {
    return shuffleArray(batch.map(([word, english]) => ({ id: word, label: getMeaningLabel(english) })));
  }
  if (wordType === "mixed") {
    return shuffleArray(batch.map(entry => {
      const isSimple = entry.length <= 3;
      return { id: isSimple ? entry[0] : getNounEntryId(entry), label: getMeaningLabel(isSimple ? entry[1] : entry[3]) };
    }));
  }
  return shuffleArray(batch.map(noun => ({ id: getNounEntryId(noun), label: getMeaningLabel(noun[3]) })));
}

function dedupeMistakesByNoun(mistakes) {
  const latestByNoun = new Map();
  mistakes.forEach(mistake => {
    latestByNoun.set(getMistakeEntryId(mistake), mistake);
  });
  return [...latestByNoun.values()];
}
