            <span style={{fontSize:11,color:"#FDE68A",position:"relative",zIndex:1}}>Previous best: {best.prevPct}% → <b style={{color:"#FCD34D"}}>100%</b></span>
          )}
        </div>
      )}
      {showNewBest && (
        <div className="celebrate-banner" style={{width:"100%",padding:"14px 18px",background:"linear-gradient(135deg, rgba(16,185,129,0.18) 0%, rgba(59,130,246,0.14) 100%)",border:"1.5px solid rgba(16,185,129,0.5)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10,position:"relative",zIndex:1}}>
            <Medal pct={best.pct} size={36}/>
            <div style={{display:"flex",flexDirection:"column"}}>
              <span style={{fontSize:16,fontWeight:900,color:"#6EE7B7",letterSpacing:0.6}}>NEW BEST!</span>
              <span style={{fontSize:12,color:UI.muted}}>
                {best.prevPct > 0 ? <>Previous: {best.prevPct}% → <b style={{color:"#6EE7B7"}}>{best.pct}%</b></> : <>First run: <b style={{color:"#6EE7B7"}}>{best.pct}%</b></>}
              </span>
            </div>
          </div>
          {nextGoal && nextGoal.next && (
            <div style={{textAlign:"right",position:"relative",zIndex:1}}>
              <div style={{fontSize:10,color:UI.muted,letterSpacing:0.5,textTransform:"uppercase"}}>Next goal</div>
              <div style={{fontSize:13,fontWeight:800,color:nextGoal.nextLabel==="Perfect"?"#FCD34D":nextGoal.nextLabel==="Silver"?"#CBD5E1":"#D97706"}}>{Math.ceil(nextGoal.gapToNext)}% to {nextGoal.nextLabel}</div>
            </div>
          )}
        </div>
      )}
      {/* Existing best but didn't beat it — still show encouragement */}
      {best && !showNewBest && !showPerfect && best.prevPct > 0 && (
        <div style={{width:"100%",padding:"10px 14px",background:UI.panel,border:`1px solid ${UI.line}`,borderRadius:12,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Medal pct={best.prevPct} size={28}/>
            <div style={{display:"flex",flexDirection:"column"}}>
              <span style={{fontSize:12,color:UI.muted}}>This run: <b style={{color:UI.textStrong}}>{best.pct}%</b> · Best: <b style={{color:UI.textStrong}}>{best.prevPct}%</b></span>
              {nextGoal && nextGoal.next && (
                <span style={{fontSize:11,color:UI.faint}}>One clean run away — <b style={{color:nextGoal.nextLabel==="Perfect"?UI.gold:nextGoal.nextLabel==="Silver"?UI.text:"#D97706"}}>{Math.ceil(nextGoal.gapToNext)}% to {nextGoal.nextLabel}</b></span>
              )}
            </div>
          </div>
        </div>
      )}

      {streakBumped&&(userData.dailyStreak||{}).current>=1&&(
        <div style={{fontSize:13,color:"#EF4444",fontWeight:700,textAlign:"center"}}>🔥 {userData.dailyStreak.current} day streak{(userData.dailyStreak||{}).current>=(userData.dailyStreak||{}).best?" (new best!)":""}</div>
      )}

      <h2 style={{fontSize:30,fontWeight:700,color:UI.textStrong,margin:0,fontFamily:FONT_SERIF}}>Session Complete</h2>
      <div style={S.resultsGrid}>
        <div style={S.resultCard}>
          <span style={S.resultValue}>{accuracy}%</span>
          <span style={S.resultLabel}>Accuracy</span>
          <span style={{fontSize:11,color:UI.muted,marginTop:2}}>{totalCorrect}/{totalAnswered} correct</span>
        </div>
        <div style={S.resultCard}>
          <span style={S.resultValue}>🔥 {bestStreak}</span>
          <span style={S.resultLabel}>Best Streak</span>
        </div>
      </div>

      {reviewWrongAnswers.length>0&&(
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
          <h3 style={{fontSize:16,fontWeight:800,color:"#f87171",margin:0}}>Review: {reviewWrongAnswers.length} mistake{reviewWrongAnswers.length>1?"s":""}</h3>
          {!isMatching&&!isVerbForms&&!isVerbPrep&&<p style={{fontSize:12,color:UI.faint,margin:"0 0 4px"}}>Tap any card for the grammar rule explanation</p>}
          <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:500,overflowY:"auto",paddingRight:4}}>
            {reviewWrongAnswers.map((w,i)=>{
              const expl=EXPLANATIONS.get(w.noun);
              const isOpen=expandedIdx===i;
              return (
                <div key={i} onClick={()=>{ if (!isMatching&&!isVerbForms&&!isVerbPrep) setExpandedIdx(isOpen?null:i); }} style={{background:UI.panel,border:`1px solid ${isOpen&&!isMatching&&!isVerbForms&&!isVerbPrep?"rgba(210,161,74,0.4)":UI.line}`,borderRadius:12,padding:"12px 14px",cursor:isMatching||isVerbForms||isVerbPrep?"default":"pointer",transition:"border-color 0.2s"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                    {isVerbForms?(
                      <span style={{fontWeight:800,fontSize:17,color:UI.textStrong}}>{getMeaningLabel(w.english)}</span>
                    ):isVerbPrep?(
                      <div style={{display:"flex",flexDirection:"column",gap:2}}>
                        <span style={{fontWeight:800,fontSize:17,color:UI.textStrong}}>{w.vpVerb}</span>
                        <span style={{fontSize:12,color:UI.muted,fontStyle:"italic"}}>{getMeaningLabel(w.english)}</span>
                      </div>
                    ):(
                    <div style={{display:"flex",alignItems:"baseline",gap:2}}>
                      <span style={{color:ARTICLE_COLORS[w.article],fontWeight:800,fontSize:15}}>{w.article}</span>
                      <span style={{fontWeight:800,fontSize:17,color:UI.textStrong}}> {w.noun}</span>
                      <span style={{color:UI.faint,fontSize:13,marginLeft:6}}>{"->"} {formatPluralAttempt(w.plural)}</span>
                    </div>
                    )}
                    {!isVerbForms&&<span style={{fontSize:12,color:UI.muted,fontStyle:"italic"}}>{getMeaningLabel(w.english)}</span>}
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:2,marginTop:6}}>
                    {isVerbForms&&w.verbInfinitive&&(
                      <>
                        <span style={{fontSize:12,color:"#10B981",fontWeight:700}}>Correct: {w.verbInfinitive} — {w.verbPrateritum} — {w.verbPerfekt}</span>
                        <span style={{fontSize:12,color:UI.muted}}>Infinitiv: <span style={{color:normalize(w.userInfinitive||"")=== normalize(w.verbInfinitive)?"#10B981":"#f87171",fontWeight:700}}>{w.userInfinitive===NO_ANSWER?"—":w.userInfinitive}</span></span>
                        <span style={{fontSize:12,color:UI.muted}}>Präteritum: <span style={{color:normalize(w.userPrateritum||"")=== normalize(w.verbPrateritum)?"#10B981":"#f87171",fontWeight:700}}>{w.userPrateritum===NO_ANSWER?"—":w.userPrateritum}</span></span>
                        <span style={{fontSize:12,color:UI.muted}}>Partizip: <span style={{color:normalize(w.userPerfekt||"")=== normalize(w.verbPerfekt)?"#10B981":"#f87171",fontWeight:700}}>{w.userPerfekt===NO_ANSWER?"—":w.userPerfekt}</span></span>
                      </>
                    )}
                    {isVerbPrep&&w.vpVerb&&(
                      <>
                        <span style={{fontSize:12,color:"#10B981",fontWeight:700}}>Correct: {w.vpVerb} + {w.vpPreposition} ({w.vpCase})</span>
                        <span style={{fontSize:12,color:UI.muted}}>Preposition: <span style={{color:normalize(w.userPreposition||"")===normalize(w.vpPreposition)?"#10B981":"#f87171",fontWeight:700}}>{w.userPreposition===NO_ANSWER?"—":w.userPreposition}</span></span>
                        <span style={{fontSize:12,color:UI.muted}}>Case: <span style={{color:w.userCase===w.vpCase?"#10B981":"#f87171",fontWeight:700}}>{w.userCase===NO_ANSWER?"—":w.userCase}</span></span>
                        {w.vpExample&&<span style={{fontSize:11,color:UI.faint,fontStyle:"italic",marginTop:2}}>{w.vpExample}</span>}
                      </>
                    )}
                    {isMatching&&(
                      <>
                        <span style={{fontSize:12,color:UI.muted}}>
                          Your match: <span style={{color:"#f87171",fontWeight:700}}>{w.userMeaning || "none"}</span>
                        </span>
                        <span style={{fontSize:12,color:UI.muted}}>
                          Correct meaning: <span style={{color:"#10B981",fontWeight:700}}>{getMeaningLabel(w.english)}</span>
                        </span>
                      </>
                    )}
                    {(mode===MODES.ARTICLE||mode===MODES.BOTH)&&w.userArticle!==NO_ANSWER&&(
                      <span style={{fontSize:12,color:UI.muted}}>
                        Your article: <span style={{color:w.userArticle===w.article?"#10B981":"#f87171",fontWeight:700}}>{formatArticleAttempt(w.userArticle)}</span>
                        {w.userArticle!==w.article&&<span style={{color:"#10B981"}}>{" -> "}{w.article}</span>}
                      </span>
                    )}
                    {(mode===MODES.PLURAL||mode===MODES.BOTH)&&w.userPlural!==NO_ANSWER&&(
                      <span style={{fontSize:12,color:UI.muted}}>
                        Your plural: <span style={{color:"#f87171",fontWeight:700}}>{formatPluralAttempt(w.userPlural)}</span>
                        <span style={{color:"#10B981"}}>{" -> "}{formatPluralAttempt(w.plural)}</span>
                      </span>
                    )}
                    {!isMatching&&!isVerbForms&&w.userArticle===NO_ANSWER&&w.userPlural===NO_ANSWER&&<span style={{fontSize:12,color:"#f59e0b"}}>Time expired</span>}
                  </div>
                  {!isMatching&&!isVerbForms&&isOpen&&expl&&(() => {
                    const rule = expl.ruleId ? ARTICLE_RULES[expl.ruleId] : null;
                    const exceptionsInBank = getRuleExceptionsInBank(rule);
                    return (
                    <div style={{marginTop:10,padding:"10px 12px",background:"rgba(251,191,36,0.05)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:8,display:"flex",flexDirection:"column",gap:10}}>
                      <div style={{display:"flex",flexDirection:"column",gap:5}}>
                        <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,color:"#fbbf24"}}>Why {w.article}?</span>
                        {rule ? (
                          <>
                            {expl.isException ? (
                              <span style={{fontSize:12,fontWeight:700,color:"#f87171",textTransform:"uppercase",letterSpacing:1}}>⚠ Exception to "{rule.name}"</span>
                            ) : (
                              <span style={{fontSize:12,fontWeight:700,color:"#a7f3d0"}}>Rule: {rule.name} → {rule.article}</span>
                            )}
                            {expl.isException && <span style={{fontSize:13,color:UI.textStrong,lineHeight:1.55}}>{w.noun} is one of the known exceptions — it takes <span style={{color:ARTICLE_COLORS[w.article],fontWeight:800}}>{w.article}</span> instead of <span style={{color:ARTICLE_COLORS[rule.article],fontWeight:800}}>{rule.article}</span>.</span>}
                            <span style={{fontSize:13,color:UI.textStrong,lineHeight:1.55}}>{rule.description}</span>
                            {exceptionsInBank.length > 0 && (
                              <ExceptionsList exceptions={exceptionsInBank} currentWord={w.noun} />
                            )}
                          </>
                        ) : (
                          <span style={{fontSize:13,color:UI.textStrong,lineHeight:1.55}}>{expl.article}</span>
                        )}
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,color:"#fbbf24"}}>Plural pattern</span>
                        <span style={{fontSize:13,color:UI.textStrong,lineHeight:1.55}}>{expl.plural}</span>
                      </div>
                    </div>
                    );
                  })()}
                  {!isMatching&&!isVerbForms&&<div style={{fontSize:10,color:UI.muted,textAlign:"center",marginTop:6}}>{isOpen?"▲ collapse":"▼ tap for explanation"}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {reviewWrongAnswers.length===0&&<div style={{textAlign:"center",padding:24,color:"#10B981",fontSize:18,fontWeight:700}}>Perfect session — no mistakes!</div>}

      {reviewWrongAnswers.length>0&&!deckSaved&&(
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:11,color:UI.faint,textTransform:"uppercase",letterSpacing:2,fontWeight:600}}>Save mistakes as deck</label>
          <div style={{display:"flex",gap:8}}>
            <input value={deckName} onChange={e=>setDeckName(e.target.value)}
              placeholder={`Mistakes ${new Date().toLocaleDateString()}`}
              style={{...S.pluralInput,fontSize:13,textAlign:"left",flex:1,padding:"8px 12px"}}/>
            <button onClick={()=>{
              const name = deckName.trim() || `Mistakes ${new Date().toLocaleDateString()}`;
              onSaveDeck(name, reviewWrongAnswers.map(w=>w.entryId || w.noun));
              setDeckSaved(true);
            }} style={{...S.submitBtn,fontSize:13,padding:"8px 16px"}}>Save</button>
          </div>
        </div>
      )}
      {deckSaved&&<div style={{fontSize:13,color:"#10B981",fontWeight:700}}>Deck saved{syncStatus==="synced"?" & synced":""}</div>}

      <div style={{display:"flex",gap:10,width:"100%",flexDirection:"column"}}>
        {reviewWrongAnswers.length>0&&<button onClick={onPracticeWrong} style={S.practiceBtn}>Practice {reviewWrongAnswers.length} Missed {isVerbForms?"Verb":isVerbPrep?"Verb":"Word"}{reviewWrongAnswers.length>1?"s":""}</button>}
        <div style={{display:"flex",gap:10,width:"100%"}}>
          <button onClick={onRestart} style={{...S.restartBtn,flex:1}}>New Game</button>
          {canReplay && <button onClick={onReplay} style={{...S.restartBtn,flex:1,background:"rgba(16,185,129,0.15)",border:"1px solid rgba(16,185,129,0.4)",color:"#6EE7B7"}}>Replay</button>}
        </div>
      </div>
    </div></div>
  );
}

const STATE_LABEL_POS = {
  bw: [176.5, 319.1],
  by: [248.8, 306.9],
  be: [309.5, 137.8],
  bb: [297.2, 139.4],
  hb: [168.4, 107.3],
  hh: [207.3, 84.8],
  he: [176.5, 232.8],
  mv: [281.8, 72.9],
  ni: [180.5, 132.6],
  nw: [136.1, 189.8],
  rp: [125.5, 259.8],
  sl: [112.5, 287.0],
  sn: [310.5, 214.0],
  st: [262.9, 162.6],
  sh: [197.6, 51.7],
  th: [244.5, 214.1],
};

function CampaignScreen({ campaignProgress, onSelectChallenge, onBack }) {
  const [selectedState, setSelectedState] = useState(null);
  const [hoveredState, setHoveredState] = useState(null);
  const totalStars = CAMPAIGN_STATES.reduce((sum, s) => sum + getCampaignStateStars(s.id, campaignProgress), 0);
  const maxStars = CAMPAIGN_STATES.reduce((sum, s) => sum + getCampaignMaxStars(s.id), 0);
  const tierColors = { 1:"#5C8578", 2:"#C96A3D", 3:"#B4935F", 4:"#8E6448", 5:"#8D5B56", 6:"#4F7C77" };

  // State detail panel
  if (selectedState) {
    const state = CAMPAIGN_STATES.find(s => s.id === selectedState);
    if (!state) { setSelectedState(null); return null; }
    const unlocked = isCampaignStateUnlocked(state, campaignProgress);
    const sp = campaignProgress[state.id] || {};
    const stateStars = getCampaignStateStars(state.id, campaignProgress);
    const stateMax = getCampaignMaxStars(state.id);

    return (
      <div style={S.container}><div style={{...S.menuInner,maxWidth:520}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <button onClick={()=>setSelectedState(null)} style={S.endBtn}>Back</button>
          <div style={{textAlign:"right"}}>
            <span style={{fontSize:16,color:"#F59E0B"}}>{"★".repeat(Math.min(stateStars, stateMax))}</span>
            <span style={{fontSize:12,color:UI.muted}}> {stateStars}/{stateMax}</span>
          </div>
        </div>
        <div style={{textAlign:"center",marginBottom:8}}>
          <div style={{fontSize:13,color:tierColors[state.tier]||UI.accent,fontWeight:700,textTransform:"uppercase",letterSpacing:2}}>{state.abbr}</div>
          <h2 style={{fontSize:28,fontWeight:700,color:UI.textStrong,margin:"6px 0 0",fontFamily:FONT_SERIF}}>{state.name}</h2>
        </div>

        {!unlocked ? (
          <div style={{...S.settingsPanel,textAlign:"center",borderColor:"rgba(180,106,91,0.28)"}}>
            <span style={{fontSize:28}}>🔒</span>
            <p style={{fontSize:14,color:UI.muted,margin:"8px 0 0"}}>
              Complete {state.unlockRequires.count} states from Tier {state.unlockRequires.tier} to unlock
            </p>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {state.challenges.map((ch, idx) => {
              const stars = sp[ch.id] || 0;
              const chUnlocked = isChallengeUnlocked(state, idx, campaignProgress);
              const modeLabel = {classic:"Classic",timed:"Time Attack",survival:"Survival",reverse:"Reverse",matching:"Matching"}[ch.gameMode] || ch.gameMode;
              const answerLabel = {article:"Articles",plural:"Plurals",both:"Both"}[ch.mode] || ch.mode;
              const isBoss = ch.icon === "S";
              return (
                <button key={ch.id} onClick={()=>chUnlocked && onSelectChallenge(state, ch)}
                  disabled={!chUnlocked}
                  style={{
                    ...S.settingsPanel,
                    cursor: chUnlocked ? "pointer" : "default",
                    opacity: chUnlocked ? 1 : 0.4,
                    borderColor: isBoss ? (stars >= 1 ? "rgba(210,161,74,0.44)" : "rgba(210,161,74,0.22)") : (stars >= 1 ? "rgba(79,124,119,0.34)" : UI.line),
                    background: stars >= 1 ? (isBoss ? UI.goldSoft : UI.tealSoft) : UI.panel,
                    textAlign: "left",
                    transition: "transform 0.1s, border-color 0.15s",
                  }}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{
                      width:36, height:36, borderRadius: isBoss ? 8 : "50%",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      background: isBoss ? "linear-gradient(135deg, #d2a14a, #c96a3d)" : stars >= 1 ? UI.tealSoft : UI.panelSoft,
                      border: `2px solid ${isBoss ? "rgba(210,161,74,0.5)" : stars >= 1 ? "rgba(79,124,119,0.34)" : UI.line}`,
                      fontSize: isBoss ? 16 : 14, fontWeight: 800,
                      color: isBoss ? "#fff" : stars >= 1 ? UI.teal : UI.faint,
                      flexShrink: 0,
                    }}>
                      {!chUnlocked ? "🔒" : ch.icon}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:15,fontWeight:700,color:UI.textStrong}}>{ch.name}</div>
                      <div style={{fontSize:11,color:UI.muted}}>{ch.desc}</div>
                      <div style={{fontSize:10,color:UI.faint,marginTop:2}}>
                        {modeLabel} · {answerLabel} · Top {ch.tier} · {ch.count} words
                      </div>
                    </div>
                    <div style={{display:"flex",gap:2,flexShrink:0}}>
                      {[1,2,3].map(s => (
                        <span key={s} style={{fontSize:16,color:stars>=s?"#F59E0B":"#6b7280"}}>★</span>
                      ))}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div></div>
    );
  }

  // Main map view
  return (
    <div style={S.container}><div style={{...S.menuInner, maxWidth: 520}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={onBack} style={S.endBtn}>Back</button>
        <div style={{textAlign:"center",flex:1}}>
          <h2 style={{fontSize:26,fontWeight:700,color:UI.textStrong,margin:0,fontFamily:FONT_SERIF}}>Campaign</h2>
        </div>
        <div style={{textAlign:"right",minWidth:70}}>
          <span style={{fontSize:14,color:"#F59E0B",fontWeight:700}}>★ {totalStars}</span>
          <span style={{fontSize:11,color:UI.muted}}>/ {maxStars}</span>
        </div>
      </div>

      {/* Map */}
      <div style={{position:"relative",width:"100%",maxWidth:420,margin:"0 auto"}}>
        <svg viewBox="35 -5 370 400" style={{width:"100%",height:"auto"}}>
          {/* Bundesland shapes */}
          {CAMPAIGN_STATES.map(state => {
            const pathD = STATE_PATHS[state.id];
            if (!pathD) return null;
            const unlocked = isCampaignStateUnlocked(state, campaignProgress);
            const stateStars = getCampaignStateStars(state.id, campaignProgress);
            const stateMax = getCampaignMaxStars(state.id);
            const allDone = stateStars >= stateMax;
            const anyDone = stateStars > 0;
            const color = tierColors[state.tier] || UI.accent;
            const isHovered = hoveredState === state.id;
            const labelPos = STATE_LABEL_POS[state.id];

            let fillColor, fillOpacity, strokeColor, strokeOpacity;
            if (!unlocked) {
              fillColor = "#d1d5db"; fillOpacity = 0.72;
              strokeColor = "#9ca3af"; strokeOpacity = 0.8;
            } else if (allDone) {
              fillColor = color; fillOpacity = isHovered ? 0.35 : 0.2;
              strokeColor = color; strokeOpacity = 0.8;
            } else if (anyDone) {
              fillColor = color; fillOpacity = isHovered ? 0.25 : 0.1;
              strokeColor = color; strokeOpacity = 0.6;
            } else {
              fillColor = color; fillOpacity = isHovered ? 0.2 : 0.06;
              strokeColor = color; strokeOpacity = isHovered ? 0.6 : 0.3;
            }

            return (
              <g key={state.id}
                onClick={()=>setSelectedState(state.id)}
                onMouseEnter={()=>setHoveredState(state.id)}
                onMouseLeave={()=>setHoveredState(null)}
                style={{cursor:"pointer"}}>
                <path d={pathD}
                  fill={fillColor} fillOpacity={fillOpacity}
                  stroke={strokeColor} strokeOpacity={strokeOpacity}
                  strokeWidth={isHovered ? "1.5" : "0.8"}
                  style={{transition:"fill-opacity 0.15s, stroke-opacity 0.15s"}}
                />
                {labelPos && (
                  <>
                    <text x={labelPos[0]} y={labelPos[1]+(unlocked && anyDone ? -2 : 1)} textAnchor="middle" dominantBaseline="middle"
                      fill={unlocked ? (allDone ? color : isHovered ? "#f4e8d0" : "#d4c4a7") : "#7b6f62"}
                      fontSize={state.id==="be"||state.id==="hh"||state.id==="hb" ? "6" : "8"}
                      fontWeight="800" fontFamily={FONT_MONO}
                      style={{pointerEvents:"none",textShadow:"0 1px 3px rgba(0,0,0,0.8)"}}>
                      {unlocked ? state.abbr : "🔒"}
                    </text>
                    {unlocked && anyDone && (
                      <text x={labelPos[0]} y={labelPos[1]+9} textAnchor="middle"
                        fill="#F59E0B" fontSize="6" fontWeight="700"
                        style={{pointerEvents:"none",textShadow:"0 1px 2px rgba(0,0,0,0.8)"}}>
                        {"★".repeat(Math.min(Math.ceil(stateStars/state.challenges.length), 3))}
                      </text>
                    )}
                  </>
                )}
              </g>
            );
          })}
        </svg>

        {/* Hovered state tooltip */}
        {hoveredState && (() => {
          const state = CAMPAIGN_STATES.find(s=>s.id===hoveredState);
          if (!state) return null;
          const unlocked = isCampaignStateUnlocked(state, campaignProgress);
          const stateStars = getCampaignStateStars(state.id, campaignProgress);
          const stateMax = getCampaignMaxStars(state.id);
          return (
            <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",
              background:"rgba(255,255,255,0.96)",border:`1px solid ${UI.lineStrong}`,
              borderRadius:10,padding:"7px 14px",whiteSpace:"nowrap",pointerEvents:"none",zIndex:10,boxShadow:"0 8px 26px rgba(15,23,42,0.08)"}}>
              <span style={{fontSize:13,fontWeight:700,color:UI.textStrong}}>{state.name}</span>
              {unlocked ? (
                <span style={{fontSize:11,color:"#F59E0B",marginLeft:8}}>★ {stateStars}/{stateMax}</span>
              ) : (
                <span style={{fontSize:11,color:UI.muted,marginLeft:8}}>🔒 Locked</span>
              )}
            </div>
          );
        })()}
      </div>

      {/* Tier legend */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginTop:4}}>
        {[
          [1,tierColors[1],"Coast"],[2,tierColors[2],"North"],[3,tierColors[3],"East"],
          [4,tierColors[4],"Central"],[5,tierColors[5],"West"],[6,tierColors[6],"South"]
        ].map(([t,c,label])=>{
          const tierStates = CAMPAIGN_STATES.filter(s=>s.tier===t);
          const done = tierStates.filter(s => {
            const sp = campaignProgress[s.id];
            return sp && s.challenges.every(ch => (sp[ch.id] || 0) >= 1);
          }).length;
          return (
            <div key={t} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:UI.muted}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:c,display:"inline-block"}}/>
              {label} {done}/{tierStates.length}
            </div>
          );
        })}
      </div>
    </div></div>
  );
}

function WordDataStatus({ title, detail, isError = false }) {
  return (
    <div style={{...S.container, justifyContent:"center", padding:"24px"}}>
      <div style={{...S.settingsPanel, maxWidth:520, width:"100%", borderColor:isError?"rgba(180,106,91,0.36)":"rgba(79,124,119,0.3)", gap:12}}>
        <h2 style={{fontSize:30, fontWeight:700, color:isError?"#f0b7ad":UI.textStrong, margin:0, fontFamily:FONT_SERIF}}>{title}</h2>
        <p style={{fontSize:14, lineHeight:1.6, color:UI.muted, margin:0}}>{detail}</p>
      </div>
    </div>
  );
}

// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<WordDataStatus title="Loading vocabulary..." detail="Fetching the noun database from data/nouns.json." />);
loadWordData()
  .then(() => {
    root.render(<GermanNounGame />);
  })
  .catch((error) => {
    console.error("Failed to load noun data", error);
    root.render(
      <WordDataStatus
        title="Vocabulary failed to load"
        detail={error.message + ". Open the site through GitHub Pages or another HTTP server instead of file://."}
        isError={true}
      />
    );
  });
</script>
</body>
</html>
