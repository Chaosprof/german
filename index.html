            <button onClick={()=>{setSource("tier");setSelectedDeck(null);}} style={{...S.diffBtn,flex:1,borderColor:source==="tier"?"#8B5CF6":"rgba(255,255,255,0.1)",backgroundColor:source==="tier"?"rgba(139,92,246,0.1)":"transparent"}}>
              <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>Vocab Level</span>
            </button>
            {showDeck&&(
              <button onClick={()=>setSource("deck")} style={{...S.diffBtn,flex:1,borderColor:source==="deck"?"#8B5CF6":"rgba(255,255,255,0.1)",backgroundColor:source==="deck"?"rgba(139,92,246,0.1)":"transparent"}}>
                <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>Saved Deck</span>
                {(userData.decks.length+BUILTIN_DECKS.length)>0&&<span style={{fontSize:10,color:"#64748b"}}>{userData.decks.length+BUILTIN_DECKS.length} deck{(userData.decks.length+BUILTIN_DECKS.length)>1?"s":""}</span>}
              </button>
            )}
            <button onClick={()=>setSource("weakest")} style={{...S.diffBtn,flex:1,borderColor:source==="weakest"?"#EF4444":"rgba(255,255,255,0.1)",backgroundColor:source==="weakest"?"rgba(239,68,68,0.1)":"transparent"}}>
              <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>Weakest</span>
              <span style={{fontSize:10,color:"#64748b"}}>Your worst words</span>
            </button>
          </div>
        </div>
        );
      })()}

      {source==="weakest"&&<div style={{fontSize:12,color:"#94a3b8",textAlign:"center"}}>Practice your weakest words based on past performance. Requires at least a few sessions of play data.</div>}

      {source!=="weakest"&&(source==="tier"||selectedGameMode==="verb_forms"||selectedGameMode==="verb_prepositions"||(supportsWordType&&matchWordType!=="nouns"))&&(()=>{
        // Compute effective word type for tier labels
        const effWt = supportsWordType ? matchWordType : (selectedGameMode === "verb_forms" ? "verbs" : selectedGameMode === "verb_prepositions" ? "verb_prep" : "nouns");
        const countForTier = (tv) => {
          if (effWt === "nouns") return getNounsForTier(tv).length;
          if (effWt === "adjectives") return getAdjectivesForTier(tv).length;
          if (effWt === "verb_prep") return getVerbPrepositionsForTier(tv).length;
          if (effWt === "verbs") return (selectedGameMode === "verb_forms" ? getIrregularVerbsForTier(tv) : getVerbsForTier(tv)).length;
          // mixed
          return getNounsForTier(tv).length + getAdjectivesForTier(tv).length + getVerbsForTier(tv).length;
        };
        const countForRange = (min, max) => {
          if (effWt === "nouns") return getNounsForTier(max, min).length;
          if (effWt === "adjectives") return getAdjectivesForTier(max, min).length;
          if (effWt === "verb_prep") return getVerbPrepositionsForTier(max, min).length;
          if (effWt === "verbs") return (selectedGameMode === "verb_forms" ? getIrregularVerbsForTier(max, min) : getVerbsForTier(max, min)).length;
          return getNounsForTier(max, min).length + getAdjectivesForTier(max, min).length + getVerbsForTier(max, min).length;
        };
        // Mastery: count mastered words in a range
        const masteredSet = new Set(userData.masteredNouns || []);
        const nounStats = userData.nounStats || {};
        const uModeStats = userData.modeStats || {};
        // Per-mode mastery for nouns in a range
        const modeMasteryInRange = (modeId, min, max) => {
          if (effWt !== "nouns") return null;
          const words = getNounsForTier(max, min || undefined);
          if (!words.length) return null;
          let m = 0;
          words.forEach(n => { const s = uModeStats[modeId+":"+n[0]]; if (s && (s.consecutiveCorrect||0) >= 5) m++; });
          return { pct: Math.round((m / words.length) * 100) };
        };
        const wordsInRange = (min, max) => {
          const words = [];
          if (effWt === "nouns" || effWt === "mixed") getNounsForTier(max, min).forEach(n => words.push(n[0]));
          if (effWt === "adjectives" || effWt === "mixed") getAdjectivesForTier(max, min).forEach(a => words.push(a[0]));
          if (effWt === "verbs" || effWt === "mixed") getVerbsForTier(max, min).forEach(v => words.push(v[0]));
          if (effWt === "verb_prep") getVerbPrepositionsForTier(max, min).forEach(v => words.push(v[0]+"|"+v[3]));
          return words;
        };
        const masteryForRange = (min, max) => {
          const words = wordsInRange(min, max);
          if (!words.length) return { mastered: 0, total: 0, pct: 0 };
          let m = 0;
          words.forEach(w => {
            if (masteredSet.has(w)) { m++; return; }
            const s = nounStats[w];
            if (s && (s.consecutiveCorrect || 0) >= 5) m++;
          });
          return { mastered: m, total: words.length, pct: Math.round((m / words.length) * 100) };
        };
        const maxAvailable = countForTier(99999);
        // Filter out tiers with 0 words, and dedupe tiers that yield the same count
        const seenCounts = new Set();
        const filteredTiers = TIER_OPTIONS.filter(t => {
          const c = countForTier(t.value);
          if (c <= 0) return false;
          if (seenCounts.has(c)) return false;
          seenCounts.add(c);
          return true;
        });
        // Build 100-word incremental ranges based on rank values
        const rangeSize = 100;
        const ranges = [];
        const maxRankTier = TIER_OPTIONS[TIER_OPTIONS.length - 1].value;
        for (let i = 0; i < maxRankTier; i += rangeSize) {
          const rMin = i;
          const rMax = i + rangeSize;
          const c = countForRange(rMin, rMax);
          if (c > 0) ranges.push({ min: rMin, max: rMax, count: c });
        }
        // SVG progress ring helper
        const ProgressRing = ({pct, size, stroke, color, bgColor}) => {
          const r = (size - stroke) / 2;
          const circ = 2 * Math.PI * r;
          const offset = circ - (pct / 100) * circ;
          return (
            <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
              <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bgColor||"rgba(255,255,255,0.06)"} strokeWidth={stroke}/>
              {pct > 0 && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color||"#10B981"} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s ease"}}/>}
            </svg>
          );
        };
        // Compute overall mastery for the header
        const totalMastery = masteryForRange(0, 99999);
        const rangesCompleted = ranges.filter(r => masteryForRange(r.min, r.max).pct >= 100).length;
        const rangesStarted = ranges.filter(r => { const m = masteryForRange(r.min, r.max); return m.pct > 0 && m.pct < 100; }).length;
        return (
        <div style={S.menuSection}>
          <label style={S.menuLabel}>Vocabulary Level</label>
          <div style={{display:"flex",gap:6,marginBottom:10}}>
            <button onClick={()=>{setTierMode("cumulative");setTierMin(0);}} style={{...S.diffBtn,flex:1,borderColor:tierMode==="cumulative"?"#8B5CF6":"rgba(255,255,255,0.1)",backgroundColor:tierMode==="cumulative"?"rgba(139,92,246,0.1)":"transparent"}}>
              <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>Cumulative</span>
              <span style={{fontSize:10,color:"#64748b"}}>Top N words</span>
            </button>
            <button onClick={()=>{setTierMode("range");}} style={{...S.diffBtn,flex:1,borderColor:tierMode==="range"?"#8B5CF6":"rgba(255,255,255,0.1)",backgroundColor:tierMode==="range"?"rgba(139,92,246,0.1)":"transparent"}}>
              <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>Ranges</span>
              <span style={{fontSize:10,color:"#64748b"}}>100-word chunks</span>
            </button>
          </div>
          {tierMode==="cumulative"?(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {filteredTiers.map(t=>{
                const count = countForTier(t.value);
                const capped = effWt !== "mixed" && count < t.value;
                const label = capped ? `Top ${count.toLocaleString()}` : t.label;
                const isAll = count >= maxAvailable;
                const desc = isAll
                  ? `All ${effWt === "mixed" ? "words" : effWt} (${count.toLocaleString()})`
                  : effWt === "mixed"
                    ? `${count.toLocaleString()} words`
                    : (capped ? `${count.toLocaleString()} available` : t.desc);
                const tierKey = `${selectedGameMode}:tier:${t.value}`;
                const tierBest = (userData.bestScores || {})[tierKey];
                const tierPct = tierBest ? tierBest.pct : 0;
                const tm = masteryForRange(0, t.value);
                const ringColor = tm.pct >= 100 ? "#F59E0B" : tm.pct >= 50 ? "#10B981" : "#8B5CF6";
                return (
                <button key={t.value} className={tm.pct>=100?"range-gold":""} onClick={()=>{setTier(t.value);setTierMin(0);}} style={{...S.tierBtn,borderColor:tier===t.value&&tierMin===0?"#8B5CF6":tm.pct>=100?"rgba(245,158,11,0.5)":tierPct>0?"rgba(16,185,129,0.4)":"rgba(255,255,255,0.1)",backgroundColor:tier===t.value&&tierMin===0?"rgba(139,92,246,0.1)":tm.pct>=100?"rgba(245,158,11,0.06)":"transparent",position:"relative",overflow:"hidden",padding:"12px 8px"}}>
                  {tierPct>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${tierPct}%`,background:tm.pct>=100?"linear-gradient(to top, rgba(245,158,11,0.2), rgba(245,158,11,0.05))":"linear-gradient(to top, rgba(16,185,129,0.35), rgba(16,185,129,0.15))",borderRadius:"0 0 8px 8px",transition:"height 0.3s ease",pointerEvents:"none"}}/>}
                  <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:2}}>
                    <ProgressRing pct={tm.pct} size={36} stroke={3} color={ringColor}/>
                    <span style={{position:"absolute",fontSize:9,fontWeight:800,color:ringColor}}>{tm.pct>=100?"\u2713":tm.pct>0?tm.pct+"%":""}</span>
                  </div>
                  <span style={{fontSize:13,fontWeight:700,color:tm.pct>=100?"#F59E0B":"#e2e8f0",position:"relative"}}>{label}</span>
                  <span style={{fontSize:9,color:"#64748b",position:"relative"}}>{tm.mastered}/{tm.total} mastered</span>
                  {tierPct>0&&<span style={{fontSize:9,color:"#10B981",fontWeight:700,position:"relative"}}>Best: {tierPct}%</span>}
                </button>
                );
            })}
          </div>
          ):(
          <>
          {/* Overall mastery summary for ranges */}
          <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,padding:"12px 16px",marginBottom:10}}>
            <div style={{display:"flex",alignItems:"center",gap:12}}>
              <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <ProgressRing pct={totalMastery.pct} size={48} stroke={4} color={totalMastery.pct>=100?"#F59E0B":totalMastery.pct>=50?"#10B981":"#8B5CF6"}/>
                <span style={{position:"absolute",fontSize:12,fontWeight:800,color:totalMastery.pct>=100?"#F59E0B":"#e2e8f0"}}>{totalMastery.pct}%</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{totalMastery.mastered.toLocaleString()} / {totalMastery.total.toLocaleString()} words mastered</div>
                <div style={{position:"relative",height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden",marginTop:4}}>
                  <div style={{height:"100%",width:`${totalMastery.pct}%`,background:totalMastery.pct>=100?"linear-gradient(90deg,#F59E0B,#EF4444)":totalMastery.pct>=50?"linear-gradient(90deg,#10B981,#3B82F6)":"linear-gradient(90deg,#8B5CF6,#6366F1)",borderRadius:3,transition:"width 0.5s"}}/>
                </div>
                <div style={{display:"flex",gap:12,marginTop:4}}>
                  {rangesCompleted>0&&<span style={{fontSize:10,color:"#F59E0B",fontWeight:700}}>{rangesCompleted} completed</span>}
                  {rangesStarted>0&&<span style={{fontSize:10,color:"#10B981",fontWeight:700}}>{rangesStarted} in progress</span>}
                  <span style={{fontSize:10,color:"#64748b"}}>{ranges.length} total ranges</span>
                </div>
              </div>
            </div>
          </div>
          <div className="range-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,maxHeight:400,overflowY:"auto",paddingRight:4}}>
            {ranges.map(r=>{
                const isSelected = tierMin===r.min && tier===r.max && tierMode==="range";
                const rangeKey = `${selectedGameMode}:range:${r.min+1}-${r.max}`;
                const rangeBest = (userData.bestScores || {})[rangeKey];
                const rangePct = rangeBest ? rangeBest.pct : 0;
                const rm = masteryForRange(r.min, r.max);
                const isComplete = rm.pct >= 100;
                const isStarted = rm.pct > 0;
                const ringColor = isComplete ? "#F59E0B" : rm.pct >= 50 ? "#10B981" : rm.pct > 0 ? "#8B5CF6" : "rgba(255,255,255,0.1)";
                const borderColor = isSelected ? "#8B5CF6" : isComplete ? "rgba(245,158,11,0.5)" : rangePct >= 90 ? "rgba(16,185,129,0.5)" : isStarted ? "rgba(139,92,246,0.25)" : "rgba(255,255,255,0.08)";
                const bgColor = isSelected ? "rgba(139,92,246,0.1)" : isComplete ? "rgba(245,158,11,0.06)" : "transparent";
                return (
                <button key={r.min} className={isComplete?"range-gold":""} onClick={()=>{setTier(r.max);setTierMin(r.min);}} style={{...S.tierBtn,borderColor,backgroundColor:bgColor,position:"relative",overflow:"hidden",padding:"10px 6px",gap:1}}>
                  {rangePct>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${rangePct}%`,background:isComplete?"linear-gradient(to top, rgba(245,158,11,0.2), rgba(245,158,11,0.05))":"linear-gradient(to top, rgba(16,185,129,0.25), rgba(16,185,129,0.08))",borderRadius:"0 0 8px 8px",transition:"height 0.3s ease",pointerEvents:"none"}}/>}
                  <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:1}}>
                    <ProgressRing pct={rm.pct} size={32} stroke={2.5} color={ringColor}/>
                    <span style={{position:"absolute",fontSize:isComplete?11:8,fontWeight:800,color:ringColor}}>{isComplete?"\u2713":rm.pct>0?rm.pct+"%":""}</span>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:isComplete?"#F59E0B":"#e2e8f0",position:"relative"}}>{r.min+1}–{r.max}</span>
                  <span style={{fontSize:9,color:"#64748b",position:"relative"}}>{rm.mastered}/{rm.total}</span>
                  {(()=>{
                    const am = modeMasteryInRange("article", r.min, r.max);
                    const pm = modeMasteryInRange("plural", r.min, r.max);
                    if (!am && !pm) return null;
                    return (
                      <div style={{display:"flex",gap:3,position:"relative",alignItems:"center",justifyContent:"center"}}>
                        {am&&<div title={`Articles: ${am.pct}%`} style={{width:6,height:6,borderRadius:3,background:am.pct>=100?"#F59E0B":am.pct>0?"#3B82F6":"rgba(255,255,255,0.1)"}}/>}
                        {pm&&<div title={`Plurals: ${pm.pct}%`} style={{width:6,height:6,borderRadius:3,background:pm.pct>=100?"#F59E0B":pm.pct>0?"#EC4899":"rgba(255,255,255,0.1)"}}/>}
                      </div>
                    );
                  })()}
                  {rangePct>=90&&<span style={{fontSize:8,position:"relative",color:rangePct>=100?"#F59E0B":"#10B981",fontWeight:700}}>{rangePct>=100?"\u2605 "+rangePct+"%":rangePct+"%"}</span>}
                </button>
                );
            })}
          </div>
          </>
          )}
        </div>
        );
      })()}

      {source==="deck"&&(
        <div style={S.menuSection}>
          <label style={S.menuLabel}>Select Deck</label>
          <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:300,overflowY:"auto"}}>
            {BUILTIN_DECKS.map(dk=>{
              const dkKey = `${selectedGameMode}:deck:${dk.id}`;
              const dkBest = (userData.bestScores || {})[dkKey];
              const dkPct = dkBest ? dkBest.pct : 0;
              return (
              <div key={dk.id} style={{display:"flex",gap:8,alignItems:"stretch"}}>
                <button onClick={()=>setSelectedDeck(dk.id)} style={{...S.modeCard,flex:1,borderColor:selectedDeck===dk.id?"#8B5CF6":dkPct>0?"rgba(16,185,129,0.4)":"rgba(255,255,255,0.1)",backgroundColor:selectedDeck===dk.id?"rgba(139,92,246,0.1)":"transparent",position:"relative",overflow:"hidden"}}>
                  {dkPct>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${dkPct}%`,background:"linear-gradient(to top, rgba(16,185,129,0.35), rgba(16,185,129,0.15))",borderRadius:"0 0 8px 8px",transition:"height 0.3s ease",pointerEvents:"none"}}/>}
                  <span style={{fontSize:15,fontWeight:700,color:"#e2e8f0",position:"relative"}}>{dk.name}</span>
                  <span style={{fontSize:11,color:"#64748b",position:"relative"}}>{dk.nouns.length} noun{dk.nouns.length>1?"s":""} · Built-in{dkPct>0?` · Best: ${dkPct}%`:""}</span>
                </button>
              </div>
              );
            })}
            {userData.decks.map(dk=>{
              const dkKey = `${selectedGameMode}:deck:${dk.id}`;
              const dkBest = (userData.bestScores || {})[dkKey];
              const dkPct = dkBest ? dkBest.pct : 0;
              return (
              <div key={dk.id} style={{display:"flex",gap:8,alignItems:"stretch"}}>
                <button onClick={()=>setSelectedDeck(dk.id)} style={{...S.modeCard,flex:1,borderColor:selectedDeck===dk.id?"#8B5CF6":dkPct>0?"rgba(16,185,129,0.4)":"rgba(255,255,255,0.1)",backgroundColor:selectedDeck===dk.id?"rgba(139,92,246,0.1)":"transparent",position:"relative",overflow:"hidden"}}>
                  {dkPct>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${dkPct}%`,background:"linear-gradient(to top, rgba(16,185,129,0.35), rgba(16,185,129,0.15))",borderRadius:"0 0 8px 8px",transition:"height 0.3s ease",pointerEvents:"none"}}/>}
                  <span style={{fontSize:15,fontWeight:700,color:"#e2e8f0",position:"relative"}}>{dk.name}</span>
                  <span style={{fontSize:11,color:"#64748b",position:"relative"}}>{dk.nouns.length} noun{dk.nouns.length>1?"s":""} · {new Date(dk.created).toLocaleDateString()}{dkPct>0?` · Best: ${dkPct}%`:""}</span>
                </button>
                <button onClick={()=>{if(confirm("Delete deck \""+dk.name+"\"?"))onDeleteDeck(dk.id);}} style={{...S.endBtn,alignSelf:"center",fontSize:11,padding:"4px 10px"}}>Del</button>
              </div>
              );
            })}
            {userData.decks.length===0&&BUILTIN_DECKS.length===0&&<p style={{fontSize:12,color:"#475569",textAlign:"center",margin:"8px 0"}}>No decks yet — create one or save mistakes after a session</p>}
          </div>
          <button onClick={()=>setShowDeckBuilder(true)} style={{...S.practiceBtn,borderColor:"rgba(139,92,246,0.3)",color:"#a78bfa",background:"rgba(139,92,246,0.1)",marginTop:4}}>
            + Create Custom Deck
          </button>
        </div>
      )}

      {/* ── Answer type (hidden for reverse and special game modes) ── */}
      {selectedGameMode!=="reverse"&&selectedGameMode!=="matching"&&selectedGameMode!=="verb_forms"&&(
        <div style={S.menuSection}>
          <label style={S.menuLabel}>Answer Type</label>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {[[MODES.ARTICLE,"Articles","der / die / das"],[MODES.PLURAL,"Plurals","Choose the plural form"],[MODES.BOTH,"Both","Article + plural choice"]].map(([m,t,d])=>
              <button key={m} onClick={()=>setMode(m)} style={{...S.modeCard,borderColor:mode===m?"#3B82F6":"rgba(255,255,255,0.1)",backgroundColor:mode===m?"rgba(59,130,246,0.1)":"transparent"}}>
                <span style={{fontSize:16,fontWeight:700,color:"#e2e8f0"}}>{t}</span><span style={{fontSize:12,color:"#64748b"}}>{d}</span>
              </button>
            )}
          </div>
        </div>
      )}

      <div style={S.menuSection}>
        <label style={S.menuLabel}>Play Style</label>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>setPlayStyle("practice")} style={{...S.diffBtn,flex:1,borderColor:playStyle==="practice"?"#10B981":"rgba(255,255,255,0.1)",backgroundColor:playStyle==="practice"?"rgba(16,185,129,0.1)":"transparent"}}>
            <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>Practice</span>
            <span style={{fontSize:10,color:"#64748b"}}>No constraints</span>
          </button>
          <button onClick={()=>setPlayStyle("timed")} style={{...S.diffBtn,flex:1,borderColor:playStyle==="timed"?"#F59E0B":"rgba(255,255,255,0.1)",backgroundColor:playStyle==="timed"?"rgba(245,158,11,0.1)":"transparent"}}>
            <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>Timed</span>
            <span style={{fontSize:10,color:"#64748b"}}>Per-question timer</span>
          </button>
          <button onClick={()=>setPlayStyle("survival")} style={{...S.diffBtn,flex:1,borderColor:playStyle==="survival"?"#EF4444":"rgba(255,255,255,0.1)",backgroundColor:playStyle==="survival"?"rgba(239,68,68,0.1)":"transparent"}}>
            <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>Survival</span>
            <span style={{fontSize:10,color:"#64748b"}}>3 lives</span>
          </button>
        </div>
        {playStyle==="timed"&&(
          <div style={{marginTop:8}}>
            <label style={{fontSize:12,color:"#94a3b8",marginBottom:4,display:"block"}}>Time per question: {timedSeconds}s</label>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[5,8,10,15,20,30].map(s=>
                <button key={s} onClick={()=>setTimedSeconds(s)} style={{...S.tierBtn,padding:"6px 12px",minWidth:44,borderColor:timedSeconds===s?"#F59E0B":"rgba(255,255,255,0.1)",backgroundColor:timedSeconds===s?"rgba(245,158,11,0.1)":"transparent"}}>
                  <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{s}s</span>
                </button>
              )}
            </div>
          </div>
        )}
      </div>

      <button onClick={handleStart} disabled={source==="deck"&&!selectedDeck} style={{...S.startBtn,opacity:(source==="deck"&&!selectedDeck)?0.4:1}}>Start Game</button>
      <button onClick={onOpenCampaign} style={{...S.startBtn,background:"linear-gradient(135deg,#7C3AED,#2563EB)",marginTop:0}}>Campaign Mode</button>
      <button onClick={onOpenDashboard} style={{...S.startBtn,background:"linear-gradient(135deg,#10B981,#06B6D4)",marginTop:0}}>Progress Dashboard</button>
      <div style={{textAlign:"center",fontSize:12,color:"#475569"}}>{EXPLANATIONS.size} precomputed grammar explanations loaded</div>
    </div></div>
  );
}

// ═══════════════════════════════════════════════════════════════
// PROGRESS DASHBOARD
// ═══════════════════════════════════════════════════════════════
function MenuScreen({onStart, userData, syncStatus, onDeleteDeck, onSaveDeck, onSyncRefresh, onOpenCampaign, onOpenDashboard}) {
  const [mode,setMode]=useState(MODES.ARTICLE);
  const [tier,setTier]=useState(500);
  const [tierMin,setTierMin]=useState(0);
  const [tierMode,setTierMode]=useState("cumulative");
  const [source,setSource]=useState("tier");
  const [selectedDeck,setSelectedDeck]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [showDeckBuilder,setShowDeckBuilder]=useState(false);
  const [selectedGameMode,setSelectedGameMode]=useState("classic");
  const [matchWordType,setMatchWordType]=useState("nouns");
  const [playStyle,setPlayStyle]=useState("practice");
  const [timedSeconds,setTimedSeconds]=useState(10);
  const [patInput,setPatInput]=useState(getPat());
  const [patSaved,setPatSaved]=useState(false);
  const [activeStep,setActiveStep]=useState(1);

  const handleSavePat = () => {
    setPat(patInput.trim());
    setPatSaved(true);
    setTimeout(() => setPatSaved(false), 2000);
    if (patInput.trim()) onSyncRefresh();
  };

  const supportsWordType = selectedGameMode === "matching" || selectedGameMode === "reverse";
  const answerTypeAllowed = selectedGameMode !== "reverse" && selectedGameMode !== "matching" && selectedGameMode !== "verb_forms" && selectedGameMode !== "verb_prepositions" && selectedGameMode !== "runner";
  const effectiveWordType = supportsWordType ? matchWordType : (selectedGameMode === "verb_forms" ? "verbs" : selectedGameMode === "verb_prepositions" ? "verb_prep" : "nouns");
  const deckAllowed = !((supportsWordType && matchWordType !== "nouns") || selectedGameMode === "verb_forms" || selectedGameMode === "verb_prepositions");
  const weakestAllowed = selectedGameMode !== "verb_prepositions";
  const allDecks = useMemo(() => [...BUILTIN_DECKS, ...(userData.decks || [])], [userData.decks]);
  const selectedDeckData = allDecks.find(dk => dk.id === selectedDeck) || null;
  const sourceOptions = useMemo(() => {
    const options = [{ id: "tier", name: "Vocab Level", desc: "Pick a tier or range" }];
    if (deckAllowed) options.push({ id: "deck", name: "Saved Deck", desc: `${allDecks.length} available` });
    if (weakestAllowed) options.push({ id: "weakest", name: "Weakest", desc: "Use your worst words" });
    return options;
  }, [deckAllowed, weakestAllowed, allDecks.length]);

  useEffect(() => {
    if (!supportsWordType && matchWordType !== "nouns") setMatchWordType("nouns");
  }, [supportsWordType, matchWordType]);

  useEffect(() => {
    if (!answerTypeAllowed && mode !== MODES.ARTICLE) setMode(MODES.ARTICLE);
  }, [answerTypeAllowed, mode]);

  useEffect(() => {
    const validSources = new Set(sourceOptions.map(opt => opt.id));
    if (!validSources.has(source)) {
      setSource("tier");
      setSelectedDeck(null);
    }
  }, [source, sourceOptions]);

  useEffect(() => {
    if (selectedDeck && !allDecks.some(dk => dk.id === selectedDeck)) setSelectedDeck(null);
  }, [selectedDeck, allDecks]);

  useEffect(() => {
    if (activeStep === 3 && source === "deck" && !selectedDeck) setActiveStep(2);
  }, [activeStep, source, selectedDeck]);

  const handleStart = () => {
    const wType = supportsWordType ? matchWordType : "nouns";
    const diff = playStyle === "timed" ? "normal" : "easy";
    const isRange = source === "tier" && tierMode === "range";
    const effectiveTierMin = isRange ? tierMin : 0;
    if (source === "weakest") onStart(mode, diff, tier, "__weakest__", selectedGameMode, wType, playStyle, timedSeconds, 0, false);
    else if (source === "deck" && selectedDeck) onStart(mode, diff, tier, selectedDeck, selectedGameMode, wType, playStyle, timedSeconds, 0, false);
    else onStart(mode, diff, tier, null, selectedGameMode, wType, playStyle, timedSeconds, effectiveTierMin, isRange);
  };

  const handleGameModeSelect = (gameModeId) => {
    setSelectedGameMode(gameModeId);
    setActiveStep(2);
  };

  const openStep = (step) => {
    if (step === 3 && source === "deck" && !selectedDeck) {
      setActiveStep(2);
      return;
    }
    setActiveStep(step);
  };

  const prog = xpProgress(userData.xp || 0);
  const title = getTitle(prog.level);
  const syncDot = {idle:"#64748b",loading:"#F59E0B",saving:"#F59E0B",synced:"#10B981",error:"#EF4444"}[syncStatus];
  const dailyStreak = userData.dailyStreak || {current:0,best:0};
  const totalNouns = NOUNS.length;
  const masteredCount = (userData.masteredNouns||[]).length;
  const masteryPct = totalNouns > 0 ? Math.round((masteredCount / totalNouns) * 100) : 0;
  const masteryColor = masteryPct >= 100 ? "#F59E0B" : masteryPct >= 50 ? "#10B981" : "#8B5CF6";
  const bestScores = userData.bestScores || {};
  const nounStats = userData.nounStats || {};
  const modeStats = userData.modeStats || {};
  const masteredSet = new Set(userData.masteredNouns || []);
  const gameModeMeta = GAME_MODES.find(gm => gm.id === selectedGameMode) || GAME_MODES[0];
  const contentReady = source !== "deck" || !!selectedDeck;
  const canStart = contentReady;

  const wordTypeLabel = (wType) => {
    if (wType === "nouns") return "Nouns";
    if (wType === "adjectives") return "Adjectives";
    if (wType === "verbs") return selectedGameMode === "verb_forms" ? "Irregular Verbs" : "Verbs";
    if (wType === "verb_prep") return "Verb + Prep";
    return "Mixed";
  };

  const countForTier = (tv) => {
    if (effectiveWordType === "nouns") return getNounsForTier(tv).length;
    if (effectiveWordType === "adjectives") return getAdjectivesForTier(tv).length;
    if (effectiveWordType === "verb_prep") return getVerbPrepositionsForTier(tv).length;
    if (effectiveWordType === "verbs") return (selectedGameMode === "verb_forms" ? getIrregularVerbsForTier(tv) : getVerbsForTier(tv)).length;
    return getNounsForTier(tv).length + getAdjectivesForTier(tv).length + getVerbsForTier(tv).length;
  };

  const countForRange = (min, max) => {
    if (effectiveWordType === "nouns") return getNounsForTier(max, min).length;
    if (effectiveWordType === "adjectives") return getAdjectivesForTier(max, min).length;
    if (effectiveWordType === "verb_prep") return getVerbPrepositionsForTier(max, min).length;
    if (effectiveWordType === "verbs") return (selectedGameMode === "verb_forms" ? getIrregularVerbsForTier(max, min) : getVerbsForTier(max, min)).length;
    return getNounsForTier(max, min).length + getAdjectivesForTier(max, min).length + getVerbsForTier(max, min).length;
  };

  const wordsInRange = (min, max) => {
    const words = [];
    if (effectiveWordType === "nouns" || effectiveWordType === "mixed") getNounsForTier(max, min).forEach(n => words.push(n[0]));
    if (effectiveWordType === "adjectives" || effectiveWordType === "mixed") getAdjectivesForTier(max, min).forEach(a => words.push(a[0]));
    if (effectiveWordType === "verbs" || effectiveWordType === "mixed") {
      const verbs = selectedGameMode === "verb_forms" ? getIrregularVerbsForTier(max, min) : getVerbsForTier(max, min);
      verbs.forEach(v => words.push(v[0]));
    }
    if (effectiveWordType === "verb_prep") getVerbPrepositionsForTier(max, min).forEach(v => words.push(v[0]+"|"+v[3]));
    return words;
  };

  const masteryForRange = (min, max) => {
    const words = wordsInRange(min, max);
    if (!words.length) return { mastered: 0, total: 0, pct: 0 };
    let mastered = 0;
    words.forEach(w => {
      if (masteredSet.has(w)) { mastered++; return; }
      const s = nounStats[w];
      if (s && (s.consecutiveCorrect || 0) >= 5) mastered++;
    });
    return { mastered, total: words.length, pct: Math.round((mastered / words.length) * 100) };
  };

  const modeMasteryInRange = (modeId, min, max) => {
    if (effectiveWordType !== "nouns") return null;
    const words = getNounsForTier(max, min || undefined);
    if (!words.length) return null;
    let mastered = 0;
    words.forEach(n => {
      const s = modeStats[modeId+":"+n[0]];
      if (s && (s.consecutiveCorrect||0) >= 5) mastered++;
    });
    return { pct: Math.round((mastered / words.length) * 100) };
  };

  const describeTierSelection = () => {
    const count = tierMode === "range" ? countForRange(tierMin, tier) : countForTier(tier);
    const label = wordTypeLabel(effectiveWordType).toLowerCase();
    if (!count) return "Choose vocabulary";
    if (tierMode === "range") return `${tierMin + 1}-${tier} ${label} (${count.toLocaleString()})`;
    const maxAvailable = countForTier(99999);
    if (count >= maxAvailable) return `All ${label} (${count.toLocaleString()})`;
    return `Top ${count.toLocaleString()} ${label}`;
  };

  const activitySummary = gameModeMeta.name;
  const contentSummary = source === "deck"
    ? (selectedDeckData ? `Deck: ${selectedDeckData.name}` : "Choose a deck")
    : source === "weakest"
      ? `Weakest ${wordTypeLabel(effectiveWordType).toLowerCase()}`
      : describeTierSelection();
  const rulesSummaryParts = [];
  if (supportsWordType) rulesSummaryParts.push(wordTypeLabel(matchWordType));
  if (answerTypeAllowed) rulesSummaryParts.push(mode === MODES.ARTICLE ? "Articles" : mode === MODES.PLURAL ? "Plurals" : "Both");
  rulesSummaryParts.push(selectedGameMode === "runner" ? "3 Lives" : playStyle === "timed" ? `Timed ${timedSeconds}s` : playStyle === "survival" ? "Survival" : "Practice");
  const rulesSummary = rulesSummaryParts.length ? rulesSummaryParts.join(" / ") : "Mode defaults";

  const renderActivityHint = () => {
    if (selectedGameMode === "verb_forms") return `Type the Infinitiv, Prateritum (ich), and Partizip Perfekt for each irregular verb. ${IRREGULAR_VERBS.length.toLocaleString()} irregular verbs available.`;
    if (selectedGameMode === "verb_prepositions") return `Type the fixed preposition and select the governed case for each verb. ${VERB_PREPOSITIONS.length.toLocaleString()} combos available.`;
    if (selectedGameMode === "runner") return "Endless runner game! Dodge into the correct article lane (der/die/das) for each noun. 3 lives, increasing speed.";
    return gameModeMeta.desc;
  };

  const renderTierSelector = () => {
    const maxAvailable = countForTier(99999);
    const seenCounts = new Set();
    const filteredTiers = TIER_OPTIONS.filter(t => {
      const c = countForTier(t.value);
      if (c <= 0) return false;
      if (seenCounts.has(c)) return false;
      seenCounts.add(c);
      return true;
    });
    const ranges = [];
    const rangeSize = 100;
    const maxRankTier = TIER_OPTIONS[TIER_OPTIONS.length - 1].value;
    for (let i = 0; i < maxRankTier; i += rangeSize) {
      const rMin = i;
      const rMax = i + rangeSize;
      const c = countForRange(rMin, rMax);
      if (c > 0) ranges.push({ min: rMin, max: rMax, count: c });
    }
    const totalMastery = masteryForRange(0, 99999);
    const rangesCompleted = ranges.filter(r => masteryForRange(r.min, r.max).pct >= 100).length;
    const rangesStarted = ranges.filter(r => {
      const mastery = masteryForRange(r.min, r.max);
      return mastery.pct > 0 && mastery.pct < 100;
    }).length;

    const ProgressRing = ({pct, size, stroke, color, bgColor}) => {
      const r = (size - stroke) / 2;
      const circ = 2 * Math.PI * r;
      const offset = circ - (pct / 100) * circ;
      return (
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bgColor||"rgba(255,255,255,0.06)"} strokeWidth={stroke}/>
          {pct > 0 && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color||"#10B981"} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s ease"}}/>}
        </svg>
      );
    };

    return (
      <div style={S.menuSection}>
        <div style={S.inlineSummaryCard}>
          <span style={S.inlineSummaryLabel}>Current Selection</span>
          <span style={S.inlineSummaryValue}>{describeTierSelection()}</span>
        </div>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{setTierMode("cumulative");setTierMin(0);}} style={{...S.diffBtn,flex:1,borderColor:tierMode==="cumulative"?"#8B5CF6":"rgba(255,255,255,0.1)",backgroundColor:tierMode==="cumulative"?"rgba(139,92,246,0.1)":"transparent"}}>
            <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>Cumulative</span>
            <span style={{fontSize:10,color:"#64748b"}}>Top N words</span>
          </button>
          <button onClick={()=>setTierMode("range")} style={{...S.diffBtn,flex:1,borderColor:tierMode==="range"?"#8B5CF6":"rgba(255,255,255,0.1)",backgroundColor:tierMode==="range"?"rgba(139,92,246,0.1)":"transparent"}}>
            <span style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>Ranges</span>
            <span style={{fontSize:10,color:"#64748b"}}>100-word chunks</span>
          </button>
        </div>
        {tierMode==="cumulative"?(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {filteredTiers.map(t=>{
              const count = countForTier(t.value);
              const capped = effectiveWordType !== "mixed" && count < t.value;
              const label = capped ? `Top ${count.toLocaleString()}` : t.label;
              const tierKey = `${selectedGameMode}:tier:${t.value}`;
              const tierBest = bestScores[tierKey];
              const tierPct = tierBest ? tierBest.pct : 0;
              const tm = masteryForRange(0, t.value);
              const ringColor = tm.pct >= 100 ? "#F59E0B" : tm.pct >= 50 ? "#10B981" : "#8B5CF6";
              const isPerfectRun = tierPct >= 100;
              const isMasteryDone = tm.pct >= 100;
              const goldState = isPerfectRun || isMasteryDone;
              const cardClass = isPerfectRun ? "perfect-card" : goldState ? "range-gold" : "";
              return (
                <button key={t.value} className={cardClass} onClick={()=>{setTier(t.value);setTierMin(0);}} style={{...S.tierBtn,borderColor:tier===t.value&&tierMin===0?"#8B5CF6":goldState?"rgba(245,158,11,0.65)":tierPct>=90?"rgba(203,213,225,0.45)":tierPct>=75?"rgba(217,119,6,0.45)":tierPct>0?"rgba(16,185,129,0.35)":"rgba(255,255,255,0.1)",backgroundColor:tier===t.value&&tierMin===0?"rgba(139,92,246,0.1)":goldState?"rgba(245,158,11,0.08)":"transparent",position:"relative",overflow:"hidden",padding:"12px 8px"}}>
                  {tierPct>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${tierPct}%`,background:isPerfectRun?"linear-gradient(to top, rgba(245,158,11,0.3), rgba(245,158,11,0.06))":tierPct>=90?"linear-gradient(to top, rgba(203,213,225,0.28), rgba(203,213,225,0.06))":tierPct>=75?"linear-gradient(to top, rgba(217,119,6,0.3), rgba(217,119,6,0.06))":"linear-gradient(to top, rgba(16,185,129,0.3), rgba(16,185,129,0.08))",borderRadius:"0 0 8px 8px",transition:"height 0.3s ease",pointerEvents:"none"}}/>}
                  {tierPct>0&&<div style={{position:"absolute",top:6,right:6,zIndex:2}}><Medal pct={tierPct} size={24}/></div>}
                  <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:2}}>
                    <ProgressRing pct={tm.pct} size={36} stroke={3} color={ringColor}/>
                    <span style={{position:"absolute",fontSize:9,fontWeight:800,color:ringColor}}>{tm.pct>=100?"\u2713":tm.pct>0?tm.pct+"%":""}</span>
                  </div>
                  <span style={{fontSize:13,fontWeight:700,color:goldState?"#F59E0B":"#e2e8f0",position:"relative"}}>{label}</span>
                  <span style={{fontSize:9,color:"#64748b",position:"relative"}}>{tm.mastered}/{tm.total} mastered</span>
                  {isPerfectRun&&<span style={{fontSize:9,color:"#F59E0B",fontWeight:800,letterSpacing:0.8,position:"relative"}}>PERFECT</span>}
                  {count >= maxAvailable && <span style={{fontSize:8,color:"#94a3b8",position:"relative"}}>All</span>}
                </button>
              );
            })}
          </div>
        ):(
          <>
            <div style={S.inlineSummaryCard}>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <ProgressRing pct={totalMastery.pct} size={48} stroke={4} color={totalMastery.pct>=100?"#F59E0B":totalMastery.pct>=50?"#10B981":"#8B5CF6"}/>
                  <span style={{position:"absolute",fontSize:12,fontWeight:800,color:totalMastery.pct>=100?"#F59E0B":"#e2e8f0"}}>{totalMastery.pct}%</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{totalMastery.mastered.toLocaleString()} / {totalMastery.total.toLocaleString()} words mastered</div>
                  <div style={{position:"relative",height:6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden",marginTop:4}}>
                    <div style={{height:"100%",width:`${totalMastery.pct}%`,background:totalMastery.pct>=100?"linear-gradient(90deg,#F59E0B,#EF4444)":totalMastery.pct>=50?"linear-gradient(90deg,#10B981,#3B82F6)":"linear-gradient(90deg,#8B5CF6,#6366F1)",borderRadius:3,transition:"width 0.5s"}}/>
                  </div>
                  <div style={{display:"flex",gap:12,marginTop:4,flexWrap:"wrap"}}>
                    {rangesCompleted>0&&<span style={{fontSize:10,color:"#F59E0B",fontWeight:700}}>{rangesCompleted} completed</span>}
                    {rangesStarted>0&&<span style={{fontSize:10,color:"#10B981",fontWeight:700}}>{rangesStarted} in progress</span>}
                    <span style={{fontSize:10,color:"#64748b"}}>{ranges.length} total ranges</span>
                  </div>
                </div>
              </div>
            </div>
            <div className="range-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,maxHeight:320,overflowY:"auto",paddingRight:4}}>
              {ranges.map(r=>{
                const isSelected = tierMin===r.min && tier===r.max && tierMode==="range";
                const rangeKey = `${selectedGameMode}:range:${r.min+1}-${r.max}`;
                const rangeBest = bestScores[rangeKey];
                const rangePct = rangeBest ? rangeBest.pct : 0;
                const rm = masteryForRange(r.min, r.max);
                const isComplete = rm.pct >= 100;
                const isPerfectRun = rangePct >= 100;
                const goldState = isComplete || isPerfectRun;
                const isStarted = rm.pct > 0;
                const ringColor = isComplete ? "#F59E0B" : rm.pct >= 50 ? "#10B981" : rm.pct > 0 ? "#8B5CF6" : "rgba(255,255,255,0.1)";
                const borderColor = isSelected ? "#8B5CF6" : goldState ? "rgba(245,158,11,0.65)" : rangePct >= 90 ? "rgba(203,213,225,0.45)" : rangePct >= 75 ? "rgba(217,119,6,0.45)" : isStarted ? "rgba(139,92,246,0.25)" : "rgba(255,255,255,0.08)";
                const bgColor = isSelected ? "rgba(139,92,246,0.1)" : goldState ? "rgba(245,158,11,0.08)" : "transparent";
                const cardClass = isPerfectRun ? "perfect-card" : goldState ? "range-gold" : "";
                return (
                  <button key={r.min} className={cardClass} onClick={()=>{setTier(r.max);setTierMin(r.min);}} style={{...S.tierBtn,borderColor,backgroundColor:bgColor,position:"relative",overflow:"hidden",padding:"10px 6px",gap:1}}>
                    {rangePct>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${rangePct}%`,background:isPerfectRun?"linear-gradient(to top, rgba(245,158,11,0.3), rgba(245,158,11,0.06))":rangePct>=90?"linear-gradient(to top, rgba(203,213,225,0.26), rgba(203,213,225,0.06))":rangePct>=75?"linear-gradient(to top, rgba(217,119,6,0.28), rgba(217,119,6,0.06))":"linear-gradient(to top, rgba(16,185,129,0.28), rgba(16,185,129,0.06))",borderRadius:"0 0 8px 8px",transition:"height 0.3s ease",pointerEvents:"none"}}/>}
                    {rangePct>0&&<div style={{position:"absolute",top:4,right:4,zIndex:2}}><Medal pct={rangePct} size={22}/></div>}
                    <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:1}}>
                      <ProgressRing pct={rm.pct} size={32} stroke={2.5} color={ringColor}/>
                      <span style={{position:"absolute",fontSize:isComplete?11:8,fontWeight:800,color:ringColor}}>{isComplete?"\u2713":rm.pct>0?rm.pct+"%":""}</span>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:goldState?"#F59E0B":"#e2e8f0",position:"relative"}}>{r.min+1}-{r.max}</span>
                    <span style={{fontSize:9,color:"#64748b",position:"relative"}}>{rm.mastered}/{rm.total}</span>
                    {(()=>{
                      const am = modeMasteryInRange("article", r.min, r.max);
                      const pm = modeMasteryInRange("plural", r.min, r.max);
                      if (!am && !pm) return null;
                      return (
                        <div style={{display:"flex",gap:3,position:"relative",alignItems:"center",justifyContent:"center"}}>
                          {am&&<div title={`Articles: ${am.pct}%`} style={{width:6,height:6,borderRadius:3,background:am.pct>=100?"#F59E0B":am.pct>0?"#3B82F6":"rgba(255,255,255,0.1)"}}/>}
                          {pm&&<div title={`Plurals: ${pm.pct}%`} style={{width:6,height:6,borderRadius:3,background:pm.pct>=100?"#F59E0B":pm.pct>0?"#EC4899":"rgba(255,255,255,0.1)"}}/>}
                        </div>
                      );
                    })()}
                    {isPerfectRun&&<span style={{fontSize:9,position:"relative",color:"#F59E0B",fontWeight:800,letterSpacing:0.8}}>PERFECT</span>}
                  </button>
                );
              })}
            </div>
          </>
        )}
      </div>
    );
  };
  const renderDeckSelector = () => (
    <div style={S.menuSection}>
      {selectedDeckData && (
        <div style={S.inlineSummaryCard}>
          <span style={S.inlineSummaryLabel}>Current Deck</span>
          <span style={S.inlineSummaryValue}>{selectedDeckData.name}</span>
        </div>
      )}
      <div style={{display:"flex",flexDirection:"column",gap:8,maxHeight:300,overflowY:"auto"}}>
        {BUILTIN_DECKS.map(dk=>{
          const dkKey = `${selectedGameMode}:deck:${dk.id}`;
          const dkBest = bestScores[dkKey];
          const dkPct = dkBest ? dkBest.pct : 0;
          const isPerfect = dkPct >= 100;
          const m = bestScoreMedal(dkPct);

function ProgressDashboard({ userData, onBack }) {
  const modeStats = userData.modeStats || {};
  const modeMastered = userData.modeMastered || {};
  const nounStats = userData.nounStats || {};
  const masteredSet = new Set(userData.masteredNouns || []);

  // Tracked answer modes with labels and colors
  const TRACKED_MODES = [
    { id: "article", label: "Articles", color: "#3B82F6", icon: "der/die/das" },
    { id: "plural", label: "Plurals", color: "#EC4899", icon: "die ..." },
    { id: "matching", label: "Matching", color: "#8B5CF6", icon: "DE \u2194 EN" },
    { id: "reverse", label: "Reverse", color: "#F59E0B", icon: "EN \u2192 DE" },
    { id: "verb_forms", label: "Verb Forms", color: "#10B981", icon: "Pr\u00e4t/Perf" },
    { id: "verb_prep", label: "Verb+Prep", color: "#06B6D4", icon: "auf+Akk" },
  ];

  // Compute per-mode mastery for a range
  const modeMasteryForRange = (modeId, min, max) => {
    const words = getNounsForTier(max, min || undefined);
    if (!words.length) return { mastered: 0, total: 0, pct: 0 };
    let m = 0;
    words.forEach(n => {
      const key = modeId + ":" + n[0];
      const s = modeStats[key];
      if (s && (s.consecutiveCorrect || 0) >= 5) m++;
    });
    return { mastered: m, total: words.length, pct: words.length > 0 ? Math.round((m / words.length) * 100) : 0 };
  };

  // Compute overall mode mastery (all nouns)
  const modeMasteryOverall = (modeId) => modeMasteryForRange(modeId, 0, 99999);

  // Overall mastery (any mode)
  const overallMastery = (() => {
    const total = NOUNS.length;
    const m = masteredSet.size;
    return { mastered: m, total, pct: total > 0 ? Math.round((m / total) * 100) : 0 };
  })();

  // Build ranges for breakdown
  const rangeSize = 100;
  const ranges = [];
  for (let i = 0; i < 2500; i += rangeSize) {
    const c = getNounsForTier(i + rangeSize, i).length;
    if (c > 0) ranges.push({ min: i, max: i + rangeSize, count: c });
  }

  // Progress ring
  const Ring = ({ pct, size, stroke, color }) => {
    const r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (pct / 100) * circ;
    return (
      <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
        {pct > 0 && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s ease"}}/>}
      </svg>
    );
  };

  // Bar helper
  const Bar = ({ pct, color, height }) => (
    <div style={{position:"relative",height:height||6,background:"rgba(255,255,255,0.06)",borderRadius:3,overflow:"hidden",width:"100%"}}>
      <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:3,transition:"width 0.5s"}}/>
    </div>
  );

  return (
    <div style={S.container}><div style={S.menuInner}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#f1f5f9",margin:0}}>Progress Dashboard</h2>
        <button onClick={onBack} style={S.endBtn}>Back</button>
      </div>

      {/* ── Overall ── */}
      <div style={{...S.settingsPanel,textAlign:"center"}}>
        <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:2,fontWeight:600,marginBottom:6}}>Overall Noun Mastery</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ring pct={overallMastery.pct} size={72} stroke={5} color={overallMastery.pct>=100?"#F59E0B":overallMastery.pct>=50?"#10B981":"#8B5CF6"}/>
            <span style={{position:"absolute",fontSize:18,fontWeight:900,color:"#e2e8f0"}}>{overallMastery.pct}%</span>
          </div>
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:24,fontWeight:900,color:"#e2e8f0"}}>{overallMastery.mastered.toLocaleString()}</div>
            <div style={{fontSize:12,color:"#64748b"}}>of {overallMastery.total.toLocaleString()} nouns mastered</div>
          </div>
        </div>
      </div>

      {/* ── Per-mode overview ── */}
      <div style={S.menuSection}>
        <label style={S.menuLabel}>Mastery by Mode</label>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {TRACKED_MODES.map(tm => {
            const mm = modeMasteryOverall(tm.id);
            const mmList = modeMastered[tm.id] || [];
            return (
              <div key={tm.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"10px 14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:4,background:tm.color,flexShrink:0}}/>
                    <span style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{tm.label}</span>
                    <span style={{fontSize:10,color:"#64748b"}}>{tm.icon}</span>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:mm.pct>=100?"#F59E0B":mm.pct>0?tm.color:"#475569"}}>{mm.mastered} / {mm.total}</span>
                </div>
                <Bar pct={mm.pct} color={mm.pct>=100?"#F59E0B":tm.color} height={5}/>
                {mm.pct > 0 && <div style={{fontSize:10,color:"#64748b",marginTop:3}}>{mm.pct}% mastered (5+ consecutive correct)</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Range breakdown for articles & plurals ── */}
      <div style={S.menuSection}>
        <label style={S.menuLabel}>Range Breakdown (Top 2500)</label>
        <div style={{display:"flex",gap:4,marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:4,background:"#3B82F6"}}/><span style={{fontSize:10,color:"#64748b"}}>Articles</span></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:4,background:"#EC4899"}}/><span style={{fontSize:10,color:"#64748b"}}>Plurals</span></div>
          <div style={{display:"flex",alignItems:"center",gap:4}}><div style={{width:8,height:8,borderRadius:4,background:"#10B981"}}/><span style={{fontSize:10,color:"#64748b"}}>Overall</span></div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:400,overflowY:"auto"}} className="range-grid">
          {ranges.map(r => {
            const am = modeMasteryForRange("article", r.min, r.max);
            const pm = modeMasteryForRange("plural", r.min, r.max);
            // Overall mastery for this range
            let om = 0;
            getNounsForTier(r.max, r.min).forEach(n => { if (masteredSet.has(n[0])) om++; });
            const oPct = r.count > 0 ? Math.round((om / r.count) * 100) : 0;
            const allComplete = am.pct >= 100 && pm.pct >= 100;
            return (
              <div key={r.min} className={allComplete?"range-gold":""} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:allComplete?"rgba(245,158,11,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${allComplete?"rgba(245,158,11,0.3)":"rgba(255,255,255,0.06)"}`,borderRadius:8,position:"relative",overflow:"hidden"}}>
                <span style={{fontSize:12,fontWeight:700,color:allComplete?"#F59E0B":"#e2e8f0",minWidth:52,position:"relative"}}>{r.min+1}–{r.max}</span>
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:3,position:"relative"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:9,color:"#3B82F6",minWidth:14,fontWeight:700}}>A</span>
                    <Bar pct={am.pct} color={am.pct>=100?"#F59E0B":"#3B82F6"} height={4}/>
                    <span style={{fontSize:9,color:"#64748b",minWidth:28,textAlign:"right"}}>{am.pct}%</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:9,color:"#EC4899",minWidth:14,fontWeight:700}}>P</span>
                    <Bar pct={pm.pct} color={pm.pct>=100?"#F59E0B":"#EC4899"} height={4}/>
                    <span style={{fontSize:9,color:"#64748b",minWidth:28,textAlign:"right"}}>{pm.pct}%</span>
                  </div>
                </div>
                {allComplete && <span style={{fontSize:14,color:"#F59E0B",position:"relative"}}>{"\u2605"}</span>}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Session stats ── */}
      <div style={{...S.settingsPanel}}>
        <div style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:2,fontWeight:600,marginBottom:4}}>Stats</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:"#e2e8f0"}}>{userData.totalSessions||0}</div><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase"}}>Sessions</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:"#e2e8f0"}}>{Object.keys(nounStats).length}</div><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase"}}>Words Attempted</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:"#e2e8f0"}}>{(userData.dailyStreak||{}).best||0}</div><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase"}}>Best Streak (days)</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:"#e2e8f0"}}>{userData.xp||0}</div><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase"}}>Total XP</div></div>
        </div>
      </div>
    </div></div>
  );
}

// ═══════════════════════════════════════════════════════════════
// RESULTS — detailed review with grammar explanations
// ═══════════════════════════════════════════════════════════════
function ResultsScreen({score,totalCorrect,totalAnswered,bestStreak,wrongAnswers,mode,onSaveDeck,syncStatus,sessionRewards,newAchievements,userData,gameMode,onRestart,onPracticeWrong}) {
  const [expandedIdx,setExpandedIdx]=useState(null);

  const [deckSaved,setDeckSaved]=useState(false);

  const grade=accuracy>=95?"S":accuracy>=85?"A":accuracy>=70?"B":accuracy>=55?"C":"D";
  const gc={S:"#F59E0B",A:"#10B981",B:"#3B82F6",C:"#8B5CF6",D:"#EF4444"}[grade];
  const prog = xpProgress(userData.xp || 0);
  const title = getTitle(prog.level);
  const isMatching = gameMode === "matching";
  const isVerbForms = gameMode === "verb_forms";

  // Best-score celebration (new best, perfect run, next-goal hint)
  const best = sessionRewards && sessionRewards.best;
  const showPerfect = best && best.isPerfect;
  const showNewBest = best && best.isNewBest && !best.isPerfect && best.pct > 0;
  const nextGoal = best ? bestScoreMedal(best.pct) : null;
  return (
    <div style={S.container}><div style={S.resultsInner}>
      <div style={{...S.gradeCircle,borderColor:gc,color:gc}}>{grade}</div>

      {/* ── Celebration banner (perfect / new best) ── */}
      {showPerfect && (
        <div className="celebrate-banner" style={{width:"100%",padding:"18px 20px",background:"linear-gradient(135deg, rgba(252,211,77,0.22) 0%, rgba(245,158,11,0.14) 50%, rgba(180,83,9,0.18) 100%)",border:"1.5px solid rgba(252,211,77,0.7)",display:"flex",flexDirection:"column",alignItems:"center",gap:6}}>
          <div style={{display:"flex",alignItems:"center",gap:10,position:"relative",zIndex:1}}>
            <Medal pct={100} size={42}/>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-start"}}>
              <span style={{fontSize:22,fontWeight:900,color:"#FCD34D",letterSpacing:1.2}}>PERFECT RUN!</span>
              <span style={{fontSize:12,color:"#FDE68A",fontWeight:600}}>Gold medal locked in</span>
            </div>
          </div>
          {best.prevPct > 0 && best.prevPct < 100 && (
            <span style={{fontSize:11,color:"#FDE68A",position:"relative",zIndex:1}}>Previous best: {best.prevPct}% → <b style={{color:"#FCD34D"}}>100%</b></span>
          )}
        </div>
      )}
      {showNewBest && (
        <div className="celebrate-banner" style={{width:"100%",padding:"14px 18px",background:"linear-gradient(135deg, rgba(16,185,129,0.18) 0%, rgba(59,130,246,0.14) 100%)",border:"1.5px solid rgba(16,185,129,0.5)",display:"flex",alignItems:"center",justifyContent:"space-between",gap:12}}>
          <div style={{display:"flex",alignItems:"center",gap:10,position:"relative",zIndex:1}}>
            <Medal pct={best.pct} size={36}/>
            <div style={{display:"flex",flexDirection:"column"}}>
              <span style={{fontSize:16,fontWeight:900,color:"#6EE7B7",letterSpacing:0.6}}>NEW BEST!</span>
              <span style={{fontSize:12,color:"#94a3b8"}}>
                {best.prevPct > 0 ? <>Previous: {best.prevPct}% → <b style={{color:"#6EE7B7"}}>{best.pct}%</b></> : <>First run: <b style={{color:"#6EE7B7"}}>{best.pct}%</b></>}
              </span>
            </div>
          </div>
          {nextGoal && nextGoal.next && (
            <div style={{textAlign:"right",position:"relative",zIndex:1}}>
              <div style={{fontSize:10,color:"#94a3b8",letterSpacing:0.5,textTransform:"uppercase"}}>Next goal</div>
              <div style={{fontSize:13,fontWeight:800,color:nextGoal.nextLabel==="Perfect"?"#FCD34D":nextGoal.nextLabel==="Silver"?"#CBD5E1":"#D97706"}}>{Math.ceil(nextGoal.gapToNext)}% to {nextGoal.nextLabel}</div>
            </div>
          )}
        </div>
      )}
      {/* Existing best but didn't beat it — still show encouragement */}
      {best && !showNewBest && !showPerfect && best.prevPct > 0 && (
        <div style={{width:"100%",padding:"10px 14px",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:12,display:"flex",alignItems:"center",justifyContent:"space-between",gap:10}}>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <Medal pct={best.prevPct} size={28}/>
            <div style={{display:"flex",flexDirection:"column"}}>
              <span style={{fontSize:12,color:"#94a3b8"}}>This run: <b style={{color:"#e2e8f0"}}>{best.pct}%</b> · Best: <b style={{color:"#e2e8f0"}}>{best.prevPct}%</b></span>
              {nextGoal && nextGoal.next && (
                <span style={{fontSize:11,color:"#64748b"}}>One clean run away — <b style={{color:nextGoal.nextLabel==="Perfect"?"#FCD34D":nextGoal.nextLabel==="Silver"?"#CBD5E1":"#D97706"}}>{Math.ceil(nextGoal.gapToNext)}% to {nextGoal.nextLabel}</b></span>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── XP & Rewards panel ── */}
      {sessionRewards&&(
        <div style={{...S.settingsPanel,textAlign:"center",borderColor:"rgba(139,92,246,0.3)"}}>
          <div style={{fontSize:24,fontWeight:900,color:"#8B5CF6"}}>+{sessionRewards.xp} XP</div>
          <div style={{fontSize:14,color:"#F59E0B",fontWeight:700}}>+{sessionRewards.coins} coins</div>
          <div style={{position:"relative",height:10,background:"rgba(255,255,255,0.06)",borderRadius:5,overflow:"hidden",margin:"6px 0"}}>
            <div style={{height:"100%",width:`${prog.needed>0?(prog.current/prog.needed)*100:100}%`,background:"linear-gradient(90deg,#8B5CF6,#6366F1)",borderRadius:5,transition:"width 1s"}}/>
          </div>
          <div style={{fontSize:12,color:"#94a3b8"}}>Lv. {prog.level} {title[1]} — {prog.current}/{prog.needed} XP</div>
          {(userData.dailyStreak||{}).current>=1&&(
            <div style={{fontSize:13,color:"#EF4444",fontWeight:700,marginTop:4}}>🔥 {userData.dailyStreak.current} day streak{(userData.dailyStreak||{}).current>=(userData.dailyStreak||{}).best?" (new best!)":""}</div>

      <h2 style={{fontSize:24,fontWeight:800,color:"#f1f5f9",margin:0}}>Session Complete</h2>
      <div style={S.resultsGrid}>
        {[["Score",score.toLocaleString()],["Accuracy",`${accuracy}%`],["Correct",`${totalCorrect}/${totalAnswered}`],["Best Streak",`🔥 ${bestStreak}`]].map(([l,v])=>
          <div key={l} style={S.resultCard}><span style={S.resultValue}>{v}</span><span style={S.resultLabel}>{l}</span></div>

      {reviewWrongAnswers.length>0&&(

          {!isMatching&&!isVerbForms&&!isVerbPrep&&<p style={{fontSize:12,color:"#64748b",margin:"0 0 4px"}}>Tap any card for the grammar rule explanation</p>}

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                    {isVerbForms?(
                      <span style={{fontWeight:800,fontSize:17,color:"#f1f5f9"}}>{getMeaningLabel(w.english)}</span>
                    ):isVerbPrep?(
                      <div style={{display:"flex",flexDirection:"column",gap:2}}>
                        <span style={{fontWeight:800,fontSize:17,color:"#f1f5f9"}}>{w.vpVerb}</span>
                        <span style={{fontSize:12,color:"#94a3b8",fontStyle:"italic"}}>{getMeaningLabel(w.english)}</span>

                    ):(

                      <span style={{color:ARTICLE_COLORS[w.article],fontWeight:800,fontSize:15}}>{w.article}</span>

                        <span style={{fontSize:12,color:"#94a3b8"}}>Partizip: <span style={{color:normalize(w.userPerfekt||"")=== normalize(w.verbPerfekt)?"#10B981":"#f87171",fontWeight:700}}>{w.userPerfekt===NO_ANSWER?"—":w.userPerfekt}</span></span>

                    {isMatching&&(

                        <span style={{fontSize:12,color:"#94a3b8"}}>
                          Your match: <span style={{color:"#f87171",fontWeight:700}}>{w.userMeaning || "none"}</span>
                        </span>
                        <span style={{fontSize:12,color:"#94a3b8"}}>
                          Correct meaning: <span style={{color:"#10B981",fontWeight:700}}>{getMeaningLabel(w.english)}</span>
                        </span>
                      </>
                    )}
                    {(mode===MODES.ARTICLE||mode===MODES.BOTH)&&w.userArticle!==NO_ANSWER&&(
                      <span style={{fontSize:12,color:"#94a3b8"}}>

                  </div>
                  {!isMatching&&!isVerbForms&&isOpen&&expl&&(
                    <div style={{marginTop:10,padding:"10px 12px",background:"rgba(251,191,36,0.05)",border:"1px solid rgba(251,191,36,0.15)",borderRadius:8,display:"flex",flexDirection:"column",gap:10}}>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,color:"#fbbf24"}}>Why {w.article}?</span>
                        <span style={{fontSize:13,color:"#e2e8f0",lineHeight:1.55}}>{expl.article}</span>
                      </div>
                      <div style={{display:"flex",flexDirection:"column",gap:3}}>
                        <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,color:"#fbbf24"}}>Plural pattern</span>
                        <span style={{fontSize:13,color:"#e2e8f0",lineHeight:1.55}}>{expl.plural}</span>
                      </div>
                    </div>
                  )}
                  {!isMatching&&!isVerbForms&&<div style={{fontSize:10,color:"#475569",textAlign:"center",marginTop:6}}>{isOpen?"▲ collapse":"▼ tap for explanation"}</div>}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {reviewWrongAnswers.length===0&&<div style={{textAlign:"center",padding:24,color:"#10B981",fontSize:18,fontWeight:700}}>Perfect session — no mistakes!</div>}

      {reviewWrongAnswers.length>0&&!deckSaved&&(
        <div style={{width:"100%",display:"flex",flexDirection:"column",gap:8}}>
          <label style={{fontSize:11,color:"#64748b",textTransform:"uppercase",letterSpacing:2,fontWeight:600}}>Save mistakes as deck</label>
          <div style={{display:"flex",gap:8}}>
            <input value={deckName} onChange={e=>setDeckName(e.target.value)}
              placeholder={`Mistakes ${new Date().toLocaleDateString()}`}
              style={{...S.pluralInput,fontSize:13,textAlign:"left",flex:1,padding:"8px 12px"}}/>
            <button onClick={()=>{
              const name = deckName.trim() || `Mistakes ${new Date().toLocaleDateString()}`;
              onSaveDeck(name, reviewWrongAnswers.map(w=>w.entryId || w.noun));
              setDeckSaved(true);
            }} style={{...S.submitBtn,fontSize:13,padding:"8px 16px"}}>Save</button>
          </div>
        </div>
      )}
      {deckSaved&&<div style={{fontSize:13,color:"#10B981",fontWeight:700}}>Deck saved{syncStatus==="synced"?" & synced":""}</div>}

      <div style={{display:"flex",gap:10,width:"100%",flexDirection:"column"}}>
        {reviewWrongAnswers.length>0&&<button onClick={onPracticeWrong} style={S.practiceBtn}>Practice {reviewWrongAnswers.length} Missed {isVerbForms?"Verb":isVerbPrep?"Verb":"Word"}{reviewWrongAnswers.length>1?"s":""}</button>}
        <button onClick={onRestart} style={S.restartBtn}>New Game</button>
      </div>
    </div></div>
  );
}

            <span style={{fontSize:28}}>🔒</span>
            <p style={{fontSize:14,color:"#94a3b8",margin:"8px 0 0"}}>
              Complete {state.unlockRequires.count} states from Tier {state.unlockRequires.tier} to unlock
            </p>
          </div>
        ) : (
          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {state.challenges.map((ch, idx) => {
              const stars = sp[ch.id] || 0;
              const chUnlocked = isChallengeUnlocked(state, idx, campaignProgress);
              const modeLabel = {classic:"Classic",timed:"Time Attack",survival:"Survival",reverse:"Reverse",matching:"Matching"}[ch.gameMode] || ch.gameMode;
              const answerLabel = {article:"Articles",plural:"Plurals",both:"Both"}[ch.mode] || ch.mode;
              const isBoss = ch.icon === "S";
              return (
                <button key={ch.id} onClick={()=>chUnlocked && onSelectChallenge(state, ch)}
                  disabled={!chUnlocked}
                  style={{
                    ...S.settingsPanel,
                    cursor: chUnlocked ? "pointer" : "default",
                    opacity: chUnlocked ? 1 : 0.4,
                    borderColor: isBoss ? (stars >= 1 ? "rgba(245,158,11,0.4)" : "rgba(245,158,11,0.2)") : (stars >= 1 ? "rgba(16,185,129,0.3)" : "rgba(255,255,255,0.1)"),
                    background: stars >= 1 ? (isBoss ? "rgba(245,158,11,0.06)" : "rgba(16,185,129,0.04)") : "transparent",
                    textAlign: "left",
                    transition: "transform 0.1s, border-color 0.15s",
                  }}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{
                      width:36, height:36, borderRadius: isBoss ? 8 : "50%",
                      display:"flex", alignItems:"center", justifyContent:"center",
                      background: isBoss ? "linear-gradient(135deg,#F59E0B,#EF4444)" : stars >= 1 ? "rgba(16,185,129,0.15)" : "rgba(255,255,255,0.06)",
                      border: `2px solid ${isBoss ? "rgba(245,158,11,0.5)" : stars >= 1 ? "rgba(16,185,129,0.3)" : "rgba(255,255,255,0.1)"}`,
                      fontSize: isBoss ? 16 : 14, fontWeight: 800,
                      color: isBoss ? "#fff" : stars >= 1 ? "#10B981" : "#64748b",
                      flexShrink: 0,
                    }}>
                      {!chUnlocked ? "🔒" : ch.icon}
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:15,fontWeight:700,color:"#e2e8f0"}}>{ch.name}</div>
                      <div style={{fontSize:11,color:"#94a3b8"}}>{ch.desc}</div>
                      <div style={{fontSize:10,color:"#64748b",marginTop:2}}>
                        {modeLabel} · {answerLabel} · Top {ch.tier} · {ch.count} words
                      </div>
                    </div>
                    <div style={{display:"flex",gap:2,flexShrink:0}}>
                      {[1,2,3].map(s => (
                        <span key={s} style={{fontSize:16,color:stars>=s?"#F59E0B":"#334155"}}>★</span>
                      ))}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        )}
      </div></div>
    );
  }

  // Main map view
  return (
    <div style={S.container}><div style={{...S.menuInner, maxWidth: 520}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button onClick={onBack} style={S.endBtn}>Back</button>
        <div style={{textAlign:"center",flex:1}}>
          <h2 style={{fontSize:20,fontWeight:800,color:"#f1f5f9",margin:0}}>Campaign</h2>
        </div>
        <div style={{textAlign:"right",minWidth:70}}>
          <span style={{fontSize:14,color:"#F59E0B",fontWeight:700}}>★ {totalStars}</span>
          <span style={{fontSize:11,color:"#64748b"}}>/{maxStars}</span>
        </div>
      </div>

      {/* Map */}
      <div style={{position:"relative",width:"100%",maxWidth:420,margin:"0 auto"}}>
        <svg viewBox="35 -5 370 400" style={{width:"100%",height:"auto"}}>
          {/* Bundesland shapes */}
          {CAMPAIGN_STATES.map(state => {
            const pathD = STATE_PATHS[state.id];
            if (!pathD) return null;
            const unlocked = isCampaignStateUnlocked(state, campaignProgress);
            const stateStars = getCampaignStateStars(state.id, campaignProgress);
            const stateMax = getCampaignMaxStars(state.id);
            const allDone = stateStars >= stateMax;
            const anyDone = stateStars > 0;
            const color = tierColors[state.tier] || "#8B5CF6";
            const isHovered = hoveredState === state.id;
            const labelPos = STATE_LABEL_POS[state.id];

            let fillColor, fillOpacity, strokeColor, strokeOpacity;
            if (!unlocked) {
              fillColor = "#1e293b"; fillOpacity = 0.4;
              strokeColor = "#334155"; strokeOpacity = 0.5;
            } else if (allDone) {
              fillColor = color; fillOpacity = isHovered ? 0.35 : 0.2;
              strokeColor = color; strokeOpacity = 0.8;
            } else if (anyDone) {
              fillColor = color; fillOpacity = isHovered ? 0.25 : 0.1;
              strokeColor = color; strokeOpacity = 0.6;
            } else {
              fillColor = color; fillOpacity = isHovered ? 0.2 : 0.06;
              strokeColor = color; strokeOpacity = isHovered ? 0.6 : 0.3;
            }

            return (
              <g key={state.id}
                onClick={()=>setSelectedState(state.id)}
                onMouseEnter={()=>setHoveredState(state.id)}
                onMouseLeave={()=>setHoveredState(null)}
                style={{cursor:"pointer"}}>
                <path d={pathD}
                  fill={fillColor} fillOpacity={fillOpacity}
                  stroke={strokeColor} strokeOpacity={strokeOpacity}
                  strokeWidth={isHovered ? "1.5" : "0.8"}
                  style={{transition:"fill-opacity 0.15s, stroke-opacity 0.15s"}}
                />
                {labelPos && (
                  <>
                    <text x={labelPos[0]} y={labelPos[1]+(unlocked && anyDone ? -2 : 1)} textAnchor="middle" dominantBaseline="middle"
                      fill={unlocked ? (allDone ? color : isHovered ? "#f1f5f9" : "#cbd5e1") : "#475569"}
                      fontSize={state.id==="be"||state.id==="hh"||state.id==="hb" ? "6" : "8"}
                      fontWeight="800" fontFamily="'JetBrains Mono',monospace"
                      style={{pointerEvents:"none",textShadow:"0 1px 3px rgba(0,0,0,0.8)"}}>
                      {unlocked ? state.abbr : "🔒"}
                    </text>
                    {unlocked && anyDone && (
                      <text x={labelPos[0]} y={labelPos[1]+9} textAnchor="middle"
                        fill="#F59E0B" fontSize="6" fontWeight="700"
                        style={{pointerEvents:"none",textShadow:"0 1px 2px rgba(0,0,0,0.8)"}}>
                        {"★".repeat(Math.min(Math.ceil(stateStars/state.challenges.length), 3))}
                      </text>
                    )}
                  </>
                )}
              </g>
            );
          })}
        </svg>

        {/* Hovered state tooltip */}
        {hoveredState && (() => {
          const state = CAMPAIGN_STATES.find(s=>s.id===hoveredState);
          if (!state) return null;
          const unlocked = isCampaignStateUnlocked(state, campaignProgress);
          const stateStars = getCampaignStateStars(state.id, campaignProgress);
          const stateMax = getCampaignMaxStars(state.id);
          return (
            <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",
              background:"rgba(15,23,42,0.95)",border:"1px solid rgba(139,92,246,0.3)",
              borderRadius:8,padding:"6px 14px",whiteSpace:"nowrap",pointerEvents:"none",zIndex:10}}>
              <span style={{fontSize:13,fontWeight:700,color:"#f1f5f9"}}>{state.name}</span>
              {unlocked ? (
                <span style={{fontSize:11,color:"#F59E0B",marginLeft:8}}>★ {stateStars}/{stateMax}</span>
              ) : (
                <span style={{fontSize:11,color:"#64748b",marginLeft:8}}>🔒 Locked</span>
              )}
            </div>
          );
        })()}
      </div>

      {/* Tier legend */}
      <div style={{display:"flex",flexWrap:"wrap",gap:8,justifyContent:"center",marginTop:4}}>
        {[
          [1,"#3B82F6","Coast"],[2,"#8B5CF6","North"],[3,"#EC4899","East"],
          [4,"#F59E0B","Central"],[5,"#EF4444","West"],[6,"#10B981","South"]
        ].map(([t,c,label])=>{
          const tierStates = CAMPAIGN_STATES.filter(s=>s.tier===t);
          const done = tierStates.filter(s => {
            const sp = campaignProgress[s.id];
            return sp && s.challenges.every(ch => (sp[ch.id] || 0) >= 1);
          }).length;
          return (
            <div key={t} style={{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"#94a3b8"}}>
              <span style={{width:8,height:8,borderRadius:"50%",background:c,display:"inline-block"}}/>
              {label} {done}/{tierStates.length}
            </div>
          );
        })}
      </div>
    </div></div>
  );
}

function WordDataStatus({ title, detail, isError = false }) {
  return (
    <div style={{...S.container, justifyContent:"center", padding:"24px"}}>
      <div style={{...S.settingsPanel, maxWidth:520, width:"100%", borderColor:isError?"rgba(239,68,68,0.35)":"rgba(59,130,246,0.25)", gap:12}}>
        <h2 style={{fontSize:26, fontWeight:800, color:isError?"#f87171":"#f1f5f9", margin:0}}>{title}</h2>
        <p style={{fontSize:14, lineHeight:1.6, color:"#94a3b8", margin:0}}>{detail}</p>
      </div>
    </div>
  );
}

// Mount the app
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<WordDataStatus title="Loading vocabulary..." detail="Fetching the noun database from data/nouns.json." />);
loadWordData()
  .then(() => {
    root.render(<GermanNounGame />);
  })
  .catch((error) => {
    console.error("Failed to load noun data", error);
    root.render(
      <WordDataStatus
        title="Vocabulary failed to load"
        detail={error.message + ". Open the site through GitHub Pages or another HTTP server instead of file://."}
        isError={true}
      />
    );
  });
</script>
</body>
</html>
