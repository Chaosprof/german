// ARTIKEL RUNNER — Subway Surfer-style der/die/das game
// ═══════════════════════════════════════════════════════════════
function ArtikelRunner({ queue, onEnd }) {
  const iframeRef = useRef(null);
  const onEndRef = useRef(onEnd);
  onEndRef.current = onEnd;

  useEffect(() => {
    // Pass word list to the Godot game via a global
    const words = queue.map(q => ({ noun: q[0], article: q[1] }));
    window._artikelRunnerWords = words;

    // Listen for results from Godot via postMessage
    const handleMessage = (event) => {
      let data = event.data;
      if (typeof data === "string") {
        try { data = JSON.parse(data); } catch(e) { return; }
      }
      if (data && data.type === "game_over") {
        // Map Godot results to the format expected by handleRunnerEnd
        const sessionAnswers = (data.results || []).map(r => ({
          noun: r.noun, correct: r.correct, modes: ["article"]
        }));
        const wrongAnswers = (data.results || []).filter(r => !r.correct).map(r => ({
          noun: r.noun, article: r.correct_article, userArticle: r.picked_article
        }));
        onEndRef.current({
          score: data.score || 0,
          totalCorrect: data.correct || 0,
          totalAnswered: (data.correct || 0) + (data.wrong || 0),
          bestStreak: data.score || 0,
          streak: 0,
          wrongAnswers,
          sessionAnswers,
        });
      }
    };
    window.addEventListener("message", handleMessage);
    return () => {
      window.removeEventListener("message", handleMessage);
      delete window._artikelRunnerWords;
    };
  }, [queue]);

  return (
    <div style={{position:"fixed",top:0,left:0,width:"100vw",height:"100vh",background:"#09090b",zIndex:50,display:"flex",justifyContent:"center",alignItems:"center"}}>
      <iframe
        ref={iframeRef}
        src="godot-runner/build/index.html"
        style={{width:"100%",height:"100%",border:"none"}}
        allow="autoplay; fullscreen"
      />
    </div>
  );
}

/* Canvas-based ArtikelRunner fallback (legacy) — kept for reference.
   To use the canvas version instead of Godot, rename this to ArtikelRunner
   and remove the Godot iframe version above. */
function ArtikelRunnerCanvas({ queue, onEnd }) {
  const canvasRef = useRef(null);
  const stateRef = useRef(null);
  const animFrameRef = useRef(null);
  const touchStartRef = useRef(null);
  const onEndRef = useRef(onEnd);
  onEndRef.current = onEnd;
  const resultsRef = useRef(null);

  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    const dpr = window.devicePixelRatio || 1;
    let cw = 0, ch = 0;
    const resize = () => {
      cw = Math.min(window.innerWidth, 500);
      ch = Math.min(window.innerHeight, 920);
      canvas.style.width = cw + "px";
      canvas.style.height = ch + "px";
      canvas.width = cw * dpr;
      canvas.height = ch * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    window.addEventListener("resize", resize);

    // ── 3D Perspective ──
    const HORIZON = 0.30;
    const VP_X = 0.5;
    const ROAD_W_TOP = 0.05;
    const ROAD_W_BOT = 0.48;
    const PLAYER_Z_BASE = 0.84;
    const ARTICLES = ["der", "die", "das"];
    const ART_COLORS = { "der": "#3B82F6", "die": "#EC4899", "das": "#10B981" };
    const ART_DARK  = { "der": "#1e40af", "die": "#9d174d", "das": "#065f46" };
    const ART_GLOW  = { "der": "rgba(59,130,246,", "die": "rgba(236,72,153,", "das": "rgba(16,185,129," };
    const LIVES = 3;
    const INITIAL_SPEED = 0.016;
    const MAX_SPEED = 0.035;
    const SPEED_INC = 0.00035;
    const STRIPE_COUNT = 28;
    const TILE_ROWS = 18;

    const projY = (z) => (HORIZON + z * (1 - HORIZON)) * ch;
    const projScale = (z) => ROAD_W_TOP + z * (ROAD_W_BOT - ROAD_W_TOP);
    const projX = (lane, z) => {
      const hw = projScale(z) * cw;
      return VP_X * cw + (lane - 1) * hw * 0.6;
    };
    const projHW = (z) => projScale(z) * cw;

    // ── Game state ──
    const gs = {
      lane: 1, targetLane: 1, laneSmooth: 1,
      coins: [],
      obstacles: [],     // { z, lane, hit }
      wordIndex: 0,
      speed: INITIAL_SPEED,
      lives: LIVES,
      score: 0, streak: 0, bestStreak: 0,
      totalCorrect: 0, totalAnswered: 0,
      wrongAnswers: [], sessionAnswers: [],
      gameOver: false, gameOverTimer: 0,
      frame: 0, stripeOffset: 0,
      particles: [],
      floatingTexts: [],
      flashColor: null, flashTimer: 0,
      shakeTimer: 0, shakeX: 0, shakeY: 0,
      coinSpawnTimer: 0, coinSpawnInterval: 50,
      obstacleTimer: 0, obstacleInterval: 180,
      jumpVel: 0, jumpY: 0, isJumping: false,
      tileOffset: 0,
      distance: 0,
    };
    stateRef.current = gs;

    const spawnCoin = () => {
      const idx = gs.wordIndex % queue.length;
      gs.coins.push({ z: -0.15, wordIndex: idx, passed: false });
      gs.wordIndex++;
    };
    const spawnObstacle = () => {
      const lane = Math.floor(Math.random() * 3);
      // Don't spawn obstacle too close to a coin
      const tooClose = gs.coins.some(c => !c.passed && Math.abs(c.z - (-0.15)) < 0.2);
      if (tooClose) return;
      gs.obstacles.push({ z: -0.15, lane, hit: false });
    };

    const getCurrentWord = () => {
      for (const c of gs.coins) if (!c.passed) return queue[c.wordIndex % queue.length];
      return queue[gs.wordIndex % queue.length];
    };

    const addParticles = (sx, sy, color, count, spread) => {
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const v = 2 + Math.random() * (spread || 5);
        gs.particles.push({ x: sx, y: sy, vx: Math.cos(angle)*v, vy: Math.sin(angle)*v - 3,
          life: 20 + Math.random()*25, maxLife: 45, color, size: 2+Math.random()*5 });
      }
    };
    const addFloatingText = (text, x, y, color, big) => {
      gs.floatingTexts.push({ text, x, y, vy: -2.5, life: 45, maxLife: 45, color, big: !!big });
    };

    // ── Input ──
    const moveLane = (dir) => {
      if (gs.gameOver) return;
      gs.targetLane = Math.max(0, Math.min(2, gs.targetLane + dir));
    };
    const jump = () => {
      if (gs.gameOver || gs.isJumping) return;
      gs.isJumping = true;
      gs.jumpVel = -12;
    };
    const handleKeyDown = (e) => {
      if (e.key === "ArrowLeft" || e.key === "a") { e.preventDefault(); moveLane(-1); }
      else if (e.key === "ArrowRight" || e.key === "d") { e.preventDefault(); moveLane(1); }
      else if (e.key === "ArrowUp" || e.key === "w" || e.key === " ") { e.preventDefault(); jump(); }
    };
    const handleTouchStart = (e) => {
      touchStartRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY, t: Date.now() };
    };
    const handleTouchEnd = (e) => {
      if (!touchStartRef.current) return;
      const dx = e.changedTouches[0].clientX - touchStartRef.current.x;
      const dy = e.changedTouches[0].clientY - touchStartRef.current.y;
      if (Math.abs(dy) > Math.abs(dx) && dy < -30) { jump(); }
      else if (Math.abs(dx) > 25) moveLane(dx > 0 ? 1 : -1);
      touchStartRef.current = null;
    };
    const handleClick = (e) => {
      if (gs.gameOver) return;
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      moveLane(x < cw/2 ? -1 : 1);
    };
    window.addEventListener("keydown", handleKeyDown);
    canvas.addEventListener("touchstart", handleTouchStart, { passive: true });
    canvas.addEventListener("touchend", handleTouchEnd, { passive: true });
    canvas.addEventListener("click", handleClick);

    // ── Drawing ──
    const drawSky = () => {
      const hLine = HORIZON * ch;
      const sky = ctx.createLinearGradient(0, 0, 0, hLine);
      sky.addColorStop(0, "#050518");
      sky.addColorStop(0.4, "#0c0c2a");
      sky.addColorStop(0.8, "#151540");
      sky.addColorStop(1, "#1f1f55");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, cw, hLine + 2);
      // Stars
      const rng = (seed) => { let s = seed; return () => { s = (s * 16807) % 2147483647; return s / 2147483647; }; };
      const r = rng(42);
      for (let i = 0; i < 80; i++) {
        const sx = r() * cw, sy = r() * hLine * 0.88;
        const twinkle = Math.sin(gs.frame * 0.025 + i * 2.3) * 0.35 + 0.65;
        ctx.globalAlpha = (0.25 + r() * 0.55) * twinkle;
        ctx.fillStyle = "#fff";
        const sz = 0.8 + r() * 1.5;
        ctx.fillRect(sx, sy, sz, sz);
      }
      ctx.globalAlpha = 1;
      // Moon
      ctx.fillStyle = "rgba(200,200,255,0.06)";
      ctx.beginPath(); ctx.arc(cw * 0.78, hLine * 0.22, 28, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(220,220,255,0.12)";
      ctx.beginPath(); ctx.arc(cw * 0.78, hLine * 0.22, 18, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "rgba(240,240,255,0.25)";
      ctx.beginPath(); ctx.arc(cw * 0.78, hLine * 0.22, 12, 0, Math.PI*2); ctx.fill();
      // City skyline
      const r2 = rng(77);
      for (let i = 0; i < 40; i++) {
        const bx = r2() * cw;
        const bw = 6 + r2() * 28;
        const bh = 8 + r2() * 55;
        const brightness = 15 + r2() * 20;
        ctx.fillStyle = `rgb(${brightness},${brightness},${brightness + 15})`;
        ctx.fillRect(bx - bw/2, hLine - bh, bw, bh + 2);
        // Windows
        if (bw > 12 && bh > 20) {
          for (let wy = hLine - bh + 4; wy < hLine - 3; wy += 8) {
            for (let wx = bx - bw/2 + 3; wx < bx + bw/2 - 3; wx += 7) {
              if (r2() > 0.5) {
                ctx.fillStyle = `rgba(255,220,100,${0.15 + r2() * 0.25})`;
                ctx.fillRect(wx, wy, 3, 4);
              }
            }
          }
        }
      }
    };

    const drawRoad = () => {
      const hLine = HORIZON * ch;
      // Main road trapezoid
      const topL = VP_X * cw - ROAD_W_TOP * cw;
      const topR = VP_X * cw + ROAD_W_TOP * cw;
      const botL = VP_X * cw - ROAD_W_BOT * cw;
      const botR = VP_X * cw + ROAD_W_BOT * cw;

      // Sidewalk / ground outside road
      const gndGrad = ctx.createLinearGradient(0, hLine, 0, ch);
      gndGrad.addColorStop(0, "#1a1a35");
      gndGrad.addColorStop(1, "#12122a");
      ctx.fillStyle = gndGrad;
      ctx.fillRect(0, hLine, cw, ch - hLine);

      // Road surface with slight texture
      const roadGrad = ctx.createLinearGradient(0, hLine, 0, ch);
      roadGrad.addColorStop(0, "#333355");
      roadGrad.addColorStop(0.15, "#2a2a48");
      roadGrad.addColorStop(0.5, "#252540");
      roadGrad.addColorStop(1, "#1e1e38");
      ctx.fillStyle = roadGrad;
      ctx.beginPath();
      ctx.moveTo(topL, hLine); ctx.lineTo(topR, hLine);
      ctx.lineTo(botR, ch); ctx.lineTo(botL, ch);
      ctx.closePath(); ctx.fill();

      // Checkered ground tiles (perspective)
      gs.tileOffset = (gs.tileOffset + gs.speed * 55) % (2 / TILE_ROWS);
      for (let i = 0; i < TILE_ROWS; i++) {
        const zFrac = ((i / TILE_ROWS + gs.tileOffset) % 1);
        const z = zFrac * zFrac;
        const y1 = projY(z);
        const zFrac2 = (((i+1) / TILE_ROWS + gs.tileOffset) % 1);
        const z2 = zFrac2 * zFrac2;
        const y2 = projY(z2);
        if (y2 <= y1) continue;
        const hw1 = projHW(z);
        const hw2 = projHW(z2);
        const cx = VP_X * cw;
        // Alternating stripe on road
        if (i % 2 === 0) {
          ctx.fillStyle = `rgba(255,255,255,${Math.min(0.04, z * 0.08)})`;
          ctx.beginPath();
          ctx.moveTo(cx - hw1, y1); ctx.lineTo(cx + hw1, y1);
          ctx.lineTo(cx + hw2, y2); ctx.lineTo(cx - hw2, y2);
          ctx.closePath(); ctx.fill();
        }
      }

      // Animated dashed center stripes
      gs.stripeOffset = (gs.stripeOffset + gs.speed * 50) % (2 / STRIPE_COUNT);
      for (let i = 0; i < STRIPE_COUNT; i++) {
        const zFrac = ((i / STRIPE_COUNT + gs.stripeOffset) % 1);
        const z = zFrac * zFrac;
        const y = projY(z);
        const hw = projHW(z);
        const cx = VP_X * cw;
        const alpha = Math.min(1, z * 3) * 0.22;
        ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
        ctx.lineWidth = 1 + z * 2.5;
        ctx.beginPath();
        ctx.moveTo(cx - hw, y); ctx.lineTo(cx + hw, y);
        ctx.stroke();
      }

      // Lane dividers (converging dashed lines)
      for (let side = -1; side <= 1; side += 2) {
        const laneOff = side * 0.333;
        ctx.setLineDash([8, 12]);
        ctx.strokeStyle = "rgba(255,255,200,0.18)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (let i = 0; i <= 40; i++) {
          const z = (i/40) * (i/40);
          const y = projY(z);
          const hw = projHW(z);
          const x = VP_X * cw + laneOff * hw;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        ctx.setLineDash([]);
      }

      // Side walls with neon rails
      for (const sign of [-1, 1]) {
        // Wall fill
        ctx.fillStyle = "rgba(30,30,60,0.6)";
        ctx.beginPath();
        for (let i = 0; i <= 40; i++) {
          const z = (i/40)*(i/40);
          const y = projY(z);
          const hw = projHW(z);
          const x = VP_X * cw + sign * (hw + 4);
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        for (let i = 40; i >= 0; i--) {
          const z = (i/40)*(i/40);
          const y = projY(z);
          const hw = projHW(z);
          const wallH = 3 + z * 18;
          const x = VP_X * cw + sign * (hw + 4);
          ctx.lineTo(x, y - wallH);
        }
        ctx.closePath(); ctx.fill();

        // Neon rail on top of wall
        ctx.strokeStyle = "rgba(139,92,246,0.7)";
        ctx.lineWidth = 2.5;
        ctx.shadowColor = "rgba(139,92,246,0.5)";
        ctx.shadowBlur = 8;
        ctx.beginPath();
        for (let i = 0; i <= 40; i++) {
          const z = (i/40)*(i/40);
          const y = projY(z);
          const hw = projHW(z);
          const wallH = 3 + z * 18;
          const x = VP_X * cw + sign * (hw + 4);
          if (i === 0) ctx.moveTo(x, y - wallH); else ctx.lineTo(x, y - wallH);
        }
        ctx.stroke();
        ctx.shadowBlur = 0;

        // Ground neon line
        ctx.strokeStyle = "rgba(100,80,200,0.25)";
        ctx.lineWidth = 3;
        ctx.beginPath();
        for (let i = 0; i <= 40; i++) {
          const z = (i/40)*(i/40);
          const y = projY(z);
          const hw = projHW(z);
          const x = VP_X * cw + sign * hw;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }
    };

    const drawObstacle3D = (obs) => {
      const z = obs.z;
      if (z < 0 || z > 1.15) return;
      const zz = z * z;
      const scale = projScale(zz);
      const sx = projX(obs.lane, zz);
      const sy = projY(zz);
      const hw = scale * cw * 0.09;
      const hh = scale * cw * 0.14;
      if (hw < 2) return;

      // Shadow
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.beginPath();
      ctx.ellipse(sx, sy + 2, hw * 1.1, hw * 0.2, 0, 0, Math.PI*2);
      ctx.fill();

      // Barrier body (3D box look)
      // Front face
      const fGrad = ctx.createLinearGradient(sx - hw, sy - hh, sx + hw, sy);
      fGrad.addColorStop(0, "#ef4444");
      fGrad.addColorStop(0.5, "#dc2626");
      fGrad.addColorStop(1, "#b91c1c");
      ctx.fillStyle = fGrad;
      ctx.beginPath();
      ctx.moveTo(sx - hw, sy);
      ctx.lineTo(sx - hw, sy - hh);
      ctx.lineTo(sx + hw, sy - hh);
      ctx.lineTo(sx + hw, sy);
      ctx.closePath();
      ctx.fill();

      // Top face (3D effect)
      const topDepth = hh * 0.2;
      ctx.fillStyle = "#f87171";
      ctx.beginPath();
      ctx.moveTo(sx - hw, sy - hh);
      ctx.lineTo(sx - hw * 0.7, sy - hh - topDepth);
      ctx.lineTo(sx + hw * 1.3, sy - hh - topDepth);
      ctx.lineTo(sx + hw, sy - hh);
      ctx.closePath();
      ctx.fill();

      // Right face
      ctx.fillStyle = "#991b1b";
      ctx.beginPath();
      ctx.moveTo(sx + hw, sy - hh);
      ctx.lineTo(sx + hw * 1.3, sy - hh - topDepth);
      ctx.lineTo(sx + hw * 1.3, sy - topDepth);
      ctx.lineTo(sx + hw, sy);
      ctx.closePath();
      ctx.fill();

      // Warning stripes
      const stripeW = hw * 0.35;
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      for (let si = 0; si < 3; si++) {
        const sx2 = sx - hw + stripeW * si * 2.2 + hw * 0.15;
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(sx - hw, sy); ctx.lineTo(sx - hw, sy - hh);
        ctx.lineTo(sx + hw, sy - hh); ctx.lineTo(sx + hw, sy);
        ctx.closePath(); ctx.clip();
        ctx.translate(sx2, sy - hh/2);
        ctx.rotate(-0.4);
        ctx.fillRect(-stripeW/2, -hh, stripeW, hh * 2);
        ctx.restore();
      }

      // Danger glow
      const dGlow = ctx.createRadialGradient(sx, sy - hh/2, 0, sx, sy - hh/2, hw * 2);
      dGlow.addColorStop(0, "rgba(239,68,68,0.15)");
      dGlow.addColorStop(1, "rgba(239,68,68,0)");
      ctx.fillStyle = dGlow;
      ctx.beginPath();
      ctx.arc(sx, sy - hh/2, hw * 2, 0, Math.PI*2);
      ctx.fill();
    };

    const drawCoin3D = (lane, z, article, bobOffset) => {
      if (z < -0.05 || z > 1.12) return;
      const zz = z * z;
      const scale = projScale(zz);
      const screenX = projX(lane, zz);
      const screenY = projY(zz);
      const radius = scale * cw * 0.12;  // MUCH bigger coins
      if (radius < 4) return;
      const color = ART_COLORS[article];
      const dark = ART_DARK[article];
      const glowBase = ART_GLOW[article];
      const bob = Math.sin(gs.frame * 0.09 + bobOffset) * radius * 0.1;
      const cy = screenY + bob - radius * 0.3; // float above road
      const spin = gs.frame * 0.04 + bobOffset; // rotation feel
      const stretch = 0.85 + Math.sin(spin) * 0.12; // slight wobble

      // Shadow on road
      ctx.fillStyle = "rgba(0,0,0,0.3)";
      ctx.beginPath();
      ctx.ellipse(screenX, screenY + 3, radius * 0.7, radius * 0.15, 0, 0, Math.PI*2);
      ctx.fill();

      // Outer glow (big and colorful)
      const glow = ctx.createRadialGradient(screenX, cy, radius * 0.2, screenX, cy, radius * 2.2);
      glow.addColorStop(0, glowBase + "0.3)");
      glow.addColorStop(0.5, glowBase + "0.08)");
      glow.addColorStop(1, glowBase + "0)");
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(screenX, cy, radius * 2.2, 0, Math.PI*2);
      ctx.fill();

      // Coin edge (3D rim — thick dark ring behind)
      ctx.fillStyle = dark;
      ctx.beginPath();
      ctx.ellipse(screenX + 1.5, cy + 3, radius * stretch + 3, radius + 3, 0, 0, Math.PI*2);
      ctx.fill();

      // Coin main face — rich gradient
      const faceGrad = ctx.createRadialGradient(
        screenX - radius*0.25, cy - radius*0.25, radius * 0.05,
        screenX, cy, radius * stretch
      );
      faceGrad.addColorStop(0, "#ffffff");
      faceGrad.addColorStop(0.12, color);
      faceGrad.addColorStop(0.55, color);
      faceGrad.addColorStop(0.85, dark);
      faceGrad.addColorStop(1, dark);
      ctx.fillStyle = faceGrad;
      ctx.beginPath();
      ctx.ellipse(screenX, cy, radius * stretch, radius, 0, 0, Math.PI*2);
      ctx.fill();

      // Inner ring (gold-ish border)
      ctx.strokeStyle = "rgba(255,255,255,0.3)";
      ctx.lineWidth = Math.max(1.5, radius * 0.06);
      ctx.beginPath();
      ctx.ellipse(screenX, cy, radius * stretch * 0.78, radius * 0.78, 0, 0, Math.PI*2);
      ctx.stroke();

      // Second inner ring
      ctx.strokeStyle = "rgba(255,255,255,0.12)";
      ctx.lineWidth = Math.max(1, radius * 0.04);
      ctx.beginPath();
      ctx.ellipse(screenX, cy, radius * stretch * 0.88, radius * 0.88, 0, 0, Math.PI*2);
      ctx.stroke();

      // Specular highlight (top-left sheen)
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.beginPath();
      ctx.ellipse(screenX - radius*0.2, cy - radius*0.28, radius*0.38, radius*0.22, -0.3, 0, Math.PI*2);
      ctx.fill();
      // Secondary softer highlight
      ctx.fillStyle = "rgba(255,255,255,0.1)";
      ctx.beginPath();
      ctx.ellipse(screenX + radius*0.1, cy + radius*0.25, radius*0.45, radius*0.18, 0.2, 0, Math.PI*2);
      ctx.fill();

      // Article text — BIG and bold inside coin
      const fontSize = Math.max(10, radius * 0.95);
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      // Text shadow
      ctx.fillStyle = "rgba(0,0,0,0.4)";
      ctx.font = `900 ${fontSize}px JetBrains Mono, sans-serif`;
      ctx.fillText(article, screenX + 1, cy + 2);
      // Main text
      ctx.fillStyle = "#fff";
      ctx.font = `900 ${fontSize}px JetBrains Mono, sans-serif`;
      ctx.fillText(article, screenX, cy);
    };

    const drawPlayer3D = () => {
      const pz = PLAYER_Z_BASE;
      const scale = projScale(pz) * cw;
      const px = projX(gs.laneSmooth, pz);
      const baseY = projY(pz);
      const jumpOffset = gs.jumpY;
      const py = baseY + jumpOffset;
      const sz = scale * 0.15;
      const bob = gs.isJumping ? 0 : Math.sin(gs.frame * 0.28) * sz * 0.06;
      const lean = (gs.targetLane - gs.laneSmooth) * 0.3;
      const legCycle = gs.frame * 0.35;
      const runAmp = gs.isJumping ? 0.15 : 1;

      ctx.save();
      ctx.translate(px, py + bob);
      ctx.rotate(lean);

      // Shadow on ground (at baseY, not affected by jump)
      ctx.save();
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.translate(px * dpr, baseY * dpr);
      const shadowScale = 1 - Math.min(1, Math.abs(jumpOffset) / 80) * 0.4;
      ctx.scale(shadowScale, shadowScale);
      ctx.fillStyle = `rgba(0,0,0,${0.35 * shadowScale})`;
      ctx.beginPath();
      ctx.ellipse(0, 4 * dpr, sz * 0.9 * dpr, sz * 0.15 * dpr, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.translate(px, py + bob);
      ctx.rotate(lean);

      // Shoes
      const legSpread = Math.sin(legCycle) * sz * 0.5 * runAmp;
      ctx.fillStyle = "#1e1b4b";
      ctx.beginPath();
      ctx.ellipse(-sz*0.15 - legSpread*0.3, sz*0.92, sz*0.14, sz*0.08, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(sz*0.15 + legSpread*0.3, sz*0.92, sz*0.14, sz*0.08, 0, 0, Math.PI*2);
      ctx.fill();

      // Legs
      ctx.strokeStyle = "#4338ca";
      ctx.lineWidth = sz * 0.24;
      ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-sz*0.1, sz*0.2);
      ctx.lineTo(-sz*0.15 - legSpread*0.3, sz*0.85 + Math.abs(legSpread)*0.12);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sz*0.1, sz*0.2);
      ctx.lineTo(sz*0.15 + legSpread*0.3, sz*0.85 - Math.abs(legSpread)*0.12);
      ctx.stroke();

      // Body (torso with hoodie look)
      const bodyGrad = ctx.createLinearGradient(0, -sz*0.65, 0, sz*0.3);
      bodyGrad.addColorStop(0, "#7c3aed");
      bodyGrad.addColorStop(0.6, "#6d28d9");
      bodyGrad.addColorStop(1, "#5b21b6");
      ctx.fillStyle = bodyGrad;
      ctx.beginPath();
      ctx.moveTo(-sz*0.34, sz*0.2);
      ctx.quadraticCurveTo(-sz*0.38, -sz*0.15, -sz*0.3, -sz*0.5);
      ctx.quadraticCurveTo(0, -sz*0.72, sz*0.3, -sz*0.5);
      ctx.quadraticCurveTo(sz*0.38, -sz*0.15, sz*0.34, sz*0.2);
      ctx.closePath();
      ctx.fill();
      // Hoodie front line
      ctx.strokeStyle = "rgba(0,0,0,0.15)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, -sz*0.55); ctx.lineTo(0, sz*0.15); ctx.stroke();

      // Arms
      const armSwing = Math.sin(legCycle + Math.PI) * sz * 0.4 * runAmp;
      ctx.strokeStyle = "#7c3aed";
      ctx.lineWidth = sz * 0.2;
      ctx.lineCap = "round";
      ctx.beginPath(); ctx.moveTo(-sz*0.32, -sz*0.25);
      ctx.lineTo(-sz*0.52 - armSwing*0.3, sz*0.1 + armSwing*0.25);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sz*0.32, -sz*0.25);
      ctx.lineTo(sz*0.52 + armSwing*0.3, sz*0.1 - armSwing*0.25);
      ctx.stroke();
      // Hands
      ctx.fillStyle = "#fde68a";
      ctx.beginPath();
      ctx.arc(-sz*0.52 - armSwing*0.3, sz*0.1 + armSwing*0.25, sz*0.07, 0, Math.PI*2); ctx.fill();
      ctx.beginPath();
      ctx.arc(sz*0.52 + armSwing*0.3, sz*0.1 - armSwing*0.25, sz*0.07, 0, Math.PI*2); ctx.fill();

      // Head
      const headR = sz * 0.26;
      const headGrad = ctx.createRadialGradient(-headR*0.15, -sz*0.72 - headR*0.15, 0, 0, -sz*0.72, headR);
      headGrad.addColorStop(0, "#fef3c7");
      headGrad.addColorStop(1, "#fbbf24");
      ctx.fillStyle = headGrad;
      ctx.beginPath();
      ctx.arc(0, -sz*0.72, headR, 0, Math.PI*2);
      ctx.fill();

      // Hair
      ctx.fillStyle = "#78350f";
      ctx.beginPath();
      ctx.ellipse(0, -sz*0.72 - headR*0.5, headR*0.9, headR*0.5, 0, Math.PI, Math.PI*2);
      ctx.fill();
      // Hair side
      ctx.fillRect(-headR*0.85, -sz*0.72 - headR*0.2, headR*0.2, headR*0.5);
      ctx.fillRect(headR*0.65, -sz*0.72 - headR*0.2, headR*0.2, headR*0.5);

      // Eyes
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.ellipse(-headR*0.32, -sz*0.73, headR*0.15, headR*0.13, 0, 0, Math.PI*2); ctx.fill();
      ctx.ellipse(headR*0.32, -sz*0.73, headR*0.15, headR*0.13, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = "#1e1b4b";
      ctx.beginPath();
      ctx.arc(-headR*0.3, -sz*0.73, headR*0.07, 0, Math.PI*2); ctx.fill();
      ctx.arc(headR*0.34, -sz*0.73, headR*0.07, 0, Math.PI*2); ctx.fill();

      // Mouth
      ctx.strokeStyle = "#92400e";
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.arc(0, -sz*0.64, headR*0.2, 0.15, Math.PI - 0.15);
      ctx.stroke();

      ctx.restore();

      // Glow trail behind player
      const trailGrad = ctx.createRadialGradient(px, baseY, 0, px, baseY, sz * 2.5);
      trailGrad.addColorStop(0, "rgba(124,58,237,0.2)");
      trailGrad.addColorStop(1, "rgba(124,58,237,0)");
      ctx.fillStyle = trailGrad;
      ctx.beginPath();
      ctx.arc(px, baseY, sz * 2.5, 0, Math.PI*2);
      ctx.fill();
    };

    const drawHUD = () => {
      const noun = getCurrentWord();
      const word = noun ? noun[0] : "";
      const english = noun ? noun[3] : "";

      // Top gradient overlay
      const topGrad = ctx.createLinearGradient(0, 0, 0, 105);
      topGrad.addColorStop(0, "rgba(5,5,20,0.94)");
      topGrad.addColorStop(0.7, "rgba(5,5,20,0.5)");
      topGrad.addColorStop(1, "rgba(5,5,20,0)");
      ctx.fillStyle = topGrad;
      ctx.fillRect(0, 0, cw, 105);

      // Word (huge, centered)
      ctx.textBaseline = "top";
      ctx.textAlign = "center";
      ctx.shadowColor = "rgba(139,92,246,0.8)";
      ctx.shadowBlur = 20;
      ctx.fillStyle = "#fff";
      ctx.font = `900 ${Math.min(42, cw*0.09)}px JetBrains Mono, sans-serif`;
      ctx.fillText(word, cw/2, 10);
      ctx.shadowBlur = 0;

      // English
      ctx.fillStyle = "#94a3b8";
      ctx.font = `500 ${Math.min(15, cw*0.033)}px JetBrains Mono, sans-serif`;
      ctx.fillText(english, cw/2, 56);

      // Score (top right)
      ctx.textAlign = "right";
      ctx.fillStyle = "#f1f5f9";
      ctx.font = `800 22px JetBrains Mono, sans-serif`;
      ctx.fillText(gs.score.toLocaleString(), cw - 12, 10);

      // Streak
      if (gs.streak >= 3) {
        const pulse = 1 + Math.sin(gs.frame * 0.15) * 0.12;
        ctx.font = `700 ${15 * pulse}px JetBrains Mono, sans-serif`;
        ctx.fillStyle = gs.streak >= 10 ? "#EF4444" : "#F59E0B";
        ctx.fillText(`x${gs.streak}`, cw - 12, 36);
      }

      // Lives
      ctx.textAlign = "left";
      for (let i = 0; i < LIVES; i++) {
        const hx = 12 + i * 30, hy = 16;
        const alive = i < gs.lives;
        ctx.fillStyle = alive ? "#EF4444" : "rgba(255,255,255,0.1)";
        if (alive) { ctx.shadowColor = "rgba(239,68,68,0.6)"; ctx.shadowBlur = 8; }
        ctx.beginPath();
        ctx.moveTo(hx, hy + 4);
        ctx.bezierCurveTo(hx, hy, hx - 9, hy - 3, hx - 9, hy + 5);
        ctx.bezierCurveTo(hx - 9, hy + 11, hx, hy + 17, hx, hy + 19);
        ctx.bezierCurveTo(hx, hy + 17, hx + 9, hy + 11, hx + 9, hy + 5);
        ctx.bezierCurveTo(hx + 9, hy - 3, hx, hy, hx, hy + 4);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Speed bar
      const speedPct = Math.min(1, (gs.speed - INITIAL_SPEED) / (MAX_SPEED - INITIAL_SPEED));
      ctx.fillStyle = "rgba(255,255,255,0.06)";
      const barY = 42;
      ctx.beginPath(); ctx.roundRect(12, barY, 75, 5, 3); ctx.fill();
      const spClr = speedPct > 0.7 ? "#EF4444" : speedPct > 0.4 ? "#F59E0B" : "#10B981";
      ctx.fillStyle = spClr;
      ctx.beginPath(); ctx.roundRect(12, barY, 75 * speedPct, 5, 3); ctx.fill();

      // Bottom lane labels
      ctx.textBaseline = "bottom";
      const labels = ["der", "die", "das"];
      for (let i = 0; i < 3; i++) {
        const lx = projX(i, PLAYER_Z_BASE + 0.07);
        const ly = ch - 6;
        ctx.fillStyle = ART_COLORS[labels[i]];
        ctx.font = `900 18px JetBrains Mono, sans-serif`;
        ctx.textAlign = "center";
        ctx.globalAlpha = gs.lane === i ? 1 : 0.35;
        ctx.shadowColor = ART_COLORS[labels[i]];
        ctx.shadowBlur = gs.lane === i ? 10 : 0;
        ctx.fillText(labels[i], lx, ly);
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;

      // Jump hint (subtle)
      if (gs.frame < 180 && gs.obstacles.length === 0) {
        ctx.globalAlpha = 0.5 - gs.frame * 0.002;
        if (ctx.globalAlpha > 0) {
          ctx.fillStyle = "#94a3b8";
          ctx.font = "500 12px JetBrains Mono, sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillText("Swipe up / Space / W to jump obstacles", cw/2, 76);
        }
        ctx.globalAlpha = 1;
      }
    };

    const drawParticles = () => {
      gs.particles.forEach(p => {
        const alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.color;
        ctx.shadowBlur = 4;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * (0.4 + alpha * 0.6), 0, Math.PI*2);
        ctx.fill();
      });
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    };

    const drawFloatingTexts = () => {
      gs.floatingTexts.forEach(ft => {
        const alpha = ft.life / ft.maxLife;
        const scale = ft.big ? 1.6 : 1;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = ft.color;
        ctx.font = `900 ${(20 + (1-alpha)*10) * scale}px JetBrains Mono, sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.shadowColor = ft.color;
        ctx.shadowBlur = 12;
        ctx.fillText(ft.text, ft.x, ft.y);
        ctx.shadowBlur = 0;
      });
      ctx.globalAlpha = 1;
    };

    const drawFlash = () => {
      if (gs.flashTimer <= 0) return;
      const alpha = (gs.flashTimer / 20) * 0.25;
      ctx.fillStyle = gs.flashColor === "green"
        ? `rgba(16,185,129,${alpha})` : `rgba(239,68,68,${alpha})`;
      ctx.fillRect(0, 0, cw, ch);
    };

    const drawGameOver = () => {
      ctx.fillStyle = "rgba(5,5,15,0.9)";
      ctx.fillRect(0, 0, cw, ch);
      const cy = ch / 2 - 40;
      ctx.textAlign = "center"; ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(239,68,68,0.5)"; ctx.shadowBlur = 25;
      ctx.fillStyle = "#f1f5f9";
      ctx.font = "900 46px JetBrains Mono, sans-serif";
      ctx.fillText("GAME OVER", cw/2, cy - 55);
      ctx.shadowBlur = 0;

      // Score panel
      ctx.fillStyle = "rgba(139,92,246,0.1)";
      ctx.strokeStyle = "rgba(139,92,246,0.25)";
      ctx.lineWidth = 2;
      ctx.beginPath(); ctx.roundRect(cw/2-120, cy-15, 240, 120, 14); ctx.fill(); ctx.stroke();

      ctx.fillStyle = "#a78bfa";
      ctx.font = "800 36px JetBrains Mono, sans-serif";
      ctx.fillText(gs.score.toLocaleString(), cw/2, cy + 18);
      ctx.fillStyle = "#64748b";
      ctx.font = "600 12px JetBrains Mono, sans-serif";
      ctx.fillText("SCORE", cw/2, cy + 44);

      const acc = gs.totalAnswered > 0 ? Math.round((gs.totalCorrect/gs.totalAnswered)*100) : 0;
      ctx.fillStyle = "#cbd5e1";
      ctx.font = "600 14px JetBrains Mono, sans-serif";
      ctx.fillText(`${gs.totalCorrect}/${gs.totalAnswered} correct (${acc}%)`, cw/2, cy + 72);
      ctx.fillText(`Best streak: ${gs.bestStreak}`, cw/2, cy + 94);

      const pulse = 0.45 + Math.sin(gs.frame * 0.06) * 0.35;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = "#94a3b8";
      ctx.font = "500 14px JetBrains Mono, sans-serif";
      ctx.fillText("Tap or press any key", cw/2, cy + 145);
      ctx.globalAlpha = 1;
    };

    // ── Game Over exit ──
    let gameOverHandled = false;
    const gameOverExit = () => {
      if (!gs.gameOver || gameOverHandled || gs.gameOverTimer > 0) return;
      gameOverHandled = true;
      resultsRef.current = {
        score: gs.score, totalCorrect: gs.totalCorrect, totalAnswered: gs.totalAnswered,
        bestStreak: gs.bestStreak, streak: gs.streak,
        wrongAnswers: gs.wrongAnswers, sessionAnswers: gs.sessionAnswers,
      };
      onEndRef.current(resultsRef.current);
    };
    window.addEventListener("keydown", gameOverExit);
    canvas.addEventListener("click", gameOverExit);
    canvas.addEventListener("touchstart", gameOverExit);

    // ── Update ──
    const update = () => {
      gs.frame++;
      if (gs.gameOver) { gs.gameOverTimer--; return; }

      // Lane smoothing
      gs.laneSmooth += (gs.targetLane - gs.laneSmooth) * 0.22;
      gs.lane = gs.targetLane;

      // Jump physics
      if (gs.isJumping) {
        gs.jumpY += gs.jumpVel;
        gs.jumpVel += 0.65; // gravity
        if (gs.jumpY >= 0) { gs.jumpY = 0; gs.jumpVel = 0; gs.isJumping = false; }
      }

      // Speed ramp
      gs.speed = Math.min(MAX_SPEED, INITIAL_SPEED + gs.totalAnswered * SPEED_INC);
      gs.distance += gs.speed;

      // Spawn coins (frequently!)
      gs.coinSpawnTimer++;
      if (gs.coinSpawnTimer >= gs.coinSpawnInterval) {
        spawnCoin();
        gs.coinSpawnTimer = 0;
        gs.coinSpawnInterval = Math.max(28, 50 - gs.totalAnswered * 0.5);
      }

      // Spawn obstacles
      gs.obstacleTimer++;
      if (gs.obstacleTimer >= gs.obstacleInterval && gs.totalAnswered >= 3) {
        spawnObstacle();
        gs.obstacleTimer = 0;
        gs.obstacleInterval = Math.max(90, 180 - gs.totalAnswered * 2);
      }

      // Move everything forward
      gs.coins.forEach(c => { c.z += gs.speed; });
      gs.obstacles.forEach(o => { o.z += gs.speed; });

      // Coin collision
      const hitZone = 0.045;
      gs.coins.forEach(coin => {
        if (coin.passed) return;
        const czz = coin.z * coin.z;
        if (czz >= PLAYER_Z_BASE - hitZone && czz <= PLAYER_Z_BASE + hitZone) {
          coin.passed = true;
          const noun = queue[coin.wordIndex % queue.length];
          const correctArticle = noun[1];
          const pickedArticle = ARTICLES[gs.lane];
          const entryId = noun[5] || noun[0];
          const sx = projX(gs.lane, PLAYER_Z_BASE);
          const sy = projY(PLAYER_Z_BASE) + gs.jumpY;

          gs.totalAnswered++;
          if (pickedArticle === correctArticle) {
            gs.totalCorrect++;
            gs.streak++;
            gs.bestStreak = Math.max(gs.bestStreak, gs.streak);
            const bonus = gs.streak >= 20 ? 50 : gs.streak >= 10 ? 30 : gs.streak >= 5 ? 20 : 10;
            gs.score += bonus;
            gs.flashColor = "green"; gs.flashTimer = 16;
            addParticles(sx, sy, ART_COLORS[correctArticle], 22, 6);
            addFloatingText(`+${bonus}`, sx, sy - 40, ART_COLORS[correctArticle]);
            if (gs.streak === 5) addFloatingText("GREAT!", cw/2, ch*0.38, "#F59E0B", true);
            if (gs.streak === 10) addFloatingText("AMAZING!", cw/2, ch*0.38, "#EF4444", true);
            if (gs.streak === 25) addFloatingText("LEGENDARY!", cw/2, ch*0.38, "#8B5CF6", true);
            gs.sessionAnswers.push({ noun: entryId, correct: true, modes: ["article"] });
          } else {
            gs.streak = 0;
            gs.lives--;
            gs.flashColor = "red"; gs.flashTimer = 20;
            gs.shakeTimer = 14;
            addParticles(sx, sy, "#EF4444", 14, 4);
            addFloatingText(correctArticle, sx, sy - 35, ART_COLORS[correctArticle]);
            gs.wrongAnswers.push({ noun: noun[0], entryId, article: correctArticle, plural: noun[2], english: noun[3], userArticle: pickedArticle });
            gs.sessionAnswers.push({ noun: entryId, correct: false, modes: ["article"] });
            if (gs.lives <= 0) { gs.gameOver = true; gs.gameOverTimer = 50; }
          }
        }
      });

      // Obstacle collision
      gs.obstacles.forEach(obs => {
        if (obs.hit) return;
        const ozz = obs.z * obs.z;
        if (ozz >= PLAYER_Z_BASE - 0.04 && ozz <= PLAYER_Z_BASE + 0.03) {
          if (obs.lane === gs.lane && !gs.isJumping) {
            // Hit obstacle!
            obs.hit = true;
            gs.lives--;
            gs.flashColor = "red"; gs.flashTimer = 25;
            gs.shakeTimer = 18;
            const sx = projX(obs.lane, PLAYER_Z_BASE);
            const sy = projY(PLAYER_Z_BASE);
            addParticles(sx, sy, "#EF4444", 20, 6);
            addFloatingText("CRASH!", sx, sy - 40, "#EF4444", true);
            if (gs.lives <= 0) { gs.gameOver = true; gs.gameOverTimer = 50; }
          } else if (obs.lane === gs.lane && gs.isJumping) {
            // Jumped over it — bonus!
            obs.hit = true;
            gs.score += 5;
            const sx = projX(obs.lane, PLAYER_Z_BASE);
            const sy = projY(PLAYER_Z_BASE) + gs.jumpY;
            addFloatingText("+5", sx, sy - 30, "#a78bfa");
            addParticles(sx, sy + 20, "#a78bfa", 8, 3);
          }
        }
      });

      // Cleanup coins
      gs.coins = gs.coins.filter(c => {
        if (c.z > 1.15 && !c.passed) {
          const noun = queue[c.wordIndex % queue.length];
          const entryId = noun[5] || noun[0];
          gs.totalAnswered++;
          gs.streak = 0;
          gs.lives--;
          gs.flashColor = "red"; gs.flashTimer = 16;
          gs.shakeTimer = 10;
          addFloatingText("MISS!", cw/2, ch*0.55, "#EF4444", true);
          gs.wrongAnswers.push({ noun: noun[0], entryId, article: noun[1], plural: noun[2], english: noun[3], userArticle: "__missed__" });
          gs.sessionAnswers.push({ noun: entryId, correct: false, modes: ["article"] });
          if (gs.lives <= 0) { gs.gameOver = true; gs.gameOverTimer = 50; }
          return false;
        }
        return c.z <= 1.3;
      });
      // Cleanup obstacles
      gs.obstacles = gs.obstacles.filter(o => o.z <= 1.3);

      // Particles & floating texts
      gs.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.14; p.life--; });
      gs.particles = gs.particles.filter(p => p.life > 0);
      gs.floatingTexts.forEach(ft => { ft.y += ft.vy; ft.life--; });
      gs.floatingTexts = gs.floatingTexts.filter(ft => ft.life > 0);
      if (gs.flashTimer > 0) gs.flashTimer--;
      if (gs.shakeTimer > 0) {
        gs.shakeX = (Math.random()-0.5) * 8;
        gs.shakeY = (Math.random()-0.5) * 5;
        gs.shakeTimer--;
      } else { gs.shakeX = 0; gs.shakeY = 0; }
    };

    // ── Render ──
    const render = () => {
      ctx.save();
      ctx.translate(gs.shakeX, gs.shakeY);
      ctx.clearRect(-10, -10, cw+20, ch+20);
      drawSky();
      drawRoad();

      // Collect all z-sorted renderables
      const renderables = [];
      gs.coins.filter(c => !c.passed).forEach((coin, ci) => {
        renderables.push({ type: "coin", z: coin.z, coin, ci });
      });
      gs.obstacles.filter(o => !o.hit).forEach(obs => {
        renderables.push({ type: "obstacle", z: obs.z, obs });
      });
      renderables.push({ type: "player", z: Math.sqrt(PLAYER_Z_BASE) });
      renderables.sort((a, b) => a.z - b.z);

      renderables.forEach(r => {
        if (r.type === "coin") {
          for (let lane = 0; lane < 3; lane++) {
            drawCoin3D(lane, r.coin.z, ARTICLES[lane], r.ci * 2.1 + lane * 0.7);
          }
        } else if (r.type === "obstacle") {
          drawObstacle3D(r.obs);
        } else {
          drawPlayer3D();
        }
      });

      drawParticles();
      drawFloatingTexts();
      drawFlash();
      ctx.restore();
      drawHUD();
      if (gs.gameOver) drawGameOver();
    };

    // ── Init ──
    gs.laneSmooth = 1;
    spawnCoin();

    const loop = () => {
      update();
      render();
      animFrameRef.current = requestAnimationFrame(loop);
    };
    animFrameRef.current = requestAnimationFrame(loop);

    return () => {
      cancelAnimationFrame(animFrameRef.current);
      window.removeEventListener("keydown", handleKeyDown);
      window.removeEventListener("keydown", gameOverExit);
      window.removeEventListener("resize", resize);
      canvas.removeEventListener("touchstart", handleTouchStart);
      canvas.removeEventListener("touchend", handleTouchEnd);
      canvas.removeEventListener("click", handleClick);
      canvas.removeEventListener("click", gameOverExit);
      canvas.removeEventListener("touchstart", gameOverExit);
    };
  }, [queue]);

  return (
    <div style={{display:"flex",justifyContent:"center",alignItems:"center",width:"100vw",height:"100vh",background:"#09090b",position:"fixed",top:0,left:0,zIndex:50}}>
      <canvas ref={canvasRef} style={{display:"block",touchAction:"none"}} />
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════
// MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════
function GermanNounGame() {
  const [screen, setScreen] = useState("menu");
  const [mode, setMode] = useState(MODES.ARTICLE);
  const [tier, setTier] = useState(500);
  const [queue, setQueue] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [totalAnswered, setTotalAnswered] = useState(0);
  const [totalCorrect, setTotalCorrect] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [articleChoice, setArticleChoice] = useState(null);
  const [phase, setPhase] = useState("question");
  const [difficulty, setDifficulty] = useState("normal");
  const [showHint, setShowHint] = useState(false);
  const [wrongAnswers, setWrongAnswers] = useState([]);
  const timerRef = useRef(null);
  const inputRef = useRef(null);
  const feedbackTimerRef = useRef(null);
  const currentNoun = queue[currentIndex];
  const timeLimit = useMemo(() => difficulty==="easy"?0:difficulty==="hard"?8:15, [difficulty]);

  // ── Persistence state ──
  const [userData, setUserData] = useState(DEFAULT_DATA);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [activeDeck, setActiveDeck] = useState(null);
  const [gameMode, setGameMode] = useState("classic"); // classic|reverse|matching|verb_forms|verb_prepositions|timed|survival
  const [matchingWordType, setMatchingWordType] = useState("nouns"); // nouns|adjectives|verbs|mixed
  const [playStyle, setPlayStyle] = useState("practice"); // practice|timed|survival
  const [timedSeconds, setTimedSeconds] = useState(10);
  const [lives, setLives] = useState(3);
  const [globalTimer, setGlobalTimer] = useState(60);
  const [sessionRewards, setSessionRewards] = useState(null);
  const [newAchievements, setNewAchievements] = useState([]);
  const [reverseInput, setReverseInput] = useState("");
  const [verbFormInputs, setVerbFormInputs] = useState({infinitive: "", prateritum: "", perfekt: ""});
  const verbInfRef = useRef(null);
  const verbPratRef = useRef(null);
  const verbPerfRef = useRef(null);
  // Verb Prepositions state
  const [verbPrepInputs, setVerbPrepInputs] = useState({preposition: "", case: ""});
  const verbPrepRef = useRef(null);
  const [usedSecondChance, setUsedSecondChance] = useState(false);
  const [usedStreakShield, setUsedStreakShield] = useState(false);
  const [campaignChallenge, setCampaignChallenge] = useState(null); // {stateId, challengeId} when in campaign
  const [sessionKey, setSessionKey] = useState(null); // "gameMode:source:id" for best-score tracking
  const [sessionTotal, setSessionTotal] = useState(0); // total words in queue at session start
  const globalTimerRef = useRef(null);
  const pluralOptions = useMemo(() => {
    if (!currentNoun || gameMode === "reverse" || mode === MODES.ARTICLE) return [];
    return getPluralOptions(currentNoun[0], currentNoun[1], currentNoun[2]);
  }, [currentNoun, gameMode, mode]);
  const matchingBatch = useMemo(() => (
    gameMode === "matching" ? queue.slice(currentIndex, currentIndex + MATCHING_BATCH_SIZE) : []
  ), [gameMode, queue, currentIndex]);
  const [matchingRightItems, setMatchingRightItems] = useState([]);
  const [matchingMatchedIds, setMatchingMatchedIds] = useState([]);
  const [matchingSelectedWord, setMatchingSelectedWord] = useState(null);
  const [matchingSelectedMeaning, setMatchingSelectedMeaning] = useState(null);
  const [matchingMismatch, setMatchingMismatch] = useState(null);
  const matchingMismatchTimerRef = useRef(null);
  const matchingCards = useMemo(() => {
    if (gameMode !== "matching" || matchingRightItems.length !== matchingBatch.length) return [];
    const isEntrySimple = (entry) => matchingWordType === "adjectives" || matchingWordType === "verbs" || (matchingWordType === "mixed" && entry.length <= 3);
    const germanCards = matchingBatch.map(entry => {
      const simple = isEntrySimple(entry);
      return {
        key: `word:${simple ? entry[0] : getNounEntryId(entry)}`,
        id: simple ? entry[0] : getNounEntryId(entry),
        type: "word",
        label: entry[0],
        article: simple ? "" : entry[1],
        plural: simple ? "" : entry[2],
      };
    });
    const englishCards = matchingRightItems.map(item => ({
      key: `meaning:${item.id}`,
      id: item.id,
      type: "meaning",
      label: item.label,
      article: "",
      plural: "",
    }));
    return shuffleArray([...germanCards, ...englishCards]);
  }, [gameMode, matchingBatch, matchingRightItems, matchingWordType]);

  useEffect(() => {
    registerGistStatusSetter(setSyncStatus);
    if (!getPat()) return;
    setSyncStatus("loading");
    loadGistData().then(d => {
      const merged = sanitizePersistedData({ ...DEFAULT_DATA, ...d, dailyStreak: { ...DEFAULT_DATA.dailyStreak, ...(d.dailyStreak||{}) } });
      merged.level = levelFromXp(merged.xp);
      setUserData(merged); setSyncStatus("synced");
    }).catch(() => setSyncStatus("error"));
  }, []);

  useEffect(() => {
    if (gameMode !== "matching") return;
    if (!matchingBatch.length) return;
    clearTimeout(matchingMismatchTimerRef.current);
    setMatchingRightItems(shuffleMatchingMeanings(matchingBatch, matchingWordType));
    setMatchingMatchedIds([]);
    setMatchingSelectedWord(null);
    setMatchingSelectedMeaning(null);
    setMatchingMismatch(null);
    return () => clearTimeout(matchingMismatchTimerRef.current);
  }, [gameMode, matchingBatch, matchingWordType]);

  const persistData = useCallback(async (newData) => {
    const sanitized = sanitizePersistedData(newData);
    setUserData(sanitized);
    queueGistSave(sanitized);
  }, []);

  const updateNounStats = useCallback((answered) => {
    setUserData(prev => {
      const stats = { ...prev.nounStats };
      const mastered = new Set(prev.masteredNouns || []);
      const modeStats = { ...(prev.modeStats || {}) };
      const modeMastered = { ...(prev.modeMastered || {}) };
      answered.forEach(({ noun, correct, modes }) => {
        // Overall stats (backwards compatible)
        const s = stats[noun] || { attempts: 0, correct: 0, consecutiveCorrect: 0 };
        const cc = correct ? (s.consecutiveCorrect || 0) + 1 : 0;
        stats[noun] = { attempts: s.attempts + 1, correct: s.correct + (correct ? 1 : 0), consecutiveCorrect: cc };
        if (cc >= 5) mastered.add(noun);
        // Per-mode stats
        if (modes) {
          modes.forEach(m => {
            const key = m + ":" + noun;
            const ms = modeStats[key] || { attempts: 0, correct: 0, consecutiveCorrect: 0 };
            const mcc = correct ? (ms.consecutiveCorrect || 0) + 1 : 0;
            modeStats[key] = { attempts: ms.attempts + 1, correct: ms.correct + (correct ? 1 : 0), consecutiveCorrect: mcc };
            if (mcc >= 5) {
              if (!modeMastered[m]) modeMastered[m] = [];
              const mmSet = new Set(modeMastered[m]);
              mmSet.add(noun);
              modeMastered[m] = [...mmSet];
            }
          });
        }
      });
      const newData = { ...prev, nounStats: stats, masteredNouns: [...mastered], modeStats, modeMastered };
      // Note: no gist save here — callers (endSession paths) always follow with
      // their own save that includes these updates plus bestScores. Saving here
      // raced with that follow-up and could clobber new bestScores.
      return newData;
    });
  }, []);

  const saveDeck = useCallback((name, nounNames) => {
    const deck = { id: Date.now().toString(36), name, nouns: nounNames, created: new Date().toISOString() };
    const newData = { ...userData, decks: [...userData.decks, deck] };
    persistData(newData);
    return deck;
  }, [userData, persistData]);

  const deleteDeck = useCallback((deckId) => {
    const newData = { ...userData, decks: userData.decks.filter(d => d.id !== deckId) };
    persistData(newData);
  }, [userData, persistData]);

  const buyPerk = useCallback((perkId) => {
    const perk = PERKS.find(p => p.id === perkId);
    if (!perk || userData.coins < perk.cost) return false;
    const newData = { ...userData, coins: userData.coins - perk.cost, activePerks: [...(userData.activePerks||[]), perkId] };
    persistData(newData);
    return true;
  }, [userData, persistData]);

  const deactivatePerk = useCallback((perkId) => {
    const newData = { ...userData, activePerks: (userData.activePerks||[]).filter(p => p !== perkId) };
    persistData(newData);
  }, [userData, persistData]);

  const sessionAnswersRef = useRef([]);

  const startGame = useCallback((m, d, t, deckId, gm, wordType, pStyle, tSecs, tMin, isRange) => {
    let nouns;
    const gMode = gm || "classic";
    const wType = wordType || "nouns";
    const ps = pStyle || "practice";
    const ts = tSecs || 10;
    const tierMinVal = tMin || 0;
    setMatchingWordType(wType);
    setPlayStyle(ps);
    setTimedSeconds(ts);
    // Adjective/verb loading for matching and reverse modes
    const loadAdjectives = (tier, mn) => {
      const adjTier = Math.min(tier, ADJECTIVES.length);
      const tierAdjs = getAdjectivesForTier(adjTier, mn);
      const unique = (() => { const seen = new Set(); return tierAdjs.filter(a => { if (seen.has(a[0])) return false; seen.add(a[0]); return true; }); })();
      return shuffleArray(unique.filter(a => a[1]));
    };
    const loadVerbs = (tier, mn) => {
      const verbTier = Math.min(tier, VERBS.length);
      const tierVerbs = getVerbsForTier(verbTier, mn);
      const unique = (() => { const seen = new Set(); return tierVerbs.filter(v => { if (seen.has(v[0])) return false; seen.add(v[0]); return true; }); })();
      return shuffleArray(unique.filter(v => v[1]));
    };
    // Normalize adj/verb to noun-like format [word, article, plural, english, rank]
    const normalizeAdj = (a) => [a[0], "", "", a[1], a[2]];
    const normalizeVerb = (v) => [v[0], "", "", v[1], v[2]];
    const supportsWt = gMode === "matching" || gMode === "reverse";

    // Helper to resolve a word name to its entry (noun, adj, or verb)
    const resolveWordEntry = (name, forMode) => {
      // Try noun first
      const nounEntries = getDrillEntriesByName(name);
      if (nounEntries.length) return nounEntries;
      // Try adjective
      const adj = ADJECTIVES.find(a => a[0] === name);
      if (adj) return forMode === "reverse" ? [normalizeAdj(adj)] : [adj];
      // Try verb
      const verb = VERBS.find(v => v[0] === name);
      if (verb) return forMode === "reverse" ? [normalizeVerb(verb)] : [verb];
      return [];
    };

    if (deckId === "__weakest__") {
      // Weakest words mode - filtered by effective word type
      const effWeakType = supportsWt ? wType : (gMode === "verb_forms" ? "verbs" : "nouns");
      const weakNames = getWeakestNouns(userData.nounStats, 30, effWeakType === "mixed" ? undefined : effWeakType);
      if (gMode === "verb_forms") {
        const weakVerbs = weakNames.flatMap(name => { const v = IRREGULAR_VERBS.find(iv => iv[0] === name); return v ? [v] : []; });

              {["der","die","das"].map(art=>(

                  <span style={S.articleBtnMain}>{art}</span>
                  <span style={S.articleBtnSub}>{art==="der"?"masc":art==="die"?"fem":"neut"}</span>
                </button>
              ))}
            </div>
          )}
          {gameMode!=="reverse"&&gameMode!=="matching"&&gameMode!=="verb_forms"&&gameMode!=="verb_prepositions"&&phase==="question"&&(mode===MODES.PLURAL||mode===MODES.BOTH)&&(
            <div style={S.pluralSection}>
              <label style={S.pluralLabel}>{mode===MODES.BOTH&&!articleChoice?"Pick the article first, then the plural":"Plural form:"}</label>
              <div style={S.pluralChoices}>
                {pluralOptions.map((option, idx)=>(
                  <button
                    key={currentNoun[0] + "-" + option}
                    onClick={()=>handlePluralChoice(option)}
                    disabled={mode===MODES.BOTH&&!articleChoice}
                    style={{...S.pluralChoiceBtn,opacity:mode===MODES.BOTH&&!articleChoice?0.45:1,cursor:mode===MODES.BOTH&&!articleChoice?"not-allowed":"pointer"}}
                  >
                    <span style={S.pluralChoiceKey}>{idx+1}</span>
                    <span style={S.pluralChoiceLabel}>{getPluralOptionLabel(option)}</span>

              </div>

          {gameMode==="verb_prepositions"&&phase==="question"&&<div style={S.shortcutHint}>Type the preposition, select the case, then press <kbd style={S.kbd}>Enter</kbd> to check.</div>}
          {gameMode!=="reverse"&&gameMode!=="matching"&&gameMode!=="verb_forms"&&gameMode!=="verb_prepositions"&&phase==="question"&&mode===MODES.ARTICLE&&<div style={S.shortcutHint}>Keys: <kbd style={S.kbd}>1</kbd> der | <kbd style={S.kbd}>2</kbd> die | <kbd style={S.kbd}>3</kbd> das | <kbd style={S.kbd}>H</kbd> hint</div>}
          {gameMode!=="reverse"&&gameMode!=="matching"&&gameMode!=="verb_forms"&&gameMode!=="verb_prepositions"&&phase==="question"&&mode===MODES.PLURAL&&<div style={S.shortcutHint}>Keys: <kbd style={S.kbd}>1</kbd> <kbd style={S.kbd}>2</kbd> <kbd style={S.kbd}>3</kbd> choose plural | <kbd style={S.kbd}>H</kbd> hint</div>}
          {gameMode!=="reverse"&&gameMode!=="matching"&&gameMode!=="verb_forms"&&gameMode!=="verb_prepositions"&&phase==="question"&&mode===MODES.BOTH&&<div style={S.shortcutHint}>Keys: <kbd style={S.kbd}>1</kbd> <kbd style={S.kbd}>2</kbd> <kbd style={S.kbd}>3</kbd> article first, then plural | <kbd style={S.kbd}>H</kbd> hint</div>}
        </div>
      )}
    </div>
  );
}

function DeckBuilder({onSave, onCancel}) {
  const [name,setName]=useState("");
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(new Set());
  const searchRef = useRef(null);

  const results = useMemo(()=>{
    if(!search.trim()) return [];
    const q = search.trim().toLowerCase();
    return NOUNS.filter(n =>
      n[0].toLowerCase().includes(q) || n[3].toLowerCase().includes(q)
    ).slice(0, 50);
  },[search]);

  const toggle = (noun) => {
    setSelected(prev => {
      const s = new Set(prev);
      if (s.has(noun)) s.delete(noun); else s.add(noun);
      return s;
    });
  };

  const handleSave = () => {
    if (!selected.size) return;
    const deckName = name.trim() || `Custom ${new Date().toLocaleDateString()}`;
    onSave(deckName, [...selected]);
  };

  return (
    <div style={S.container}><div style={S.menuInner}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 style={{fontSize:22,fontWeight:800,color:"#f1f5f9",margin:0}}>Create Deck</h2>
        <button onClick={onCancel} style={S.endBtn}>Cancel</button>
      </div>

      <div style={S.menuSection}>
        <label style={S.menuLabel}>Deck Name</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="My custom deck"
          style={{...S.pluralInput,fontSize:14,textAlign:"left",padding:"10px 14px"}}/>
      </div>

      <div style={S.menuSection}>
        <label style={S.menuLabel}>Search nouns ({NOUNS.length.toLocaleString()} available)</label>
        <input ref={searchRef} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Type German or English..."
          style={{...S.pluralInput,fontSize:14,textAlign:"left",padding:"10px 14px"}} autoFocus/>
      </div>

      {results.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:250,overflowY:"auto",paddingRight:4}}>
          {results.map(n=>{
            const inDeck = selected.has(n[0]);
            return (
              <button key={n[0]} onClick={()=>toggle(n[0])} style={{
                display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",
                background:inDeck?"rgba(139,92,246,0.15)":"rgba(255,255,255,0.03)",
                border:`1px solid ${inDeck?"rgba(139,92,246,0.4)":"rgba(255,255,255,0.08)"}`,
                borderRadius:8,cursor:"pointer",transition:"all 0.15s",textAlign:"left"
              }}>
                <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                  <span style={{color:ARTICLE_COLORS[n[1]],fontWeight:800,fontSize:13}}>{n[1]}</span>
                  <span style={{fontWeight:700,fontSize:15,color:"#f1f5f9"}}>{n[0]}</span>
                  <span style={{fontSize:11,color:"#64748b"}}>{n[3].split("/")[0]}</span>
                </div>
                <span style={{fontSize:14,color:inDeck?"#10B981":"#475569"}}>{inDeck?"✓":"+"}</span>
              </button>
            );
          })}
        </div>
      )}

      {!search.trim()&&!selected.size&&(
        <p style={{fontSize:12,color:"#475569",textAlign:"center"}}>Search for nouns above to add them to your deck</p>
      )}

      {selected.size>0&&(
        <div style={S.menuSection}>
          <label style={S.menuLabel}>Selected ({selected.size} noun{selected.size>1?"s":""})</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {[...selected].map(noun=>{
              const n = getNounByName(noun);
              return (
                <button key={noun} onClick={()=>toggle(noun)} style={{
                  display:"flex",alignItems:"center",gap:4,padding:"4px 10px",
                  background:"rgba(139,92,246,0.1)",border:"1px solid rgba(139,92,246,0.3)",
                  borderRadius:16,cursor:"pointer",fontSize:12,color:"#e2e8f0"
                }}>
                  {n&&<span style={{color:ARTICLE_COLORS[n[1]],fontWeight:700}}>{n[1]}</span>}
                  <span style={{fontWeight:600}}>{noun}</span>
                  <span style={{color:"#f87171",marginLeft:2}}>×</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      <button onClick={handleSave} disabled={!selected.size}
        style={{...S.startBtn,opacity:selected.size?1:0.4,background:selected.size?"linear-gradient(135deg, #8B5CF6, #6366F1)":"#333"}}>
        Save Deck ({selected.size} noun{selected.size!==1?"s":""})
      </button>
    </div></div>
  );
}

function LegacyMenuScreen({onStart, userData, syncStatus, onDeleteDeck, onSaveDeck, onSyncRefresh, onOpenCampaign, onOpenDashboard}) {
  const [mode,setMode]=useState(MODES.ARTICLE);
  const [tier,setTier]=useState(500);
  const [tierMin,setTierMin]=useState(0);
  const [tierMode,setTierMode]=useState("cumulative"); // "cumulative" or "range"
  const [source,setSource]=useState("tier");
  const [selectedDeck,setSelectedDeck]=useState(null);
  const [showSettings,setShowSettings]=useState(false);
  const [showDeckBuilder,setShowDeckBuilder]=useState(false);
  const [selectedGameMode,setSelectedGameMode]=useState("classic");
  const [matchWordType,setMatchWordType]=useState("nouns");
  const [playStyle,setPlayStyle]=useState("practice");
  const [timedSeconds,setTimedSeconds]=useState(10);
  const [patInput,setPatInput]=useState(getPat());
  const [patSaved,setPatSaved]=useState(false);

  const handleSavePat = () => {
    setPat(patInput.trim()); setPatSaved(true);
    setTimeout(() => setPatSaved(false), 2000);
    if (patInput.trim()) onSyncRefresh();
  };

  const supportsWordType = selectedGameMode === "matching" || selectedGameMode === "reverse";
  const handleStart = () => {
    const wType = supportsWordType ? matchWordType : "nouns";
    const diff = playStyle === "timed" ? "normal" : "easy";
    const isRange = source === "tier" && tierMode === "range";
    const effectiveTierMin = isRange ? tierMin : 0;
    if (source === "weakest") onStart(mode, diff, tier, "__weakest__", selectedGameMode, wType, playStyle, timedSeconds, 0, false);
    else if (source === "deck" && selectedDeck) onStart(mode, diff, tier, selectedDeck, selectedGameMode, wType, playStyle, timedSeconds, 0, false);
    else onStart(mode, diff, tier, null, selectedGameMode, wType, playStyle, timedSeconds, effectiveTierMin, isRange);
  };

  const prog = xpProgress(userData.xp || 0);
  const title = getTitle(prog.level);
  const syncDot = {idle:"#64748b",loading:"#F59E0B",saving:"#F59E0B",synced:"#10B981",error:"#EF4444"}[syncStatus];
  const dailyStreak = userData.dailyStreak || {current:0,best:0};

  if (showDeckBuilder) {
    return <DeckBuilder onSave={(name, nouns) => { onSaveDeck(name, nouns); setShowDeckBuilder(false); setSource("deck"); }}
      onCancel={() => setShowDeckBuilder(false)} />;
  }

  return (
    <div style={S.container}><div style={S.menuInner}>
      <div style={{textAlign:"center",position:"relative"}}>
        <button onClick={()=>setShowSettings(!showSettings)} style={S.gearBtn} title="Sync Settings">
          <span style={{fontSize:18}}>&#9881;</span>
          <span style={{width:8,height:8,borderRadius:"50%",backgroundColor:syncDot,display:"inline-block",marginLeft:4}}/>
        </button>
        <div style={{fontSize:28,marginBottom:8,letterSpacing:2}}><span style={{color:"#3B82F6",fontWeight:900}}>der</span><span style={{color:"#EC4899",fontWeight:900}}> die</span><span style={{color:"#10B981",fontWeight:900}}> das</span></div>
        <h1 style={S.menuTitle}>Artikel Blitz</h1>
        <p style={{fontSize:14,color:"#64748b",margin:0}}>Master {NOUNS.length.toLocaleString()} German nouns · {WORDS_META.source ? "Leipzig JSON dataset" : "JSON word dataset"}</p>
      </div>

      {/* ── Profile card ── */}
      {(()=>{
        const totalNouns = NOUNS.length;
        const masteredCount = (userData.masteredNouns||[]).length;
        const masteryPct = totalNouns > 0 ? Math.round((masteredCount / totalNouns) * 100) : 0;
        const masteryColor = masteryPct >= 100 ? "#F59E0B" : masteryPct >= 50 ? "#10B981" : "#8B5CF6";
        return (
      <div style={{...S.settingsPanel,textAlign:"center",position:"relative",overflow:"hidden"}}>
        {/* Subtle shimmer for high mastery */}
        {masteryPct >= 25 && <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:`linear-gradient(90deg, transparent, ${masteryColor}44, transparent)`,opacity:0.6}}/>}
        <div style={{display:"flex",alignItems:"center",gap:14,justifyContent:"center"}}>
          {/* XP level ring */}
          <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width={56} height={56} style={{transform:"rotate(-90deg)"}}>
              <circle cx={28} cy={28} r={24} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={4}/>
              <circle cx={28} cy={28} r={24} fill="none" stroke="#8B5CF6" strokeWidth={4}
                strokeDasharray={2*Math.PI*24} strokeDashoffset={2*Math.PI*24-(prog.needed>0?(prog.current/prog.needed):1)*2*Math.PI*24}
                strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s ease"}}/>
            </svg>
            <span style={{position:"absolute",fontSize:18,fontWeight:900,color:"#e2e8f0"}}>{prog.level}</span>
          </div>
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:18,fontWeight:900,color:"#e2e8f0"}}>{title[1]} <span style={{fontSize:12,color:"#94a3b8",fontWeight:600}}>{title[2]}</span></div>
            <div style={{fontSize:11,color:"#64748b"}}>{prog.current} / {prog.needed} XP to Lv. {prog.level+1}</div>
          </div>
        </div>
        {/* Stats row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:10}}>
          <div style={{background:dailyStreak.current>=3?"rgba(239,68,68,0.06)":"rgba(255,255,255,0.02)",border:`1px solid ${dailyStreak.current>=3?"rgba(239,68,68,0.2)":"rgba(255,255,255,0.06)"}`,borderRadius:8,padding:"8px 4px"}}>

          </div>
        </div>
        {/* Mastery progress bar */}
        <div style={{marginTop:8}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
            <span style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>Overall Mastery</span>

          </div>
        </div>
      </div>
        );
      })()}

      {showSettings&&(
        <div style={S.settingsPanel}>

            <input value={patInput} onChange={e=>setPatInput(e.target.value)} placeholder="ghp_xxxxxxxxxxxx" type="password"

            </span>
            {getGistId()&&<span style={{fontSize:10,color:"#475569",marginLeft:"auto"}}>Gist: {getGistId().slice(0,8)}...</span>}

        <label style={S.menuLabel}>Game Mode</label>
