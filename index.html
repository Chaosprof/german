<script type="text/babel">
const { useState, useEffect, useCallback, useRef, useMemo } = React;


// ═══════════════════════════════════════════════════════════════
// WORD DATA - loaded from JSON so the app can stay a static GitHub Pages site
const WORDS_DATA_PATH = "./data/nouns.json";
const ADJECTIVES_DATA_PATH = "./data/adjectives.json";
const VERBS_DATA_PATH = "./data/verbs.json";
const DUAL_GENDER_PATH = "./data/dual-gender-nouns.json";
const VERB_PREP_PATH = "./data/verbs-with-prepositions.json";
const ARTICLE_RULES_PATH = "./data/article-rules.json";
let NOUNS = [];
let NOUN_INDEX = new Map();
let EXPLANATIONS = new Map();
let ARTICLE_RULES = {};
let WORDS_META = {};
let BUILTIN_DECKS = [];
let DUAL_GENDER_WORDS = new Set();
let DUAL_GENDER_SENSES = new Map();
let DUAL_GENDER_INDEX = new Map();
let DUAL_GENDER_DRILL_BOTH = new Set();
let ADJECTIVES = [];  // [word, english, rank]
let VERBS = [];  // [word, english, rank]
let IRREGULAR_VERBS = [];  // [word, english, rank, prateritum, perfekt]
let VERB_PREPOSITIONS = [];  // [verb, english, rank, preposition, case, example]

function makeDualGenderSenseId(word, article, plural) {
  return `__dual__|${word}|${article}|${plural || "—"}`;
}

function buildDualGenderEntry(word, rank, genderEntry) {
  const plural = genderEntry.singularOnly || genderEntry.plural === "?" ? "—" : (genderEntry.plural || "—");
  return [word, genderEntry.article, plural, genderEntry.english, rank, makeDualGenderSenseId(word, genderEntry.article, plural)];
}

function getNounEntryId(noun) {
  return noun?.[5] || noun?.[0] || "";
}

function getMistakeEntryId(mistake) {
  return mistake?.entryId || mistake?.noun || "";
}

function hydrateWordData(payload) {
  const nounEntries = Array.isArray(payload?.nouns) ? payload.nouns : [];
  NOUNS = nounEntries.map(({ word, article, plural, english, rank }) => [word, article, plural, english, rank]);
  NOUN_INDEX = new Map(NOUNS.map(noun => [noun[0], noun]));
  EXPLANATIONS = new Map(nounEntries.map(({ word, articleHelp, pluralHelp, ruleId, isException }) => [word, { article: articleHelp || "", plural: pluralHelp || "", ruleId: ruleId || null, isException: !!isException }]));
  WORDS_META = payload?.meta || {};
}

async function loadWordData() {
  const response = await fetch(WORDS_DATA_PATH);
  if (!response.ok) throw new Error(`Could not load ${WORDS_DATA_PATH} (${response.status})`);
  const payload = await response.json();
  hydrateWordData(payload);
  if (!NOUNS.length) throw new Error(`No noun data found in ${WORDS_DATA_PATH}`);
  // Load adjectives
  try {
    const adjResp = await fetch(ADJECTIVES_DATA_PATH);
    if (adjResp.ok) {
      const adjData = await adjResp.json();
      ADJECTIVES = (adjData.adjectives || []).map(({ word, english, rank }) => [word, english, rank]);
    }
  } catch(e) { console.warn("Could not load adjectives:", e); }
  // Load verbs
  try {
    const verbResp = await fetch(VERBS_DATA_PATH);
    if (verbResp.ok) {
      const verbData = await verbResp.json();
      VERBS = (verbData.verbs || []).map(({ word, english, rank }) => [word, english, rank]);
      IRREGULAR_VERBS = (verbData.verbs || []).filter(v => v.irregular).map(({ word, english, rank, prateritum, perfekt, withSein }) => [word, english, rank, prateritum, (withSein ? "ist " : "hat ") + perfekt]);
    }
  } catch(e) { console.warn("Could not load verbs:", e); }
  // Load built-in decks
  try {
    const dgResp = await fetch(DUAL_GENDER_PATH);
    if (dgResp.ok) {
      const dgData = await dgResp.json();
      if (dgData.nouns?.length) {
        const dualSensePairs = dgData.nouns.map(({ word, rank, genders = [] }) => [word, genders.map(genderEntry => buildDualGenderEntry(word, rank, genderEntry))]);
        const dualEntries = dualSensePairs.flatMap(([, entries]) => entries);
        DUAL_GENDER_WORDS = new Set(dualSensePairs.map(([word]) => word));
        DUAL_GENDER_SENSES = new Map(dualSensePairs);
        DUAL_GENDER_INDEX = new Map(dualEntries.map(entry => [getNounEntryId(entry), entry]));
        DUAL_GENDER_DRILL_BOTH = new Set(dgData.nouns.filter(n => n.bothInDrills).map(n => n.word));
        BUILTIN_DECKS.push({
          id: "__dual_gender__",
          name: "Dual-Gender Nouns",
          description: dgData.meta?.description || "Nouns whose meaning changes with the article",
          nouns: dualEntries.map(entry => getNounEntryId(entry)),
          builtin: true
        });
      }
    }
  } catch(e) { console.warn("Could not load dual-gender deck:", e); }
  // Load verbs with prepositions
  try {
    const vpResp = await fetch(VERB_PREP_PATH);
    if (vpResp.ok) {
      const vpData = await vpResp.json();
      VERB_PREPOSITIONS = (vpData.verbs || [])
        .filter(({ preposition }) => SELECTABLE_VERB_PREPOSITIONS.has(preposition))
        .map(({ verb, english, rank, preposition, case: cas, example }) => [verb, english, rank, preposition, cas, example]);
    }
  } catch(e) { console.warn("Could not load verbs with prepositions:", e); }
  // Load article rules
  try {
    const arResp = await fetch(ARTICLE_RULES_PATH);
    if (arResp.ok) {
      const arData = await arResp.json();
      ARTICLE_RULES = arData.rules || {};
    }
  } catch(e) { console.warn("Could not load article rules:", e); }
}

function getNounByName(name) {
  return DUAL_GENDER_INDEX.get(name) || NOUN_INDEX.get(name) || null;
}

function getDeckEntriesByName(name) {
  if (DUAL_GENDER_INDEX.has(name)) return [DUAL_GENDER_INDEX.get(name)];
  const dualEntries = DUAL_GENDER_SENSES.get(name);
  if (dualEntries?.length) return dualEntries;
  const noun = getNounByName(name);
  return noun ? [noun] : [];
}

const ARTICLE_SORT_ORDER = { der: 0, die: 1, das: 2 };

function sortArticles(articles) {
  return [...new Set(articles.filter(Boolean))].sort((a, b) => {
    const orderDiff = (ARTICLE_SORT_ORDER[a] ?? 99) - (ARTICLE_SORT_ORDER[b] ?? 99);
    return orderDiff || a.localeCompare(b, "de");
  });
}

function getArticlesForNounName(name) {
  return sortArticles(getDeckEntriesByName(name).map(entry => entry[1]));
}

function getMeaningsForNounName(name) {
  return [...new Set(getDeckEntriesByName(name).map(entry => entry[3]).filter(Boolean))];
}

// Like getDeckEntriesByName, but only expands to both genders for Category A words.
// Category B/C dual-gender words return only their primary (nouns.json) entry.
function getDrillEntriesByName(name) {
  if (DUAL_GENDER_INDEX.has(name)) return [DUAL_GENDER_INDEX.get(name)];
  if (DUAL_GENDER_SENSES.has(name)) {
    if (DUAL_GENDER_DRILL_BOTH.has(name)) return DUAL_GENDER_SENSES.get(name);
    // B/C word: return only the primary entry from nouns.json
    const primary = NOUN_INDEX.get(name);
    return primary ? [primary] : [DUAL_GENDER_SENSES.get(name)[0]];
  }
  const noun = getNounByName(name);
  return noun ? [noun] : [];
}

function getAdjectivesForTier(tier, minRank) {
  return minRank ? ADJECTIVES.filter(a => a[2] > minRank && a[2] <= tier) : ADJECTIVES.filter(a => a[2] <= tier);
}

function getVerbsForTier(tier, minRank) {
  return minRank ? VERBS.filter(v => v[2] > minRank && v[2] <= tier) : VERBS.filter(v => v[2] <= tier);
}

function getIrregularVerbsForTier(tier, minRank) {
  return minRank ? IRREGULAR_VERBS.filter(v => v[2] > minRank && v[2] <= tier) : IRREGULAR_VERBS.filter(v => v[2] <= tier);
}

const sortGermanStrings = values => [...values].sort((a, b) => a.localeCompare(b, "de"));
const COMMON_VERB_PREPOSITIONS = sortGermanStrings(["an", "auf", "aus", "bei", "für", "gegen", "in", "mit", "nach", "über", "um", "von", "vor", "zu", "als"]);
const RARE_VERB_PREPOSITIONS = sortGermanStrings(["unter", "zwischen", "durch", "gegenüber"]);
const ALL_VERB_PREPOSITIONS = sortGermanStrings([...COMMON_VERB_PREPOSITIONS, ...RARE_VERB_PREPOSITIONS]);
const SELECTABLE_VERB_PREPOSITIONS = new Set(ALL_VERB_PREPOSITIONS);
const VERB_PREP_BUCKET_SIZE = 30;

function getVerbPrepositionsForTier(tier, minRank) {
  // Verb+preposition tiers use actual playable combo positions, not noun-scale ranks.
  if (!VERB_PREPOSITIONS.length) return [];
  const sorted = [...VERB_PREPOSITIONS].sort((a, b) => a[2] - b[2]);
  const maxCount = sorted.length;
  const upper = Math.max(Math.min(tier || maxCount, maxCount), 0);
  const lower = Math.max(Math.min(minRank || 0, upper), 0);
  return sorted.slice(lower, upper);
}

// Answer mode helpers for per-mode tracking
function getAnswerModes(mode, gameMode) {
  if (gameMode === "matching") return ["matching"];
  if (gameMode === "reverse") return ["reverse"];
  if (gameMode === "verb_forms") return ["verb_forms"];
  if (gameMode === "verb_prepositions") return ["verb_prep"];
  if (mode === MODES.BOTH) return ["article", "plural"];
  if (mode === MODES.PLURAL) return ["plural"];
  return ["article"];
}

// VOCABULARY TIER CONFIG
// ═══════════════════════════════════════════════════════════════
const TIER_OPTIONS = [
  { value: 100, label: "Top 100", desc: "Most essential words" },
  { value: 200, label: "Top 200", desc: "Core vocabulary" },
  { value: 500, label: "Top 500", desc: "Intermediate" },
  { value: 1000, label: "Top 1000", desc: "Advanced beginner" },
  { value: 2000, label: "Top 2000", desc: "Intermediate-advanced" },
  { value: 5000, label: "Top 5000", desc: "Comprehensive" },
  { value: 10000, label: "Top 10000", desc: "C2 mastery" },
  { value: 15000, label: "Top 15000", desc: "Advanced C2" },
  { value: 25000, label: "Top 25000", desc: "Near-native" },
];

function getNounsForTier(tier, minRank) {
  return minRank ? NOUNS.filter(n => n[4] > minRank && n[4] <= tier) : NOUNS.filter(n => n[4] <= tier);
}

// ═══════════════════════════════════════════════════════════════
// GRAMMAR EXPLANATIONS - precomputed in JSON
// ═══════════════════════════════════════════════════════════════

// Per-noun articleHelp/pluralHelp live in data/nouns.json. Suffix and
// semantic article rules live in data/article-rules.json; nouns are tagged
// with ruleId (+ isException) and we render the shared rule text.

function getRuleExceptionsInBank(rule) {
  if (!rule || !Array.isArray(rule.exceptions)) return [];
  return rule.exceptions.filter(exc => {
    const noun = NOUN_INDEX.get(exc.word);
    return noun && noun[1] === exc.article;
  });
}
// UTILITIES
// ═══════════════════════════════════════════════════════════════
const ARTICLE_COLORS = { "der": "#3B82F6", "die": "#EC4899", "das": "#10B981" };
const FONT_SANS = "'IBM Plex Sans','Segoe UI',sans-serif";
const FONT_SERIF = "'Fraunces','Iowan Old Style','Palatino Linotype',serif";
const FONT_MONO = "'IBM Plex Mono','SFMono-Regular',monospace";
const UI = {
  text: "#111111",
  textStrong: "#000000",
  muted: "#374151",
  faint: "#6b7280",
  line: "rgba(17,24,39,0.12)",
  lineStrong: "rgba(17,24,39,0.22)",
  panel: "rgba(255,255,255,0.92)",
  panelAlt: "rgba(249,250,251,0.96)",
  panelSoft: "rgba(17,24,39,0.035)",
  accent: "#d1d5db",
  accentDeep: "#9ca3af",
  accentSoft: "rgba(156,163,175,0.22)",
  accentGhost: "rgba(156,163,175,0.14)",
  teal: "#cbd5e1",
  tealSoft: "rgba(203,213,225,0.32)",
  gold: "#c4b28f",
  goldSoft: "rgba(196,178,143,0.22)",
  success: "#bbd2a6",
  successSoft: "rgba(187,210,166,0.24)",
  danger: "#d8b4ae",
  dangerSoft: "rgba(216,180,174,0.24)",
  shadow: "0 18px 42px rgba(15,23,42,0.08)",
};
function shuffleArray(a) { const b=[...a]; for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];} return b; }
function normalize(s) { return s.trim().toLowerCase().replace(/ß/g,"ss").replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue"); }
const MODES = { ARTICLE:"article", PLURAL:"plural", BOTH:"both" };

// ═══════════════════════════════════════════════════════════════
// GIST PERSISTENCE
// ═══════════════════════════════════════════════════════════════
const GIST_FILENAME = "artikel-blitz-data.json";
const PAT_KEY = "artikel-blitz-pat";
const GIST_ID_KEY = "artikel-blitz-gist-id";
const DEFAULT_DATA = {
  decks: [], nounStats: {},
  dailyStreak: { current: 0, lastDate: null, best: 0 },
  unlockedTiers: [100],
  masteredNouns: [],
  totalSessions: 0,
  campaignProgress: {},
  bestScores: {},  // { "gameMode:tier_or_deck": { correct, total, pct } }
  modeStats: {},   // { "article:Haus": {attempts,correct,consecutiveCorrect}, "plural:Haus": {...}, ... }
  modeMastered: {}, // { "article": ["Haus",...], "plural": [...], ... }
};

function getPat() { return localStorage.getItem(PAT_KEY) || ""; }
function setPat(t) { localStorage.setItem(PAT_KEY, t); }
function getGistId() { return localStorage.getItem(GIST_ID_KEY) || ""; }
function setGistId(id) { localStorage.setItem(GIST_ID_KEY, id); }

async function gistFetch(path, opts = {}) {
  const pat = getPat();
  if (!pat) throw new Error("No PAT configured");
  const r = await fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: { Authorization: `token ${pat}`, Accept: "application/vnd.github+json", ...opts.headers },
  });
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${r.statusText}`);
  return r.json();
}

async function loadGistData() {
  const gistId = getGistId();
  if (!gistId) return { ...DEFAULT_DATA };
  const gist = await gistFetch(`/gists/${gistId}`);
  const file = gist.files[GIST_FILENAME];
  if (!file) return { ...DEFAULT_DATA };
  return sanitizePersistedData(JSON.parse(file.content));
}

// ── Gist save queue: serialize writes, coalesce concurrent updates ──
// Without this, two overlapping saveGistData() PATCHes (e.g. updateNounStats +
// endSession firing back-to-back) race on the same gist and whichever lands
// last wins — commonly losing the newer bestScores entry.
let _gistSaveInFlight = null;
let _gistSavePending = null;
let _gistStatusSetter = null;
function registerGistStatusSetter(fn) { _gistStatusSetter = fn; }
async function _drainGistSave() {
  try {
    while (_gistSavePending) {
      const data = _gistSavePending;
      _gistSavePending = null;
      await saveGistData(data);
    }
    if (_gistStatusSetter) _gistStatusSetter("synced");
  } catch (e) {
    if (_gistStatusSetter) _gistStatusSetter("error");
  } finally {
    _gistSaveInFlight = null;
  }
}
function queueGistSave(data) {
  if (!getPat()) return;
  _gistSavePending = data; // coalesce to latest
  if (_gistStatusSetter) _gistStatusSetter("saving");
  if (!_gistSaveInFlight) _gistSaveInFlight = _drainGistSave();
}

async function saveGistData(data) {
  const sanitized = sanitizePersistedData(data);
  const gistId = getGistId();
  const body = { files: { [GIST_FILENAME]: { content: JSON.stringify(sanitized, null, 2) } } };
  if (gistId) {
    return gistFetch(`/gists/${gistId}`, { method: "PATCH", body: JSON.stringify(body) });
  } else {
    const gist = await gistFetch("/gists", {
      method: "POST",
      body: JSON.stringify({ description: "Artikel Blitz — saved progress", public: false, ...body }),
    });
    setGistId(gist.id);
    return gist;
  }
}

// ═══════════════════════════════════════════════════════════════
// GAME SYSTEMS — SRS, medals
// ═══════════════════════════════════════════════════════════════

// ── Best-score medal tiering ──────────────────────────────────
// Returns { tier: "gold"|"silver"|"bronze"|null, label, color, next, nextLabel, gapToNext }
function bestScoreMedal(pct) {
  if (pct == null || pct <= 0) return { tier: null, label: null, color: null, next: 80, nextLabel: "Bronze", gapToNext: 80 };
  if (pct >= 100) return { tier: "gold", label: "PERFECT", color: "#F59E0B", next: null, nextLabel: null, gapToNext: 0 };
  if (pct >= 90)  return { tier: "silver", label: "Silver", color: "#CBD5E1", next: 100, nextLabel: "Perfect", gapToNext: 100 - pct };
  if (pct >= 80)  return { tier: "bronze", label: "Bronze", color: "#D97706", next: 90, nextLabel: "Silver", gapToNext: 90 - pct };
  return { tier: null, label: null, color: UI.muted, next: 80, nextLabel: "Bronze", gapToNext: 80 - pct };
}

// Small medal badge — shows trophy/medal with pct centered, styled by tier
function Medal({ pct, size = 28, showLabel = false }) {
  const m = bestScoreMedal(pct);
  if (m.tier === null && (!pct || pct <= 0)) return null;
  const bg = m.tier === "gold"
    ? "linear-gradient(135deg,#FCD34D 0%,#F59E0B 55%,#B45309 100%)"
    : m.tier === "silver"
    ? "linear-gradient(135deg,#F1F5F9 0%,#CBD5E1 55%,#64748B 100%)"
    : m.tier === "bronze"
    ? "linear-gradient(135deg,#FCD9B6 0%,#D97706 55%,#7C2D12 100%)"
    : "linear-gradient(135deg,#6b6257 0%,#3f3831 100%)";
  const border = m.tier === "gold" ? "rgba(252,211,77,0.9)" : m.tier === "silver" ? "rgba(203,213,225,0.8)" : m.tier === "bronze" ? "rgba(217,119,6,0.85)" : "rgba(148,163,184,0.5)";
  const textColor = m.tier === "silver" ? "#0f172a" : "#ffffff";
  const fs = size >= 30 ? 11 : size >= 24 ? 10 : 9;
  return (
    <div style={{display:"inline-flex",alignItems:"center",gap:4}}>
      <div className={m.tier === "gold" ? "medal-gold" : ""} style={{
        width: size, height: size, borderRadius: "50%",
        background: bg, border: `1.5px solid ${border}`,
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: m.tier === "gold" ? "0 0 10px rgba(245,158,11,0.55), inset 0 1px 2px rgba(255,255,255,0.5)" : "inset 0 1px 2px rgba(255,255,255,0.35)",
        color: textColor, fontWeight: 900, fontSize: fs, lineHeight: 1,
        flexShrink: 0,
      }}>
        {m.tier === "gold" ? "★" : Math.round(pct) + "%"}
      </div>
      {showLabel && m.label && <span style={{fontSize:10,fontWeight:800,letterSpacing:0.5,color:m.color,textTransform:"uppercase"}}>{m.label}</span>}
    </div>
  );
}

function isCampaignStateUnlocked(stateData, campaignProgress) {
  if (!stateData.unlockRequires) return true;
  const { tier, count } = stateData.unlockRequires;
  const statesInTier = CAMPAIGN_STATES.filter(s => s.tier === tier);
  const completed = statesInTier.filter(s => {
    const sp = campaignProgress[s.id];
    return sp && s.challenges.every(c => (sp[c.id] || 0) >= 1);
  });
  return completed.length >= count;
}

function getCampaignStateStars(stateId, campaignProgress) {
  const state = CAMPAIGN_STATES.find(s => s.id === stateId);
  if (!state) return 0;
  const sp = campaignProgress[stateId] || {};
  return state.challenges.reduce((sum, c) => sum + (sp[c.id] || 0), 0);
}

function getCampaignMaxStars(stateId) {
  const state = CAMPAIGN_STATES.find(s => s.id === stateId);
  return state ? state.challenges.length * 3 : 0;
}

function isChallengeUnlocked(state, challengeIndex, campaignProgress) {
  if (challengeIndex === 0) return true;
  const prevChallenge = state.challenges[challengeIndex - 1];
  const sp = campaignProgress[state.id] || {};
  return (sp[prevChallenge.id] || 0) >= 1;
}

// SRS: build a weighted queue — struggling nouns appear more, mastered less
function buildSrsQueue(nouns, nounStats, maxSize) {
  const weighted = nouns.map(n => {
    const nounId = getNounEntryId(n);
    const s = nounStats[nounId] || nounStats[n[0]];
    if (!s) return { noun: n, weight: 5 }; // never seen = high priority
    const ratio = s.attempts > 0 ? s.correct / s.attempts : 0;
    const cStreak = s.consecutiveCorrect || 0;
    if (cStreak >= 5) return { noun: n, weight: 0.5 }; // mastered = low priority
    if (ratio < 0.5) return { noun: n, weight: 8 }; // struggling
    if (ratio < 0.75) return { noun: n, weight: 4 }; // needs work
    return { noun: n, weight: 2 }; // decent
  });
  // Weighted random selection
  const pool = [];
  for (const { noun, weight } of weighted) {
    const count = Math.max(1, Math.round(weight));
    for (let i = 0; i < count; i++) pool.push(noun);
  }
  const shuffled = shuffleArray(pool);
  const seen = new Set(); const result = [];
  for (const n of shuffled) {
    const nounId = getNounEntryId(n);
    if (seen.has(nounId)) continue;
    seen.add(nounId); result.push(n);
    if (result.length >= maxSize) break;
  }
  return result;
}

// Generate weakest words from stats, optionally filtered by word type
function getWeakestNouns(nounStats, count = 30, wordType) {
  // Build lookup sets for filtering by word type
  let allowedWords = null;
  if (wordType === "nouns") {
    allowedWords = new Set(NOUNS.map(n => n[0]));
    // Also include noun entry IDs
    NOUNS.forEach(n => { const id = getNounEntryId(n); if (id) allowedWords.add(id); });
  } else if (wordType === "adjectives") {
    allowedWords = new Set(ADJECTIVES.map(a => a[0]));
  } else if (wordType === "verbs") {
    allowedWords = new Set(VERBS.map(v => v[0]));
  }
  // wordType "mixed" or undefined => no filter
  const entries = Object.entries(nounStats)
    .filter(([name, s]) => s.attempts >= 2 && (!allowedWords || allowedWords.has(name)))
    .map(([noun, s]) => ({ noun, ratio: s.correct / s.attempts, attempts: s.attempts }))
    .sort((a, b) => a.ratio - b.ratio || b.attempts - a.attempts);
  return entries.slice(0, count).map(e => e.noun);
}

// Daily streak logic
function updateDailyStreak(streak) {
  const today = new Date().toISOString().slice(0, 10);
  if (streak.lastDate === today) return streak; // already played today
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (streak.lastDate === yesterday) {
    const c = streak.current + 1;
    return { current: c, lastDate: today, best: Math.max(streak.best || 0, c) };
  }
  return { current: 1, lastDate: today, best: Math.max(streak.best || 0, 1) }; // streak broken
}

function sanitizePersistedData(data) {
  if (!data || typeof data !== "object") return { ...DEFAULT_DATA };
  const bestScores = Object.fromEntries(
    Object.entries(data.bestScores || {}).filter(([key]) => PERSISTED_BEST_SCORE_MODE_IDS.has(key.split(":")[0]))
  );
  const modeStats = Object.fromEntries(
    Object.entries(data.modeStats || {}).filter(([key]) => VALID_PERSISTED_MODE_STAT_IDS.has(key.split(":")[0]))
  );
  const modeMastered = Object.fromEntries(
    Object.entries(data.modeMastered || {}).filter(([modeId]) => VALID_PERSISTED_MODE_STAT_IDS.has(modeId))
  );
  const campaignProgress = Object.fromEntries(
    Object.entries(data.campaignProgress || {}).flatMap(([stateId, progress]) => {
      const validChallenges = VALID_CAMPAIGN_CHALLENGES[stateId];
      if (!validChallenges) return [];
      const cleaned = Object.fromEntries(
        Object.entries(progress || {}).filter(([challengeId]) => validChallenges.has(challengeId))
      );
      return Object.keys(cleaned).length ? [[stateId, cleaned]] : [];
    })
  );
  return { ...data, bestScores, modeStats, modeMastered, campaignProgress };
}

const PLURAL_FAMILY_PRIORITY = {
  none: ["same", "e", "en", "s"],
  same: ["e", "en", "er", "umlaut"],
  s: ["e", "en", "same", "er"],
  nen: ["n", "en", "e", "same"],
  n: ["en", "e", "same", "s"],
  en: ["e", "same", "er", "s"],
  e: ["en", "er", "same", "s"],
  er: ["e", "same", "en", "s"],
  er_umlaut: ["er", "e_umlaut", "same", "en"],
  e_umlaut: ["e", "en", "er_umlaut", "same"],
  umlaut: ["same", "e_umlaut", "er_umlaut", "e"],
  um_en: ["um_a", "same", "e", "en"],
  um_a: ["um_en", "same", "e", "en"],
  ium_ien: ["same", "en", "e", "s"],
  us_en: ["same", "e", "en", "s"],
  a_en: ["same", "e", "en", "s"],
};

function formatArticleAttempt(value) {
  return value === NO_ANSWER ? "—" : value;
}

function formatPluralAttempt(value) {
  if (value === NO_ANSWER) return "—";
  return value === "—" ? NO_PLURAL_LABEL : value;
}

function getPluralOptionLabel(value) {
  return value === "—" ? NO_PLURAL_LABEL : `die ${value}`;
}

function isLikelyLoanword(lowerWord) {
  return ["ion","t\u00e4t","ismus","ist","or","eur","ment","ette","age","ade","ie","ik","ur","a","i","o","u","y"].some(suffix => lowerWord.endsWith(suffix));
}

function addUmlaut(word) {
  const lowerWord = word.toLowerCase();
  const auIndex = lowerWord.lastIndexOf("au");
  if (auIndex !== -1) {
    const replacement = word[auIndex] === word[auIndex].toUpperCase() ? "Äu" : "äu";
    return word.slice(0, auIndex) + replacement + word.slice(auIndex + 2);
  }

  const replacements = [["a", "ä"], ["o", "ö"], ["u", "ü"]];
  let bestMatch = null;

  replacements.forEach(([base, target]) => {
    const idx = lowerWord.lastIndexOf(base);
    if (idx === -1) return;
    if (!bestMatch || idx > bestMatch.idx || (idx === bestMatch.idx && base.length > bestMatch.base.length)) {
      bestMatch = { idx, base, target };
    }
  });

  if (!bestMatch) return word;

  let replacement = bestMatch.target;
  const originalSlice = word.slice(bestMatch.idx, bestMatch.idx + bestMatch.base.length);
  if (originalSlice[0] === originalSlice[0].toUpperCase()) {
    replacement = replacement[0].toUpperCase() + replacement.slice(1);
  }

  return word.slice(0, bestMatch.idx) + replacement + word.slice(bestMatch.idx + bestMatch.base.length);
}

function buildPluralCandidates(word, article) {
  const lowerWord = word.toLowerCase();
  const umlauted = addUmlaut(word);
  const hasUmlautVariant = umlauted !== word;
  const endsWithStableEnding = /(er|el|en)$/i.test(lowerWord);
  const hasLatinEnding = /(ent|ant|ist|or|eur|ion|ium|ismus|ment)$/i.test(lowerWord);
  const candidates = new Map();

  const pushCandidate = (form, family, score) => {
    if (!form && form !== "—") return;
    if (form !== "—" && form === word && family !== "same" && family !== "umlaut") return;
    const existing = candidates.get(form);
    if (!existing || existing.score < score) {
      candidates.set(form, { form, family, score });
    }
  };

  pushCandidate(word, "same", 0.18 + (endsWithStableEnding ? 0.65 : 0));
  if (!lowerWord.endsWith("e")) pushCandidate(word + "e", "e", 0.18 + (article === "der" ? 0.85 : article === "das" ? 0.65 : 0.22));
  pushCandidate(word + "en", "en", 0.18 + (article === "die" ? 0.95 : 0.38));
  if (!lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(word + "er", "er", 0.12 + (article === "das" ? 0.8 : article === "der" ? 0.35 : 0));
  pushCandidate(word + "s", "s", 0.08 + ((/[aiouy]$/i.test(word) || isLikelyLoanword(lowerWord)) ? 0.75 : 0.1));
  pushCandidate("—", "none", article === "die" ? 0.03 : 0.05);

  if (lowerWord.endsWith("e")) pushCandidate(word + "n", "n", 1.3 + (article === "die" ? 0.2 : 0.05));
  if (lowerWord.endsWith("in")) pushCandidate(word + "nen", "nen", 1.7);

  if (hasUmlautVariant && !hasLatinEnding) {
    pushCandidate(umlauted, "umlaut", 0.12 + (endsWithStableEnding ? 0.6 : 0.2));
    if (!lowerWord.endsWith("e")) pushCandidate(umlauted + "e", "e_umlaut", 0.15 + (article === "der" ? 1.0 : article === "die" ? 0.45 : 0.18));
    if (!lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(umlauted + "er", "er_umlaut", 0.12 + (article === "das" ? 1.05 : article === "der" ? 0.45 : 0));
  }

  if (/(chen|lein)$/i.test(lowerWord)) pushCandidate(word, "same", 1.6);
  if (endsWithStableEnding) {
    pushCandidate(word, "same", 1.05);
    if (hasUmlautVariant) pushCandidate(umlauted, "umlaut", 0.95);
  }

  if (article === "die" && !lowerWord.endsWith("e") && !lowerWord.endsWith("in")) pushCandidate(word + "en", "en", 1.2);
  if (article === "der" && word.length <= 7) {
    if (!lowerWord.endsWith("e")) pushCandidate(word + "e", "e", 1.1);
    if (hasUmlautVariant && !hasLatinEnding && !lowerWord.endsWith("e")) pushCandidate(umlauted + "e", "e_umlaut", 1.18);
  }
  if (article === "das" && word.length <= 7) {
    if (!lowerWord.endsWith("e")) pushCandidate(word + "e", "e", 1.02);
    if (!lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(word + "er", "er", 1.08);
    if (hasUmlautVariant && !hasLatinEnding && !lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(umlauted + "er", "er_umlaut", 1.2);
  }

  if (lowerWord.endsWith("um")) {
    pushCandidate(word.slice(0, -2) + "en", "um_en", 1.55);
    pushCandidate(word.slice(0, -2) + "a", "um_a", 1.1);
  }
  if (lowerWord.endsWith("ium")) pushCandidate(word.slice(0, -3) + "ien", "ium_ien", 1.65);
  if (lowerWord.endsWith("us")) pushCandidate(word.slice(0, -2) + "en", "us_en", 1.15);
  if (lowerWord.endsWith("a")) pushCandidate(word.slice(0, -1) + "en", "a_en", 1.05);

  return [...candidates.values()];
}

function familyClosenessBonus(candidateFamily, correctFamily) {
  if (!correctFamily) return 0;
  const priorities = PLURAL_FAMILY_PRIORITY[correctFamily] || [];
  const idx = priorities.indexOf(candidateFamily);
  return idx === -1 ? 0 : Math.max(0.16, 0.72 - idx * 0.14);
}

function getPluralOptions(word, article, correctPlural) {
  const candidates = buildPluralCandidates(word, article);
  if (!candidates.some(candidate => candidate.form === correctPlural)) {
    candidates.push({ form: correctPlural, family: null, score: 1.5 });
  }

  const correctEntry = candidates.find(candidate => candidate.form === correctPlural) || { family: null };
  const correctLength = correctPlural === "—" ? word.length : correctPlural.length;
  const wrongOptions = candidates
    .filter(candidate => candidate.form !== correctPlural)
    .map(candidate => ({
      ...candidate,
      totalScore:
        candidate.score +
        familyClosenessBonus(candidate.family, correctEntry.family) -
        Math.abs((candidate.form === "—" ? word.length : candidate.form.length) - correctLength) * 0.04,
    }))
    .sort((a, b) => b.totalScore - a.totalScore || a.form.localeCompare(b.form, "de"))
    .slice(0, 2)
    .map(candidate => candidate.form);

  const fallbackPool = [word + "e", word + "en", word + "er", word + "s", word, "—"].filter(form => form !== correctPlural);
  fallbackPool.forEach(form => {
    if (wrongOptions.length < 2 && !wrongOptions.includes(form)) wrongOptions.push(form);
  });

  return shuffleArray([correctPlural, ...wrongOptions.slice(0, 2)]);
}

function getMeaningLabel(english) {
  return (english || "").split("/").join(" / ");
}

function shuffleMatchingMeanings(batch, wordType) {
  if (wordType === "adjectives" || wordType === "verbs") {
    return shuffleArray(batch.map(([word, english]) => ({ id: word, label: getMeaningLabel(english) })));
  }
  if (wordType === "mixed") {
    return shuffleArray(batch.map(entry => {
      const isSimple = entry.length <= 3;
      return { id: isSimple ? entry[0] : getNounEntryId(entry), label: getMeaningLabel(isSimple ? entry[1] : entry[3]) };
    }));
  }
  return shuffleArray(batch.map(noun => ({ id: getNounEntryId(noun), label: getMeaningLabel(noun[3]) })));
}

function dedupeMistakesByNoun(mistakes) {
  const latestByNoun = new Map();
  mistakes.forEach(mistake => {
    latestByNoun.set(getMistakeEntryId(mistake), mistake);
  });
  return [...latestByNoun.values()];
}

function GermanNounGame() {

  const [activeDeck, setActiveDeck] = useState(null);
  const [gameMode, setGameMode] = useState("classic"); // classic|reverse|matching|verb_forms|verb_prepositions|timed|survival

  const [playStyle, setPlayStyle] = useState("practice"); // practice|timed|survival
  const [timedSeconds, setTimedSeconds] = useState(10);
  const [lives, setLives] = useState(3);
  const [globalTimer, setGlobalTimer] = useState(60);
  const [sessionBest, setSessionBest] = useState(null);
  const [streakBumped, setStreakBumped] = useState(false);
  const [reverseInput, setReverseInput] = useState("");
  const [verbFormInputs, setVerbFormInputs] = useState({infinitive: "", prateritum: "", perfekt: ""});
  const verbInfRef = useRef(null);
  const verbPratRef = useRef(null);
  const verbPerfRef = useRef(null);
  // Verb Prepositions state
  const [verbPrepInputs, setVerbPrepInputs] = useState({preposition: "", case: ""});
  const [campaignChallenge, setCampaignChallenge] = useState(null); // {stateId, challengeId} when in campaign
  const [sessionKey, setSessionKey] = useState(null); // "gameMode:source:id" for best-score tracking
  const [sessionTotal, setSessionTotal] = useState(0); // total words in queue at session start
  const [lastStartArgs, setLastStartArgs] = useState(null); // remembers last menu selection for Replay / New Game
  const globalTimerRef = useRef(null);
  const pluralOptions = useMemo(() => {
    if (!currentNoun || gameMode === "reverse" || mode === MODES.ARTICLE) return [];
    return getPluralOptions(currentNoun[0], currentNoun[1], currentNoun[2]);
  }, [currentNoun, gameMode, mode]);
  const matchingBatch = useMemo(() => (
    gameMode === "matching" ? queue.slice(currentIndex, currentIndex + MATCHING_BATCH_SIZE) : []
  ), [gameMode, queue, currentIndex]);
  const verbPrepOptions = useMemo(() => {
    if (gameMode !== "verb_prepositions") return [];
    const hasRareOptions = queue.some(entry => RARE_VERB_PREPOSITIONS.includes(entry[3]));
    return hasRareOptions ? ALL_VERB_PREPOSITIONS : COMMON_VERB_PREPOSITIONS;
  }, [gameMode, queue]);
  const [matchingRightItems, setMatchingRightItems] = useState([]);
  const [matchingMatchedIds, setMatchingMatchedIds] = useState([]);
  const [matchingSelectedWord, setMatchingSelectedWord] = useState(null);
  const [matchingSelectedMeaning, setMatchingSelectedMeaning] = useState(null);
  const [matchingMismatch, setMatchingMismatch] = useState(null);
  const matchingMismatchTimerRef = useRef(null);
  const matchingCards = useMemo(() => {
    if (gameMode !== "matching" || matchingRightItems.length !== matchingBatch.length) return [];
    const isEntrySimple = (entry) => matchingWordType === "adjectives" || matchingWordType === "verbs" || (matchingWordType === "mixed" && entry.length <= 3);
    const germanCards = matchingBatch.map(entry => {
      const simple = isEntrySimple(entry);
      return {
        key: `word:${simple ? entry[0] : getNounEntryId(entry)}`,
        id: simple ? entry[0] : getNounEntryId(entry),
        type: "word",
        label: entry[0],
        article: simple ? "" : entry[1],
        plural: simple ? "" : entry[2],
      };
    });
    const englishCards = matchingRightItems.map(item => ({
      key: `meaning:${item.id}`,
      id: item.id,
      type: "meaning",
      label: item.label,
      article: "",
      plural: "",
    }));
    return shuffleArray([...germanCards, ...englishCards]);
  }, [gameMode, matchingBatch, matchingRightItems, matchingWordType]);

  useEffect(() => {
    registerGistStatusSetter(setSyncStatus);
    if (!getPat()) return;
    setSyncStatus("loading");
    loadGistData().then(d => {
      const merged = sanitizePersistedData({ ...DEFAULT_DATA, ...d, dailyStreak: { ...DEFAULT_DATA.dailyStreak, ...(d.dailyStreak||{}) } });
      setUserData(merged); setSyncStatus("synced");
    }).catch(() => setSyncStatus("error"));
  }, []);

  useEffect(() => {
    if (gameMode !== "matching") return;
    if (!matchingBatch.length) return;
    clearTimeout(matchingMismatchTimerRef.current);
    setMatchingRightItems(shuffleMatchingMeanings(matchingBatch, matchingWordType));
    setMatchingMatchedIds([]);
    setMatchingSelectedWord(null);
    setMatchingSelectedMeaning(null);
    setMatchingMismatch(null);
    return () => clearTimeout(matchingMismatchTimerRef.current);
  }, [gameMode, matchingBatch, matchingWordType]);

  const persistData = useCallback(async (newData) => {
    const sanitized = sanitizePersistedData(newData);
    setUserData(sanitized);
    queueGistSave(sanitized);
  }, []);

  const updateNounStats = useCallback((answered) => {
    setUserData(prev => {
      const stats = { ...prev.nounStats };
      const mastered = new Set(prev.masteredNouns || []);
      const modeStats = { ...(prev.modeStats || {}) };
      const modeMastered = { ...(prev.modeMastered || {}) };
      answered.forEach(({ noun, correct, modes }) => {
        // Overall stats (backwards compatible)
        const s = stats[noun] || { attempts: 0, correct: 0, consecutiveCorrect: 0 };
        const cc = correct ? (s.consecutiveCorrect || 0) + 1 : 0;
        stats[noun] = { attempts: s.attempts + 1, correct: s.correct + (correct ? 1 : 0), consecutiveCorrect: cc };
        if (cc >= 5) mastered.add(noun);
        // Per-mode stats
        if (modes) {
          modes.forEach(m => {
            const key = m + ":" + noun;
            const ms = modeStats[key] || { attempts: 0, correct: 0, consecutiveCorrect: 0 };
            const mcc = correct ? (ms.consecutiveCorrect || 0) + 1 : 0;
            modeStats[key] = { attempts: ms.attempts + 1, correct: ms.correct + (correct ? 1 : 0), consecutiveCorrect: mcc };
            if (mcc >= 5) {
              if (!modeMastered[m]) modeMastered[m] = [];
              const mmSet = new Set(modeMastered[m]);
              mmSet.add(noun);
              modeMastered[m] = [...mmSet];
            }
          });
        }
      });
      const newData = { ...prev, nounStats: stats, masteredNouns: [...mastered], modeStats, modeMastered };
      // Note: no gist save here — callers (endSession paths) always follow with
      // their own save that includes these updates plus bestScores. Saving here
      // raced with that follow-up and could clobber new bestScores.
      return newData;
    });
  }, []);

  const saveDeck = useCallback((name, nounNames) => {
    const deck = { id: Date.now().toString(36), name, nouns: nounNames, created: new Date().toISOString() };
    const newData = { ...userData, decks: [...userData.decks, deck] };
    persistData(newData);
    return deck;
  }, [userData, persistData]);

  const deleteDeck = useCallback((deckId) => {
    const newData = { ...userData, decks: userData.decks.filter(d => d.id !== deckId) };
    persistData(newData);
  }, [userData, persistData]);

  const sessionAnswersRef = useRef([]);

  const startGame = useCallback((m, d, t, deckId, gm, wordType, pStyle, tSecs, tMin, isRange) => {
    let nouns;
    const gMode = gm || "classic";
    const wType = wordType || "nouns";
    const ps = pStyle || "practice";
    const ts = tSecs || 10;
    const tierMinVal = tMin || 0;
    setMatchingWordType(wType);
    setPlayStyle(ps);
    setTimedSeconds(ts);
    // Adjective/verb loading for matching and reverse modes
    const loadAdjectives = (tier, mn) => {
      const adjTier = Math.min(tier, ADJECTIVES.length);
      const tierAdjs = getAdjectivesForTier(adjTier, mn);
      const unique = (() => { const seen = new Set(); return tierAdjs.filter(a => { if (seen.has(a[0])) return false; seen.add(a[0]); return true; }); })();
      return shuffleArray(unique.filter(a => a[1]));
    };
    const loadVerbs = (tier, mn) => {
      const verbTier = Math.min(tier, VERBS.length);
      const tierVerbs = getVerbsForTier(verbTier, mn);
      const unique = (() => { const seen = new Set(); return tierVerbs.filter(v => { if (seen.has(v[0])) return false; seen.add(v[0]); return true; }); })();
      return shuffleArray(unique.filter(v => v[1]));
    };
    // Normalize adj/verb to noun-like format [word, article, plural, english, rank]
    const normalizeAdj = (a) => [a[0], "", "", a[1], a[2]];
    const normalizeVerb = (v) => [v[0], "", "", v[1], v[2]];
    const supportsWt = gMode === "matching" || gMode === "reverse";

    // Helper to resolve a word name to its entry (noun, adj, or verb)
    const resolveWordEntry = (name, forMode) => {
      // Try noun first
      const nounEntries = getDrillEntriesByName(name);
      if (nounEntries.length) return nounEntries;
      // Try adjective
      const adj = ADJECTIVES.find(a => a[0] === name);
      if (adj) return forMode === "reverse" ? [normalizeAdj(adj)] : [adj];
      // Try verb
      const verb = VERBS.find(v => v[0] === name);
      if (verb) return forMode === "reverse" ? [normalizeVerb(verb)] : [verb];
      return [];
    };

    if (deckId === "__weakest__") {
      // Weakest words mode - filtered by effective word type
      const effWeakType = supportsWt ? wType : (gMode === "verb_forms" ? "verbs" : "nouns");
      const weakNames = getWeakestNouns(userData.nounStats, 30, effWeakType === "mixed" ? undefined : effWeakType);
      if (gMode === "verb_forms") {
        const weakVerbs = weakNames.flatMap(name => { const v = IRREGULAR_VERBS.find(iv => iv[0] === name); return v ? [v] : []; });
        nouns = shuffleArray(weakVerbs);
      } else if (gMode === "matching") {
        nouns = weakNames.flatMap(name => resolveWordEntry(name, "matching"));
      } else if (gMode === "reverse") {
        nouns = weakNames.flatMap(name => resolveWordEntry(name, "reverse"));
      } else {
        nouns = weakNames.flatMap(name => getDrillEntriesByName(name));
      }
      if (!nouns.length) { alert("Not enough data yet — play some sessions first!"); return; }
      setActiveDeck(null);
    } else if ((gMode === "matching" || gMode === "reverse") && wType === "adjectives") {
      nouns = loadAdjectives(t, tierMinVal);
      if (gMode === "reverse") nouns = nouns.map(normalizeAdj);
      if (!nouns.length) { alert("No adjectives available for this tier"); return; }
      setActiveDeck(null);
    } else if ((gMode === "matching" || gMode === "reverse") && wType === "verbs") {
      nouns = loadVerbs(t, tierMinVal);
      if (gMode === "reverse") nouns = nouns.map(normalizeVerb);
      if (!nouns.length) { alert("No verbs available for this tier"); return; }
      setActiveDeck(null);
    } else if ((gMode === "matching" || gMode === "reverse") && wType === "mixed") {
      const adjItems = loadAdjectives(t, tierMinVal);
      const verbItems = loadVerbs(t, tierMinVal);
      if (gMode === "reverse") {
        const tierNouns = getNounsForTier(t, tierMinVal);
        const uniqueNouns = (() => { const seen = new Set(); return tierNouns.filter(n => { if (seen.has(n[0])) return false; seen.add(n[0]); return true; }); })();
        const nounItems = shuffleArray(uniqueNouns.filter(n => n[3]));
        nouns = shuffleArray([...nounItems, ...adjItems.map(normalizeAdj), ...verbItems.map(normalizeVerb)]);
      } else {
        nouns = shuffleArray([...adjItems, ...verbItems]);
        // For matching mixed, we also need nouns
        const tierNouns = getNounsForTier(t, tierMinVal);
        const uniqueNouns = (() => { const seen = new Set(); return tierNouns.filter(n => { if (seen.has(n[0])) return false; seen.add(n[0]); return true; }); })();
        const nounItems = shuffleArray(uniqueNouns.filter(n => n[3]));
        nouns = shuffleArray([...nounItems, ...nouns]);
      }
      if (!nouns.length) { alert("No words available for this tier"); return; }
      setActiveDeck(null);
    } else if (gMode === "verb_forms") {
      const verbTier = Math.min(t, IRREGULAR_VERBS.length > 0 ? Math.max(...IRREGULAR_VERBS.map(v => v[2])) : t);
      const tierVerbs = getIrregularVerbsForTier(verbTier, tierMinVal);
      const unique = (() => { const seen = new Set(); return tierVerbs.filter(v => { if (seen.has(v[0])) return false; seen.add(v[0]); return true; }); })();
      nouns = shuffleArray(unique.filter(v => v[1]));
      if (!nouns.length) { alert("No irregular verbs available for this tier"); return; }
      setActiveDeck(null);
    } else if (gMode === "verb_prepositions") {
      const tierVP = getVerbPrepositionsForTier(t, tierMinVal);
      const unique = (() => { const seen = new Set(); return tierVP.filter(v => { const k = v[0]+"|"+v[3]; if (seen.has(k)) return false; seen.add(k); return true; }); })();
      nouns = shuffleArray(unique.filter(v => v[1]));
      if (!nouns.length) { alert("No verb+preposition data available for this tier"); return; }
      setActiveDeck(null);
    } else if (deckId) {
      const deck = userData.decks.find(dk => dk.id === deckId) || BUILTIN_DECKS.find(dk => dk.id === deckId);
      if (!deck) return;
      nouns = deck.nouns.flatMap(name => getDeckEntriesByName(name));
      setActiveDeck(deckId);
    } else {
      const tierNouns = getNounsForTier(t, tierMinVal);
      const unique = (() => { const seen = new Set(); return tierNouns.filter(n => { if (seen.has(n[0])) return false; seen.add(n[0]); return true; }); })();
      const expanded = unique.flatMap(noun => getDrillEntriesByName(noun[0]));
      // Use SRS weighting for classic mode
      nouns = gMode === "classic" ? buildSrsQueue(expanded, userData.nounStats, expanded.length) : shuffleArray(expanded);

function DeckBuilderHelp({ word }) {
  const expl = EXPLANATIONS.get(word);

  const labelStyle = {fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,color:UI.muted};

                {entries.length > 1 && <><span style={{color:ARTICLE_COLORS[e[1]],fontWeight:700}}>{e[1]}</span>{" "}<span style={{fontWeight:600}}>{e[0]}</span>{" → "}</>}
                <span style={{color:ARTICLE_COLORS.die,fontWeight:700}}>die</span>{" "}

              </React.Fragment>
            ))}
          </span>
        </div>
      )}
      {rule ? (
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          <span style={{...labelStyle,color:"#fbbf24"}}>Why this article?</span>
          {expl.isException ? (
            <span style={{fontSize:12,fontWeight:700,color:"#dc2626"}}>⚠ Exception to "{rule.name}"</span>
          ) : (
            <span style={{fontSize:12,fontWeight:700,color:UI.text}}>Rule: {rule.name} → <span style={{color:ARTICLE_COLORS[rule.article]}}>{rule.article}</span></span>
          )}
          <span style={bodyStyle}>{rule.description}</span>
          {exceptionsInBank.length > 0 && <ExceptionsList exceptions={exceptionsInBank} currentWord={word} />}
        </div>
      ) : expl?.article ? (
        <div style={{display:"flex",flexDirection:"column",gap:3}}>
          <span style={labelStyle}>Article note</span>
          <span style={bodyStyle}>{expl.article}</span>

        <span style={{fontSize:12,color:UI.faint,fontStyle:"italic"}}>No explanation available for this word.</span>
      )}
    </div>
  );
}

function DeckBuilder({onSave, onCancel}) {
  const [name,setName]=useState("");
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(new Set());
  const [expanded,setExpanded]=useState(new Set());
  const searchRef = useRef(null);
  const searchEntries = useMemo(() => {
    const words = [...new Set([...NOUNS.map(noun => noun[0]), ...DUAL_GENDER_SENSES.keys()])];
    return words
      .map(word => {
        const entries = getDeckEntriesByName(word);
        if (!entries.length) return null;
        const meanings = getMeaningsForNounName(word);
        const articles = getArticlesForNounName(word);
        const rank = Math.min(...entries.map(entry => entry[4] || Number.MAX_SAFE_INTEGER));
        const meaningPreview = meanings
          .slice(0, 2)
          .map(meaning => meaning.split("/")[0].trim())
          .join(" • ");
        const extraCount = meanings.length > 2 ? meanings.length - 2 : 0;
        return { word, articles, meanings, rank, meaningPreview, extraCount };
      })
      .filter(Boolean)
      .sort((a, b) => a.rank - b.rank || a.word.localeCompare(b.word, "de"));
  }, []);

  const results = useMemo(()=>{
    if(!search.trim()) return [];
    const q = search.trim().toLowerCase();
    return searchEntries.filter(entry =>
      entry.word.toLowerCase().includes(q) || entry.meanings.some(meaning => meaning.toLowerCase().includes(q))
    ).slice(0, 50);
  },[search, searchEntries]);

  const toggle = (noun) => {
    setSelected(prev => {
      const s = new Set(prev);
      if (s.has(noun)) s.delete(noun); else s.add(noun);
      return s;
    });
  };

  const toggleExpand = (noun) => {
    setExpanded(prev => {
      const s = new Set(prev);
      if (s.has(noun)) s.delete(noun); else s.add(noun);
      return s;
    });
  };

  const handleSave = () => {
    if (!selected.size) return;
    const deckName = name.trim() || `Custom ${new Date().toLocaleDateString()}`;
    onSave(deckName, [...selected]);
  };

  return (
    <div style={S.container}><div style={S.menuInner}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 style={{fontSize:26,fontWeight:700,color:UI.textStrong,margin:0,fontFamily:FONT_SERIF}}>Create Deck</h2>
        <button onClick={onCancel} style={S.endBtn}>Cancel</button>
      </div>

      <div style={S.menuSection}>
        <label style={S.menuLabel}>Deck Name</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="My custom deck"
          style={{...S.pluralInput,fontSize:14,textAlign:"left",padding:"10px 14px"}}/>
      </div>

      <div style={S.menuSection}>
        <label style={S.menuLabel}>Search nouns ({searchEntries.length.toLocaleString()} available)</label>
        <input ref={searchRef} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Type German or English..."
          style={{...S.pluralInput,fontSize:14,textAlign:"left",padding:"10px 14px"}} autoFocus/>
      </div>

      {results.length>0&&(
        <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:360,overflowY:"auto",paddingRight:4}}>
          {results.map(n=>{
            const inDeck = selected.has(n.word);
            const isExpanded = expanded.has(n.word);
            const borderColor = inDeck?UI.gold:UI.line;
            return (
              <div key={n.word} style={{
                background:inDeck?UI.goldSoft:UI.panel,
                border:`1px solid ${borderColor}`,
                borderRadius:12,overflow:"hidden",transition:"all 0.15s"
              }}>
                <div style={{display:"flex",alignItems:"stretch"}}>
                  <button onClick={()=>toggle(n.word)} style={{
                    flex:1,display:"flex",justifyContent:"space-between",alignItems:"center",
                    padding:"8px 12px",background:"transparent",border:"none",cursor:"pointer",textAlign:"left",font:"inherit"
                  }}>
                    <div style={{display:"flex",alignItems:"baseline",gap:6,flexWrap:"wrap"}}>
                      {n.articles.map(article=>(
                        <span key={article} style={{color:ARTICLE_COLORS[article],fontWeight:800,fontSize:13}}>{article}</span>
                      ))}
                      <span style={{fontWeight:700,fontSize:15,color:UI.textStrong}}>{n.word}</span>
                      {n.meaningPreview&&<span style={{fontSize:11,color:UI.faint}}>{n.meaningPreview}{n.extraCount>0?` +${n.extraCount}`:""}</span>}
                    </div>
                    <span style={{fontSize:14,color:inDeck?UI.success:UI.faint}}>{inDeck?"✓":"+"}</span>
                  </button>
                  <button onClick={()=>toggleExpand(n.word)} title={isExpanded?"Hide explanation":"Show explanation"} style={{
                    padding:"0 14px",background:"transparent",border:"none",borderLeft:`1px solid ${borderColor}`,
                    cursor:"pointer",color:UI.muted,fontSize:11,fontWeight:700
                  }}>
                    {isExpanded?"▲":"▼"}
                  </button>
                </div>
                {isExpanded && <DeckBuilderHelp word={n.word} />}
              </div>
            );
          })}
        </div>
      )}

      {!search.trim()&&!selected.size&&(
        <p style={{fontSize:12,color:UI.muted,textAlign:"center"}}>Search for nouns above to add them to your deck</p>
      )}

      {selected.size>0&&(
        <div style={S.menuSection}>
          <label style={S.menuLabel}>Selected ({selected.size} noun{selected.size>1?"s":""})</label>
          <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
            {[...selected].map(noun=>{
              const articles = getArticlesForNounName(noun);
              return (
                <button key={noun} onClick={()=>toggle(noun)} style={{
                  display:"flex",alignItems:"center",gap:4,padding:"4px 10px",
                  background:UI.goldSoft,border:`1px solid ${UI.gold}`,
                  borderRadius:999,cursor:"pointer",fontSize:12,color:UI.text
                }}>
                  {articles.map(article=><span key={article} style={{color:ARTICLE_COLORS[article],fontWeight:700}}>{article}</span>)}
                  <span style={{fontWeight:600}}>{noun}</span>
                  <span style={{color:UI.danger,marginLeft:2}}>×</span>
                </button>
              );
            })}
          </div>
        </div>
      )}

      <button onClick={handleSave} disabled={!selected.size}
        style={{...S.startBtn,opacity:selected.size?1:0.4,background:selected.size?UI.gold:"rgba(209,213,219,0.7)",borderColor:selected.size?UI.gold:UI.line}}>
        Save Deck ({selected.size} noun{selected.size!==1?"s":""})
      </button>
    </div></div>
  );
}


// ═══════════════════════════════════════════════════════════════
// PROGRESS DASHBOARD
// ═══════════════════════════════════════════════════════════════
function MenuScreen({onStart, userData, syncStatus, onDeleteDeck, onSaveDeck, onSyncRefresh, onOpenCampaign, onOpenDashboard, initialSelection}) {
  const init = initialSelection || {};
  const initSource = init.deckId === "__weakest__" ? "weakest" : init.deckId ? "deck" : (init.gm !== undefined ? "tier" : "tier");
  const [mode,setMode]=useState(init.m ?? MODES.ARTICLE);
  const [tier,setTier]=useState(init.t ?? 500);
  const [tierMin,setTierMin]=useState(init.tMin ?? 0);
  const [tierMode,setTierMode]=useState(init.isRange ? "range" : "cumulative");
  const [source,setSource]=useState(initSource);
  const [selectedDeck,setSelectedDeck]=useState(init.deckId && init.deckId !== "__weakest__" ? init.deckId : null);
  const [showSettings,setShowSettings]=useState(false);
  const [showDeckBuilder,setShowDeckBuilder]=useState(false);
  const [selectedGameMode,setSelectedGameMode]=useState(init.gm ?? "classic");
  const [matchWordType,setMatchWordType]=useState(init.wordType ?? "nouns");
  const [playStyle,setPlayStyle]=useState(init.pStyle ?? "practice");
  const [timedSeconds,setTimedSeconds]=useState(init.tSecs ?? 10);
  const [patInput,setPatInput]=useState(getPat());
  const [patSaved,setPatSaved]=useState(false);

  const handleSavePat = () => {
    setPat(patInput.trim());
    setPatSaved(true);
    setTimeout(() => setPatSaved(false), 2000);
    if (patInput.trim()) onSyncRefresh();
  };

  const supportsWordType = selectedGameMode === "matching" || selectedGameMode === "reverse";
  const answerTypeAllowed = selectedGameMode !== "reverse" && selectedGameMode !== "matching" && selectedGameMode !== "verb_forms" && selectedGameMode !== "verb_prepositions";
  const effectiveWordType = supportsWordType ? matchWordType : (selectedGameMode === "verb_forms" ? "verbs" : selectedGameMode === "verb_prepositions" ? "verb_prep" : "nouns");
  const deckAllowed = !((supportsWordType && matchWordType !== "nouns") || selectedGameMode === "verb_forms" || selectedGameMode === "verb_prepositions");
  const weakestAllowed = selectedGameMode !== "verb_prepositions";
  const allDecks = useMemo(() => [...BUILTIN_DECKS, ...(userData.decks || [])], [userData.decks]);
  const selectedDeckData = allDecks.find(dk => dk.id === selectedDeck) || null;
  const sourceOptions = useMemo(() => {
    const options = [{ id: "tier", name: "Vocab Level", desc: "Pick a tier or range" }];
    if (deckAllowed) options.push({ id: "deck", name: "Saved Deck", desc: `${allDecks.length} available` });
    if (weakestAllowed) options.push({ id: "weakest", name: "Weakest", desc: "Use your worst words" });
    return options;
  }, [deckAllowed, weakestAllowed, allDecks.length]);

  useEffect(() => {
    if (!supportsWordType && matchWordType !== "nouns") setMatchWordType("nouns");
  }, [supportsWordType, matchWordType]);

  useEffect(() => {
    if (!answerTypeAllowed && mode !== MODES.ARTICLE) setMode(MODES.ARTICLE);
  }, [answerTypeAllowed, mode]);

  useEffect(() => {
    const validSources = new Set(sourceOptions.map(opt => opt.id));
    if (!validSources.has(source)) {
      setSource("tier");
      setSelectedDeck(null);
    }
  }, [source, sourceOptions]);

  useEffect(() => {
    if (selectedDeck && !allDecks.some(dk => dk.id === selectedDeck)) setSelectedDeck(null);
  }, [selectedDeck, allDecks]);

  const handleStart = () => {
    const wType = supportsWordType ? matchWordType : "nouns";
    const diff = playStyle === "timed" ? "normal" : "easy";
    const isRange = source === "tier" && tierMode === "range";
    const effectiveTierMin = isRange ? tierMin : 0;
    if (source === "weakest") onStart(mode, diff, tier, "__weakest__", selectedGameMode, wType, playStyle, timedSeconds, 0, false);
    else if (source === "deck" && selectedDeck) onStart(mode, diff, tier, selectedDeck, selectedGameMode, wType, playStyle, timedSeconds, 0, false);
    else onStart(mode, diff, tier, null, selectedGameMode, wType, playStyle, timedSeconds, effectiveTierMin, isRange);
  };

  const handleGameModeSelect = (gameModeId) => {
    setSelectedGameMode(gameModeId);
  };

  const syncDot = {idle:UI.faint,loading:UI.gold,saving:UI.gold,synced:UI.success,error:"#EF4444"}[syncStatus];
  const bestScores = userData.bestScores || {};
  const nounStats = userData.nounStats || {};
  const modeStats = userData.modeStats || {};
  const masteredSet = new Set(userData.masteredNouns || []);
  const gameModeMeta = GAME_MODES.find(gm => gm.id === selectedGameMode) || GAME_MODES[0];
  const bestScoreKeyPrefix = selectedGameMode === "classic"
    ? `${selectedGameMode}:${mode}`
    : (selectedGameMode === "reverse" || selectedGameMode === "matching")
      ? `${selectedGameMode}:${matchWordType}`
      : selectedGameMode;
  const contentReady = source !== "deck" || !!selectedDeck;
  const canStart = contentReady;

  const wordTypeLabel = (wType) => {
    if (wType === "nouns") return "Nouns";
    if (wType === "adjectives") return "Adjectives";
    if (wType === "verbs") return selectedGameMode === "verb_forms" ? "Irregular Verbs" : "Verbs";
    if (wType === "verb_prep") return "Verb + Prep";
    return "Mixed";
  };

  const countForTier = (tv) => {
    if (effectiveWordType === "nouns") return getNounsForTier(tv).length;
    if (effectiveWordType === "adjectives") return getAdjectivesForTier(tv).length;
    if (effectiveWordType === "verb_prep") return getVerbPrepositionsForTier(tv).length;
    if (effectiveWordType === "verbs") return (selectedGameMode === "verb_forms" ? getIrregularVerbsForTier(tv) : getVerbsForTier(tv)).length;
    return getNounsForTier(tv).length + getAdjectivesForTier(tv).length + getVerbsForTier(tv).length;
  };

  const countForRange = (min, max) => {
    if (effectiveWordType === "nouns") return getNounsForTier(max, min).length;
    if (effectiveWordType === "adjectives") return getAdjectivesForTier(max, min).length;
    if (effectiveWordType === "verb_prep") return getVerbPrepositionsForTier(max, min).length;
    if (effectiveWordType === "verbs") return (selectedGameMode === "verb_forms" ? getIrregularVerbsForTier(max, min) : getVerbsForTier(max, min)).length;
    return getNounsForTier(max, min).length + getAdjectivesForTier(max, min).length + getVerbsForTier(max, min).length;
  };

  const activeTierOptions = useMemo(() => {
    if (effectiveWordType !== "verb_prep") return TIER_OPTIONS;
    const options = [];
    const total = VERB_PREPOSITIONS.length;
    for (let value = VERB_PREP_BUCKET_SIZE; value < total; value += VERB_PREP_BUCKET_SIZE) {
      options.push({ value, label: `Top ${value}`, desc: `${value} verb+prep combos` });
    }
    if (total > 0) options.push({ value: total, label: `All ${total}`, desc: "All verb+prep combos" });
    return options;
  }, [effectiveWordType]);

  const activeRangeSize = effectiveWordType === "verb_prep" ? VERB_PREP_BUCKET_SIZE : 100;

  const activeRanges = useMemo(() => {
    const maxAvailable = countForTier(99999);
    const ranges = [];
    for (let min = 0; min < maxAvailable; min += activeRangeSize) {
      const max = Math.min(min + activeRangeSize, maxAvailable);
      const count = countForRange(min, max);
      if (count > 0) ranges.push({ min, max, count });
    }
    return ranges;
  }, [activeRangeSize, effectiveWordType, selectedGameMode]);

  useEffect(() => {
    if (effectiveWordType !== "verb_prep") return;
    if (tierMode === "cumulative") {
      const validTiers = activeTierOptions.map(opt => opt.value);
      if (!validTiers.length) return;
      if (!validTiers.includes(tier) || tierMin !== 0) {
        setTier(validTiers[0]);
        setTierMin(0);
      }
      return;
    }
    if (!activeRanges.length) return;
    const hasMatch = activeRanges.some(r => r.min === tierMin && r.max === tier);
    if (!hasMatch) {
      setTierMin(activeRanges[0].min);
      setTier(activeRanges[0].max);
    }
  }, [effectiveWordType, tierMode, tier, tierMin, activeTierOptions, activeRanges]);

  const wordsInRange = (min, max) => {
    const words = [];
    if (effectiveWordType === "nouns" || effectiveWordType === "mixed") getNounsForTier(max, min).forEach(n => words.push(n[0]));
    if (effectiveWordType === "adjectives" || effectiveWordType === "mixed") getAdjectivesForTier(max, min).forEach(a => words.push(a[0]));
    if (effectiveWordType === "verbs" || effectiveWordType === "mixed") {
      const verbs = selectedGameMode === "verb_forms" ? getIrregularVerbsForTier(max, min) : getVerbsForTier(max, min);
      verbs.forEach(v => words.push(v[0]));
    }
    if (effectiveWordType === "verb_prep") getVerbPrepositionsForTier(max, min).forEach(v => words.push(v[0]+"|"+v[3]));
    return words;
  };

  const masteryForRange = (min, max) => {
    const words = wordsInRange(min, max);
    if (!words.length) return { mastered: 0, total: 0, pct: 0 };
    let mastered = 0;
    words.forEach(w => {
      if (masteredSet.has(w)) { mastered++; return; }
      const s = nounStats[w];
      if (s && (s.consecutiveCorrect || 0) >= 5) mastered++;
    });
    return { mastered, total: words.length, pct: Math.round((mastered / words.length) * 100) };
  };

  const modeMasteryInRange = (modeId, min, max) => {
    if (effectiveWordType !== "nouns") return null;
    const words = getNounsForTier(max, min || undefined);
    if (!words.length) return null;
    let mastered = 0;
    words.forEach(n => {
      const s = modeStats[modeId+":"+n[0]];
      if (s && (s.consecutiveCorrect||0) >= 5) mastered++;
    });
    return { pct: Math.round((mastered / words.length) * 100) };
  };

  const describeTierSelection = () => {
    const count = tierMode === "range" ? countForRange(tierMin, tier) : countForTier(tier);
    const label = wordTypeLabel(effectiveWordType).toLowerCase();
    if (!count) return "Choose vocabulary";
    if (tierMode === "range") return `${tierMin + 1}-${tier} ${label} (${count.toLocaleString()})`;
    const maxAvailable = countForTier(99999);
    if (count >= maxAvailable) return `All ${label} (${count.toLocaleString()})`;
    return `Top ${count.toLocaleString()} ${label}`;
  };

  const renderActivityHint = () => {
    if (selectedGameMode === "verb_forms") return `Type the Infinitiv, Prateritum (ich), and Partizip Perfekt for each irregular verb. ${IRREGULAR_VERBS.length.toLocaleString()} irregular verbs available.`;
    if (selectedGameMode === "verb_prepositions") return `Select the fixed preposition and the governed case for each verb. ${VERB_PREPOSITIONS.length.toLocaleString()} combos available.`;
    return "";
  };

  const ProgressRing = ({pct, size, stroke, color, bgColor}) => {
    const r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (pct / 100) * circ;
    return (
      <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={bgColor||"rgba(255,255,255,0.06)"} strokeWidth={stroke}/>
        {pct > 0 && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color||"#10B981"} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s ease"}}/>}
      </svg>
    );
  };
  const medalRingColor = (pct) => {
    if (pct >= 100) return "#F59E0B";
    if (pct >= 90)  return "#CBD5E1";
    if (pct >= 80)  return "#D97706";
    if (pct > 0)    return "#EF4444";
    return "rgba(255,255,255,0.12)";
  };
  const medalBorderColor = (pct) => {
    if (pct >= 100) return "rgba(245,158,11,0.65)";
    if (pct >= 90)  return "rgba(203,213,225,0.5)";
    if (pct >= 80)  return "rgba(217,119,6,0.5)";
    if (pct > 0)    return "rgba(239,68,68,0.35)";
    return UI.lineStrong;
  };
  const medalFill = (pct) => {
    if (pct >= 100) return "linear-gradient(to top, rgba(245,158,11,0.32), rgba(245,158,11,0.06))";
    if (pct >= 90)  return "linear-gradient(to top, rgba(203,213,225,0.28), rgba(203,213,225,0.05))";
    if (pct >= 80)  return "linear-gradient(to top, rgba(217,119,6,0.3), rgba(217,119,6,0.05))";
    return "linear-gradient(to top, rgba(239,68,68,0.3), rgba(239,68,68,0.08))";
  };
  const medalCardClass = (pct) => pct >= 100 ? "perfect-card" : "";

  const renderTierSelector = () => {
    const maxAvailable = countForTier(99999);
    const seenCounts = new Set();
    const filteredTiers = activeTierOptions.filter(t => {
      const c = countForTier(t.value);
      if (c <= 0) return false;
      if (seenCounts.has(c)) return false;
      seenCounts.add(c);
      return true;
    });
    const totalMastery = masteryForRange(0, 99999);
    const rangesCompleted = activeRanges.filter(r => masteryForRange(r.min, r.max).pct >= 100).length;
    const rangesStarted = activeRanges.filter(r => {
      const mastery = masteryForRange(r.min, r.max);
      return mastery.pct > 0 && mastery.pct < 100;
    }).length;

    const rangesWithMedal = activeRanges.filter(r => {
      const key = `${bestScoreKeyPrefix}:range:${r.min+1}-${r.max}`;
      return (bestScores[key]?.pct || 0) >= 80;
    }).length;
    const rangesPerfect = activeRanges.filter(r => {
      const key = `${bestScoreKeyPrefix}:range:${r.min+1}-${r.max}`;
      return (bestScores[key]?.pct || 0) >= 100;
    }).length;

    return (
      <div style={S.menuSection}>
        <div style={{display:"flex",gap:6}}>
          <button onClick={()=>{setTierMode("cumulative");setTierMin(0);}} style={{...S.diffBtn,flex:1,borderColor:tierMode==="cumulative"?UI.gold:UI.line,backgroundColor:tierMode==="cumulative"?UI.goldSoft:UI.panel}}>
            <span style={{fontSize:13,fontWeight:700,color:UI.textStrong}}>Cumulative</span>
          </button>
          <button onClick={()=>setTierMode("range")} style={{...S.diffBtn,flex:1,borderColor:tierMode==="range"?UI.gold:UI.line,backgroundColor:tierMode==="range"?UI.goldSoft:UI.panel}}>
            <span style={{fontSize:13,fontWeight:700,color:UI.textStrong}}>Ranges</span>
          </button>
        </div>
        {tierMode==="cumulative"?(
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            {filteredTiers.map(t=>{
              const count = countForTier(t.value);
              const capped = effectiveWordType !== "mixed" && count < t.value;
              const label = capped ? `Top ${count.toLocaleString()}` : t.label;
              const tierKey = `${bestScoreKeyPrefix}:tier:${t.value}`;
              const tierBest = bestScores[tierKey];
              const tierPct = tierBest ? tierBest.pct : 0;
              const isSelected = tier===t.value && tierMin===0;
              const ringColor = medalRingColor(tierPct);
              const cardClass = medalCardClass(tierPct);
              const isPerfect = tierPct >= 100;
              return (
                <button key={t.value} className={cardClass} onClick={()=>{setTier(t.value);setTierMin(0);}} style={{...S.tierBtn,borderColor:isSelected?UI.gold:medalBorderColor(tierPct),backgroundColor:isSelected?UI.goldSoft:tierPct>=80?UI.goldSoft:UI.panel,position:"relative",overflow:"hidden",padding:"12px 8px"}}>
                  {tierPct>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${tierPct}%`,background:medalFill(tierPct),borderRadius:"0 0 8px 8px",transition:"height 0.3s ease",pointerEvents:"none"}}/>}
                  <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:4}}>
                    <ProgressRing pct={tierPct} size={38} stroke={3} color={ringColor}/>
                    <span className={isPerfect?"medal-gold":""} style={{position:"absolute",fontSize:isPerfect?14:10,fontWeight:900,color:ringColor}}>{isPerfect?"\u2605":tierPct>0?tierPct+"%":""}</span>
                  </div>
                  <span style={{fontSize:13,fontWeight:700,color:isPerfect?UI.gold:UI.textStrong,position:"relative"}}>{label}</span>
                </button>
              );
            })}
          </div>
        ):(
          <>
            {(rangesWithMedal>0||rangesPerfect>0)&&(
              <div style={{display:"flex",gap:10,justifyContent:"center",padding:"6px 0"}}>
                {rangesPerfect>0&&<span style={{fontSize:11,color:UI.gold,fontWeight:700}}>{rangesPerfect} Perfect</span>}
                {rangesWithMedal-rangesPerfect>0&&<span style={{fontSize:11,color:UI.text,fontWeight:700}}>{rangesWithMedal-rangesPerfect} medalled</span>}
                <span style={{fontSize:11,color:UI.muted}}>{activeRanges.length} total</span>
              </div>
            )}
            <div className="range-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,maxHeight:320,overflowY:"auto",paddingRight:4}}>
              {activeRanges.map(r=>{
                const isSelected = tierMin===r.min && tier===r.max && tierMode==="range";
                const rangeKey = `${bestScoreKeyPrefix}:range:${r.min+1}-${r.max}`;
                const rangeBest = bestScores[rangeKey];
                const rangePct = rangeBest ? rangeBest.pct : 0;
                const ringColor = medalRingColor(rangePct);
                const cardClass = medalCardClass(rangePct);
                const isPerfect = rangePct >= 100;
                return (
                  <button key={r.min} className={cardClass} onClick={()=>{setTier(r.max);setTierMin(r.min);}} style={{...S.tierBtn,borderColor:isSelected?UI.gold:medalBorderColor(rangePct),backgroundColor:isSelected?UI.goldSoft:rangePct>=80?UI.goldSoft:UI.panel,position:"relative",overflow:"hidden",padding:"10px 6px",gap:2}}>
                    {rangePct>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:`${rangePct}%`,background:medalFill(rangePct),borderRadius:"0 0 8px 8px",transition:"height 0.3s ease",pointerEvents:"none"}}/>}
                    <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center",marginBottom:2}}>
                      <ProgressRing pct={rangePct} size={34} stroke={2.5} color={ringColor}/>
                      <span className={isPerfect?"medal-gold":""} style={{position:"absolute",fontSize:isPerfect?12:9,fontWeight:900,color:ringColor}}>{isPerfect?"\u2605":rangePct>0?rangePct+"%":""}</span>
                    </div>
                    <span style={{fontSize:12,fontWeight:700,color:isPerfect?UI.gold:UI.textStrong,position:"relative"}}>{r.min+1}-{r.max}</span>
                  </button>
                );
              })}
            </div>
          </>
        )}
      </div>
    );
  };
  const renderDeckSelector = () => (
    <div style={S.menuSection}>
      {selectedDeckData && (
        <div style={S.inlineSummaryCard}>

function ProgressDashboard({ userData, onBack }) {
  const modeStats = userData.modeStats || {};
  const modeMastered = userData.modeMastered || {};
  const nounStats = userData.nounStats || {};
  const masteredSet = new Set(userData.masteredNouns || []);

  // Tracked answer modes with labels and colors
  const TRACKED_MODES = [
    { id: "article", label: "Articles", color: UI.teal, icon: "der/die/das" },
    { id: "plural", label: "Plurals", color: UI.accent, icon: "die ..." },
    { id: "matching", label: "Matching", color: UI.gold, icon: "DE \u2194 EN" },
    { id: "reverse", label: "Translation", color: UI.accentDeep, icon: "EN \u2192 DE" },
    { id: "verb_forms", label: "Verb Forms", color: UI.success, icon: "Pr\u00e4t/Perf" },
    { id: "verb_prep", label: "Verb+Prep", color: UI.teal, icon: "auf+Akk" },
  ];

  // Compute overall mode mastery (all nouns)
  const modeMasteryOverall = (modeId) => {
    const words = getNounsForTier(99999);
    if (!words.length) return { mastered: 0, total: 0, pct: 0 };
    let m = 0;
    words.forEach(n => {
      const key = modeId + ":" + n[0];
      const s = modeStats[key];
      if (s && (s.consecutiveCorrect || 0) >= 5) m++;
    });
    return { mastered: m, total: words.length, pct: words.length > 0 ? Math.round((m / words.length) * 100) : 0 };
  };

  // Overall mastery (any mode)
  const overallMastery = (() => {
    const total = NOUNS.length;
    const m = masteredSet.size;
    return { mastered: m, total, pct: total > 0 ? Math.round((m / total) * 100) : 0 };
  })();

  // Progress ring
  const Ring = ({ pct, size, stroke, color }) => {
    const r = (size - stroke) / 2;
    const circ = 2 * Math.PI * r;
    const offset = circ - (pct / 100) * circ;
    return (
      <svg width={size} height={size} style={{transform:"rotate(-90deg)",flexShrink:0}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={UI.line} strokeWidth={stroke}/>
        {pct > 0 && <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={offset} strokeLinecap="round" style={{transition:"stroke-dashoffset 0.5s ease"}}/>}
      </svg>
    );
  };

  // Bar helper
  const Bar = ({ pct, color, height }) => (
    <div style={{position:"relative",height:height||6,background:UI.line,borderRadius:3,overflow:"hidden",width:"100%"}}>
      <div style={{height:"100%",width:`${pct}%`,background:color,borderRadius:3,transition:"width 0.5s"}}/>
    </div>
  );

  return (
    <div style={S.container}><div style={S.menuInner}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <h2 style={{fontSize:24,fontWeight:700,color:UI.textStrong,margin:0,fontFamily:FONT_SERIF}}>Progress Dashboard</h2>
        <button onClick={onBack} style={S.endBtn}>Back</button>
      </div>

      {/* ── Overall ── */}
      <div style={{...S.settingsPanel,textAlign:"center"}}>
        <div style={{fontSize:11,color:UI.faint,textTransform:"uppercase",letterSpacing:2,fontWeight:600,marginBottom:6}}>Overall Noun Mastery</div>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:16}}>
          <div style={{position:"relative",display:"flex",alignItems:"center",justifyContent:"center"}}>
            <Ring pct={overallMastery.pct} size={72} stroke={5} color={overallMastery.pct>=100?UI.gold:overallMastery.pct>=50?UI.success:UI.accent}/>
            <span style={{position:"absolute",fontSize:18,fontWeight:900,color:UI.textStrong}}>{overallMastery.pct}%</span>
          </div>
          <div style={{textAlign:"left"}}>
            <div style={{fontSize:24,fontWeight:900,color:UI.textStrong}}>{overallMastery.mastered.toLocaleString()}</div>
            <div style={{fontSize:12,color:UI.muted}}>of {overallMastery.total.toLocaleString()} nouns mastered</div>
          </div>
        </div>
      </div>

      {/* ── Per-mode overview ── */}
      <div style={S.menuSection}>
        <label style={S.menuLabel}>Mastery by Mode</label>
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {TRACKED_MODES.map(tm => {
            const mm = modeMasteryOverall(tm.id);
            const mmList = modeMastered[tm.id] || [];
            return (
              <div key={tm.id} style={{background:UI.panel,border:`1px solid ${UI.line}`,borderRadius:14,padding:"12px 14px"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:4,background:tm.color,flexShrink:0}}/>
                    <span style={{fontSize:14,fontWeight:700,color:UI.textStrong}}>{tm.label}</span>
                    <span style={{fontSize:10,color:UI.muted}}>{tm.icon}</span>
                  </div>
                  <span style={{fontSize:12,fontWeight:700,color:mm.pct>=100?UI.gold:mm.pct>0?tm.color:UI.faint}}>{mm.mastered} / {mm.total}</span>
                </div>
                <Bar pct={mm.pct} color={mm.pct>=100?UI.gold:tm.color} height={5}/>
                {mm.pct > 0 && <div style={{fontSize:10,color:UI.muted,marginTop:3}}>{mm.pct}% mastered (5+ consecutive correct)</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* ── Session stats ── */}
      <div style={{...S.settingsPanel}}>
        <div style={{fontSize:11,color:UI.faint,textTransform:"uppercase",letterSpacing:2,fontWeight:600,marginBottom:4}}>Stats</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:UI.textStrong}}>{userData.totalSessions||0}</div><div style={{fontSize:9,color:UI.faint,textTransform:"uppercase"}}>Sessions</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:UI.textStrong}}>{Object.keys(nounStats).length}</div><div style={{fontSize:9,color:UI.faint,textTransform:"uppercase"}}>Words Attempted</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:20,fontWeight:800,color:UI.textStrong}}>{(userData.dailyStreak||{}).best||0}</div><div style={{fontSize:9,color:UI.faint,textTransform:"uppercase"}}>Best Streak (days)</div></div>
        </div>
      </div>
    </div></div>
  );
}

const EXCEPTIONS_COLLAPSED_LIMIT = 12;
function ExceptionsList({ exceptions, currentWord }) {
  const [expanded, setExpanded] = useState(false);
  const ordered = useMemo(() => {
    if (!currentWord) return exceptions;
    const hit = exceptions.find(e => e.word === currentWord);
    if (!hit) return exceptions;
    return [hit, ...exceptions.filter(e => e.word !== currentWord)];
  }, [exceptions, currentWord]);
  const visible = expanded ? ordered : ordered.slice(0, EXCEPTIONS_COLLAPSED_LIMIT);
  const remaining = ordered.length - visible.length;
  return (
    <div style={{display:"flex",flexDirection:"column",gap:2,marginTop:4}}>
      <span style={{fontSize:10,fontWeight:800,textTransform:"uppercase",letterSpacing:1.5,color:"#fbbf24"}}>Exceptions ({ordered.length})</span>
      <span style={{fontSize:12,color:"#cbd5e1",lineHeight:1.6}}>
        {visible.map((exc, idx) => (
          <React.Fragment key={exc.word}>
            {idx > 0 && ", "}
            <span style={{color:ARTICLE_COLORS[exc.article],fontWeight:700}}>{exc.article}</span>
            {" "}
            <span style={{fontWeight: exc.word === currentWord ? 800 : 600, textDecoration: exc.word === currentWord ? "underline" : "none"}}>{exc.word}</span>
          </React.Fragment>
        ))}
        {remaining > 0 && (
          <>
            {" … "}
            <button onClick={e => { e.stopPropagation(); setExpanded(true); }} style={{background:"none",border:"none",color:"#fbbf24",fontSize:12,cursor:"pointer",padding:0,fontFamily:"inherit",textDecoration:"underline"}}>+{remaining} more</button>
          </>
        )}
        {expanded && ordered.length > EXCEPTIONS_COLLAPSED_LIMIT && (
          <>
            {" "}
            <button onClick={e => { e.stopPropagation(); setExpanded(false); }} style={{background:"none",border:"none",color:UI.muted,fontSize:11,cursor:"pointer",padding:0,fontFamily:"inherit",textDecoration:"underline"}}>collapse</button>
          </>
        )}
      </span>
    </div>
  );
}
