// WORD DATA - loaded from JSON so the app can stay a static GitHub Pages site
const WORDS_DATA_PATH = "./data/nouns.json";
const ADJECTIVES_DATA_PATH = "./data/adjectives.json";
const DUAL_GENDER_PATH = "./data/dual-gender-nouns.json";
let NOUNS = [];
let NOUN_INDEX = new Map();
let EXPLANATIONS = new Map();
let WORDS_META = {};
let BUILTIN_DECKS = [];
let DUAL_GENDER_WORDS = new Set();
let DUAL_GENDER_SENSES = new Map();
let DUAL_GENDER_INDEX = new Map();
let ADJECTIVES = [];  // [word, english, rank]

function makeDualGenderSenseId(word, article, plural) {
  return `__dual__|${word}|${article}|${plural || "—"}`;
}

function buildDualGenderEntry(word, rank, genderEntry) {
  const plural = genderEntry.singularOnly || genderEntry.plural === "?" ? "—" : (genderEntry.plural || "—");
  return [word, genderEntry.article, plural, genderEntry.english, rank, makeDualGenderSenseId(word, genderEntry.article, plural)];
}

function getNounEntryId(noun) {
  return noun?.[5] || noun?.[0] || "";
}

function getMistakeEntryId(mistake) {
  return mistake?.entryId || mistake?.noun || "";
}

function hydrateWordData(payload) {
  const nounEntries = Array.isArray(payload?.nouns) ? payload.nouns : [];
  NOUNS = nounEntries.map(({ word, article, plural, english, rank }) => [word, article, plural, english, rank]);
  NOUN_INDEX = new Map(NOUNS.map(noun => [noun[0], noun]));
  EXPLANATIONS = new Map(nounEntries.map(({ word, articleHelp, pluralHelp }) => [word, { article: articleHelp || "", plural: pluralHelp || "" }]));
  WORDS_META = payload?.meta || {};
}

async function loadWordData() {
  const response = await fetch(WORDS_DATA_PATH);
  if (!response.ok) throw new Error(`Could not load ${WORDS_DATA_PATH} (${response.status})`);
  const payload = await response.json();
  hydrateWordData(payload);
  if (!NOUNS.length) throw new Error(`No noun data found in ${WORDS_DATA_PATH}`);
  // Load adjectives
  try {
    const adjResp = await fetch(ADJECTIVES_DATA_PATH);
    if (adjResp.ok) {
      const adjData = await adjResp.json();
      ADJECTIVES = (adjData.adjectives || []).map(({ word, english, rank }) => [word, english, rank]);
    }
  } catch(e) { console.warn("Could not load adjectives:", e); }
  // Load built-in decks
  try {
    const dgResp = await fetch(DUAL_GENDER_PATH);
    if (dgResp.ok) {
      const dgData = await dgResp.json();
      if (dgData.nouns?.length) {
        const dualSensePairs = dgData.nouns.map(({ word, rank, genders = [] }) => [word, genders.map(genderEntry => buildDualGenderEntry(word, rank, genderEntry))]);
        const dualEntries = dualSensePairs.flatMap(([, entries]) => entries);
        DUAL_GENDER_WORDS = new Set(dualSensePairs.map(([word]) => word));
        DUAL_GENDER_SENSES = new Map(dualSensePairs);
        DUAL_GENDER_INDEX = new Map(dualEntries.map(entry => [getNounEntryId(entry), entry]));
        BUILTIN_DECKS.push({
          id: "__dual_gender__",
          name: "Dual-Gender Nouns",
          description: dgData.meta?.description || "Nouns whose meaning changes with the article",
          nouns: dualEntries.map(entry => getNounEntryId(entry)),
          builtin: true
        });
      }
    }
  } catch(e) { console.warn("Could not load dual-gender deck:", e); }
}

function getNounByName(name) {
  return DUAL_GENDER_INDEX.get(name) || NOUN_INDEX.get(name) || null;
}

function getDeckEntriesByName(name) {
  if (DUAL_GENDER_INDEX.has(name)) return [DUAL_GENDER_INDEX.get(name)];
  const dualEntries = DUAL_GENDER_SENSES.get(name);
  if (dualEntries?.length) return dualEntries;
  const noun = getNounByName(name);
  return noun ? [noun] : [];
}

function shouldShowSenseHint(noun) {
  return !!noun?.[0] && !!noun?.[3] && DUAL_GENDER_WORDS.has(noun[0]);
}

function getAdjectivesForTier(tier) {
  return ADJECTIVES.filter(a => a[2] <= tier);
}

async function gistFetch(path, opts = {}) {
  const pat = getPat();
  if (!pat) throw new Error("No PAT configured");
  const r = await fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: { Authorization: `token ${pat}`, Accept: "application/vnd.github+json", ...opts.headers },
  });
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${r.statusText}`);
  return r.json();
}

async function loadGistData() {
  const gistId = getGistId();
  if (!gistId) return { ...DEFAULT_DATA };
  const gist = await gistFetch(`/gists/${gistId}`);
  const file = gist.files[GIST_FILENAME];
  if (!file) return { ...DEFAULT_DATA };
  return JSON.parse(file.content);
}

async function saveGistData(data) {
  const gistId = getGistId();
  const body = { files: { [GIST_FILENAME]: { content: JSON.stringify(data, null, 2) } } };
  if (gistId) {
    return gistFetch(`/gists/${gistId}`, { method: "PATCH", body: JSON.stringify(body) });
  } else {
    const gist = await gistFetch("/gists", {
      method: "POST",
      body: JSON.stringify({ description: "Artikel Blitz — saved progress", public: false, ...body }),
    });
    setGistId(gist.id);
    return gist;
  }
}

// XP: level N requires 50*N*(N-1) total XP
function xpForLevel(n) { return 50 * n * (n - 1); }
function levelFromXp(xp) { let l = 1; while (xpForLevel(l + 1) <= xp) l++; return l; }
function xpProgress(xp) { const l = levelFromXp(xp); const cur = xpForLevel(l); const nxt = xpForLevel(l + 1); return { level: l, current: xp - cur, needed: nxt - cur, total: xp }; }

function checkAchievements(data, sessionAchievements = []) {
  const newlyEarned = [];
  const all = [...data.achievements, ...sessionAchievements];
  for (const a of ACHIEVEMENTS) {
    if (all.includes(a.id)) continue;
    if (a.check && a.check(data)) newlyEarned.push(a.id);
  }
  return [...sessionAchievements, ...newlyEarned];
}

// Session XP/coin calculator
function calcSessionRewards(totalCorrect, totalAnswered, bestStreak, mode, difficulty, activePerks, gameMode) {
  let xp = totalCorrect * 10 + (totalAnswered - totalCorrect) * 3;
  xp += bestStreak * 2;
  const acc = totalAnswered > 0 ? totalCorrect / totalAnswered : 0;
  if (acc >= 1) xp += 200; else if (acc >= 0.9) xp += 100; else if (acc >= 0.8) xp += 50;
  if (mode === MODES.PLURAL) xp = Math.floor(xp * 1.2);
  if (mode === MODES.BOTH) xp = Math.floor(xp * 1.5);
  if (difficulty === "normal") xp = Math.floor(xp * 1.25);
  if (difficulty === "hard") xp = Math.floor(xp * 1.5);
  if (gameMode === "timed") xp = Math.floor(xp * 1.3);
  if (gameMode === "survival") xp = Math.floor(xp * 1.4);
  if (activePerks.includes("double_xp")) xp *= 2;

  let coins = totalCorrect;
  if (bestStreak >= 10) coins += 5;
  if (bestStreak >= 25) coins += 10;
  if (acc >= 1 && totalAnswered >= 5) coins += 15;

  return { xp: Math.floor(xp), coins };
}

// SRS: build a weighted queue — struggling nouns appear more, mastered less
function buildSrsQueue(nouns, nounStats, maxSize) {
  const weighted = nouns.map(n => {
    const nounId = getNounEntryId(n);
    const s = nounStats[nounId] || nounStats[n[0]];
    if (!s) return { noun: n, weight: 5 }; // never seen = high priority
    const ratio = s.attempts > 0 ? s.correct / s.attempts : 0;
    const cStreak = s.consecutiveCorrect || 0;
    if (cStreak >= 5) return { noun: n, weight: 0.5 }; // mastered = low priority
    if (ratio < 0.5) return { noun: n, weight: 8 }; // struggling
    if (ratio < 0.75) return { noun: n, weight: 4 }; // needs work
    return { noun: n, weight: 2 }; // decent
  });
  // Weighted random selection
  const pool = [];
  for (const { noun, weight } of weighted) {
    const count = Math.max(1, Math.round(weight));
    for (let i = 0; i < count; i++) pool.push(noun);
  }
  const shuffled = shuffleArray(pool);
  const seen = new Set(); const result = [];
  for (const n of shuffled) {
    const nounId = getNounEntryId(n);
    if (seen.has(nounId)) continue;
    seen.add(nounId); result.push(n);
    if (result.length >= maxSize) break;
  }
  return result;
}

// Generate weakest nouns deck from stats
function getWeakestNouns(nounStats, count = 30) {
  const entries = Object.entries(nounStats)
    .filter(([, s]) => s.attempts >= 2)
    .map(([noun, s]) => ({ noun, ratio: s.correct / s.attempts, attempts: s.attempts }))
    .sort((a, b) => a.ratio - b.ratio || b.attempts - a.attempts);
  return entries.slice(0, count).map(e => e.noun);
}

// Daily streak logic
function updateDailyStreak(streak) {
  const today = new Date().toISOString().slice(0, 10);
  if (streak.lastDate === today) return streak; // already played today
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (streak.lastDate === yesterday) {
    const c = streak.current + 1;
    return { current: c, lastDate: today, best: Math.max(streak.best || 0, c) };
  }
  return { current: 1, lastDate: today, best: Math.max(streak.best || 0, 1) }; // streak broken
}

function formatArticleAttempt(value) {

}

function formatPluralAttempt(value) {

function getPluralOptionLabel(value) {

function isLikelyLoanword(lowerWord) {
  return ["ion","t\u00e4t","ismus","ist","or","eur","ment","ette","age","ade","ie","ik","ur","a","i","o","u","y"].some(suffix => lowerWord.endsWith(suffix));
}

function addUmlaut(word) {
  const lowerWord = word.toLowerCase();
  const auIndex = lowerWord.lastIndexOf("au");
  if (auIndex !== -1) {
    const replacement = word[auIndex] === word[auIndex].toUpperCase() ? "Äu" : "äu";
    return word.slice(0, auIndex) + replacement + word.slice(auIndex + 2);
  }

  const replacements = [["a", "ä"], ["o", "ö"], ["u", "ü"]];
  let bestMatch = null;

  replacements.forEach(([base, target]) => {
    const idx = lowerWord.lastIndexOf(base);
    if (idx === -1) return;
    if (!bestMatch || idx > bestMatch.idx || (idx === bestMatch.idx && base.length > bestMatch.base.length)) {
      bestMatch = { idx, base, target };
    }
  });

  if (!bestMatch) return word;

  let replacement = bestMatch.target;
  const originalSlice = word.slice(bestMatch.idx, bestMatch.idx + bestMatch.base.length);
  if (originalSlice[0] === originalSlice[0].toUpperCase()) {
    replacement = replacement[0].toUpperCase() + replacement.slice(1);
  }

  return word.slice(0, bestMatch.idx) + replacement + word.slice(bestMatch.idx + bestMatch.base.length);
}

function buildPluralCandidates(word, article) {
  const lowerWord = word.toLowerCase();
  const umlauted = addUmlaut(word);
  const hasUmlautVariant = umlauted !== word;
  const endsWithStableEnding = /(er|el|en)$/i.test(lowerWord);
  const hasLatinEnding = /(ent|ant|ist|or|eur|ion|ium|ismus|ment)$/i.test(lowerWord);
  const candidates = new Map();

  const pushCandidate = (form, family, score) => {
    if (!form && form !== "—") return;
    if (form !== "—" && form === word && family !== "same" && family !== "umlaut") return;
    const existing = candidates.get(form);
    if (!existing || existing.score < score) {
      candidates.set(form, { form, family, score });
    }
  };

  pushCandidate(word, "same", 0.18 + (endsWithStableEnding ? 0.65 : 0));
  if (!lowerWord.endsWith("e")) pushCandidate(word + "e", "e", 0.18 + (article === "der" ? 0.85 : article === "das" ? 0.65 : 0.22));
  pushCandidate(word + "en", "en", 0.18 + (article === "die" ? 0.95 : 0.38));
  if (!lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(word + "er", "er", 0.12 + (article === "das" ? 0.8 : article === "der" ? 0.35 : 0));
  pushCandidate(word + "s", "s", 0.08 + ((/[aiouy]$/i.test(word) || isLikelyLoanword(lowerWord)) ? 0.75 : 0.1));
  pushCandidate("—", "none", article === "die" ? 0.03 : 0.05);

  if (lowerWord.endsWith("e")) pushCandidate(word + "n", "n", 1.3 + (article === "die" ? 0.2 : 0.05));
  if (lowerWord.endsWith("in")) pushCandidate(word + "nen", "nen", 1.7);

  if (hasUmlautVariant && !hasLatinEnding) {
    pushCandidate(umlauted, "umlaut", 0.12 + (endsWithStableEnding ? 0.6 : 0.2));
    if (!lowerWord.endsWith("e")) pushCandidate(umlauted + "e", "e_umlaut", 0.15 + (article === "der" ? 1.0 : article === "die" ? 0.45 : 0.18));
    if (!lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(umlauted + "er", "er_umlaut", 0.12 + (article === "das" ? 1.05 : article === "der" ? 0.45 : 0));
  }

  if (/(chen|lein)$/i.test(lowerWord)) pushCandidate(word, "same", 1.6);
  if (endsWithStableEnding) {
    pushCandidate(word, "same", 1.05);
    if (hasUmlautVariant) pushCandidate(umlauted, "umlaut", 0.95);
  }

  if (article === "die" && !lowerWord.endsWith("e") && !lowerWord.endsWith("in")) pushCandidate(word + "en", "en", 1.2);
  if (article === "der" && word.length <= 7) {
    if (!lowerWord.endsWith("e")) pushCandidate(word + "e", "e", 1.1);
    if (hasUmlautVariant && !hasLatinEnding && !lowerWord.endsWith("e")) pushCandidate(umlauted + "e", "e_umlaut", 1.18);
  }
  if (article === "das" && word.length <= 7) {
    if (!lowerWord.endsWith("e")) pushCandidate(word + "e", "e", 1.02);
    if (!lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(word + "er", "er", 1.08);
    if (hasUmlautVariant && !hasLatinEnding && !lowerWord.endsWith("e") && !endsWithStableEnding) pushCandidate(umlauted + "er", "er_umlaut", 1.2);
  }

  if (lowerWord.endsWith("um")) {
    pushCandidate(word.slice(0, -2) + "en", "um_en", 1.55);
    pushCandidate(word.slice(0, -2) + "a", "um_a", 1.1);
  }
  if (lowerWord.endsWith("ium")) pushCandidate(word.slice(0, -3) + "ien", "ium_ien", 1.65);
  if (lowerWord.endsWith("us")) pushCandidate(word.slice(0, -2) + "en", "us_en", 1.15);
  if (lowerWord.endsWith("a")) pushCandidate(word.slice(0, -1) + "en", "a_en", 1.05);

  return [...candidates.values()];
}

function familyClosenessBonus(candidateFamily, correctFamily) {
  if (!correctFamily) return 0;
  const priorities = PLURAL_FAMILY_PRIORITY[correctFamily] || [];
  const idx = priorities.indexOf(candidateFamily);
  return idx === -1 ? 0 : Math.max(0.16, 0.72 - idx * 0.14);
}

function getPluralOptions(word, article, correctPlural) {
  const candidates = buildPluralCandidates(word, article);
  if (!candidates.some(candidate => candidate.form === correctPlural)) {
    candidates.push({ form: correctPlural, family: null, score: 1.5 });
  }

  const correctEntry = candidates.find(candidate => candidate.form === correctPlural) || { family: null };
  const correctLength = correctPlural === "—" ? word.length : correctPlural.length;
  const wrongOptions = candidates
    .filter(candidate => candidate.form !== correctPlural)
    .map(candidate => ({
      ...candidate,
      totalScore:
        candidate.score +
        familyClosenessBonus(candidate.family, correctEntry.family) -
        Math.abs((candidate.form === "—" ? word.length : candidate.form.length) - correctLength) * 0.04,
    }))
    .sort((a, b) => b.totalScore - a.totalScore || a.form.localeCompare(b.form, "de"))
    .slice(0, 2)
    .map(candidate => candidate.form);

  const fallbackPool = [word + "e", word + "en", word + "er", word + "s", word, "—"].filter(form => form !== correctPlural);
  fallbackPool.forEach(form => {
    if (wrongOptions.length < 2 && !wrongOptions.includes(form)) wrongOptions.push(form);
  });

  return shuffleArray([correctPlural, ...wrongOptions.slice(0, 2)]);
}

function getMeaningLabel(english) {
  return (english || "").split("/").join(" / ");
}

function shuffleMatchingMeanings(batch, wordType) {
  if (wordType === "adjectives") {
    return shuffleArray(batch.map(([word, english]) => ({ id: word, label: getMeaningLabel(english) })));
  }
  return shuffleArray(batch.map(noun => ({ id: getNounEntryId(noun), label: getMeaningLabel(noun[3]) })));
}

function dedupeMistakesByNoun(mistakes) {
  const latestByNoun = new Map();
  mistakes.forEach(mistake => {
    latestByNoun.set(getMistakeEntryId(mistake), mistake);
  });
  return [...latestByNoun.values()];
}

// ═══════════════════════════════════════════════════════════════
// MAIN COMPONENT
// ═══════════════════════════════════════════════════════════════
function GermanNounGame() {
  const [screen, setScreen] = useState("menu");
  const [mode, setMode] = useState(MODES.ARTICLE);
  const [tier, setTier] = useState(500);
  const [queue, setQueue] = useState([]);
  const [currentIndex, setCurrentIndex] = useState(0);
  const [score, setScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [bestStreak, setBestStreak] = useState(0);
  const [totalAnswered, setTotalAnswered] = useState(0);
  const [totalCorrect, setTotalCorrect] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [feedback, setFeedback] = useState(null);
  const [articleChoice, setArticleChoice] = useState(null);
  const [phase, setPhase] = useState("question");
  const [difficulty, setDifficulty] = useState("normal");
  const [showHint, setShowHint] = useState(false);
  const [wrongAnswers, setWrongAnswers] = useState([]);
  const timerRef = useRef(null);
  const inputRef = useRef(null);
  const feedbackTimerRef = useRef(null);
  const currentNoun = queue[currentIndex];
  const timeLimit = useMemo(() => difficulty==="easy"?0:difficulty==="hard"?8:15, [difficulty]);

  // ── Persistence state ──
  const [userData, setUserData] = useState(DEFAULT_DATA);
  const [syncStatus, setSyncStatus] = useState("idle");
  const [activeDeck, setActiveDeck] = useState(null);
  const [gameMode, setGameMode] = useState("classic"); // classic|timed|survival|reverse|weakest
  const [matchingWordType, setMatchingWordType] = useState("nouns"); // nouns|adjectives
  const [lives, setLives] = useState(3);
  const [globalTimer, setGlobalTimer] = useState(60);
  const [sessionRewards, setSessionRewards] = useState(null);
  const [newAchievements, setNewAchievements] = useState([]);
  const [reverseInput, setReverseInput] = useState("");
  const [usedSecondChance, setUsedSecondChance] = useState(false);
  const [usedStreakShield, setUsedStreakShield] = useState(false);
  const globalTimerRef = useRef(null);
  const pluralOptions = useMemo(() => {
    if (!currentNoun || gameMode === "reverse" || mode === MODES.ARTICLE) return [];
    return getPluralOptions(currentNoun[0], currentNoun[1], currentNoun[2]);
  }, [currentNoun, gameMode, mode]);
  const matchingBatch = useMemo(() => (
    gameMode === "matching" ? queue.slice(currentIndex, currentIndex + MATCHING_BATCH_SIZE) : []
  ), [gameMode, queue, currentIndex]);
  const [matchingRightItems, setMatchingRightItems] = useState([]);
  const [matchingMatchedIds, setMatchingMatchedIds] = useState([]);
  const [matchingSelectedWord, setMatchingSelectedWord] = useState(null);
  const [matchingSelectedMeaning, setMatchingSelectedMeaning] = useState(null);
  const [matchingMismatch, setMatchingMismatch] = useState(null);
  const matchingMismatchTimerRef = useRef(null);

  useEffect(() => {
    if (!getPat()) return;
    setSyncStatus("loading");
    loadGistData().then(d => {
      const merged = { ...DEFAULT_DATA, ...d, dailyStreak: { ...DEFAULT_DATA.dailyStreak, ...(d.dailyStreak||{}) } };
      merged.level = levelFromXp(merged.xp);
      setUserData(merged); setSyncStatus("synced");
    }).catch(() => setSyncStatus("error"));
  }, []);

  useEffect(() => {
    if (gameMode !== "matching") return;
    if (!matchingBatch.length) return;
    clearTimeout(matchingMismatchTimerRef.current);
    setMatchingRightItems(shuffleMatchingMeanings(matchingBatch, matchingWordType));
    setMatchingMatchedIds([]);
    setMatchingSelectedWord(null);
    setMatchingSelectedMeaning(null);
    setMatchingMismatch(null);
    return () => clearTimeout(matchingMismatchTimerRef.current);
  }, [gameMode, matchingBatch, matchingWordType]);

  const persistData = useCallback(async (newData) => {
    setUserData(newData);
    if (!getPat()) return;
    setSyncStatus("saving");
    try { await saveGistData(newData); setSyncStatus("synced"); }
    catch { setSyncStatus("error"); }
  }, []);

  const updateNounStats = useCallback((answered) => {
    setUserData(prev => {
      const stats = { ...prev.nounStats };
      const mastered = new Set(prev.masteredNouns || []);
      answered.forEach(({ noun, correct }) => {
        const s = stats[noun] || { attempts: 0, correct: 0, consecutiveCorrect: 0 };
        const cc = correct ? (s.consecutiveCorrect || 0) + 1 : 0;
        stats[noun] = { attempts: s.attempts + 1, correct: s.correct + (correct ? 1 : 0), consecutiveCorrect: cc };
        if (cc >= 5) mastered.add(noun);
      });
      const newData = { ...prev, nounStats: stats, masteredNouns: [...mastered] };
      if (getPat()) {
        setSyncStatus("saving");
        saveGistData(newData).then(() => setSyncStatus("synced")).catch(() => setSyncStatus("error"));
      }
      return newData;
    });
  }, []);

  const saveDeck = useCallback((name, nounNames) => {
    const deck = { id: Date.now().toString(36), name, nouns: nounNames, created: new Date().toISOString() };
    const newData = { ...userData, decks: [...userData.decks, deck] };
    persistData(newData);
    return deck;
  }, [userData, persistData]);

  const deleteDeck = useCallback((deckId) => {
    const newData = { ...userData, decks: userData.decks.filter(d => d.id !== deckId) };
    persistData(newData);
  }, [userData, persistData]);

  const buyPerk = useCallback((perkId) => {
    const perk = PERKS.find(p => p.id === perkId);
    if (!perk || userData.coins < perk.cost) return false;
    const newData = { ...userData, coins: userData.coins - perk.cost, activePerks: [...(userData.activePerks||[]), perkId] };
    persistData(newData);
    return true;
  }, [userData, persistData]);

  const deactivatePerk = useCallback((perkId) => {
    const newData = { ...userData, activePerks: (userData.activePerks||[]).filter(p => p !== perkId) };
    persistData(newData);
  }, [userData, persistData]);

  const startGame = useCallback((m, d, t, deckId, gm, wordType) => {
    let nouns;
    const gMode = gm || "classic";
    const wType = wordType || "nouns";
    setMatchingWordType(wType);
    // Adjective matching mode
    if (gMode === "matching" && wType === "adjectives") {
      const adjTier = Math.min(t, ADJECTIVES.length);
      const tierAdjs = getAdjectivesForTier(adjTier);
      const unique = (() => { const seen = new Set(); return tierAdjs.filter(a => { if (seen.has(a[0])) return false; seen.add(a[0]); return true; }); })();
      // Filter out adjectives without English translations
      nouns = shuffleArray(unique.filter(a => a[1]));
      if (!nouns.length) { alert("No adjectives available for this tier"); return; }
      setActiveDeck(null);
    } else if (gMode === "weakest") {
      const weakNames = getWeakestNouns(userData.nounStats, 30);
      nouns = weakNames.flatMap(name => getDeckEntriesByName(name));
      if (!nouns.length) { alert("Not enough data yet — play some sessions first!"); return; }
      setActiveDeck(null);
    } else if (deckId) {
      const deck = userData.decks.find(dk => dk.id === deckId) || BUILTIN_DECKS.find(dk => dk.id === deckId);
      if (!deck) return;
      nouns = deck.nouns.flatMap(name => getDeckEntriesByName(name));
      setActiveDeck(deckId);
    } else {
      const tierNouns = getNounsForTier(t);
      const unique = (() => { const seen = new Set(); return tierNouns.filter(n => { if (seen.has(n[0])) return false; seen.add(n[0]); return true; }); })();
      const expanded = unique.flatMap(noun => getDeckEntriesByName(noun[0]));
      // Use SRS weighting for classic mode
      nouns = gMode === "classic" ? buildSrsQueue(expanded, userData.nounStats, expanded.length) : shuffleArray(expanded);
      setActiveDeck(null);
    }
    if (!nouns.length) return;
    sessionAnswersRef.current = [];
    const effectiveMode = gMode === "reverse" || gMode === "matching" ? MODES.ARTICLE : m;
    const effectiveDifficulty = gMode === "survival" || gMode === "timed" || gMode === "matching" ? "easy" : d;
    setGameMode(gMode);
    setMode(effectiveMode);
    setDifficulty(effectiveDifficulty);
    setTier(t);setQueue(shuffleArray(nouns));setCurrentIndex(0);setScore(0);setStreak(0);setBestStreak(0);
    setTotalAnswered(0);setTotalCorrect(0);setFeedback(null);setArticleChoice(null);setReverseInput("");
    setPhase("question");setShowHint(false);setWrongAnswers([]);setSessionRewards(null);setNewAchievements([]);
    setUsedSecondChance(false);setUsedStreakShield(false);
    setMatchingRightItems([]);
    setMatchingMatchedIds([]);
    setMatchingSelectedWord(null);
    setMatchingSelectedMeaning(null);
    setMatchingMismatch(null);
    if (gMode === "survival") { setLives(3); setTimeLeft(0); }
    else if (gMode === "timed") { setGlobalTimer(60); setTimeLeft(0); }
    else { setTimeLeft(effectiveDifficulty==="easy"?0:effectiveDifficulty==="hard"?8:15); }
    setScreen("game");
  }, [userData]);

  const sessionAnswersRef = useRef([]);

  // End session: calculate XP, coins, achievements, tier unlocks
  const endSession = useCallback(() => {
    clearInterval(timerRef.current); clearTimeout(feedbackTimerRef.current); clearInterval(globalTimerRef.current);
    if (sessionAnswersRef.current.length) updateNounStats(sessionAnswersRef.current);
    sessionAnswersRef.current = [];

    // Calculate rewards
    const rewards = calcSessionRewards(totalCorrect, totalAnswered, bestStreak, mode, difficulty, userData.activePerks || [], gameMode);
    setSessionRewards(rewards);

    // Update userData with rewards
    setUserData(prev => {
      const newXp = (prev.xp || 0) + rewards.xp;
      const newLevel = levelFromXp(newXp);
      const newCoins = (prev.coins || 0) + rewards.coins;
      const newStreak = updateDailyStreak(prev.dailyStreak || { current: 0, lastDate: null, best: 0 });
      const newSessions = (prev.totalSessions || 0) + 1;

      const acc = totalAnswered > 0 ? totalCorrect / totalAnswered : 0;

      // Session-based achievements
      let sessionAch = [];
      if (acc >= 1 && totalAnswered >= 5) sessionAch.push("perfect_session");
      if (bestStreak >= 10) sessionAch.push("streak_10");
      if (bestStreak >= 25) sessionAch.push("streak_25");
      if (bestStreak >= 50) sessionAch.push("streak_50");
      if (gameMode === "timed" && totalCorrect >= 20) sessionAch.push("speed_demon");
      if (gameMode === "survival" && totalAnswered >= 30) sessionAch.push("survivor");

      const updated = { ...prev, xp: newXp, level: newLevel, coins: newCoins, dailyStreak: newStreak,
        totalSessions: newSessions, activePerks: [] }; // perks consumed after session
      const allNew = checkAchievements(updated, sessionAch.filter(a => !(prev.achievements||[]).includes(a)));
      updated.achievements = [...new Set([...(prev.achievements || []), ...allNew])];
      setNewAchievements(allNew.filter(a => !(prev.achievements||[]).includes(a)));

      if (getPat()) {
        setSyncStatus("saving");
        saveGistData(updated).then(() => setSyncStatus("synced")).catch(() => setSyncStatus("error"));
      }
      return updated;
    });

    setScreen("results");
  }, [updateNounStats, totalCorrect, totalAnswered, bestStreak, mode, difficulty, gameMode, userData.activePerks, tier]);

  // Per-question timer (classic/reverse with timer)
  useEffect(() => {
    if (screen!=="game"||phase!=="question"||difficulty==="easy"||gameMode==="timed"||gameMode==="survival") return;
    const tl = (userData.activePerks||[]).includes("time_freeze") ? timeLimit + 5 : timeLimit;
    setTimeLeft(tl);
    timerRef.current = setInterval(() => {
      setTimeLeft(p => { if(p<=1){clearInterval(timerRef.current);handleTimeout();return 0;} return p-1; });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [screen, phase, currentIndex, difficulty, gameMode]);

  // Global timer for timed challenge
  useEffect(() => {
    if (screen!=="game"||gameMode!=="timed") return;
    globalTimerRef.current = setInterval(() => {
      setGlobalTimer(p => { if(p<=1){clearInterval(globalTimerRef.current);endSession();return 0;} return p-1; });
    }, 1000);
    return () => clearInterval(globalTimerRef.current);
  }, [screen, gameMode]);

  const handleTimeout = useCallback(() => {
    if (!currentNoun) return;
    const [s,a,p,e] = currentNoun;
    const entryId = getNounEntryId(currentNoun);
    setStreak(0);setTotalAnswered(pr=>pr+1);
    setFeedback({correct:false,article:a,plural:p,noun:s,english:e});
    setWrongAnswers(pr=>[...pr,{noun:s,entryId,article:a,plural:p,english:e,userArticle:NO_ANSWER,userPlural:NO_ANSWER}]);
    sessionAnswersRef.current.push({ noun: entryId, correct: false });
    setPhase("feedback");
  }, [currentNoun]);

  useEffect(() => {
    if (phase==="feedback") { feedbackTimerRef.current=setTimeout(()=>nextQuestion(),feedback?.correct?150:650); return()=>clearTimeout(feedbackTimerRef.current); }
  }, [phase, feedback]);

  const nextQuestion = useCallback(() => {
    // Second chance: retry same question
    if (feedback?.secondChance) {
      setFeedback(null);setArticleChoice(null);setReverseInput("");setPhase("question");setShowHint(false);
      if (gameMode !== "timed" && gameMode !== "survival" && difficulty !== "easy") setTimeLeft(timeLimit);
      return;
    }
    const ni=currentIndex+1;
    if(ni>=queue.length){
      if (gameMode === "timed") {
        // Loop for timed mode
        setQueue(prev => shuffleArray([...prev]));
        setCurrentIndex(0);setFeedback(null);setArticleChoice(null);setReverseInput("");setPhase("question");setShowHint(false);
        return;
      }
      if (sessionAnswersRef.current.length) updateNounStats(sessionAnswersRef.current);
      sessionAnswersRef.current = [];
      endSession();return;
    }
    setCurrentIndex(ni);setFeedback(null);setArticleChoice(null);setReverseInput("");setPhase("question");setShowHint(false);
    if (gameMode !== "timed" && gameMode !== "survival" && difficulty !== "easy") setTimeLeft(timeLimit);
  }, [currentIndex, queue.length, timeLimit, gameMode, difficulty, feedback]);

  const checkAnswer = useCallback((chosenArt, chosenPlural, typedReverse) => {
    if(!currentNoun||phase!=="question") return;
    clearInterval(timerRef.current);
    const [s,a,p,e]=currentNoun; let correct=true;
    const entryId = getNounEntryId(currentNoun);

    if (gameMode === "reverse") {
      const typed = (typedReverse||"").trim();
      correct = typed === s || normalize(typed) === normalize(s);
    } else {
      if(mode===MODES.ARTICLE||mode===MODES.BOTH) if(chosenArt!==a) correct=false;
      if(mode===MODES.PLURAL||mode===MODES.BOTH){const t=chosenPlural||"";if(!t||(t!==p&&normalize(t)!==normalize(p))) correct=false;}
    }

    const perks = userData.activePerks || [];
    const scoreMultiplier = perks.includes("score_boost") ? 1.5 : 1;

    if(correct){
      const sb=Math.floor(streak/5)*10, tb=difficulty!=="easy"?Math.floor(timeLeft*2):0;
      setScore(pr=>pr+Math.floor((100+sb+tb)*scoreMultiplier));
      setStreak(pr=>{const n=pr+1;setBestStreak(b=>Math.max(b,n));return n;});setTotalCorrect(pr=>pr+1);
    } else {
      // Second chance perk
      if (perks.includes("second_chance") && !usedSecondChance) {
        setUsedSecondChance(true);
        setFeedback({correct:false,article:a,plural:p,noun:s,english:e,secondChance:true});
        setPhase("feedback");
        return; // don't record, let them retry
      }
      // Streak shield perk
      if (perks.includes("streak_shield") && !usedStreakShield && streak > 0) {
        setUsedStreakShield(true);
        // Don't reset streak
      } else {
        setStreak(0);
      }
      setWrongAnswers(pr=>[...pr,{noun:s,entryId,article:a,plural:p,english:e,userArticle:chosenArt||NO_ANSWER,userPlural:chosenPlural||NO_ANSWER}]);
      // Survival mode: lose a life
      if (gameMode === "survival") {
        setLives(prev => {
          if (prev <= 1) { setTimeout(() => endSession(), 700); return 0; }
          return prev - 1;
        });
      }
    }
    sessionAnswersRef.current.push({ noun: entryId, correct });
    setTotalAnswered(pr=>pr+1);setFeedback({correct,article:a,plural:p,noun:s,english:e});setPhase("feedback");
  }, [currentNoun, mode, phase, streak, difficulty, timeLeft, gameMode, userData.activePerks, usedSecondChance, usedStreakShield]);

  const handleArticle = useCallback((art) => {
    if(phase!=="question") return;
    if(mode===MODES.ARTICLE) checkAnswer(art,"");
    else setArticleChoice(art);
  }, [mode, phase, checkAnswer]);

  const handlePluralChoice = useCallback((plural) => {
    if(phase!=="question") return;
    if(mode===MODES.PLURAL) checkAnswer("",plural);
    else if(mode===MODES.BOTH){if(!articleChoice) return; checkAnswer(articleChoice,plural);}
  }, [mode,phase,articleChoice,checkAnswer]);

  const resolveMatchingPair = useCallback((wordId, meaningId) => {
    const isAdj = matchingWordType === "adjectives";
    const item = matchingBatch.find(entry => (isAdj ? entry[0] : getNounEntryId(entry)) === wordId);
    const chosenMeaning = matchingRightItems.find(item => item.id === meaningId);
    if (!item || !chosenMeaning) return;

    const word = item[0];
    const article = isAdj ? "" : item[1];
    const plural = isAdj ? "" : item[2];
    const english = isAdj ? item[1] : item[3];
    const entryId = isAdj ? word : getNounEntryId(item);
    const correct = wordId === meaningId;
    const perks = userData.activePerks || [];
    const scoreMultiplier = perks.includes("score_boost") ? 1.5 : 1;

    setTotalAnswered(prev => prev + 1);

    if (correct) {
      setScore(prev => prev + Math.floor(120 * scoreMultiplier));
      setTotalCorrect(prev => prev + 1);
      setStreak(prev => {
        const next = prev + 1;
        setBestStreak(best => Math.max(best, next));
        return next;
      });
      sessionAnswersRef.current.push({ noun: entryId, correct: true });
      setMatchingMatchedIds(prev => [...prev, entryId]);
      setMatchingSelectedWord(null);
      setMatchingSelectedMeaning(null);
      setMatchingMismatch(null);
      return;
    }

    if (perks.includes("streak_shield") && !usedStreakShield && streak > 0) {
      setUsedStreakShield(true);
    } else {
      setStreak(0);
    }

    sessionAnswersRef.current.push({ noun: entryId, correct: false });
    setWrongAnswers(prev => [...prev, {
      noun: word,
      entryId,
      article,
      plural,
      english,
      userMeaning: chosenMeaning.label,
      userArticle: NO_ANSWER,
      userPlural: NO_ANSWER,
    }]);
    setMatchingMismatch({ wordId, meaningId });
    setMatchingSelectedWord(null);
    setMatchingSelectedMeaning(null);
    clearTimeout(matchingMismatchTimerRef.current);
    matchingMismatchTimerRef.current = setTimeout(() => setMatchingMismatch(null), 450);
  }, [matchingBatch, matchingRightItems, matchingWordType, userData.activePerks, usedStreakShield, streak]);

  const handleMatchingWordSelect = useCallback((wordId) => {
    if (gameMode !== "matching" || phase !== "question" || matchingMatchedIds.includes(wordId)) return;
    if (matchingSelectedWord === wordId) {
      setMatchingSelectedWord(null);
      return;
    }
    if (matchingSelectedMeaning) {
      resolveMatchingPair(wordId, matchingSelectedMeaning);
      return;
    }
    setMatchingSelectedWord(wordId);
  }, [gameMode, phase, matchingMatchedIds, matchingSelectedWord, matchingSelectedMeaning, resolveMatchingPair]);

  const handleMatchingMeaningSelect = useCallback((meaningId) => {
    if (gameMode !== "matching" || phase !== "question" || matchingMatchedIds.includes(meaningId)) return;
    if (matchingSelectedMeaning === meaningId) {
      setMatchingSelectedMeaning(null);
      return;
    }
    if (matchingSelectedWord) {
      resolveMatchingPair(matchingSelectedWord, meaningId);
      return;
    }
    setMatchingSelectedMeaning(meaningId);
  }, [gameMode, phase, matchingMatchedIds, matchingSelectedMeaning, matchingSelectedWord, resolveMatchingPair]);

  const handleReverseSubmit = useCallback((ev) => {
    ev?.preventDefault(); if(phase!=="question"||gameMode!=="reverse") return;
    checkAnswer("","",reverseInput);
  }, [phase,gameMode,reverseInput,checkAnswer]);

  useEffect(() => {
    if (gameMode !== "matching" || !matchingBatch.length) return;
    if (matchingMatchedIds.length !== matchingBatch.length) return;
    const nextIndex = currentIndex + matchingBatch.length;
    if (nextIndex >= queue.length) {
      endSession();
      return;
    }
    setCurrentIndex(nextIndex);
  }, [gameMode, matchingBatch, matchingMatchedIds, currentIndex, queue.length, endSession]);

  useEffect(() => {
    if(screen!=="game"||phase!=="question"||gameMode==="matching") return;
    const h=(ev)=>{
      if(ev.target.tagName==="INPUT")return;
      if(ev.key==="h"){setShowHint(true);return;}
      const choiceIndex = ["1","2","3"].indexOf(ev.key);
      if(choiceIndex===-1)return;
      if(mode===MODES.ARTICLE){handleArticle(["der","die","das"][choiceIndex]);return;}
      if(mode===MODES.PLURAL){const choice = pluralOptions[choiceIndex]; if(choice) handlePluralChoice(choice); return;}
      if(mode===MODES.BOTH){
        if(!articleChoice){handleArticle(["der","die","das"][choiceIndex]); return;}
        const choice = pluralOptions[choiceIndex];
        if(choice) handlePluralChoice(choice);
      }
    };
    window.addEventListener("keydown",h); return()=>window.removeEventListener("keydown",h);
  }, [screen,phase,gameMode,mode,articleChoice,pluralOptions,handleArticle,handlePluralChoice]);

  useEffect(() => { if(screen==="game"&&phase==="question"&&gameMode==="reverse") setTimeout(()=>inputRef.current?.focus(),100); }, [screen,phase,currentIndex,gameMode]);

  const accuracy = totalAnswered>0?Math.round((totalCorrect/totalAnswered)*100):0;
  const timerPct = timeLimit>0?(timeLeft/timeLimit)*100:100;
  const timerColor = timeLeft<=3?"#EF4444":timeLeft<=6?"#F59E0B":"#10B981";
  const matchingProgress = Math.min(currentIndex + matchingMatchedIds.length, queue.length);
  const matchingBatchNumber = gameMode === "matching" ? Math.floor(currentIndex / MATCHING_BATCH_SIZE) + 1 : 0;
  const matchingBatchTotal = gameMode === "matching" ? Math.ceil(queue.length / MATCHING_BATCH_SIZE) : 0;
  const showSenseHint = shouldShowSenseHint(currentNoun);
  const selectedWordLabel = matchingSelectedWord
    ? matchingBatch.find(entry => ((matchingWordType === "adjectives" ? entry[0] : getNounEntryId(entry)) === matchingSelectedWord))?.[0]
    : "";
  const selectedMeaningLabel = matchingSelectedMeaning
    ? matchingRightItems.find(item => item.id === matchingSelectedMeaning)?.label
    : "";
  const matchingPrompt = matchingMismatch
    ? "Wrong pair. Try again."
    : matchingSelectedWord
      ? `Choose the meaning for ${selectedWordLabel}.`
      : matchingSelectedMeaning
        ? `Choose the ${matchingWordType==="adjectives"?"adjective":"noun"} for ${selectedMeaningLabel}.`
        : `Match all ${matchingBatch.length} pairs to continue.`;

  if(screen==="menu") return <MenuScreen onStart={startGame} userData={userData} syncStatus={syncStatus} onDeleteDeck={deleteDeck} onSaveDeck={saveDeck} onBuyPerk={buyPerk} onDeactivatePerk={deactivatePerk} onSyncRefresh={()=>{
    if(!getPat()) return; setSyncStatus("loading");
    loadGistData().then(d=>{const m={...DEFAULT_DATA,...d,dailyStreak:{...DEFAULT_DATA.dailyStreak,...(d.dailyStreak||{})}};m.level=levelFromXp(m.xp);setUserData(m);setSyncStatus("synced");}).catch(()=>setSyncStatus("error"));
  }}/>;
  if(screen==="results") return <ResultsScreen score={score} totalCorrect={totalCorrect} totalAnswered={totalAnswered} bestStreak={bestStreak} wrongAnswers={wrongAnswers} mode={mode} onSaveDeck={saveDeck} syncStatus={syncStatus} sessionRewards={sessionRewards} newAchievements={newAchievements} userData={userData} gameMode={gameMode} onRestart={()=>setScreen("menu")} onPracticeWrong={()=>{
    if(!wrongAnswers.length) return;
    const nd=dedupeMistakesByNoun(wrongAnswers).flatMap(w=>getDeckEntriesByName(w.entryId || w.noun));
    sessionAnswersRef.current = [];
    setQueue(shuffleArray(nd));setCurrentIndex(0);setScore(0);setStreak(0);setBestStreak(0);setTotalAnswered(0);setTotalCorrect(0);
    setFeedback(null);setArticleChoice(null);setReverseInput("");setPhase("question");setShowHint(false);setWrongAnswers([]);setTimeLeft(timeLimit);setScreen("game");
  }}/>;

  return (
    <div style={S.container}>
      <div style={S.header}>
        <button onClick={endSession} style={S.endBtn}>End</button>
        <div style={{textAlign:"center"}}>
          <span style={S.scoreLabel}>{score.toLocaleString()}{streak>=3&&<span style={S.streakBadge}>🔥 {streak}</span>}</span>
        </div>
        <div style={{textAlign:"right"}}>
          {gameMode==="survival"&&<span style={{fontSize:22,letterSpacing:4}}>{"❤️".repeat(lives)}{"🖤".repeat(3-lives)}</span>}
          {gameMode==="timed"&&<span style={{fontSize:20,fontWeight:900,color:globalTimer<=10?"#EF4444":globalTimer<=30?"#F59E0B":"#10B981"}}>{globalTimer}s</span>}
          {gameMode==="matching"&&<span style={S.progressText}>{matchingProgress} / {queue.length}</span>}
          {gameMode!=="survival"&&gameMode!=="timed"&&gameMode!=="matching"&&<span style={S.progressText}>{totalAnswered+1} / {queue.length}</span>}
        </div>
      </div>
      {difficulty!=="easy"&&gameMode!=="timed"&&gameMode!=="survival"&&<div style={S.timerBarOuter}><div style={{...S.timerBarInner,width:`${timerPct}%`,backgroundColor:timerColor,transition:phase==="question"?"width 1s linear":"none"}}/></div>}
      {gameMode==="timed"&&<div style={S.timerBarOuter}><div style={{...S.timerBarInner,width:`${(globalTimer/60)*100}%`,backgroundColor:globalTimer<=10?"#EF4444":globalTimer<=30?"#F59E0B":"#10B981",transition:"width 1s linear"}}/></div>}
      <div style={S.statsRow}>
        {[["Accuracy",`${accuracy}%`,"#cbd5e1"],["Best",bestStreak,"#cbd5e1"],["Correct",totalCorrect,"#10B981"],["Wrong",wrongAnswers.length,"#f87171"]].map(([l,v,c])=>
          <div key={l} style={S.statItem}><span style={{...S.statValue,color:c}}>{v}</span><span style={S.statLabel}>{l}</span></div>
        )}
      </div>
      {currentNoun&&(
        <div style={{...S.card,borderColor:phase==="feedback"?(feedback?.correct?"#10B981":"#EF4444"):"transparent",backgroundColor:phase==="feedback"?(feedback?.correct?"rgba(16,185,129,0.2)":"rgba(239,68,68,0.2)"):"rgba(255,255,255,0.03)"}}>
          {gameMode==="matching"?(
            <div style={S.nounDisplay}>
              <span style={{fontSize:13,color:"#64748b",textTransform:"uppercase",letterSpacing:2}}>{matchingWordType==="adjectives"?"Adjectives":"Nouns"} — Batch {matchingBatchNumber} / {matchingBatchTotal}</span>
              <span style={{fontSize:28,fontWeight:900,color:"#f1f5f9",textAlign:"center"}}>Match the nouns with their meanings</span>
              <span style={{...S.hintText,color:matchingMismatch?"#f87171":"#94a3b8",fontStyle:"normal"}}>{matchingPrompt}</span>
            </div>
          ):gameMode==="reverse"?(
            <div style={S.nounDisplay}>
              <span style={{fontSize:13,color:"#64748b",textTransform:"uppercase",letterSpacing:2}}>Translate to German</span>
              <span style={{fontSize:28,fontWeight:900,color:"#f1f5f9"}}>{currentNoun[3].split("/")[0]}</span>
              <span style={{fontSize:14,color:ARTICLE_COLORS[currentNoun[1]],fontWeight:700}}>({currentNoun[1]})</span>
            </div>
          ):(
            <div style={S.nounDisplay}>
              <span style={S.nounWord}>{currentNoun[0]}</span>
              {showSenseHint&&<span style={S.nounSense}>{getMeaningLabel(currentNoun[3])}</span>}
              {showHint&&!showSenseHint&&<span style={S.hintText}>({currentNoun[3]})</span>}
              {!showHint&&!showSenseHint&&phase==="question"&&<button onClick={()=>setShowHint(true)} style={S.hintBtn}>hint</button>}
            </div>
          )}
          {gameMode==="matching"&&phase==="question"&&(
            <>
              <div style={S.matchingBoard}>
                <div style={S.matchingColumn}>
                  <span style={S.matchingColumnTitle}>German</span>
                  <div style={S.matchingList}>
                    {matchingBatch.map((entry) => {
                      const word = entry[0];
                      const isAdj = matchingWordType === "adjectives";
                      const wordId = isAdj ? word : getNounEntryId(entry);
                      const article = isAdj ? "" : entry[1];
                      const plural = isAdj ? "" : entry[2];
                      const matched = matchingMatchedIds.includes(wordId);
                      const selected = matchingSelectedWord === wordId;
                      const mismatched = matchingMismatch?.wordId === wordId;
                      return (
                        <button
                          key={wordId}
                          onClick={() => handleMatchingWordSelect(wordId)}
                          disabled={matched}
                          style={{
                            ...S.matchingItemBtn,
                            borderColor: matched ? "rgba(16,185,129,0.45)" : mismatched ? "rgba(239,68,68,0.45)" : selected ? "rgba(139,92,246,0.55)" : "rgba(255,255,255,0.12)",
                            background: matched ? "rgba(16,185,129,0.12)" : mismatched ? "rgba(239,68,68,0.1)" : selected ? "rgba(139,92,246,0.14)" : "rgba(255,255,255,0.04)",
                            opacity: matched ? 0.72 : 1,
                            cursor: matched ? "default" : "pointer",
                          }}
                        >
                          <div style={{display:"flex",flexDirection:"column",gap:4}}>
                            <span style={{display:"flex",alignItems:"baseline",gap:6}}>
                              {article&&<span style={{color:ARTICLE_COLORS[article],fontWeight:800,fontSize:13}}>{article}</span>}
                              <span style={S.matchingItemMain}>{word}</span>
                            </span>
                            {plural&&<span style={S.matchingItemMeta}>{formatPluralAttempt(plural)}</span>}
                          </div>
                          <span style={S.matchingItemState}>{matched ? "done" : selected ? "pick" : ""}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
                <div style={S.matchingColumn}>
                  <span style={S.matchingColumnTitle}>English</span>
                  <div style={S.matchingList}>
                    {matchingRightItems.map(item => {
                      const matched = matchingMatchedIds.includes(item.id);
                      const selected = matchingSelectedMeaning === item.id;
                      const mismatched = matchingMismatch?.meaningId === item.id;
                      return (
                        <button
                          key={item.id}
                          onClick={() => handleMatchingMeaningSelect(item.id)}
                          disabled={matched}
                          style={{
                            ...S.matchingItemBtn,
                            borderColor: matched ? "rgba(16,185,129,0.45)" : mismatched ? "rgba(239,68,68,0.45)" : selected ? "rgba(139,92,246,0.55)" : "rgba(255,255,255,0.12)",
                            background: matched ? "rgba(16,185,129,0.12)" : mismatched ? "rgba(239,68,68,0.1)" : selected ? "rgba(139,92,246,0.14)" : "rgba(255,255,255,0.04)",
                            opacity: matched ? 0.72 : 1,
                            cursor: matched ? "default" : "pointer",
                          }}
                        >
                          <span style={S.matchingItemMain}>{item.label}</span>
                          <span style={S.matchingItemState}>{matched ? "done" : selected ? "pick" : ""}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              </div>
              <div style={S.shortcutHint}>This mode runs through the whole selected deck in batches of up to {MATCHING_BATCH_SIZE}.</div>
            </>
          )}
          {phase==="feedback"&&feedback&&(
            <div style={S.feedbackFlash}>
              <span style={{fontSize:36,fontWeight:900,color:feedback.correct?"#10B981":"#EF4444"}}>{feedback.correct?"✓":feedback.secondChance?"🔄":"✗"}</span>
              {feedback.secondChance&&<span style={{fontSize:13,color:"#F59E0B",fontWeight:700}}>Second chance! Try again...</span>}
              {!feedback.correct&&!feedback.secondChance&&<span style={S.flashCorrection}>{feedback.article} {feedback.noun} {"->"} {formatPluralAttempt(feedback.plural)}</span>}
            </div>
          )}
          {gameMode==="reverse"&&phase==="question"&&(
            <div style={S.pluralSection}>
              <label style={S.pluralLabel}>German noun:</label>
              <div style={S.inputRow}>
                <input ref={inputRef} value={reverseInput} onChange={e=>setReverseInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")handleReverseSubmit(e);}} placeholder="Type the noun..." style={S.pluralInput} autoComplete="off" autoFocus/>
                <button onClick={handleReverseSubmit} style={S.submitBtn}>→</button>
              </div>
              <div style={S.umlauts}>
                {["ä","ö","ü","ß","Ä","Ö","Ü"].map(c=><button key={c} onClick={()=>{setReverseInput(p=>p+c);inputRef.current?.focus();}} style={S.umlautBtn}>{c}</button>)}
              </div>
            </div>
          )}
          {gameMode!=="reverse"&&gameMode!=="matching"&&phase==="question"&&(mode===MODES.ARTICLE||mode===MODES.BOTH)&&(
            <div style={S.articleRow}>
              {["der","die","das"].map(art=>(
                <button key={art} onClick={()=>handleArticle(art)} style={{...S.articleBtn,backgroundColor:articleChoice===art?ARTICLE_COLORS[art]:"transparent",borderColor:ARTICLE_COLORS[art],color:articleChoice===art?"#fff":ARTICLE_COLORS[art]}}>
                  <span style={S.articleBtnMain}>{art}</span>
                  <span style={S.articleBtnSub}>{art==="der"?"masc":art==="die"?"fem":"neut"}</span>
                </button>
              ))}
            </div>
          )}
          {gameMode!=="reverse"&&gameMode!=="matching"&&phase==="question"&&(mode===MODES.PLURAL||mode===MODES.BOTH)&&(
            <div style={S.pluralSection}>
              <label style={S.pluralLabel}>{mode===MODES.BOTH&&!articleChoice?"Pick the article first, then the plural":"Plural form:"}</label>
              <div style={S.pluralChoices}>
                {pluralOptions.map((option, idx)=>(
                  <button
                    key={currentNoun[0] + "-" + option}
                    onClick={()=>handlePluralChoice(option)}
                    disabled={mode===MODES.BOTH&&!articleChoice}
                    style={{...S.pluralChoiceBtn,opacity:mode===MODES.BOTH&&!articleChoice?0.45:1,cursor:mode===MODES.BOTH&&!articleChoice?"not-allowed":"pointer"}}
                  >
                    <span style={S.pluralChoiceKey}>{idx+1}</span>
                    <span style={S.pluralChoiceLabel}>{getPluralOptionLabel(option)}</span>
                  </button>
                ))}
              </div>
            </div>
          )}
          {gameMode!=="reverse"&&gameMode!=="matching"&&phase==="question"&&mode===MODES.ARTICLE&&<div style={S.shortcutHint}>Keys: <kbd style={S.kbd}>1</kbd> der | <kbd style={S.kbd}>2</kbd> die | <kbd style={S.kbd}>3</kbd> das | <kbd style={S.kbd}>H</kbd> hint</div>}
          {gameMode!=="reverse"&&gameMode!=="matching"&&phase==="question"&&mode===MODES.PLURAL&&<div style={S.shortcutHint}>Keys: <kbd style={S.kbd}>1</kbd> <kbd style={S.kbd}>2</kbd> <kbd style={S.kbd}>3</kbd> choose plural | <kbd style={S.kbd}>H</kbd> hint</div>}
          {gameMode!=="reverse"&&gameMode!=="matching"&&phase==="question"&&mode===MODES.BOTH&&<div style={S.shortcutHint}>Keys: <kbd style={S.kbd}>1</kbd> <kbd style={S.kbd}>2</kbd> <kbd style={S.kbd}>3</kbd> article first, then plural | <kbd style={S.kbd}>H</kbd> hint</div>}
        </div>
      )}
    </div>
  );
}
