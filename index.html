function getArticleExplanation(word, article) {
  const w = word, lw = word.toLowerCase();
  const tips = [];

  // в”Җв”Җ 1. COMPOUND NOUNS в”Җв”Җ
  const compoundEnds = [["straГҹe","die","StraГҹe (die)"],["bahn","die","Bahn (die)"],["zeit","die","Zeit (die)"],["stelle","die","Stelle (die)"],["kraft","die","Kraft (die)"],["schrift","die","Schrift (die)"],["haus","das","Haus (das)"],["zeug","das","Zeug (das)"],["rad","das","Rad (das)"],["tier","das","Tier (das)"],["stГјck","das","StГјck (das)"],["werk","das","Werk (das)"],["bild","das","Bild (das)"],["platz","der","Platz (der)"],["hof","der","Hof (der)"],["hafen","der","Hafen (der)"],["punkt","der","Punkt (der)"],["fall","der","Fall (der)"],["schritt","der","Schritt (der)"],["grund","der","Grund (der)"],["raum","der","Raum (der)"],["kampf","der","Kampf (der)"],["schrank","der","Schrank (der)"],["schlag","der","Schlag (der)"],["gang","der","Gang (der)"],["markt","der","Markt (der)"],["dienst","der","Dienst (der)"],["wand","die","Wand (die)"]];

  if (lw.endsWith("ung")) tips.push("Suffix rule: -ung вҶ’ always die. Zero exceptions. One of the first rules to learn.");

  if (lw.endsWith("ur") && article === "die") tips.push("Suffix pattern: -ur вҶ’ usually die (Latin origin). E.g. Natur, Kultur, Struktur, Temperatur.");
  if (lw.endsWith("ei") && article === "die" && !lw.endsWith("erei")) tips.push("Suffix pattern: -ei вҶ’ usually die. E.g. Polizei, Partei, TГјrkei.");
  if (lw.endsWith("erei") && article === "die") tips.push("Suffix rule: -erei вҶ’ always die. Denotes repeated action or a place. E.g. BГӨckerei, BГјcherei.");
  if (lw.endsWith("chen")) tips.push("Suffix rule: -chen (diminutive) вҶ’ always das. Overrides the base noun's gender. das MГӨdchen (from die Magd), das BrГ¶tchen (from das Brot).");
  if (lw.endsWith("lein")) tips.push("Suffix rule: -lein (diminutive) вҶ’ always das. Southern German equivalent of -chen. Always neuter.");

  if (lw.endsWith("nis") && article === "das") tips.push("Suffix pattern: -nis вҶ’ often das (Ergebnis, VerstГӨndnis, GefГӨngnis, Geheimnis). But ~20% are die (Erkenntnis, Erlaubnis, Finsternis) вҖ” check each one.");
  if (lw.endsWith("nis") && article === "die") tips.push("Exception: Most -nis nouns are das, but this one is die. The feminine -nis words (Erkenntnis, Erlaubnis, Kenntnis, Finsternis, Besorgnis) must simply be memorized.");

  // в”Җв”Җ 3. MORPHOLOGICAL PATTERNS в”Җв”Җ
  if (lw.startsWith("ge") && article === "das" && !lw.endsWith("ung") && !lw.endsWith("heit") && !lw.endsWith("keit") && tips.length === 0)
    tips.push("Morphological: Ge- prefix вҶ’ often das. This prefix creates collective or result nouns: Gebiet, Gesetz, Gehirn, Gewicht, GesprГӨch, Gebirge, GetrГӨnk, Geschenk. Strong pattern with few exceptions (der Gedanke, der Gebrauch, die Gefahr, die Geschichte).");
  if (lw.startsWith("ge") && article === "der" && !lw.endsWith("er"))
    tips.push("Exception: Most Ge- nouns are das, but this one is der. Notable masculine Ge- exceptions: der Gedanke, der Gebrauch, der Gehalt, der Genuss, der Geruch, der Geschmack, der Gewinn.");
  if (lw.startsWith("ge") && article === "die" && !lw.endsWith("ung") && !lw.endsWith("heit") && !lw.endsWith("keit") && !lw.endsWith("schaft") && !lw.endsWith("tion"))
    tips.push("Exception: Most Ge- nouns are das, but this one is die. Notable feminine Ge- exceptions: die Gefahr, die Geburt, die Geduld, die Gemeinde, die Geschichte, die Gestalt, die Gewalt.");

  const nomInf = ["Leben","Wissen","Verhalten","Verfahren","Schwimmen","Rennen","Vertrauen","Misstrauen","Einkommen","VermГ¶gen","Unternehmen","Abkommen","Verbrechen","Essen","Trinken","Schreiben","Lesen"];
  if (nomInf.includes(w) && article === "das") tips.push("Morphological: Nominalized infinitive вҶ’ always das. Any German verb can be used as a noun (capitalize it), and it's always neuter. das Leben (to live вҶ’ life), das Essen (to eat вҶ’ food).");

  if (["Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag","Sonntag"].includes(w)) tips.push("Semantic rule: Days of the week вҶ’ always der. Der Montag, der Dienstag, etc. No exceptions.");
  if (["Januar","Februar","MГӨrz","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"].includes(w)) tips.push("Semantic rule: Months вҶ’ always der. Der Januar, der Februar, etc. No exceptions.");
  if (["Norden","SГјden","Osten","Westen"].includes(w)) tips.push("Semantic rule: Cardinal directions вҶ’ always der. Der Norden, der SГјden, der Osten, der Westen.");
  if (["Regen","Wind","Schnee","Nebel","Donner","Frost","Hagel","Tau","Sturm","Blitz"].includes(w)) tips.push("Semantic rule: Weather phenomena вҶ’ typically der. E.g. der Regen, der Wind, der Schnee, der Frost, der Blitz. Exceptions: das Eis, die Wolke, das Gewitter (Ge- prefix вҶ’ das).");
  if (["Gewitter","Wetter"].includes(w)) tips.push("Competing rules: Weather nouns are usually der, BUT the Ge- prefix makes these das. The Ge- prefix wins. das Gewitter, das Wetter.");
  if (w === "Wolke") tips.push("Exception to weather rule: Most weather nouns are der, but die Wolke is feminine. The -e ending pattern (most -e nouns вҶ’ die) overrides the weather category here.");
  if (["Gold","Silber","Eisen","Kupfer","Blei","Zinn","Nickel","Uran","Platin","Aluminium"].includes(w)) tips.push("Semantic rule: Metals and chemical elements вҶ’ typically das. E.g. das Gold, das Silber, das Eisen, das Kupfer.");
  if (w === "Stahl") tips.push("Exception: Most metals are das, but der Stahl is masculine. Stahl is Germanic (not a chemical element name), which may explain the difference.");
  if (["Frau","Mutter","Tochter","Schwester","KГ¶nigin","Nonne","Braut","Witwe","Nichte","Tante","Cousine"].includes(w)) tips.push("Semantic rule: Female persons вҶ’ die. When a noun refers to a specifically female person, grammatical and natural gender align.");
  if (["Mann","Vater","Sohn","Bruder","KГ¶nig","Herr","Onkel","Neffe","BrГӨutigam"].includes(w)) tips.push("Semantic rule: Male persons вҶ’ der. When a noun refers to a specifically male person, grammatical and natural gender align.");
  if (w === "Kind") tips.push("Semantic note: das Kind вҖ” neuter despite referring to a person. This is a famous case where grammatical gender вү  natural gender. Same for das Baby, das MГӨdchen (-chen diminutive вҶ’ always das).");
  if (["Wein","Schnaps","Wodka","Rum","Whisky","Sekt","Champagner","LikГ¶r"].includes(w) && article === "der") tips.push("Semantic rule: Alcoholic beverages вҶ’ usually der. E.g. der Wein, der Schnaps, der Wodka. Notable exception: das Bier.");
  if (w === "Bier") tips.push("Exception: Most alcoholic drinks are der, but das Bier is neuter. Must memorize.");
  if (["Eiche","Buche","Tanne","Birke","Linde","Fichte","Kiefer","Erle","Weide"].includes(w)) tips.push("Semantic rule: Tree species вҶ’ usually die. Die Eiche, die Buche, die Tanne, die Birke. (But: der Baum, der Ahorn, der Apfelbaum вҖ” compounds follow last element.)");
  if (["Blume","Rose","Tulpe","Nelke","Lilie","Orchidee"].includes(w)) tips.push("Semantic rule: Flowers вҶ’ almost always die. Die Rose, die Tulpe, die Nelke. This combines with the -e ending pattern.");
  if (["Rhein","Main","Neckar","Inn"].includes(w)) tips.push("Semantic note: German rivers are split вҖ” most are der (der Rhein, der Main, der Neckar), but several are die (die Donau, die Elbe, die Mosel, die Spree). Non-German rivers are usually die (die Themse, die Seine).");
  if (["Kopf","FuГҹ","Arm","Bein","Mund","Hals","Zahn","Finger","RГјcken","Magen","Ohr","Auge","Herz","Haar","Nase","Schulter","Haut","Knochen","Gehirn","Blut"].includes(w))
    tips.push("Semantic note: Body parts have no reliable gender rule вҖ” they're spread across all three genders. der Kopf, die Nase, das Auge. Each must be memorized individually.");

  // в”Җв”Җ 5. LOANWORD PATTERNS в”Җв”Җ
  if (lw.endsWith("ade") && article === "die") tips.push("Loanword pattern: -ade (French) вҶ’ die. E.g. Fassade, Marmelade, Parade, Limonade.");
  if (lw.endsWith("age") && article === "die") tips.push("Loanword pattern: -age (French) вҶ’ die. E.g. Garage, Etage, Massage, Passage.");
  if (lw.endsWith("ette") && article === "die") tips.push("Loanword pattern: -ette (French) вҶ’ die. E.g. Tablette, Marionette, Kassette.");
  if (lw.endsWith("eur") && article === "der") tips.push("Loanword pattern: -eur (French) вҶ’ der. E.g. Ingenieur, Friseur, Regisseur. Person nouns from French.");
  if (lw.endsWith("ment") && w === "Moment" && article === "der") tips.push("Loanword note: der Moment (point in time) is one of the few masculine -ment nouns. Contrast: das Moment (= a factor/impetus) exists as neuter. Most -ment words are das.");

  // в”Җв”Җ 6. AGENT NOUNS IN -ER в”Җв”Җ
  const agents = ["Lehrer","Arbeiter","KГјnstler","Schriftsteller","Spieler","Zuschauer","BГјrger","Bewohner","Vertreter","Sprecher","FГјhrer","KГӨufer","VerkГӨufer","Mieter","EigentГјmer","Gegner","Partner","Leser","Redner","Fahrer","Trainer","Richter","SchГјler","Mitarbeiter","Nachfolger","VorgГӨnger","Computer","Fernseher","Kalender","Spiegel","Koffer"];
  if (lw.endsWith("er") && article === "der" && agents.includes(w)) tips.push("Agent noun pattern: -er (person/thing that does X) вҶ’ usually der. This is one of the most productive German suffixes. der Lehrer (one who teaches), der Fahrer (one who drives). Even tools/machines follow this: der Computer, der Fernseher.");
  if (lw.endsWith("er") && article === "der" && !agents.includes(w) && tips.length === 0) tips.push("Pattern: -er ending вҶ’ usually der. Covers agents, tools, instruments, and many other categories. But beware: das Fenster, das Wasser, das Messer, das Feuer, das Zimmer are common neuter exceptions.");
  if (lw.endsWith("er") && article === "das") tips.push("Exception: Most -er nouns are der, but this one is das. The common neuter -er nouns (Fenster, Wasser, Messer, Feuer, Zimmer, Leder, Futter, Wetter) are among the most frequent words in German вҖ” they must simply be memorized.");

  // в”Җв”Җ 7. -E ENDING PATTERN в”Җв”Җ
  if (lw.endsWith("e") && article === "die" && !adjDerivatives[w] && tips.length === 0) tips.push("Ending pattern: ~90% of nouns ending in -e are die. This is one of the strongest gender-guessing heuristics in German. When in doubt on an -e noun, guess die.");
  if (lw.endsWith("e") && article === "der" && !verbStems[w] && tips.length === 0) {
    const weakE = ["Name","Gedanke","Glaube","Wille","Friede","Buchstabe","Funke","Haufe","KГӨse","Hase","LГ¶we","Affe","Bote","Erbe","Junge","Knabe","Kunde","Kollege","Zeuge","Riese","Laie","Neffe"];
    if (weakE.includes(w)) tips.push(`Exception: Most -e nouns are die, but '${w}' is one of the well-known masculine exceptions. It's also a weak noun (n-Deklination): ${w}вҶ’${w}n in all cases except nominative singular. These weak -e masculines must be memorized as a group.`);
    else tips.push("Exception: ~90% of -e nouns are die, but this is der. Masculine -e nouns are rare and mostly 'weak nouns' (n-Deklination). Worth memorizing as a set.");
  }
  if (lw.endsWith("e") && article === "das" && tips.length === 0) tips.push("Rare exception: ~90% of -e nouns are die, but this is das. Very few -e nouns are neuter: das Ende, das Auge, das Erbe, das Interesse, das GebГӨude. Memorize these individually.");

  // в”Җв”Җ 8. WEAK NOUN (n-DEKLINATION) FLAG в”Җв”Җ
  const weakNouns = ["Mensch","Herr","Student","Soldat","Bauer","Nachbar","Kunde","Kollege","Held","Kandidat","PrГӨsident","BГӨr","Hase","Affe","Elefant","LГ¶we","Zeuge","Autor","Name","Gedanke","Glaube","Buchstabe","Friede","Fels","Junge","Planet","Architekt","Philosoph","Pilot","Polizist","Journalist","Demokrat","Biologe"];
  if (weakNouns.includes(w) && article === "der") tips.push("вҡ  Weak noun (n-Deklination): This noun takes -(e)n in ALL cases except nominative singular. den Menschen, dem Menschen, des Menschen. Recognizing weak nouns is crucial for correct case usage beyond just the article.");

  // в”Җв”Җ 9. DUAL-GENDER NOTES в”Җв”Җ
  const dualGender = {See:"der See = lake, die See = sea/ocean",Band:"das Band = ribbon, der Band = volume (book), die Band = music band",Leiter:"der Leiter = leader/conductor, die Leiter = ladder",Steuer:"das Steuer = steering wheel, die Steuer = tax",Verdienst:"der Verdienst = earnings, das Verdienst = merit",Schild:"der Schild = shield, das Schild = sign",Tor:"der Tor = fool, das Tor = gate/goal",Gehalt:"der Gehalt = content, das Gehalt = salary",Erbe:"der Erbe = heir, das Erbe = inheritance",Kunde:"der Kunde = customer, die Kunde = news/tidings",Kiefer:"der Kiefer = jaw, die Kiefer = pine tree",Tau:"der Tau = dew, das Tau = rope"};
  if (dualGender[w]) tips.push(`Dual-gender word: ${dualGender[w]}. The gender changes the meaning entirely вҖ” a classic German pitfall.`);

  // в”Җв”Җ 10. MONOSYLLABIC DEFAULTS в”Җв”Җ
  if (tips.length === 0 && w.length <= 5) {
    if (article === "der") tips.push("Short/monosyllabic noun вҖ” no suffix or semantic rule applies. Statistically, ~60% of monosyllabic German nouns are der, ~25% das, ~15% die. But that's a gamble, not a rule. Best memorized in a phrase: 'der Hund bellt', 'der Weg ist lang'.");
    else if (article === "das") tips.push("Short/monosyllabic noun вҖ” no suffix or semantic rule applies. Short neuter nouns are less common (~25% of monosyllables). Many short das-nouns form -er plurals (BuchвҶ’BГјcher, KindвҶ’Kinder, HausвҶ’HГӨuser). Memorize in context.");
    else tips.push("Short/monosyllabic noun вҖ” no suffix or semantic rule applies. Short feminine nouns are the rarest monosyllables (~15%). Many form plurals with umlaut + -e (HandвҶ’HГӨnde, NachtвҶ’NГӨchte, StadtвҶ’StГӨdte).");
  }

  // в”Җв”Җ 11. GENERAL FALLBACK в”Җв”Җ
  if (tips.length === 0) {
    if (article === "die") tips.push("No standard suffix, semantic, or morphological rule applies cleanly. Feminine gender must be memorized. Tip: learn it in a short phrase вҖ” contextual memory is stronger than isolated flashcards.");
    else if (article === "der") tips.push("No standard suffix, semantic, or morphological rule applies cleanly. Masculine gender must be memorized. Tip: associate it with a vivid image or phrase to anchor the article.");
    else tips.push("No standard suffix, semantic, or morphological rule applies cleanly. Neuter gender must be memorized. Tip: learn it as a chunk вҖ” 'das Ziel erreichen', not just 'das Ziel'.");
  }

  return tips.join(" В· ");
}

function getPluralExplanation(word, article, plural) {
  const sing = word, plur = plural, art = article;
  const tips = [];

  if (plur === "вҖ”") {
    return "This noun is singular only (Singularetantum) вҖ” it has no plural form. Common for abstract concepts, materials, and collective nouns.";
  }

  if (plur === sing) {
    if (sing.endsWith("er")||sing.endsWith("el")||sing.endsWith("en"))
      tips.push(`No change (die ${plur}). Rule: Masculine and neuter nouns ending in -er, -el, -en usually keep the same plural form. Some add an umlaut (VaterвҶ’VГӨter), but many don't (FensterвҶ’Fenster). The article change to 'die' is your only plural signal.`);
    else if (sing.endsWith("chen")||sing.endsWith("lein"))
      tips.push(`No change (die ${plur}). Rule: Diminutives (-chen/-lein) never change in plural. Only the article shifts: das MГӨdchen вҶ’ die MГӨdchen.`);
    else
      tips.push(`No change вҖ” identical singular and plural (die ${plur}). No suffix rule predicts this; must memorize. Context and the article 'die' are the only plural markers.`);
    return tips[0];
  }

  const hasUmlaut = /[ГӨГ¶Гј]/.test(plur) && !/[ГӨГ¶Гј]/.test(sing);
  const uml = hasUmlaut ? " + umlaut" : "";
  const umlNote = hasUmlaut ? " The umlaut shifts the stem vowel (aвҶ’ГӨ, oвҶ’Г¶, uвҶ’Гј) вҖ” this is common in monosyllabic masculine and feminine nouns." : "";

  if (plur === sing + "s") {
    tips.push(`+s (die ${plur}). Rule: The -s plural is used for recent loanwords (AutoвҶ’Autos, KinoвҶ’Kinos) and nouns ending in vowels other than -e (SofaвҶ’Sofas, RadioвҶ’Radios). This is the newest plural pattern in German, borrowed from French/English.`);
    return tips[0];
  }

  if (plur.endsWith("er") && !sing.endsWith("er")) {
    if (art === "das")
      tips.push(`-er${uml} (die ${plur}). Rule: The -er plural is the signature neuter pattern for short nouns. E.g. KindвҶ’Kinder, BuchвҶ’BГјcher, HausвҶ’HГӨuser, BildвҶ’Bilder. Almost always adds umlaut if possible.${umlNote}`);
    else
      tips.push(`-er${uml} (die ${plur}). The -er plural is mainly a neuter pattern, but a handful of masculine nouns use it too: MannвҶ’MГӨnner, WaldвҶ’WГӨlder, GottвҶ’GГ¶tter. Feminine nouns never take -er.${umlNote}`);
    return tips[0];
  }

  if (plur === sing + "nen") {
    tips.push(`+nen (die ${plur}). Rule: Feminine person nouns ending in -in double the n: KГ¶niginвҶ’KГ¶niginnen, LehrerinвҶ’Lehrerinnen, Г„rztinвҶ’Г„rztinnen. 100% consistent.`);
    return tips[0];
  }

  if (plur === sing + "n" && sing.endsWith("e")) {
    tips.push(`+n (die ${plur}). Rule: Nouns ending in -e simply add -n. Extremely consistent for feminine nouns (StraГҹeвҶ’StraГҹen, LampeвҶ’Lampen, SchuleвҶ’Schulen). Also applies to masculine weak nouns ending in -e (KollegeвҶ’Kollegen, LГ¶weвҶ’LГ¶wen).`);
    return tips[0];
  }

  if (plur.endsWith("en") && !sing.endsWith("en")) {
    const weak = ["Mensch","Herr","Student","Soldat","Bauer","Nachbar","Kunde","Kollege","Held","Kandidat","PrГӨsident","BГӨr","Hase","Affe","Elefant","LГ¶we","Zeuge","Autor","Name","Gedanke","Glaube","Buchstabe","Friede"];
    if (art === "die")
      tips.push(`-(e)n (die ${plur}). Rule: The most common feminine plural. Nearly all die-nouns that don't end in -e take -(e)n: FrauвҶ’Frauen, TГјrвҶ’TГјren, UhrвҶ’Uhren, ZahlвҶ’Zahlen. When you know it's die, guess -(e)n for the plural and you'll usually be right.`);
    else if (art === "der" && weak.includes(sing))
      tips.push(`-(e)n (die ${plur}). вҡ  Weak noun (n-Deklination): This noun takes -(e)n not just in plural, but in ALL cases except nominative singular. den ${plur.endsWith("en") ? sing + "en" : plur}, dem ${plur.endsWith("en") ? sing + "en" : plur}, des ${plur.endsWith("en") ? sing + "en" : plur}. The plural form is the same as the accusative/dative/genitive singular. Weak nouns must be memorized as a group.`);
    else if (art === "der")
      tips.push(`-(e)n (die ${plur}). Some masculine nouns take -(e)n plural, especially weak nouns (n-Deklination) and Latin-origin words. Check if this noun also takes -(e)n in accusative/dative/genitive вҖ” if so, it's a weak noun.`);
    else
      tips.push(`-(e)n (die ${plur}). Less common for neuter nouns, but occurs with Latin/Greek-origin words. E.g. AugeвҶ’Augen, OhrвҶ’Ohren, InteresseвҶ’Interessen.`);
    return tips[0];
  }

  if ((plur === sing + "e") || (plur.endsWith("e") && !sing.endsWith("e") && plur.length === sing.length + 1) || (hasUmlaut && plur.endsWith("e"))) {
    if (art === "der")
      tips.push(`-e${uml} (die ${plur}). Rule: The default masculine plural. Monosyllabic der-nouns very often take -e, frequently with umlaut: TagвҶ’Tage, StuhlвҶ’StГјhle, KopfвҶ’KГ¶pfe, HundвҶ’Hunde. Tip: if it's der and one syllable, try -e (Вұumlaut) first.${umlNote}`);
    else if (art === "das")
      tips.push(`-e${uml} (die ${plur}). Rule: Some neuter nouns take -e, usually WITHOUT umlaut: JahrвҶ’Jahre, SpielвҶ’Spiele, ZielвҶ’Ziele, TierвҶ’Tiere. Neuter -e plurals rarely umlaut (exception: das FloГҹвҶ’FlГ¶Гҹe).`);
    else
      tips.push(`-e${uml} (die ${plur}). Feminine nouns with -e plural are less common but important вҖ” they almost always take umlaut: HandвҶ’HГӨnde, NachtвҶ’NГӨchte, KraftвҶ’KrГӨfte, StadtвҶ’StГӨdte, WandвҶ’WГӨnde, AngstвҶ’Г„ngste. These are mostly monosyllabic.${umlNote}`);
    return tips[0];
  }

  if (hasUmlaut && plur.length === sing.length)
    return `Umlaut only, no ending added (die ${plur}). Rule: Some -er/-el/-en nouns add an umlaut without changing the ending: VaterвҶ’VГӨter, MutterвҶ’MГјtter, BruderвҶ’BrГјder, BodenвҶ’BГ¶den, OfenвҶ’Г–fen. This is the same "no change" pattern as FensterвҶ’Fenster, but with an umlaut added. Must memorize which nouns umlaut and which don't.`;

  if (sing.endsWith("um") && (plur.endsWith("en") || plur.endsWith("a") || plur.endsWith("ien"))) {
    if (plur.endsWith("en")) return `-umвҶ’-en (die ${plur}). Latin/Greek pattern: The -um ending is dropped and replaced with -en. This is how German naturalizes Latin neuter plurals: MuseumвҶ’Museen, DatumвҶ’Daten, ZentrumвҶ’Zentren. Very consistent.`;
    if (plur.endsWith("a")) return `-umвҶ’-a (die ${plur}). Latin pattern: Some Latin nouns keep their original Latin plural (-umвҶ’-a). VisumвҶ’Visa, PraktikumвҶ’Praktika. More formal/technical words tend to keep Latin plurals.`;
    if (plur.endsWith("ien")) return `-iumвҶ’-ien (die ${plur}). Latin pattern: -ium nouns become -ien. StudiumвҶ’Studien, MinisteriumвҶ’Ministerien. Very consistent for -ium words.`;
  }
  if (sing.endsWith("us") && plur.endsWith("en")) return `-usвҶ’-en (die ${plur}). Latin/Greek pattern: RhythmusвҶ’Rhythmen, GlobusвҶ’Globen. German replaces the Latin ending with -(s)en.`;
  if (sing.endsWith("a") && plur.endsWith("en")) return `-aвҶ’-en (die ${plur}). Latin/Italian pattern: FirmaвҶ’Firmen, ThemaвҶ’Themen, KommaвҶ’Kommata/Kommas. The -a ending is replaced.`;

  if (hasUmlaut) return `Modified stem${uml} (die ${plur}). This plural involves both a suffix and an umlaut shift. The umlaut is common in monosyllabic nouns with a, o, or u in the stem. Must memorize this form with the noun.`;

  return `die ${plur}. This plural form doesn't fit a clean pattern вҖ” memorize it alongside the noun. Tip: say the full form aloud вҖ” "${art} ${sing}, die ${plur}" вҖ” to build muscle memory.`;
}

async function gistFetch(path, opts = {}) {
  const pat = getPat();
  if (!pat) throw new Error("No PAT configured");
  const r = await fetch(`https://api.github.com${path}`, {
    ...opts,
    headers: { Authorization: `token ${pat}`, Accept: "application/vnd.github+json", ...opts.headers },
  });
  if (!r.ok) throw new Error(`GitHub API ${r.status}: ${r.statusText}`);
  return r.json();
}

async function loadGistData() {
  const gistId = getGistId();
  if (!gistId) return { ...DEFAULT_DATA };
  const gist = await gistFetch(`/gists/${gistId}`);
  const file = gist.files[GIST_FILENAME];
  if (!file) return { ...DEFAULT_DATA };
  return JSON.parse(file.content);
}

async function saveGistData(data) {
  const gistId = getGistId();
  const body = { files: { [GIST_FILENAME]: { content: JSON.stringify(data, null, 2) } } };
  if (gistId) {
    return gistFetch(`/gists/${gistId}`, { method: "PATCH", body: JSON.stringify(body) });
  } else {
    const gist = await gistFetch("/gists", {
      method: "POST",
      body: JSON.stringify({ description: "Artikel Blitz вҖ” saved progress", public: false, ...body }),
    });
    setGistId(gist.id);
    return gist;
  }
}

// XP: level N requires 50*N*(N-1) total XP
function xpForLevel(n) { return 50 * n * (n - 1); }
function levelFromXp(xp) { let l = 1; while (xpForLevel(l + 1) <= xp) l++; return l; }
function xpProgress(xp) { const l = levelFromXp(xp); const cur = xpForLevel(l); const nxt = xpForLevel(l + 1); return { level: l, current: xp - cur, needed: nxt - cur, total: xp }; }

function checkAchievements(data, sessionAchievements = []) {
  const newlyEarned = [];
  const all = [...data.achievements, ...sessionAchievements];
  for (const a of ACHIEVEMENTS) {
    if (all.includes(a.id)) continue;
    if (a.check && a.check(data)) newlyEarned.push(a.id);
  }
  return [...sessionAchievements, ...newlyEarned];
}

// Session XP/coin calculator
function calcSessionRewards(totalCorrect, totalAnswered, bestStreak, mode, difficulty, activePerks, gameMode) {
  let xp = totalCorrect * 10 + (totalAnswered - totalCorrect) * 3;
  xp += bestStreak * 2;
  const acc = totalAnswered > 0 ? totalCorrect / totalAnswered : 0;
  if (acc >= 1) xp += 200; else if (acc >= 0.9) xp += 100; else if (acc >= 0.8) xp += 50;
  if (mode === MODES.PLURAL) xp = Math.floor(xp * 1.2);
  if (mode === MODES.BOTH) xp = Math.floor(xp * 1.5);
  if (difficulty === "normal") xp = Math.floor(xp * 1.25);
  if (difficulty === "hard") xp = Math.floor(xp * 1.5);
  if (gameMode === "timed") xp = Math.floor(xp * 1.3);
  if (gameMode === "survival") xp = Math.floor(xp * 1.4);
  if (activePerks.includes("double_xp")) xp *= 2;

  let coins = totalCorrect;
  if (bestStreak >= 10) coins += 5;
  if (bestStreak >= 25) coins += 10;
  if (acc >= 1 && totalAnswered >= 5) coins += 15;

  return { xp: Math.floor(xp), coins };
}

// SRS: build a weighted queue вҖ” struggling nouns appear more, mastered less
function buildSrsQueue(nouns, nounStats, maxSize) {
  const weighted = nouns.map(n => {
    const s = nounStats[n[0]];
    if (!s) return { noun: n, weight: 5 }; // never seen = high priority
    const ratio = s.attempts > 0 ? s.correct / s.attempts : 0;
    const cStreak = s.consecutiveCorrect || 0;
    if (cStreak >= 5) return { noun: n, weight: 0.5 }; // mastered = low priority
    if (ratio < 0.5) return { noun: n, weight: 8 }; // struggling
    if (ratio < 0.75) return { noun: n, weight: 4 }; // needs work
    return { noun: n, weight: 2 }; // decent
  });
  // Weighted random selection
  const pool = [];
  for (const { noun, weight } of weighted) {
    const count = Math.max(1, Math.round(weight));
    for (let i = 0; i < count; i++) pool.push(noun);
  }
  const shuffled = shuffleArray(pool);
  const seen = new Set(); const result = [];
  for (const n of shuffled) {
    if (seen.has(n[0])) continue;
    seen.add(n[0]); result.push(n);
    if (result.length >= maxSize) break;
  }
  return result;
}

// Generate weakest nouns deck from stats
function getWeakestNouns(nounStats, count = 30) {
  const entries = Object.entries(nounStats)
    .filter(([, s]) => s.attempts >= 2)
    .map(([noun, s]) => ({ noun, ratio: s.correct / s.attempts, attempts: s.attempts }))
    .sort((a, b) => a.ratio - b.ratio || b.attempts - a.attempts);
  return entries.slice(0, count).map(e => e.noun);
}

// Daily streak logic
function updateDailyStreak(streak) {
  const today = new Date().toISOString().slice(0, 10);
  if (streak.lastDate === today) return streak; // already played today
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  if (streak.lastDate === yesterday) {
    const c = streak.current + 1;
    return { current: c, lastDate: today, best: Math.max(streak.best || 0, c) };
  }
  return { current: 1, lastDate: today, best: Math.max(streak.best || 0, 1) }; // streak broken
}
